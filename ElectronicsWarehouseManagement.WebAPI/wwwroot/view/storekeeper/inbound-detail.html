<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Inbound Detail</title>
    <style>
        :root{--muted:#64748b;--accent:#16a34a}
        body{font-family:Inter, 'Segoe UI', Roboto, Arial, sans-serif;padding:24px;background:#f6fbf9;color:#0f172a}
        .container{max-width:1000px;margin:0 auto}
        .card{background:#fff;padding:18px;border-radius:12px;box-shadow:0 10px 30px rgba(2,6,23,0.06)}
        .header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
        .title{display:flex;flex-direction:column}
        h2{margin:0;font-size:20px}
        .meta{color:var(--muted);font-size:13px}
        .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
        .info-block{background:#f8fff9;padding:12px;border-radius:8px;border:1px solid #ecfdf6}
        table{width:100%;border-collapse:collapse;margin-top:12px}
        th,td{padding:10px;border-bottom:1px solid #f1f5f4;text-align:left}
        thead th{background:#f0fdf4;color:#065f46}
        .actions{display:flex;gap:8px;margin-top:14px}
        .btn{padding:8px 12px;border-radius:8px;border:none;cursor:pointer}
        .btn.primary{background:var(--accent);color:#fff}
        .btn.ghost{background:transparent;border:1px solid #e6f7ef}
        .table-card{background:#fff;border-radius:8px;padding:8px;border:1px solid #ecfdf6}
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="title">
                    <button class="btn ghost" onclick="location.href='inbound-list.html'">⬅ Back</button>
                    <h2>Phiếu Nhập</h2>
                    <div class="meta">Chi tiết phiếu nhập kho</div>
                </div>
                <div style="text-align:right">
                    <div id="createdBy" class="meta">Người tạo: -</div>
                    <div id="createdAt" class="meta">Ngày tạo: -</div>
                </div>
            </div>

            <div id="detail"></div>

            <div class="actions">
                <button id="confirmBtn" class="btn primary" onclick="confirmOrder()" style="display:none">Xác nhận</button>
                <button class="btn ghost" onclick="location.href='inbound-list.html'">Quay lại</button>
            </div>
        </div>
    </div>

    <script>
        const BASE = "https://localhost:7297/api";
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        let transfer = null;
        const componentCache = {};
        const warehouseCache = {};

        async function resolveWarehouses(t) {
            if (!t) return;
            try {
                const binFrom = t.bin_from ?? t.binFrom ?? null;
                if (binFrom) {
                    const w = binFrom.warehouse ?? binFrom.Warehouse ?? null;
                    const wid = (typeof binFrom.warehouse === 'object') ? (binFrom.warehouse?.id) : (binFrom.warehouse ?? binFrom.warehouse_id ?? binFrom.warehouseId ?? binFrom.WarehouseId);
                    const needFetch = !w || (typeof w !== 'object');
                    if (needFetch && wid && !warehouseCache[wid]) {
                        try {
                            const wres = await fetch(BASE + '/storekeeper/warehouses/' + wid, { credentials: 'include' });
                            if (wres.ok) {
                                const wjson = await wres.json();
                                if (wjson?.success && wjson.data) warehouseCache[wid] = wjson.data;
                            }
                        } catch (e) { console.error('warehouse fetch failed', e); }
                    }
                    if (warehouseCache[wid]) binFrom.warehouse = warehouseCache[wid];
                }

                const binTo = t.bin_to ?? t.binTo ?? null;
                if (binTo) {
                    const w2 = binTo.warehouse ?? binTo.Warehouse ?? null;
                    const wid2 = (typeof binTo.warehouse === 'object') ? (binTo.warehouse?.id) : (binTo.warehouse ?? binTo.warehouse_id ?? binTo.warehouseId ?? binTo.WarehouseId);
                    const needFetch2 = !w2 || (typeof w2 !== 'object');
                    if (needFetch2 && wid2 && !warehouseCache[wid2]) {
                        try {
                            const wres2 = await fetch(BASE + '/storekeeper/warehouses/' + wid2, { credentials: 'include' });
                            if (wres2.ok) {
                                const wjson2 = await wres2.json();
                                if (wjson2?.success && wjson2.data) warehouseCache[wid2] = wjson2.data;
                            }
                        } catch (e) { console.error('warehouse fetch failed', e); }
                    }
                    if (warehouseCache[wid2]) binTo.warehouse = warehouseCache[wid2];
                }
            } catch (e) { console.error('resolveWarehouses failed', e); }
        }

        async function load() {
            const res = await fetch(BASE + '/storekeeper/transfers/' + id, {credentials:'include'});
            const json = await res.json();
            transfer = json.data;

            const comps = getComponents(transfer);
            await resolveComponentNames(comps);
            await resolveWarehouses(transfer);
            console.debug('transfer loaded', transfer);
            render();
            // set created info
            try{
                const createdBy = transfer.created_by ?? transfer.createdBy ?? transfer.created_by_name ?? transfer.createdByName ?? transfer.owner ?? null;
                const createdAt = transfer.creation_date ?? transfer.creationDate ?? transfer.created_at ?? transfer.createdAt ?? null;
                if(document.getElementById('createdBy')) document.getElementById('createdBy').innerText = 'Người tạo: ' + (createdBy ?? 'Auto');
                if(document.getElementById('createdAt')) document.getElementById('createdAt').innerText = 'Ngày tạo: ' + (createdAt ? new Date(createdAt).toLocaleString('vi-VN') : '-');
            }catch(e){/* ignore */}
        }

        async function resolveComponentNames(comps) {
            if (!Array.isArray(comps)) return;
            await Promise.all(comps.map(async c => {
                const currentName = getComponentName(c);
                if (currentName && !currentName.startsWith('Component #')) return;
                const id = c.component_id ?? c.componentId ?? c.component?.id;
                if (!id) return;
                if (componentCache[id]) {
                    c.component = c.component ?? {};
                    c.component.metadata = componentCache[id].metadata ?? componentCache[id].Metadata ?? componentCache[id];
                    return;
                }

        async function resolveWarehouses(t) {
            if (!t) return;
            try {
                const binFrom = t.bin_from ?? t.binFrom ?? null;
                if (binFrom) {
                    const w = binFrom.warehouse ?? binFrom.Warehouse ?? null;
                    const wid = (typeof binFrom.warehouse === 'object') ? (binFrom.warehouse?.id) : (binFrom.warehouse ?? binFrom.warehouse_id ?? binFrom.warehouseId ?? binFrom.WarehouseId);
                    const needFetch = !w || (typeof w !== 'object');
                    if (needFetch && wid && !warehouseCache[wid]) {
                        try {
                            const wres = await fetch(BASE + '/storekeeper/warehouses/' + wid, { credentials: 'include' });
                            if (wres.ok) {
                                const wjson = await wres.json();
                                if (wjson?.success && wjson.data) warehouseCache[wid] = wjson.data;
                            }
                        } catch (e) { console.error('warehouse fetch failed', e); }
                    }
                    if (warehouseCache[wid]) binFrom.warehouse = warehouseCache[wid];
                }

                const binTo = t.bin_to ?? t.binTo ?? null;
                if (binTo) {
                    const w2 = binTo.warehouse ?? binTo.Warehouse ?? null;
                    const wid2 = (typeof binTo.warehouse === 'object') ? (binTo.warehouse?.id) : (binTo.warehouse ?? binTo.warehouse_id ?? binTo.warehouseId ?? binTo.WarehouseId);
                    const needFetch2 = !w2 || (typeof w2 !== 'object');
                    if (needFetch2 && wid2 && !warehouseCache[wid2]) {
                        try {
                            const wres2 = await fetch(BASE + '/storekeeper/warehouses/' + wid2, { credentials: 'include' });
                            if (wres2.ok) {
                                const wjson2 = await wres2.json();
                                if (wjson2?.success && wjson2.data) warehouseCache[wid2] = wjson2.data;
                            }
                        } catch (e) { console.error('warehouse fetch failed', e); }
                    }
                    if (warehouseCache[wid2]) binTo.warehouse = warehouseCache[wid2];
                }
            } catch (e) { console.error('resolveWarehouses failed', e); }
        }
                try {
                    const cres = await fetch(BASE + '/storekeeper/components/' + id, { credentials: 'include' });
                    if (!cres.ok) return;
                    const cjson = await cres.json();
                    if (cjson?.success && cjson.data) {
                        componentCache[id] = cjson.data;
                        c.component = c.component ?? {};
                        c.component.metadata = cjson.data.metadata ?? cjson.data.Metadata ?? cjson.data;
                    }
                } catch (e) { console.error('component fetch failed', e); }
            }));
        }

        function getComponents(obj) {
            if (!obj) return [];
            const keys = ['components','Components','transfer_request_components','transferRequestComponents','TransferRequestComponents','data'];
            for (const k of keys) if (Array.isArray(obj[k])) return obj[k];
            for (const k of Object.keys(obj)) {
                if (Array.isArray(obj[k]) && obj[k].length>0 && (obj[k][0].quantity !== undefined || obj[k][0].component_id !== undefined))
                    return obj[k];
            }
            return [];
        }

        function getComponentName(c) {
            return c?.name ?? c?.Name ?? c?.metadata?.name ?? c?.Metadata?.name ?? c?.component?.metadata?.name ?? c?.component?.metadata?.Name ?? ('Component #' + (c.component_id ?? c.componentId ?? c.component?.id ?? '?'));
        }

        function render() {
            if (!transfer) return;
            let html = `
<p><b>Description:</b> ${transfer.description}</p>
<p><b>Warehouse:</b> ${(transfer.bin_to?.warehouse?.warehouseName ?? transfer.bin_to?.warehouse?.name) ?? (transfer.bin_from?.warehouse?.warehouseName ?? transfer.bin_from?.warehouse?.name) ?? '-'}</p>
<p><b>Bin:</b> ${transfer.bin_to?.location_in_warehouse ?? transfer.bin_to?.locationInWarehouse ?? transfer.bin_from?.location_in_warehouse ?? transfer.bin_from?.locationInWarehouse ?? '-'}</p>
<p><b>Status:</b> ${transfer.status}</p>
<hr>
<h4>Products</h4>
<table border="1" style="width:100%;border-collapse:collapse">
<tr><th>Name</th><th>Quantity</th><th>Unit Price</th></tr>
`;

            const comps = getComponents(transfer);
            comps.forEach(c => {
                const name = getComponentName(c);
                const qty = c.quantity ?? c.Quantity ?? c.qty ?? 0;
                const price = c.unit_price ?? c.unitPrice ?? c.UnitPrice ?? '';
                html += `<tr><td>${name}</td><td>${qty}</td><td>${price}</td></tr>`;
            });
            html += `</table>`;

            document.getElementById('detail').innerHTML = html;

            // hiển thị nút confirm khi trạng thái là Approved hoặc Approved - Waiting Confirm
            if (transfer.status === 1 || transfer.status === 2) {
                document.getElementById('confirmBtn').style.display = 'inline-block';
            }
        }

        async function confirmOrder() {
            if (!confirm('Xác nhận đơn?')) return;

            const comps = getComponents(transfer);
            const requestId = transfer.id ?? transfer.ID ?? transfer.request_id ?? transfer.RequestId ?? 0;
            // Build bins_to from related transfers (or single transfer)
            const related = transfer._related ?? [transfer];
            const binsTo = [];
            for (const t of related) {
                const binToId = t.bin_to_id ?? t.binToId ?? t.bin_to?.id ?? t.bin_to?.ID ?? null;
                const compsT = getComponents(t) || [];
                const compsPayload = compsT.map(c => ({ component_id: c.component_id ?? c.componentId ?? c.component?.id, quantity: c.quantity ?? c.qty ?? c.Quantity }));
                if (binToId && compsPayload.length) binsTo.push({ bin_id: binToId, components: compsPayload });
            }
            const payload = { request_id: requestId, bins_to: binsTo.length ? binsTo : undefined };

            const res = await fetch(BASE + '/storekeeper/transfers/confirm', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(payload)
            });
            if (!res.ok) {
                const txt = await res.text().catch(()=>null);
                console.error('confirm error', txt || res.statusText);
                return alert('Tạo thất bại: ' + (txt || res.statusText));
            }
            let json;
            try { json = await res.json(); } catch (e) { return alert('Server returned invalid response'); }
            if (json?.success) { alert('Confirmed'); location.href='inbound-list.html'; }
            else alert(json?.msg || json?.message || 'Error');
        }

        load();
    </script>
</body>
</html>
