<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Inbound Detail</title>
    <style>
        :root{--muted:#64748b;--accent:#16a34a}
        body{font-family:Inter, 'Segoe UI', Roboto, Arial, sans-serif;padding:24px;background:#f6fbf9;color:#0f172a}
        .container{max-width:1000px;margin:0 auto}
        .card{background:#fff;padding:18px;border-radius:12px;box-shadow:0 10px 30px rgba(2,6,23,0.06)}
        .header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
        .title{display:flex;flex-direction:column}
        h2{margin:0;font-size:20px}
        .meta{color:var(--muted);font-size:13px}
        .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
        .info-block{background:#f8fff9;padding:12px;border-radius:8px;border:1px solid #ecfdf6}
        table{width:100%;border-collapse:collapse;margin-top:12px}
        th,td{padding:10px;border-bottom:1px solid #f1f5f4;text-align:left}
        thead th{background:#f0fdf4;color:#065f46}
        .actions{display:flex;gap:8px;margin-top:14px}
        .btn{padding:8px 12px;border-radius:8px;border:none;cursor:pointer}
        .btn.primary{background:var(--accent);color:#fff}
        .btn.ghost{background:transparent;border:1px solid #e6f7ef}
        .table-card{background:#fff;border-radius:8px;padding:8px;border:1px solid #ecfdf6}
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="title">
                    <button class="btn ghost" onclick="location.href='inbound-list.html'">⬅ Back</button>
                    <h2>Phiếu Nhập</h2>
                    <div class="meta">Chi tiết phiếu nhập kho</div>
                </div>
                <div style="text-align:right">
                    <div id="createdBy" class="meta">Người tạo: -</div>
                    <div id="createdAt" class="meta">Ngày tạo: -</div>
                </div>
            </div>

            <div id="detail"></div>

            <div id="confirmSection" style="display:none; margin-top:20px; background:#f0fdf4; border:1px solid #bbf7d0; padding:16px; border-radius:8px">
                <h4 style="margin-top:0; color:#065f46">Phân bổ Lưu kho (Inbound)</h4>
                <div style="margin-bottom:8px; color:#0f172a; font-size:14px">Vui lòng chọn sản phẩm, số lượng và Bin tương ứng để lưu trữ (có thể phân bổ vào nhiều Bin):</div>
                <table style="width:100%; text-align:left; background:#fff; border-radius:6px; border-collapse: collapse; margin-top:8px;" id="allocationTable">
                    <thead>
                        <tr style="border-bottom:1px solid #bbf7d0; background:#f0fdf4;">
                            <th style="padding:8px">Sản phẩm</th>
                            <th style="padding:8px; width:200px;">Bin lưu trữ</th>
                            <th style="padding:8px; width:120px;">Số lượng</th>
                            <th style="padding:8px; width:60px;"></th>
                        </tr>
                    </thead>
                    <tbody id="allocationBody">
                    </tbody>
                </table>
                <button class="btn ghost" style="margin-top:12px; font-size:13px; border-color:#bbf7d0; color:#065f46" onclick="addAllocationRow()">+ Thêm phân bổ</button>
            </div>

            <div class="actions">
                <button id="confirmBtn" class="btn primary" onclick="confirmOrder()" style="display:none">Xác nhận</button>
                <button class="btn ghost" onclick="location.href='inbound-list.html'">Quay lại</button>
            </div>
        </div>
    </div>

    <script>
        const BASE = "https://localhost:7297/api";
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        let transfer = null;
        const componentCache = {};
        const warehouseCache = {};
        const customerCache = {};

        async function resolveWarehouses(t) {
            if (!t) return;
            try {
                const binFrom = t.bin_from ?? t.binFrom ?? null;
                if (binFrom) {
                    const w = binFrom.warehouse ?? binFrom.Warehouse ?? null;
                    const wid = (typeof binFrom.warehouse === 'object') ? (binFrom.warehouse?.id) : (binFrom.warehouse ?? binFrom.warehouse_id ?? binFrom.warehouseId ?? binFrom.WarehouseId);
                    const needFetch = !w || (typeof w !== 'object');
                    if (needFetch && wid && !warehouseCache[wid]) {
                        try {
                            const wres = await fetch(BASE + '/storekeeper/warehouses/' + wid, { credentials: 'include' });
                            if (wres.ok) {
                                const wjson = await wres.json();
                                if (wjson?.success && wjson.data) warehouseCache[wid] = wjson.data;
                            }
                        } catch (e) { console.error('warehouse fetch failed', e); }
                    }
                    if (warehouseCache[wid]) binFrom.warehouse = warehouseCache[wid];
                }

                const binTo = t.bin_to ?? t.binTo ?? null;
                if (binTo) {
                    const w2 = binTo.warehouse ?? binTo.Warehouse ?? null;
                    const wid2 = (typeof binTo.warehouse === 'object') ? (binTo.warehouse?.id) : (binTo.warehouse ?? binTo.warehouse_id ?? binTo.warehouseId ?? binTo.WarehouseId);
                    const needFetch2 = !w2 || (typeof w2 !== 'object');
                    if (needFetch2 && wid2 && !warehouseCache[wid2]) {
                        try {
                            const wres2 = await fetch(BASE + '/storekeeper/warehouses/' + wid2, { credentials: 'include' });
                            if (wres2.ok) {
                                const wjson2 = await wres2.json();
                                if (wjson2?.success && wjson2.data) warehouseCache[wid2] = wjson2.data;
                            }
                        } catch (e) { console.error('warehouse fetch failed', e); }
                    }
                    if (warehouseCache[wid2]) binTo.warehouse = warehouseCache[wid2];
                }
            } catch (e) { console.error('resolveWarehouses failed', e); }
        }

        async function resolveCustomers(transfers) {
            if (!Array.isArray(transfers) || transfers.length === 0) return;
            try {
                const res = await fetch(BASE + '/storekeeper/customers', { credentials: 'include' });
                if (!res.ok) return;
                const json = await res.json();
                if (!json?.success || !Array.isArray(json.data)) return;
                json.data.forEach(c => { customerCache[c.id ?? c.customer_id ?? c.customerId] = c; });
            } catch (e) { /* ignore */ }
            transfers.forEach(t => {
                const cid = t.customer_id ?? t.CustomerId ?? t.customerId ?? null;
                if (cid && customerCache[cid]) t._customerName = customerCache[cid].name ?? customerCache[cid].customer_name ?? customerCache[cid].displayName ?? customerCache[cid].fullName ?? null;
            });
        }

        async function load() {
            try {
                const res = await fetch(BASE + '/storekeeper/transfers/' + id, {credentials:'include'});
                if (!res.ok) {
                    document.getElementById('detail').innerHTML = `<div style="color:#ef4444; font-weight:bold; padding:12px;">Lỗi tải dữ liệu phiếu nhập: Server trả về mã ${res.status}. Vui lòng thử tải lại trang hoặc chờ trong giây lát.</div>`;
                    return;
                }
                const json = await res.json();
                transfer = json.data;
                if (!transfer) {
                    document.getElementById('detail').innerHTML = `<div style="color:#ef4444; font-weight:bold; padding:12px;">Không tìm thấy thông tin phiếu nhập.</div>`;
                    return;
                }
            } catch (err) {
                document.getElementById('detail').innerHTML = `<div style="color:#ef4444; font-weight:bold; padding:12px;">Lỗi mạng hoặc máy chủ không phản hồi: ${err.message}</div>`;
                return;
            }

            const comps = getComponents(transfer);
            await resolveComponentNames(comps);
            await resolveWarehouses(transfer);
            await resolveCustomers([transfer]);
            console.debug('transfer loaded', transfer);
            try { render(); } catch(e) { console.error('render error', e); document.getElementById('detail').innerHTML = '<div style="color:#b91c1c;font-weight:600;padding:12px">Lỗi khi hiển thị chi tiết: ' + (e?.message || e) + '</div>'; }
            // set created info
            try{
                const createdBy = transfer.created_by ?? transfer.createdBy ?? transfer.created_by_name ?? transfer.createdByName ?? transfer.owner ?? null;
                const createdAt = transfer.creation_date ?? transfer.creationDate ?? transfer.created_at ?? transfer.createdAt ?? null;
                if(document.getElementById('createdBy')) document.getElementById('createdBy').innerText = 'Người tạo: ' + (createdBy ?? 'Auto');
                if(document.getElementById('createdAt')) document.getElementById('createdAt').innerText = 'Ngày tạo: ' + (createdAt ? new Date(createdAt).toLocaleString('vi-VN') : '-');
            }catch(e){/* ignore */}
        }

        async function resolveComponentNames(comps) {
            if (!Array.isArray(comps)) return;
            await Promise.all(comps.map(async c => {
                const currentName = getComponentName(c);
                if (currentName && !currentName.startsWith('Component #')) return;
                const id = c.component_id ?? c.componentId ?? c.component?.id;
                if (!id) return;
                if (componentCache[id]) {
                    c.component = c.component ?? {};
                    c.component.metadata = componentCache[id].metadata ?? componentCache[id].Metadata ?? componentCache[id];
                    return;
                }
                try {
                    const cres = await fetch(BASE + '/storekeeper/components/' + id, { credentials: 'include' });
                    if (!cres.ok) return;
                    const cjson = await cres.json();
                    if (cjson?.success && cjson.data) {
                        componentCache[id] = cjson.data;
                        c.component = c.component ?? {};
                        c.component.metadata = cjson.data.metadata ?? cjson.data.Metadata ?? cjson.data;
                    }
                } catch (e) { console.error('component fetch failed', e); }
            }));
        }

        function getComponents(obj) {
            if (!obj) return [];
            const keys = ['components','Components','transfer_request_components','transferRequestComponents','TransferRequestComponents','data'];
            for (const k of keys) if (Array.isArray(obj[k])) return obj[k];
            for (const k of Object.keys(obj)) {
                if (Array.isArray(obj[k]) && obj[k].length>0 && (obj[k][0].quantity !== undefined || obj[k][0].component_id !== undefined))
                    return obj[k];
            }
            return [];
        }

        function getComponentName(c) {
            return c?.name ?? c?.Name ?? c?.metadata?.name ?? c?.Metadata?.name ?? c?.component?.metadata?.name ?? c?.component?.metadata?.Name ?? ('Component #' + (c.component_id ?? c.componentId ?? c.component?.id ?? '?'));
        }

        function render() {
            if (!transfer) return;
            let html = `
<div class="info-grid">
  <div class="info-block">
    <div style="font-weight:700">Description</div>
    <div class="meta">${transfer.description ?? '-'}</div>
  </div>
  <div class="info-block">
    <div style="font-weight:700">Warehouse / Bin</div>
    <div class="meta">${(transfer.bin_to?.warehouse?.warehouseName ?? transfer.bin_to?.warehouse?.name) ?? (transfer.bin_from?.warehouse?.warehouseName ?? transfer.bin_from?.warehouse?.name) ?? '-'} / ${(transfer.bin_to?.location_in_warehouse ?? transfer.bin_to?.locationInWarehouse) ?? (transfer.bin_from?.location_in_warehouse ?? transfer.bin_from?.locationInWarehouse) ?? '-'}</div>
    <div style="height:8px"></div>
    <div style="font-weight:700">Status</div>
    <div class="meta">${(function(s){ switch(s){case 0:return 'Unknown';case 1:return 'Pending';case 2:return 'Approved - Waiting Confirm';case 3:return 'Rejected';default:return 'Completed';}})(transfer.status)}</div>
    <div style="height:8px"></div>
    <div style="font-weight:700">Customer</div>
    <div class="meta">${transfer._customerName ?? (transfer.customer_id ? ('Customer ID: ' + transfer.customer_id) : '-')}</div>
  </div>
</div>
<hr />
<h4>Products</h4>
<div class="table-card">
  <table>
    <thead>
      <tr><th>Name</th><th style="width:120px">Quantity</th><th style="width:140px">Unit Price</th></tr>
    </thead>
    <tbody>
`;

            const comps = getComponents(transfer);
            comps.forEach(c => {
                const name = getComponentName(c);
                const qty = c.quantity ?? c.Quantity ?? c.qty ?? 0;
                const price = c.unit_price ?? c.unitPrice ?? c.UnitPrice ?? '';
                html += `<tr><td>${name}</td><td>${qty}</td><td>${price}</td></tr>`;
            });
            html += `</table>`;

            document.getElementById('detail').innerHTML = html;

            // hiển thị nút confirm khi trạng thái là Approved
            if (transfer.status === 2) {
                document.getElementById('confirmBtn').style.display = 'inline-block';
                document.getElementById('confirmSection').style.display = 'block';
                loadBinsForConfirm();
            }
        }

        let availableBins = [];
        let orderProducts = [];

        async function loadBinsForConfirm() {
            try {
                orderProducts = getComponents(transfer).map(c => ({
                    id: c.component_id ?? c.componentId ?? c.component?.id,
                    name: getComponentName(c),
                    maxQty: Number(c.quantity ?? c.qty ?? c.Quantity ?? 0)
                }));
                
                // Add initial row for each product
                document.getElementById('allocationBody').innerHTML = '';
                orderProducts.forEach(p => addAllocationRow(p.id, p.maxQty));

                // Find warehouse ID attached to the transfer for available destination bins
                let wId = transfer.warehouse_to_id ?? transfer.warehouseToId ?? transfer.warehouse?.id ?? transfer.warehouse?.ID ?? transfer.warehouse_id ?? transfer.warehouseId;
                if (!wId && transfer.bin_to) wId = transfer.bin_to.warehouse?.id ?? transfer.bin_to.warehouse_id ?? transfer.bin_to.warehouseId;
                if (!wId && transfer.bin_from) wId = transfer.bin_from.warehouse?.id ?? transfer.bin_from.warehouse_id ?? transfer.bin_from.warehouseId;

                if (!wId) {
                    console.warn('Kho chưa được cấu hình cho phiếu này');
                    return;
                }
                const bres = await fetch(BASE + '/storekeeper/warehouses/' + wId, { credentials: 'include' });
                if (bres.ok) {
                    const bjson = await bres.json();
                    if (bjson?.success && bjson.data) {
                        availableBins = bjson.data.bins ?? bjson.data;
                        // Reload rows with populated bins
                        document.getElementById('allocationBody').innerHTML = '';
                        orderProducts.forEach(p => addAllocationRow(p.id, p.maxQty));
                    }
                }
            } catch (e) {
                console.error('loadBinsForConfirm err', e);
            }
        }

        function addAllocationRow(defaultProductId = '', defaultQty = '') {
            const tbody = document.getElementById('allocationBody');
            const row = document.createElement('tr');
            row.style.borderBottom = '1px solid #f1f5f4';

            let productOptions = '<option value="">-- Chọn sản phẩm --</option>';
            orderProducts.forEach(p => {
                const selected = p.id == defaultProductId ? 'selected' : '';
                productOptions += `<option value="${p.id}" ${selected}>${p.name} (cần nhập: ${p.maxQty})</option>`;
            });

            let binOptions = '<option value="">-- Chọn Bin --</option>';
            availableBins.forEach(b => {
                const lbl = b.location_in_warehouse ?? b.locationInWarehouse ?? b.binCode ?? ('Bin ' + b.id);
                binOptions += `<option value="${b.id ?? b.ID ?? b.binId}">${lbl}</option>`;
            });

            row.innerHTML = `
                <td style="padding:8px"><select class="alloc-product" style="width:100%; padding:6px; border-radius:4px; border:1px solid #ccc">${productOptions}</select></td>
                <td style="padding:8px"><select class="alloc-bin" style="width:100%; padding:6px; border-radius:4px; border:1px solid #ccc">${binOptions}</select></td>
                <td style="padding:8px"><input type="number" class="alloc-qty" value="${defaultQty}" min="1" style="width:100px; padding:6px; border-radius:4px; border:1px solid #ccc"></td>
                <td style="padding:8px; text-align:center"><button class="btn ghost" style="color:#ef4444; border-color:#fca5a5; padding:4px 8px" onclick="this.closest('tr').remove()">X</button></td>
            `;
            tbody.appendChild(row);
        }

        async function confirmOrder() {
            if (!confirm('Xác nhận lưu kho với các phân bổ này?')) return;

            const rows = Array.from(document.querySelectorAll('#allocationBody tr'));
            if (rows.length === 0) return alert('Vui lòng thêm ít nhất 1 phân bổ.');

            // Validate allocations
            const allocationSummary = {}; // product_id -> total allocated
            const binsToPayload = {}; // bin_id -> { component_id: qty }

            for (let i = 0; i < rows.length; i++) {
                const r = rows[i];
                const pId = r.querySelector('.alloc-product').value;
                const bId = r.querySelector('.alloc-bin').value;
                const qty = Number(r.querySelector('.alloc-qty').value) || 0;

                if (!pId) return alert(`Dòng ${i+1}: Vui lòng chọn sản phẩm.`);
                if (!bId) return alert(`Dòng ${i+1}: Vui lòng chọn Bin.`);
                if (qty <= 0) return alert(`Dòng ${i+1}: Số lượng phải lớn hơn 0.`);

                allocationSummary[pId] = (allocationSummary[pId] || 0) + qty;

                if (!binsToPayload[bId]) binsToPayload[bId] = {};
                binsToPayload[bId][pId] = (binsToPayload[bId][pId] || 0) + qty;
            }

            // Check if allocations match request exactly (optional but good practice)
            for (const p of orderProducts) {
                const sum = allocationSummary[p.id] || 0;
                if (sum !== p.maxQty) {
                    return alert(`Sản phẩm "${p.name}" được yêu cầu nhập ${p.maxQty}, nhưng bạn đã phân bổ tổng ${sum}. Vui lòng phân bổ cho khớp.`);
                }
            }

            const binsTo = [];
            for (const [binId, compsMap] of Object.entries(binsToPayload)) {
                const components = [];
                for (const [compId, qty] of Object.entries(compsMap)) {
                    components.push({ component_id: parseInt(compId), quantity: qty });
                }
                binsTo.push({ bin_id: parseInt(binId), components });
            }

            const requestId = transfer.id ?? transfer.ID ?? transfer.request_id ?? transfer.RequestId ?? 0;
            const payload = { request_id: requestId, bins_to: binsTo.length > 0 ? binsTo : undefined };

            const res = await fetch(BASE + '/storekeeper/transfers/confirm', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(payload)
            });
            if (!res.ok) {
                const txt = await res.text().catch(()=>null);
                console.error('confirm error', txt || res.statusText);
                return alert('Tạo thất bại: ' + (txt || res.statusText));
            }
            let json;
            try { json = await res.json(); } catch (e) { return alert('Server returned invalid response'); }
            if (json?.success) { alert('Đã lưu kho thành công!'); location.href='inbound-list.html'; }
            else alert(json?.msg || json?.message || 'Error');
        }

        load();
    </script>
</body>
</html>
