<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết Phiếu Chuyển Kho</title>
    <style>
        :root{--muted:#64748b;--accent:#3b82f6}
        body{font-family:Inter, 'Segoe UI', Roboto, Arial, sans-serif;padding:24px;background:#eff6ff;color:#0f172a;margin:0}
        .container{max-width:1000px;margin:0 auto}
        .card{background:#fff;padding:24px;border-radius:12px;box-shadow:0 10px 30px rgba(2,6,23,0.06)}
        .header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:20px}
        .title{display:flex;flex-direction:column;gap:6px}
        h2{margin:0;font-size:22px;color:#1e293b}
        .meta{color:var(--muted);font-size:13px}
        .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px}
        .info-block{background:#f8fafc;padding:16px;border-radius:10px;border:1px solid #e2e8f0}
        table{width:100%;border-collapse:collapse;margin-top:12px}
        th,td{padding:12px;border-bottom:1px solid #f1f5f9;text-align:left;font-size:14px}
        thead th{background:#f1f5f9;color:#334155;font-weight:600}
        .actions{display:flex;gap:12px;margin-top:24px}
        .btn{padding:10px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:14px;transition:0.2s}
        .btn:hover{opacity:0.9}
        .btn.primary{background:var(--accent);color:#fff}
        .btn.ghost{background:transparent;border:1px solid #cbd5e1;color:#475569}
        .table-card{background:#fff;border-radius:10px;padding:8px;border:1px solid #e2e8f0;margin-top:16px}
        hr{border:none;border-top:1px dashed #cbd5e1;margin:24px 0}
        h4{margin:0 0 12px 0;color:#1e293b;font-size:16px}
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="title">
                    <button class="btn ghost" style="width:fit-content;padding:6px 12px;margin-bottom:12px" onclick="location.href='transfer-list.html'">⬅ Quay lại</button>
                    <h2>Chi tiết Phiếu Chuyển Kho</h2>
                    <div class="meta">Thông tin chuyển nội bộ giữa các bin</div>
                </div>
                <div style="text-align:right">
                    <div id="createdBy" class="meta">Người tạo: -</div>
                    <div id="createdAt" class="meta">Ngày tạo: -</div>
                </div>
            </div>

            <div id="detail">Đang tải dữ liệu...</div>

            <div class="actions">
                <button id="confirmBtn" class="btn primary" onclick="confirmOrder()" style="display:none">Xác nhận phiếu</button>
                <button class="btn ghost" onclick="location.href='transfer-list.html'">Quay lại danh sách</button>
            </div>
        </div>
    </div>

    <script>
        const BASE = "https://localhost:7297/api";
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        let transfer = null;
        const componentCache = {};
        const warehouseCache = {};

        function getComponents(obj) {
            if (!obj) return [];
            const keys = ['components','Components','transfer_request_components','transferRequestComponents','TransferRequestComponents','data'];
            for (const k of keys) if (Array.isArray(obj[k])) return obj[k];
            for (const k of Object.keys(obj)) {
                if (Array.isArray(obj[k]) && obj[k].length>0 && (obj[k][0].quantity !== undefined || obj[k][0].component_id !== undefined))
                    return obj[k];
            }
            return [];
        }

        function getComponentName(c) {
            return c?.name ?? c?.Name ?? c?.metadata?.name ?? c?.Metadata?.name ?? c?.component?.metadata?.name ?? c?.component?.metadata?.Name ?? ('Sản phẩm #' + (c.component_id ?? c.componentId ?? c.component?.id ?? '?'));
        }

        async function resolveComponentNames(comps) {
            if (!Array.isArray(comps)) return;
            await Promise.all(comps.map(async c => {
                const currentName = getComponentName(c);
                if (currentName && !currentName.startsWith('Sản phẩm #')) return;
                const cid = c.component_id ?? c.componentId ?? c.component?.id;
                if (!cid) return;
                if (componentCache[cid]) {
                    c.component = c.component ?? {};
                    c.component.metadata = componentCache[cid].metadata ?? componentCache[cid].Metadata ?? componentCache[cid];
                    return;
                }
                try {
                    const cres = await fetch(BASE + '/storekeeper/components/' + cid, { credentials: 'include' });
                    if (!cres.ok) return;
                    const cjson = await cres.json();
                    if (cjson?.success && cjson.data) {
                        componentCache[cid] = cjson.data;
                        c.component = c.component ?? {};
                        c.component.metadata = cjson.data.metadata ?? cjson.data.Metadata ?? cjson.data;
                    }
                } catch (e) { console.error('component fetch failed', e); }
            }));
        }

        async function resolveWarehouses(t) {
            if (!t) return;
            try {
                // bin_from
                let binFrom = t.bin_from ?? t.binFrom ?? null;
                const binFromId = binFrom?.id ?? binFrom?.ID ?? t.bin_from_id ?? t.binFromId;
                if (binFromId && (!binFrom || !(binFrom.location_in_warehouse || binFrom.locationInWarehouse || binFrom.binCode))) {
                    try {
                        const bres = await fetch(BASE + '/storekeeper/bins/' + binFromId, { credentials: 'include' });
                        if (bres.ok) {
                            const bjson = await bres.json();
                            if (bjson?.success && bjson.data) { t.bin_from = bjson.data; binFrom = bjson.data; }
                        }
                    } catch (e) { }
                }
                
                if (binFrom) {
                    const wid = typeof binFrom.warehouse === 'object' ? binFrom.warehouse?.id : (binFrom.warehouse ?? binFrom.warehouse_id ?? binFrom.warehouseId);
                    if (wid && !warehouseCache[wid]) {
                        try {
                            const wres = await fetch(BASE + '/storekeeper/warehouses/' + wid, { credentials: 'include' });
                            if (wres.ok) {
                                const wjson = await wres.json();
                                if (wjson?.success && wjson.data) warehouseCache[wid] = wjson.data;
                            }
                        } catch (e) { }
                    }
                    if (wid && warehouseCache[wid]) binFrom.warehouse = warehouseCache[wid];
                }

                // bin_to
                let binTo = t.bin_to ?? t.binTo ?? null;
                const binToId = binTo?.id ?? binTo?.ID ?? t.bin_to_id ?? t.binToId;
                if (binToId && (!binTo || !(binTo.location_in_warehouse || binTo.locationInWarehouse || binTo.binCode))) {
                    try {
                        const bres2 = await fetch(BASE + '/storekeeper/bins/' + binToId, { credentials: 'include' });
                        if (bres2.ok) {
                            const bjson2 = await bres2.json();
                            if (bjson2?.success && bjson2.data) { t.bin_to = bjson2.data; binTo = bjson2.data; }
                        }
                    } catch (e) { }
                }

                if (binTo) {
                    const wid2 = typeof binTo.warehouse === 'object' ? binTo.warehouse?.id : (binTo.warehouse ?? binTo.warehouse_id ?? binTo.warehouseId);
                    if (wid2 && !warehouseCache[wid2]) {
                        try {
                            const wres2 = await fetch(BASE + '/storekeeper/warehouses/' + wid2, { credentials: 'include' });
                            if (wres2.ok) {
                                const wjson2 = await wres2.json();
                                if (wjson2?.success && wjson2.data) warehouseCache[wid2] = wjson2.data;
                            }
                        } catch (e) { }
                    }
                    if (wid2 && warehouseCache[wid2]) binTo.warehouse = warehouseCache[wid2];
                }
            } catch (e) { console.error('resolveWarehouses failed', e); }
        }

        async function load() {
            try {
                const res = await fetch(BASE + '/storekeeper/transfers/' + id, {credentials:'include'});
                if (!res.ok) throw new Error('Không thể tải phiếu báo cáo');
                const json = await res.json();
                if (!json.success || !json.data) throw new Error(json.msg || 'Không có dữ liệu');
                transfer = json.data;

                // find related transfers (grouping)
                let related = [];
                try {
                    const listRes = await fetch(BASE + '/storekeeper/transfers', { credentials: 'include' });
                    if (listRes.ok) {
                        const listJson = await listRes.json();
                        if (listJson?.success && Array.isArray(listJson.data)) {
                            const all = listJson.data.filter(t => t.type === 3);
                            const baseDesc = (transfer.description ?? '').toString();
                            const baseCreated = Date.parse(transfer.creation_date ?? transfer.creationDate ?? transfer.creationTime ?? '');
                            const baseCreator = transfer.creator_id ?? transfer.CreatorId ?? transfer.creator ?? transfer.Creator ?? null;
                            const baseCreatorStr = (baseCreator ?? '').toString();

                            related = all.filter(t => {
                                try {
                                    if ((t.description ?? '').toString() !== baseDesc) return false;
                                    const tCreator = (t.creator_id ?? t.CreatorId ?? t.creator ?? t.Creator ?? '').toString();
                                    if (baseCreatorStr && tCreator && baseCreatorStr !== tCreator) return false;
                                    
                                    const tCreated = Date.parse(t.creation_date ?? t.creationDate ?? t.creationTime ?? '');
                                    if (!isNaN(baseCreated) && !isNaN(tCreated)) {
                                        return Math.abs(baseCreated - tCreated) <= 60000;
                                    }
                                    return true;
                                } catch (e) { return false; }
                            });
                        }
                    }
                } catch (e) { }

                const relatedDetails = [];
                const seen = new Set();
                const mainId = transfer.request_id ?? transfer.RequestId ?? transfer.id ?? transfer.ID ?? null;
                if (mainId) { relatedDetails.push(transfer); seen.add(String(mainId)); }

                for (const r of related) {
                    try {
                        const idToFetch = r.request_id ?? r.RequestId ?? r.id ?? r.ID;
                        if (!idToFetch || seen.has(String(idToFetch))) continue;
                        const dres = await fetch(BASE + '/storekeeper/transfers/' + idToFetch, { credentials: 'include' });
                        if (dres.ok) {
                            const djson = await dres.json();
                            if (djson?.success && djson.data) { relatedDetails.push(djson.data); seen.add(String(idToFetch)); }
                        }
                    } catch (e) { }
                }

                if (!seen.has(String(mainId))) relatedDetails.unshift(transfer);
                transfer._related = relatedDetails;

                const allComps = [];
                for (const t of relatedDetails) {
                    try { await resolveWarehouses(t); } catch (e) { }
                    const compsT = getComponents(t) || [];
                    compsT.forEach(c => allComps.push(c));
                }
                await resolveComponentNames(allComps);
                render();
                
                // Set creator info
                let createdBy = transfer.created_by_name ?? transfer.createdByName ?? transfer.created_by ?? transfer.createdBy ?? transfer.creator?.display_name ?? transfer.creator?.username ?? transfer.creator?.fullName ?? transfer.creator?.name ?? null;
                if (!createdBy && (transfer.creator_id || transfer.creatorId)) {
                    try {
                        const uid = transfer.creator_id ?? transfer.creatorId;
                        const ures = await fetch(BASE.replace('/storekeeper','') + '/users/' + uid, {credentials: 'include'});
                        if (ures.ok) {
                            const ujson = await ures.json();
                            if (ujson?.success && ujson.data) createdBy = ujson.data.display_name ?? ujson.data.username ?? ujson.data.fullname ?? ujson.data.Username ?? uid;
                        }
                    } catch(e) {}
                }
                if (!createdBy) createdBy = '-';
                const createdAt = transfer.creation_date ?? transfer.creationDate ?? transfer.created_at ?? transfer.createdAt ?? null;
                document.getElementById('createdBy').innerText = 'Người tạo: ' + createdBy;
                document.getElementById('createdAt').innerText = 'Ngày tạo: ' + (createdAt ? new Date(createdAt).toLocaleString('vi-VN') : '-');
            } catch (err) {
                document.getElementById('detail').innerHTML = `<div style="color:#ef4444;font-weight:600;padding:12px">Lỗi: ${err.message}</div>`;
            }
        }

        function render() {
            if (!transfer) return;

            function getStatusText(status){
                switch(status){
                    case 0: return 'Không xác định';
                    case 1: return 'Chờ xử lý';
                    case 2: return 'Đã duyệt - Chờ xác nhận';
                    case 3: return 'Bị từ chối';
                    default: return 'Hoàn thành';
                }
            }

            const related = transfer._related ?? [transfer];

            const fromBinsPairs = new Set();
            const fromBinsArr = [];
            const toBinsPairs = new Set();
            const toBinsArr = [];
            const productsMap = {};
            const statuses = new Set();

            related.forEach(t => {
                const fw = t.bin_from?.warehouse?.warehouseName ?? t.bin_from?.warehouse?.name ?? '-';
                const fb = t.bin_from?.location_in_warehouse ?? t.bin_from?.locationInWarehouse ?? t.bin_from?.binCode ?? t.bin_from?.code ?? '-';
                const fKey = `${fw}||${fb}`;
                if (!fromBinsPairs.has(fKey)) { fromBinsPairs.add(fKey); fromBinsArr.push(`${fw} / <b>${fb}</b>`); }

                const tw = t.bin_to?.warehouse?.warehouseName ?? t.bin_to?.warehouse?.name ?? '-';
                const tb = t.bin_to?.location_in_warehouse ?? t.bin_to?.locationInWarehouse ?? t.bin_to?.binCode ?? t.bin_to?.code ?? '-';
                const tKey = `${tw}||${tb}`;
                if (!toBinsPairs.has(tKey)) { toBinsPairs.add(tKey); toBinsArr.push(`${tw} / <b>${tb}</b>`); }

                const comps = getComponents(t);
                comps.forEach(c => {
                    const cid = c.component_id ?? c.componentId ?? c.component?.id ?? 'unknown';
                    const name = getComponentName(c);
                    const qty = parseFloat(c.quantity ?? c.Quantity ?? c.qty ?? 0) || 0;
                    if (!productsMap[cid]) productsMap[cid] = { name: name, total: 0 };
                    productsMap[cid].total += qty;
                });
                statuses.add(t.status ?? t.Status ?? 0);
            });

            const statusText = statuses.size === 1 ? getStatusText(Array.from(statuses)[0]) : 'Multiple';

            let html = `
                <div class="info-grid">
                    <div class="info-block">
                        <div style="font-weight:700;margin-bottom:6px;color:#0f172a">Mô tả phiếu</div>
                        <div class="meta" style="font-size:14px">${transfer.description ?? '-'}</div>
                        <div style="height:16px"></div>
                        <div style="font-weight:700;margin-bottom:6px;color:#0f172a">Trạng thái</div>
                        <div class="meta" style="font-size:14px;color:var(--accent);font-weight:600">${statusText}</div>
                    </div>
                    <div class="info-block">
                        <div style="font-weight:700;margin-bottom:6px;color:#0f172a">Từ Kho / Bin xuất</div>
                        <div class="meta" style="font-size:14px">${fromBinsArr.join('<br>')}</div>
                        <div style="height:16px"></div>
                        <div style="font-weight:700;margin-bottom:6px;color:#0f172a">Đến Kho / Bin nhập</div>
                        <div class="meta" style="font-size:14px">${toBinsArr.join('<br>')}</div>
                    </div>
                </div>
                <hr />
                <h4>Danh sách Sản phẩm</h4>
                <div class="table-card">
                    <table>
                        <thead>
                            <tr><th>Tên hàng</th><th style="width:120px">Số lượng</th></tr>
                        </thead>
                        <tbody>
`;

            const prodKeys = Object.keys(productsMap);
            if (prodKeys.length === 0) {
                html += `<tr><td colspan="2" style="text-align:center;color:#64748b;padding:20px">Không có sản phẩm nào</td></tr>`;
            } else {
                prodKeys.forEach(k => {
                    const p = productsMap[k];
                    html += `<tr><td style="font-weight:500">${p.name}</td><td>${p.total}</td></tr>`;
                });
            }

            html += `</tbody></table></div>`;
            document.getElementById('detail').innerHTML = html;

            // show confirm button for appropriate statuses
            if (transfer.status === 2 || transfer.status === 1) {
                document.getElementById('confirmBtn').style.display = 'inline-block';
            } else {
                document.getElementById('confirmBtn').style.display = 'none';
            }
        }

        async function confirmOrder() {
            if (!confirm('Xác nhận phiếu chuyển kho này?')) return;
            
            const related = transfer._related ?? [transfer];
            let allSuccess = true;
            let errMsg = '';
            let skipCount = 0;

            for (const t of related) {
                const reqId = t.id ?? t.request_id ?? t.RequestId ?? t.ID;
                if (!reqId || t.status === 4 || t.status === 0 || t.status === 3) { skipCount++; continue; }

                const payload = { request_id: reqId };
                const binsFrom = [];
                const binsTo = [];

                const comps = getComponents(t) || [];
                const pComps = comps.map(c => ({ component_id: c.component_id ?? c.componentId ?? c.component?.id, quantity: Number((c.quantity ?? c.qty ?? c.Quantity) || 0) }));
                if (pComps.length === 0) { skipCount++; continue; }

                const binFromId = t.bin_from_id ?? t.binFromId ?? t.bin_from?.id ?? t.bin_from?.ID;
                if (binFromId) binsFrom.push({ bin_id: binFromId, components: pComps });

                const binToId = t.bin_to_id ?? t.binToId ?? t.bin_to?.id ?? t.bin_to?.ID;
                if (binToId) binsTo.push({ bin_id: binToId, components: pComps });

                if (binsFrom.length > 0) payload.bins_from = binsFrom;
                if (binsTo.length > 0) payload.bins_to = binsTo;

                try {
                    const res = await fetch(BASE + '/storekeeper/transfers/confirm', {
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        credentials: 'include', 
                        body: JSON.stringify(payload)
                    });
                    
                    if (!res.ok) {
                        const txt = await res.text().catch(()=>null);
                        let msg = txt || res.statusText;
                        try {
                            const obj = JSON.parse(txt);
                            if(obj.msg || obj.message) msg = obj.msg || obj.message;
                        } catch(e) {}
                        allSuccess = false;
                        errMsg = msg;
                        break;
                    }
                    
                    const json = await res.json();
                    if (!json?.success) {
                        allSuccess = false;
                        errMsg = json?.msg || json?.message || 'Có lỗi xảy ra';
                        break;
                    }
                } catch (e) {
                    allSuccess = false;
                    errMsg = e.message;
                    break;
                }
            }

            if (allSuccess) {
                if (skipCount === related.length && related.length > 0) {
                    alert('Các phiếu này đã được xác nhận hoặc không hợp lệ để xác nhận!');
                } else {
                    alert('Đã xác nhận phiếu chuyển thành công!');
                }
                location.href='transfer-list.html';
            } else {
                alert('Xác nhận một phần thất bại: ' + errMsg);
            }
        }

        load();
    </script>
</body>
</html>
