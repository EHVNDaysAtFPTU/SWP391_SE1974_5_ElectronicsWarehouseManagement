<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Outbound Orders - Storekeeper</title>

    <style>
        body{font-family:Inter, 'Segoe UI', Roboto, Arial, sans-serif;background:#f6f8fb;padding:28px;color:#0f172a}
        .page{max-width:1200px;margin:0 auto}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
        h2{margin:0;font-size:20px}
        .controls{display:flex;gap:8px}
        .btn{padding:8px 12px;border-radius:8px;border:none;cursor:pointer}
        .btn.ghost{background:transparent;border:1px solid #e6eef6}
        .btn.primary{background:#2563eb;color:#fff}
        .table-card{background:#fff;border-radius:12px;padding:12px;box-shadow:0 6px 20px rgba(2,6,23,0.06)}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px;border-bottom:1px solid #f1f5f9;text-align:left}
        th{background:#fafcff;color:#64748b;font-weight:700}
        tr:hover td{background:#fbfdff}
        .status-complete{color:#16a34a;font-weight:700}
        .status-pending{color:#f59e0b;font-weight:700}
        .action-btn{background:#2563eb;color:#fff;padding:6px 10px;border-radius:8px;border:none;cursor:pointer}
        .search{display:flex;gap:8px;align-items:center}
        .search input{padding:8px;border-radius:8px;border:1px solid #eef2f6}
        .modal{display:none;position:fixed;inset:0;background:rgba(2,6,23,0.5);justify-content:center;align-items:center}
        .modal-content{background:#fff;width:900px;padding:18px;border-radius:10px;max-height:90vh;overflow:auto}
    </style>
</head>

<body>

    <div class="page">
        <div class="top-bar">
            <div>
                <h2>Outbound Orders</h2>
                <div style="color:var(--muted);font-size:13px">Quản lý các phiếu xuất hàng đã tạo</div>
            </div>
            <div class="controls">
                <div class="search">
                    <input id="q" placeholder="Tìm theo mã, kho, bin..." />
                    <button class="btn ghost" onclick="searchFilter()">Search</button>
                </div>
                <button class="btn primary" onclick="goHome()">Back</button>
            </div>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Order Code</th>
                        <th>Date</th>
                        <th>Warehouse</th>
                        <th>Bin</th>
                        <th>Total Items</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="orderTable"></tbody>
            </table>
            <!-- Pagination Controls -->
            <div id="paginationControls" style="display:flex; justify-content:space-between; align-items:center; margin-top:20px; padding-top:16px; border-top:1px solid #f1f5f9;">
                <div id="pageInfo" class="meta" style="font-size:14px;">Hiển thị 0-0 trong số 0</div>
                <div style="display:flex; gap:8px;" id="pageButtons">
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <span onclick="closeModal()" style="float:right;cursor:pointer;color:red;font-weight:bold;">X</span>
            <h3>Outbound Detail</h3>
            <div id="detailContent"></div>
        </div>
    </div>

    <script>

        const BASE = "https://localhost:7297/api";

        function getField(obj, ...names) {
            if (!obj) return "-";
            for (const n of names) {
                if (obj[n] !== undefined && obj[n] !== null) return obj[n];
            }
            return "-";
        }

        function getId(obj) {
            if (!obj) return null;
            return obj.id ?? obj.ID ?? obj.request_id ?? obj.requestId ?? obj.requestID ?? null;
        }

        function getComponents(obj) {
            if (!obj) return [];
            const keys = ['components','Components','transfer_request_components','transferRequestComponents','TransferRequestComponents'];
            for (const k of keys) if (Array.isArray(obj[k])) return obj[k];
            if (Array.isArray(obj.data)) return obj.data;
            for (const k of Object.keys(obj)) {
                if (Array.isArray(obj[k]) && obj[k].length>0 && (obj[k][0].quantity !== undefined || obj[k][0].component_id !== undefined))
                    return obj[k];
            }
            return [];
        }

        function goHome() {
            window.location = "home.html";
        }

        function getStatusText(status) {
            switch (status) {
                case 0: return "Unknown";
                case 1: return "Pending";
                case 2: return "Approved - Waiting Confirm";
                case 3: return "Rejected";
                case 4: return "Finished";
                case 5: return "Missing components";
                case 6: return "Canceled";
                default: return "Unknown";
            }
        }

        // state used by paging and filtering
        let globalGroups = [];
        let filteredGroups = [];
        let currentPage = 1;
        const pageSize = 10;
// cache for warehouse details (so UI can list warehouse.bins)
let globalWarehouseCache = {};

        async function load() {

            let res = await fetch(BASE + "/storekeeper/transfers", { credentials: "include" });
            let result = await res.json();

            // 🔥 Outbound = type === 2
            const outboundListSummary = (result.data || []).filter(x => x.type === 2);
            const warehouseCache = {};
            // fetch full details for each outbound transfer
            const detailedTransfers = [];
            for (let t0 of outboundListSummary) {
                try {
                    // always try to fetch full transfer detail first (contains components and bin info)
                    const dres = await fetch(BASE + "/storekeeper/transfers/" + (getId(t0)), { credentials: 'include' });
                    if (dres.ok) {
                        const djson = await dres.json();
                        if (djson?.success && djson.data) {
                            t0 = djson.data;
                        }
                    }

                    // if binFrom already contains useful info, attach helper name and try to resolve warehouse object if missing
                    let binFromObj = t0.bin_from ?? t0.binFrom ?? null;
                    if (binFromObj && (binFromObj.location_in_warehouse || binFromObj.locationInWarehouse || binFromObj.binCode)) {
                        try {
                            const fromName = binFromObj.warehouse?.name ?? binFromObj.warehouse?.warehouseName ?? binFromObj.warehouse ?? null;
                            t0._fromWarehouseName = fromName ?? null;
                            // if warehouse object is missing but warehouse id exists, try fetch warehouse and cache it
                            const wid = (typeof binFromObj.warehouse === 'object') ? (binFromObj.warehouse?.id) : (binFromObj.warehouse ?? binFromObj.warehouse_id ?? binFromObj.warehouseId ?? binFromObj.WarehouseId);
                            const needFetch = !binFromObj.warehouse || (typeof binFromObj.warehouse !== 'object');
                            if (needFetch && wid) {
                                if (!warehouseCache[wid]) {
                                    try {
                                        const wres = await fetch(BASE + "/storekeeper/warehouses/" + wid, { credentials: 'include' });
                                        if (wres.ok) {
                                            const wjson = await wres.json();
                                            if (wjson?.success && wjson.data) warehouseCache[wid] = wjson.data;
                                        }
                                    } catch (e) { console.error('warehouse fetch failed', e); }
                                }
                                if (warehouseCache[wid]) {
                                    binFromObj.warehouse = warehouseCache[wid];
                                    t0._fromWarehouseName = warehouseCache[wid].name ?? warehouseCache[wid].warehouseName ?? t0._fromWarehouseName;
                                }
                            }
                        } catch (e) { /* ignore */ }
                        t0.bin_from = binFromObj;
                        detailedTransfers.push(t0);
                        continue;
                    }

                    // If transfer detail includes finished_components, assign separate finish bins for from/to when possible
                    const finishedArr = t0.finished_components ?? t0.finishedComponents ?? t0.finished_components_list ?? t0.finishedComponentsList;
                    if (Array.isArray(finishedArr) && finishedArr.length > 0) {
                        t0.bin_finish_from = null;
                        t0.bin_finish_to = null;
                        for (const fc of finishedArr) {
                            const binObj = fc.bin ?? fc.Bin ?? null;
                            const binRef = binObj ? binObj : ((fc.bin_id || fc.binId) ? { id: fc.bin_id ?? fc.binId } : null);
                            if (!binRef) continue;
                            if (fc.type === 1) t0.bin_finish_from = binRef;
                            else if (fc.type === 0) t0.bin_finish_to = binRef;
                            else if (!t0.bin_finish_to) t0.bin_finish_to = binRef;
                        }
                        // resolve warehouses for finish_from / finish_to if present
                        if (t0.bin_finish_from) {
                            const bfFromId = t0.bin_finish_from?.warehouse ?? t0.bin_finish_from?.warehouse_id ?? t0.bin_finish_from?.warehouseId ?? (typeof t0.bin_finish_from?.warehouse === 'object' ? t0.bin_finish_from.warehouse.id : null) ?? t0.warehouse_from_id;
                            if (bfFromId && (!t0.bin_finish_from?.warehouse || typeof t0.bin_finish_from.warehouse !== 'object')) {
                                try {
                                    const wresF = await fetch(BASE + "/storekeeper/warehouses/" + bfFromId, { credentials: 'include' });
                                    if (wresF.ok) {
                                        const wjsonF = await wresF.json();
                                        if (wjsonF?.success && wjsonF.data) {
                                            t0._finishFromWarehouseName = wjsonF.data.name ?? wjsonF.data.warehouseName;
                                            t0.bin_finish_from.warehouse = wjsonF.data;
                                        }
                                    }
                                } catch (e) { console.error('bin_finish_from warehouse fetch failed', e); }
                            } else if (t0.bin_finish_from?.warehouse && typeof t0.bin_finish_from.warehouse === 'object') {
                                t0._finishFromWarehouseName = t0.bin_finish_from.warehouse.name ?? t0.bin_finish_from.warehouse.warehouseName;
                            }
                        }
                        if (t0.bin_finish_to) {
                            const bfToId = t0.bin_finish_to?.warehouse ?? t0.bin_finish_to?.warehouse_id ?? t0.bin_finish_to?.warehouseId ?? (typeof t0.bin_finish_to?.warehouse === 'object' ? t0.bin_finish_to.warehouse.id : null) ?? t0.warehouse_to_id;
                            if (bfToId && (!t0.bin_finish_to?.warehouse || typeof t0.bin_finish_to.warehouse !== 'object')) {
                                try {
                                    const wresT = await fetch(BASE + "/storekeeper/warehouses/" + bfToId, { credentials: 'include' });
                                    if (wresT.ok) {
                                        const wjsonT = await wresT.json();
                                        if (wjsonT?.success && wjsonT.data) {
                                            t0._finishToWarehouseName = wjsonT.data.name ?? wjsonT.data.warehouseName;
                                            t0.bin_finish_to.warehouse = wjsonT.data;
                                        }
                                    }
                                } catch (e) { console.error('bin_finish_to warehouse fetch failed', e); }
                            } else if (t0.bin_finish_to?.warehouse && typeof t0.bin_finish_to.warehouse === 'object') {
                                t0._finishToWarehouseName = t0.bin_finish_to.warehouse.name ?? t0.bin_finish_to.warehouse.warehouseName;
                            }
                        }
                    }

                    const binId = t0.bin_from_id ?? t0.binFromId ?? t0.bin_from?.id ?? t0.bin_from?.ID ?? t0.binFrom?.id;
                    if (!binId) { detailedTransfers.push(t0); continue; }

                    const bres = await fetch(BASE + "/storekeeper/bins/" + binId, { credentials: 'include' });
                    if (!bres.ok) { detailedTransfers.push(t0); continue; }
                    const bjson = await bres.json();
                    if (bjson?.success && bjson.data) {
                        t0.bin_from = bjson.data;
                        // set helper from warehouse name
                        try {
                            const fromName = t0.bin_from?.warehouse?.name ?? t0.bin_from?.warehouse?.warehouseName ?? t0.bin_from?.warehouse ?? null;
                            t0._fromWarehouseName = fromName ?? null;
                        } catch (e) { /* ignore */ }

                        // try to resolve destination warehouse name (bin_to) so other views can use it
                        try {
                            let toName = t0.bin_to?.warehouse?.name ?? t0.bin_to?.warehouse?.warehouseName ?? t0.bin_to?.warehouse ?? null;
                            if (!toName) {
                                const toId = t0.bin_to_id ?? t0.binToId ?? t0.bin_to?.id ?? t0.bin_to?.ID;
                                if (toId) {
                                    const bres2 = await fetch(BASE + "/storekeeper/bins/" + toId, { credentials: 'include' });
                                    if (bres2.ok) {
                                        const bjson2 = await bres2.json();
                                        if (bjson2?.success && bjson2.data) toName = bjson2.data.warehouse?.name ?? bjson2.data.warehouse?.warehouseName ?? bjson2.data.warehouse ?? null;
                                    }
                                }
                            }
                            t0._toWarehouseName = toName ?? null;
                        } catch (e) { console.error('resolve to warehouse failed', e); }
                    }
                    detailedTransfers.push(t0);
                } catch (e) {
                    console.error('detail/bin fetch failed', e);
                    detailedTransfers.push(t0);
                }
            }
            // Precompute possible warehouse ids per transfer and prefetch warehouse details so UI can show all bins of a warehouse
            const localWarehouseCache = {};
            try {
                const allWarehouseIds = new Set();
                detailedTransfers.forEach(t => {
                    const ids = new Set();
                    try {
                        const binFrom = t.bin_from ?? t.binFrom ?? null;
                        const binFinishFrom = t.bin_finish_from ?? t.binFinishFrom ?? null;
                        const wid1 = (binFrom && (typeof binFrom.warehouse === 'object')) ? (binFrom.warehouse?.id) : (binFrom?.warehouse ?? binFrom?.warehouse_id ?? binFrom?.warehouseId ?? null);
                        const wid2 = (binFinishFrom && (typeof binFinishFrom.warehouse === 'object')) ? (binFinishFrom.warehouse?.id) : (binFinishFrom?.warehouse ?? binFinishFrom?.warehouse_id ?? binFinishFrom?.warehouseId ?? null);
                        const wid3 = t.warehouse_from_id ?? t.warehouseFromId ?? null;
                        if (wid1) ids.add(wid1);
                        if (wid2) ids.add(wid2);
                        if (wid3) ids.add(wid3);
                    } catch(e) { }
                    t._possibleWarehouseIds = Array.from(ids);
                    t._possibleWarehouseIds.forEach(i => { if (i) allWarehouseIds.add(i); });
                });

                // fetch warehouses once and cache (so we can list all bins from the warehouse)
                await Promise.all(Array.from(allWarehouseIds).map(async wid => {
                    try {
                        const wres = await fetch(BASE + "/storekeeper/warehouses/" + wid, { credentials: 'include' });
                        if (!wres.ok) return;
                        const wj = await wres.json();
                        if (wj?.success && wj.data) localWarehouseCache[wid] = wj.data;
                    } catch(e) { /* ignore per-item errors */ }
                }));
            } catch(e) {
                console.error('warehouse prefetch failed', e);
                /* keep localWarehouseCache empty */
                // no-op
            }

            // Group transfers by description and creation time to support multiple bins frontend-only
            const groups = [];
            detailedTransfers.forEach(t => {
                const desc = (t.description ?? '').toString();
                const createdTs = Date.parse(t.creation_date ?? t.creationDate ?? t.creationTime ?? '');
                const creator = (t.creator_id ?? t.CreatorId ?? t.creator ?? t.Creator ?? '').toString();
                
                let foundGroup = groups.find(g => 
                    g.desc === desc && 
                    g.creator === creator && 
                    (!isNaN(createdTs) && !isNaN(g.ts) ? Math.abs(g.ts - createdTs) <= 60000 : true)
                );
                
                if (foundGroup) {
                    foundGroup.items.push(t);
                } else {
                    groups.push({ desc, creator, ts: createdTs, items: [t] });
                }
            });

            // expose fetched warehouse cache to search/render
            globalWarehouseCache = localWarehouseCache;
            globalGroups = groups;
            searchFilter();
        }

        function searchFilter() {
            const q = (document.getElementById('q')?.value || '').toString().toLowerCase();
                filteredGroups = globalGroups.filter(g => {
                const group = g.items;
                const warehouses = new Set();
                // normalize bins using a map to dedupe robustly (strip HTML tags, trim, lowercase)
                const binMap = new Map();
                function normalizeLabel(x){ if (x === null || x === undefined) return ''; try { return String(x).replace(/<[^>]+>/g, '').trim().toLowerCase(); } catch(e){ return String(x); } }
                group.forEach(o => {
                    const isPendingOrApproved = (o.status === 1 || o.Status === 1 || o.status === 2 || o.Status === 2);
                    const binFinishFrom = o.bin_finish_from ?? o.binFinishFrom ?? null;
                    const binFrom = o.bin_from ?? o.binFrom ?? null;
                    const warehouseName = o._finishFromWarehouseName ?? o._fromWarehouseName ?? (o.warehouse_from?.name ?? o.warehouse_from?.warehouseName) ?? (binFinishFrom?.warehouse?.name ?? binFinishFrom?.warehouse?.warehouseName ?? binFinishFrom?.warehouse) ?? (binFrom?.warehouse?.name ?? binFrom?.warehouse?.warehouseName ?? binFrom?.warehouse) ?? (o.warehouse?.name ?? o.warehouse?.warehouseName ?? o.warehouse) ?? '-';
                    warehouses.add(warehouseName);
                    // Prefer bins referenced by finished_components (type=1 = From). Fallback to bin_finish_from / bin_from / transfer fields.
                    const finishedArr = o.finished_components ?? o.finishedComponents ?? o.finished_components_list ?? o.finishedComponentsList ?? o.FinishedTransferRequestComponents;
                    let chosenBinLabels = [];
                    if (Array.isArray(finishedArr) && finishedArr.length > 0) {
                        // prefer from-type bins
                        const fromBins = finishedArr.filter(f => f.type === 1).map(f => f.bin ?? f.Bin ?? null).filter(Boolean);
                        const baseBins = (fromBins.length > 0 ? fromBins : finishedArr.map(f => f.bin ?? f.Bin ?? null).filter(Boolean));
                        chosenBinLabels = baseBins.map(b => (b.location_in_warehouse ?? b.locationInWarehouse ?? b.binCode ?? (b.id ?? b.ID ?? b.binId) ?? '').toString());
                    }
                    if (chosenBinLabels.length === 0) {
                        const rawBinName = binFinishFrom?.location_in_warehouse ?? binFinishFrom?.locationInWarehouse ?? binFinishFrom?.binCode ?? binFrom?.location_in_warehouse ?? binFrom?.locationInWarehouse ?? binFrom?.binCode ?? o.location_in_warehouse ?? o.locationInWarehouse ?? '-';
                        chosenBinLabels = [(typeof rawBinName === 'string') ? rawBinName.trim() : rawBinName];
                    }
                    // add chosen bins into normalized binMap to be used for search text
                    chosenBinLabels.forEach(lbl => {
                        const n = normalizeLabel(lbl);
                        if (!binMap.has(n)) binMap.set(n, (typeof lbl === 'string') ? lbl.trim() : lbl);
                    });

                    // do NOT add all warehouse bins here — only include bins actually referenced by transfers
                });
                const rowText = ((group[0].description ?? '') + ' ' + Array.from(warehouses).join(' ') + ' ' + Array.from(binMap.values()).join(' ')).toLowerCase();
                return rowText.includes(q);
            });
            renderPage(1);
        }

        function renderPage(page) {
            currentPage = page;
            const start = (page - 1) * pageSize;
            const end = start + pageSize;
            const paginated = filteredGroups.slice(start, end);

            let html = "";
            if (paginated.length === 0) {
                html = `<tr><td colspan="7" style="text-align:center; padding:24px; color:#64748b">Không có dữ liệu</td></tr>`;
            } else {
                paginated.forEach(groupObj => {
                    const group = groupObj.items;
                    // aggregate bins and warehouses
                    const warehouses = new Set();
                    // use map to dedupe bins robustly while preserving first-seen label
                    const binMap = new Map();
                    function normalizeLabel(x){ if (x === null || x === undefined) return ''; try { return String(x).replace(/<[^>]+>/g, '').trim().toLowerCase(); } catch(e){ return String(x); } }
                    // compute total items by aggregating quantities per component id across the group
                    let totalItems = 0;
                    const compTotals = {}; // compId -> total qty
                    const statuses = new Set();
                    const ids = [];
                    group.forEach(o => {
                        ids.push(getId(o));
                        // prefer finished-from bin for outbound display
                        const binFinishFrom = o.bin_finish_from ?? o.binFinishFrom ?? null;
                        const binFrom = o.bin_from ?? o.binFrom ?? null;
                        const isPendingOrApproved = (o.status === 1 || o.Status === 1 || o.status === 2 || o.Status === 2);
                        const warehouseName = o._finishFromWarehouseName ?? o._fromWarehouseName ?? (o.warehouse_from?.name ?? o.warehouse_from?.warehouseName) ?? (binFinishFrom?.warehouse?.name ?? binFinishFrom?.warehouse?.warehouseName ?? binFinishFrom?.warehouse) ?? (binFrom?.warehouse?.name ?? binFrom?.warehouse?.warehouseName ?? binFrom?.warehouse) ?? (o.warehouse?.name ?? o.warehouse?.warehouseName ?? o.warehouse) ?? '-';
                        warehouses.add(warehouseName);
                        // Prefer bins referenced by finished_components (type=1 = From) for display. Collect all distinct bins used by movements.
                        const finishedArr = o.finished_components ?? o.finishedComponents ?? o.finished_components_list ?? o.finishedComponentsList ?? o.FinishedTransferRequestComponents;
                        const chosenLabels = [];
                        if (Array.isArray(finishedArr) && finishedArr.length > 0) {
                            // collect all 'From' bins first; if none, collect any bins in finishedArr
                            const fromBins = finishedArr.filter(f => f.type === 1).map(f => f.bin ?? f.Bin ?? null).filter(Boolean);
                            const baseBins = (fromBins.length > 0 ? fromBins : finishedArr.map(f => f.bin ?? f.Bin ?? null).filter(Boolean));
                            baseBins.forEach(b => chosenLabels.push((b.location_in_warehouse ?? b.locationInWarehouse ?? b.binCode ?? (b.id ?? b.ID ?? b.binId) ?? '').toString()));
                        }
                        if (chosenLabels.length === 0) {
                            const rawBin = binFinishFrom?.location_in_warehouse ?? binFinishFrom?.locationInWarehouse ?? binFinishFrom?.binCode ?? binFrom?.location_in_warehouse ?? binFrom?.locationInWarehouse ?? binFrom?.binCode ?? o.location_in_warehouse ?? o.locationInWarehouse ?? '-';
                            chosenLabels.push((typeof rawBin === 'string') ? rawBin.trim() : rawBin);
                        }
                        // add all chosen labels into binMap (deduped by normalizeLabel)
                        chosenLabels.forEach(lbl => { const n = normalizeLabel(lbl); if (!binMap.has(n)) binMap.set(n, lbl); });
                        // do NOT add all warehouse bins here — only include bins actually referenced by transfers
                        const comps = getComponents(o);
                        comps.forEach(c => {
                            const cid = String(c.component_id ?? c.componentId ?? c.component?.id ?? c.component?.componentId ?? 'unknown');
                            const qty = Number(c.quantity ?? c.Quantity ?? c.qty ?? c.component?.quantity ?? 0) || 0;
                            compTotals[cid] = (compTotals[cid] || 0) + qty;
                        });
                        statuses.add(o.status ?? o.Status ?? 0);
                    });

                    // status
                    let statusText = 'Multiple';
                    if (statuses.size === 1) statusText = getStatusText(Array.from(statuses)[0]);
                    let statusClass = 'status-pending';
                    const st = statusText.toLowerCase();
                    if (st.includes('complete') || st.includes('confirmed') || st.includes('finished') || st.includes('finish')) statusClass = 'status-complete';

                    // prefer opening detail by shared request_id when available (list groups by request_id)
                    let groupRequestId = null;
                    try {
                        const candidate = group.find(x => x.request_id ?? x.RequestId ?? x.requestId ?? null);
                        if (candidate) groupRequestId = candidate.request_id ?? candidate.RequestId ?? candidate.requestId ?? null;
                    } catch (e) { }
                    const openId = groupRequestId || ids[0];
                    // action: open detail for group (prefer request_id)
                    let action = `<button class="action-btn" onclick="goDetail('${openId}')">Detail</button>`;
                    // allow cancel when any related item is pending
                    if (Array.from(statuses).includes(1)) {
                        action += ` <button class="btn ghost" onclick="cancelOutbound('${openId}')" style="background:#fff1f0;border:1px solid #fdecec;color:#9f1239;padding:6px 10px;border-radius:8px;margin-left:6px">Cancel</button>`;
                    }

                    html += `<tr>
                        <td>${group[0].description ?? '-'}</td>
                        <td>${formatDate(group[0].creation_date ?? group[0].creationDate)}</td>
                        <td>${Array.from(warehouses).join(', ')}</td>
                        <td>${Array.from(binMap.values()).join(', ')}</td>
                    <td>${Object.values(compTotals).reduce((s, v) => s + Number(v || 0), 0)}</td>
                        <td class="${statusClass}">${statusText}</td>
                        <td>${action}</td>
                    </tr>`;
                });
            }

            document.getElementById("orderTable").innerHTML = html;

            // Update stats
            const totalItems = filteredGroups.length;
            const s = totalItems === 0 ? 0 : start + 1;
            const e = Math.min(start + pageSize, totalItems);
            document.getElementById('pageInfo').innerText = `Hiển thị ${s}-${e} trong số ${totalItems}`;

            // Render buttons
            const totalPages = Math.ceil(totalItems / pageSize) || 1;
            let btnHtml = "";
            
            // Prev button
            btnHtml += `<button class="btn ghost" onclick="renderPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled style="opacity:0.5"' : ''}>&laquo; Trước</button>`;
            
            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                if (totalPages > 7) {
                    if (i !== 1 && i !== totalPages && Math.abs(i - currentPage) > 1) {
                        if (i === 2 || i === totalPages - 1) btnHtml += `<span style="padding:4px 8px">...</span>`;
                        continue;
                    }
                }
                const activeStyle = i === currentPage ? 'background:#e2e8f0;font-weight:bold;' : '';
                btnHtml += `<button class="btn ghost" style="${activeStyle}" onclick="renderPage(${i})">${i}</button>`;
            }

            // Next button
            btnHtml += `<button class="btn ghost" onclick="renderPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled style="opacity:0.5"' : ''}>Sau &raquo;</button>`;
            
            document.getElementById('pageButtons').innerHTML = btnHtml;
        }

        function goDetail(id) {
            if (!id) return;
            window.location.href = `outbound-detail.html?id=${id}`;
        }

        async function cancelOutbound(id) {
            if (!id) return;
            if (!confirm('Are you sure you want to cancel this outbound order?')) return;
            try {
                const res = await fetch(BASE + '/storekeeper/transfers/' + id + '/cancel', { method: 'POST', credentials: 'include' });
                if (!res.ok) { const txt = await res.text().catch(()=>null); return alert('Cancel failed: ' + (txt || res.statusText)); }
                const json = await res.json().catch(()=>null);
                if (json?.success) { alert('Outbound canceled'); load(); }
                else alert(json?.msg || json?.message || 'Error');
            } catch (e) { alert('Network error: ' + e.message); }
        }

        function formatDate(dateStr) {
            const d = getField({d: dateStr}, 'd', 'creation_date', 'creationDate', 'created_at', 'createdAt');
            if (!d || d === '-') return '-';
            try { return new Date(d).toLocaleString(); } catch(e) { return d; }
        }

        load();

    </script>
</body>
</html>
