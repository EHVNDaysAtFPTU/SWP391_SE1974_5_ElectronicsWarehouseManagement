<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Outbound Orders - Storekeeper</title>

    <style>
        body {
            font-family: Arial;
            background: #fdf2f2;
            padding: 40px;
        }

        /* helper functions moved to script */

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        button {
            padding: 6px 12px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .home-btn {
            background: #6c757d;
            color: white;
        }

        .detail-btn {
            background: #3498db;
            color: white;
        }

        .confirm-btn {
            background: #e74c3c;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #e74c3c;
            color: white;
        }

        .status-complete {
            color: green;
            font-weight: bold;
        }

        .status-pending {
            color: orange;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            width: 800px;
            padding: 20px;
            border-radius: 8px;
            max-height: 90vh;
            overflow-y: auto;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <h2>Outbound Orders</h2>
        <button class="home-btn" onclick="goHome()">⬅ Back to Home</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Order Code</th>
                <th>Date</th>
                <th>Warehouse</th>
                <th>Bin</th>
                <th>Total Items</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="orderTable"></tbody>
    </table>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <span onclick="closeModal()" style="float:right;cursor:pointer;color:red;font-weight:bold;">X</span>
            <h3>Outbound Detail</h3>
            <div id="detailContent"></div>
        </div>
    </div>

    <script>

        const BASE = "https://localhost:7297/api";

        function getField(obj, ...names) {
            if (!obj) return "-";
            for (const n of names) {
                if (obj[n] !== undefined && obj[n] !== null) return obj[n];
            }
            return "-";
        }

        function goHome() {
            window.location = "home.html";
        }

        function getStatusText(status) {
            switch (status) {
                case 0: return "Pending";
                case 1: return "Approved";
                case 2: return "Approved - Waiting Confirm";
                case 3: return "Completed";
                default: return "Unknown";
            }
        }

        async function load() {

            let res = await fetch(BASE + "/storekeeper/transfers", { credentials: "include" });
            let result = await res.json();

            // 🔥 Outbound = type === 2
            const outboundListSummary = (result.data || []).filter(x => x.type === 2);
            const warehouseCache = {};

            const outboundList = await Promise.all(outboundListSummary.map(async t0 => {
                try {
                    // always try to fetch full transfer detail first (contains components and bin info)
                    const dres = await fetch(BASE + "/storekeeper/transfers/" + (t0.id ?? t0.ID ?? t0.request_id), { credentials: 'include' });
                    if (dres.ok) {
                        const djson = await dres.json();
                        if (djson?.success && djson.data) {
                            t0 = djson.data;
                        }
                    }

                    // ensure bin_from object available; if still missing try bins endpoint
                    if (t0.bin_from && (t0.bin_from.location_in_warehouse || t0.bin_from.locationInWarehouse || t0.bin_from.binCode))
                        return t0;

                    const binId = t0.bin_from_id ?? t0.binFromId ?? t0.bin_from?.id ?? t0.bin_from?.ID;
                    if (!binId) return t0;

                    const bres = await fetch(BASE + "/storekeeper/bins/" + binId, { credentials: 'include' });
                    if (!bres.ok) return t0;
                    const bjson = await bres.json();
                    if (bjson?.success && bjson.data) {
                        t0.bin_from = bjson.data;
                        // set helper from warehouse name
                        try {
                            const fromName = t0.bin_from?.warehouse?.name ?? t0.bin_from?.warehouse?.warehouseName ?? t0.bin_from?.warehouse ?? null;
                            t0._fromWarehouseName = fromName ?? null;
                        } catch (e) { /* ignore */ }
                    }
                    return t0;
                } catch (e) {
                    console.error('detail/bin fetch failed', e);
                    return t0;
                }
            }));

            let html = "";

            outboundList.forEach(o => {

                let statusText = getStatusText(o.status);
                let statusClass = o.status === 3 ? "status-complete" : "status-pending";

                const binFrom = o['bin_from'] ?? o.bin_from ?? null;
                let warehouse = '-';
                if (o._fromWarehouseName) warehouse = o._fromWarehouseName;
                else if (binFrom?.warehouse) warehouse = binFrom.warehouse.name ?? binFrom.warehouse.warehouseName ?? binFrom.warehouse;
                else if (o.warehouse) warehouse = o.warehouse.name ?? o.warehouse.warehouseName ?? o.warehouse;
                const bin = binFrom?.location_in_warehouse ?? binFrom?.locationInWarehouse ?? binFrom?.binCode ?? o.location_in_warehouse ?? o.locationInWarehouse ?? '-';

                const comps = o.components ?? o.Components ?? [];
                const totalItems = comps.reduce((s, c) => s + (c.quantity ?? c.Quantity ?? c.qty ?? 0), 0);

                let action = `<button class="detail-btn" onclick="goDetail(${o.id})">Detail</button>`;

                html += `
<tr>
<td>${o.description}</td>
<td>${formatDate(o.creation_date)}</td>
<td>${warehouse}</td>
<td>${bin}</td>
<td>${totalItems}</td>
<td class="${statusClass}">${statusText}</td>
<td>${action}</td>
</tr>`;
            });

            document.getElementById("orderTable").innerHTML = html;
        }

        function goDetail(id) {
            window.location.href = `outbound-detail.html?id=${id}`;
        }

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleString();
        }

        load();

    </script>
</body>
</html>
