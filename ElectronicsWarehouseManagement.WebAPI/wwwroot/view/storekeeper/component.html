<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Component Management</title>

    <style>
        body {
            font-family: Arial;
            padding: 40px;
            background: #f8fafc;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #2563eb;
            color: white;
        }

        .form-box {
            background: white;
            padding: 20px;
            margin-top: 20px;
        }

        input, select {
            width: 100%;
            padding: 6px;
            margin-bottom: 8px;
        }

        button {
            padding: 8px 15px;
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
            margin-right: 5px;
        }

            button:hover {
                opacity: 0.9;
            }

        .thumbnail {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s;
        }

            .thumbnail:hover {
                transform: scale(1.1);
            }
    </style>
</head>
<body>

    <div class="top-bar">
        <h2>📦 Component List</h2>
        <div>
            <button onclick="goHome()">⬅ Back Home</button>
            <button onclick="loadComponents()">Refresh</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Image</th>
                <th>Name</th>
                <th>Unit</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody id="componentBody"></tbody>
    </table>

    <div class="form-box">
        <h3>➕ Create Component</h3>

        <input id="name" placeholder="Name">
        <input id="desc" placeholder="Description">
        <input id="manufacturer" placeholder="Manufacturer">
        <input id="unit" placeholder="Unit (pcs, kg...)">
        <input id="price" type="number" placeholder="Unit Price">
        <input id="datasheet" placeholder="Datasheet URL">
        <input type="date" id="mfgDate">

        <select id="categorySelect"></select>

        <input type="file" id="imageFile">

        <button onclick="createComponent()">Create</button>
    </div>

    <script>

        const BASE = "https://localhost:7297/api";

        /* ================= BACK HOME ================= */
        function goHome() {
            window.location.href = "home.html"; // sửa nếu page home khác tên
        }

        /* ================= API ================= */
        async function api(endpoint, method = "GET", body = null, isForm = false) {

            const options = {
                method,
                credentials: "include"
            };

            if (body) {
                if (!isForm) {
                    options.headers = { "Content-Type": "application/json" };
                    options.body = JSON.stringify(body);
                } else {
                    options.body = body;
                }
            }

            const res = await fetch(BASE + endpoint, options);
            return await res.json();
        }

        /* ================= LOAD COMPONENTS ================= */
        async function loadComponents() {

            const result = await api("/storekeeper/components");

            if (!result.success) return alert(result.message);

            const tbody = document.getElementById("componentBody");
            tbody.innerHTML = "";

            result.data.forEach(c => {

                let imageUrl = c.metadata?.image_url ?? "";

                // nếu backend trả /uploads/abc.jpg
                if (imageUrl && imageUrl.startsWith("/")) {
                    imageUrl = BASE.replace("/api", "") + imageUrl;
                }

                tbody.innerHTML += `
            <tr>
                <td>${c.id}</td>
                <td>
                    ${imageUrl
                        ? `<img src="${imageUrl}" class="thumbnail" onclick="window.open('${imageUrl}','_blank')">`
                        : "No Image"
                    }
                </td>
                <td>${c.metadata?.name ?? ""}</td>
                <td>${c.unit}</td>
                <td>${c.unit_price}</td>
            </tr>`;
            });
        }

        /* ================= LOAD CATEGORY ================= */
        async function loadCategories() {

            const result = await api("/storekeeper/component-categories");
            if (!result.success) return;

            const select = document.getElementById("categorySelect");
            select.innerHTML = "";

            result.data.forEach(c => {
                select.innerHTML += `
                <option value="${c.id}">
                    ${c.name}
                </option>`;
            });
        }

        /* ================= CREATE COMPONENT ================= */
        async function createComponent() {

            const name = document.getElementById("name").value.trim();
            const description = document.getElementById("desc").value.trim();
            const manufacturer = document.getElementById("manufacturer").value.trim();
            const unit = document.getElementById("unit").value.trim();
            const priceValue = document.getElementById("price").value;
            const datasheet = document.getElementById("datasheet").value.trim();
            const dateValue = document.getElementById("mfgDate").value;
            const categoryId = document.getElementById("categorySelect").value;

            if (!name || !unit || !priceValue) {
                return alert("Name, Unit và Price là bắt buộc");
            }

            const unitPrice = parseFloat(priceValue);
            if (isNaN(unitPrice)) {
                return alert("Price không hợp lệ");
            }

            let manufacturingDate = dateValue
                ? new Date(dateValue).toISOString()
                : null;

            let imageUrl = "";
            const file = document.getElementById("imageFile").files[0];

            if (file) {
                const form = new FormData();
                form.append("image", file);

                const uploadRes = await api(
                    "/storekeeper/upload-image",
                    "POST",
                    form,
                    true
                );

                if (!uploadRes.success) return alert(uploadRes.message);
                imageUrl = uploadRes.data;
            }

            const body = {
                name,
                description,
                image_url: imageUrl,
                manufacturer,
                manufacturing_date: manufacturingDate,
                datasheet_url: datasheet,
                unit,
                unit_price: unitPrice,
                category_ids: categoryId ? [parseInt(categoryId)] : []
            };

            const result = await api(
                "/storekeeper/create-component",
                "POST",
                body
            );

            if (result.success) {
                alert("Created successfully");
                document.querySelectorAll(".form-box input").forEach(i => i.value = "");
                loadComponents();
            } else {
                alert(result.message);
            }
        }

        /* ================= INIT ================= */
        document.addEventListener("DOMContentLoaded", () => {
            loadComponents();
            loadCategories();
        });

    </script>
</body>
</html>
