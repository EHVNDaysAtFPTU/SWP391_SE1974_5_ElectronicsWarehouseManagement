<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Component Management</title>

    <style>
        :root{--accent:#2563eb;--muted:#64748b;--card:#ffffff}
        *{box-sizing:border-box}
        body{font-family:Inter, 'Segoe UI', Roboto, Arial, sans-serif;padding:24px;background:#f6f8fb;color:#0f172a}
        .page{max-width:1200px;margin:0 auto}
        .top-bar{display:flex;justify-content:space-between;align-items:center;gap:12px}
        .title{display:flex;flex-direction:column}
        .title h2{margin:0;font-size:20px}
        .title p{margin:6px 0 0 0;color:var(--muted);font-size:13px}

        .layout{display:grid;grid-template-columns:1fr 360px;gap:18px;margin-top:18px}

        .table-card{background:var(--card);border-radius:12px;padding:14px;box-shadow:0 8px 30px rgba(2,6,23,0.06)}
        table{width:100%;border-collapse:collapse}
        thead th{background:linear-gradient(90deg,#bfdbfe,#dbeafe);color:#0b5cff;padding:12px;text-align:left}
        th,td{padding:12px;border-bottom:1px solid #f1f5f9}
        tr:hover td{background:#fbfdff}

        .form-panel{background:var(--card);padding:14px;border-radius:12px;box-shadow:0 6px 20px rgba(2,6,23,0.04)}
        .form-panel h3{margin:0 0 10px 0}
        .form-panel input,.form-panel select{width:100%;padding:10px;border-radius:8px;border:1px solid #eef2ff;margin-bottom:10px}
        .form-panel .actions{display:flex;gap:8px}
        .btn{padding:10px 12px;border-radius:8px;border:none;cursor:pointer}
        .btn.primary{background:var(--accent);color:#fff}
        .btn.ghost{background:transparent;border:1px solid #e6eefb}

        .thumbnail{width:72px;height:72px;border-radius:8px;object-fit:cover;border:1px solid #eef6ff}
        .meta{font-size:13px;color:var(--muted)}

        @media(max-width:900px){.layout{grid-template-columns:1fr}}
    </style>
</head>
<body>

    <div class="page">
        <div class="top-bar">
            <div class="title">
                <h2>📦 Components</h2>
                <p>Quản lý sản phẩm — xem, tạo hoặc tải ảnh mới cho component</p>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
                <button class="btn ghost" onclick="goHome()">⬅ Back</button>
                <button class="btn primary" onclick="loadComponents()">Refresh</button>
            </div>
        </div>

        <div class="layout">
            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th style="width:70px">ID</th>
                            <th style="width:90px">Image</th>
                            <th>Name</th>
                            <th style="width:100px">Unit</th>
                            <th style="width:120px">Price</th>
                        </tr>
                    </thead>
                    <tbody id="componentBody"></tbody>
                </table>
            </div>

            <aside class="form-panel">
                <h3>➕ Create Component</h3>
                <div class="meta">Điền thông tin cơ bản của component rồi nhấn Create</div>
                <div style="height:10px"></div>
                <input id="name" placeholder="Name">
                <input id="desc" placeholder="Description">
                <input id="manufacturer" placeholder="Manufacturer">
                <input id="unit" placeholder="Unit (pcs, kg...)">
                <input id="price" type="number" placeholder="Unit Price">
                <input id="datasheet" placeholder="Datasheet URL">
                <input type="date" id="mfgDate">
                <select id="categorySelect"></select>
                <div style="display:flex;gap:8px;align-items:center;margin-top:8px">
                    <input type="file" id="imageFile" />
                    <div style="flex:1;color:var(--muted);font-size:13px">Ảnh (tùy chọn)</div>
                </div>
                <div style="height:8px"></div>
                <div class="actions">
                    <button class="btn primary" onclick="createComponent()">Create</button>
                    <button class="btn ghost" onclick="document.querySelectorAll('.form-panel input').forEach(i=>i.value='')">Clear</button>
                </div>
            </aside>
        </div>
    </div>

    <script>

        const BASE = "https://localhost:7297/api";

        /* ================= BACK HOME ================= */
        function goHome() {
            window.location.href = "home.html"; // sửa nếu page home khác tên
        }

        /* ================= API ================= */
        async function api(endpoint, method = "GET", body = null, isForm = false) {

            const options = {
                method,
                credentials: "include"
            };

            if (body) {
                if (!isForm) {
                    options.headers = { "Content-Type": "application/json" };
                    options.body = JSON.stringify(body);
                } else {
                    options.body = body;
                }
            }

            const res = await fetch(BASE + endpoint, options);
            return await res.json();
        }

        /* ================= LOAD COMPONENTS ================= */
        async function loadComponents() {

            const result = await api("/storekeeper/components");

            if (!result.success) return alert(result.message);

            const tbody = document.getElementById("componentBody");
            tbody.innerHTML = "";

            result.data.forEach(c => {

                let imageUrl = c.metadata?.image_url ?? "";

                // nếu backend trả /uploads/abc.jpg
                if (imageUrl && imageUrl.startsWith("/")) {
                    imageUrl = BASE.replace("/api", "") + imageUrl;
                }

                tbody.innerHTML += `
            <tr>
                <td>${c.id}</td>
                <td>
                    ${imageUrl
                        ? `<img src="${imageUrl}" class="thumbnail" onclick="window.open('${imageUrl}','_blank')">`
                        : "No Image"
                    }
                </td>
                <td>${c.metadata?.name ?? ""}</td>
                <td>${c.unit}</td>
                <td>${c.unit_price}</td>
            </tr>`;
            });
        }

        /* ================= LOAD CATEGORY ================= */
        async function loadCategories() {

            // controller endpoint is /storekeeper/components/categories
            const result = await api("/storekeeper/components/categories");
            if (!result.success) return;

            const select = document.getElementById("categorySelect");
            select.innerHTML = "";

            result.data.forEach(c => {
                select.innerHTML += `
                <option value="${c.id}">
                    ${c.name}
                </option>`;
            });
        }

        /* ================= CREATE COMPONENT ================= */
        async function createComponent() {

            const name = document.getElementById("name").value.trim();
            const description = document.getElementById("desc").value.trim();
            const manufacturer = document.getElementById("manufacturer").value.trim();
            const unit = document.getElementById("unit").value.trim();
            const priceValue = document.getElementById("price").value;
            const datasheet = document.getElementById("datasheet").value.trim();
            const dateValue = document.getElementById("mfgDate").value;
            const categoryId = document.getElementById("categorySelect").value;

            if (!name || !unit || !priceValue) {
                return alert("Name, Unit và Price là bắt buộc");
            }

            const unitPrice = parseFloat(priceValue);
            if (isNaN(unitPrice)) {
                return alert("Price không hợp lệ");
            }

            let manufacturingDate = dateValue
                ? new Date(dateValue).toISOString()
                : null;

            let imageUrl = "";
            const file = document.getElementById("imageFile").files[0];

            if (file) {
                const form = new FormData();
                form.append("image", file);

                const uploadRes = await api(
                    "/storekeeper/upload-image",
                    "POST",
                    form,
                    true
                );

                if (!uploadRes.success) return alert(uploadRes.message);
                imageUrl = uploadRes.data;
            }

            const body = {
                name: name,
                desc: description,
                image_url: imageUrl,
                manufacturer: manufacturer,
                // only include manufacturing_date when specified to avoid deserialization errors
                unit: unit,
                unit_price: unitPrice,
                datasheet_url: datasheet,
                category_ids: categoryId ? [parseInt(categoryId)] : []
            };

            if (manufacturingDate) body.manufacturing_date = manufacturingDate;

            // call correct controller route
            const result = await api(
                "/storekeeper/components/create",
                "POST",
                body
            );

            if (result.success) {
                alert("Created successfully");
                // clear inputs in form-panel
                document.querySelectorAll('.form-panel input').forEach(i => { try { i.value = ''; } catch {} });
                document.getElementById('categorySelect').selectedIndex = -1;
                document.getElementById('imageFile').value = '';
                loadComponents();
                loadCategories();
            } else {
                alert(result.message || 'Create failed');
            }
        }

        /* ================= INIT ================= */
        document.addEventListener("DOMContentLoaded", () => {
            loadComponents();
            loadCategories();
        });

    </script>
</body>
</html>
