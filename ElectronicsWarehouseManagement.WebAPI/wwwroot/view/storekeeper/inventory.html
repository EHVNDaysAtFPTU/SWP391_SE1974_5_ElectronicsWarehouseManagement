<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Inventory Management</title>

    <style>
        :root{--accent:#10b981;--muted:#6b7280}
        body{font-family:Inter, 'Segoe UI', Roboto, Arial, sans-serif;padding:24px;background:#f6fbf7;color:#0f172a}
        .page{max-width:1200px;margin:0 auto}
        .top-bar{display:flex;justify-content:space-between;align-items:center}
        .title{display:flex;flex-direction:column}
        .title h2{margin:0;font-size:20px}
        .title p{margin:6px 0 0 0;color:var(--muted);font-size:13px}

        .controls{display:flex;gap:12px;align-items:center;margin:18px 0}
        .search input{padding:10px;border-radius:8px;border:1px solid #eef6f0;width:280px}
        .btn{padding:10px 12px;border-radius:8px;border:none;cursor:pointer}
        .btn.ghost{background:transparent;border:1px solid #e6f6ee}
        .btn.primary{background:var(--accent);color:#fff}

        .table-card{background:#fff;border-radius:12px;padding:12px;box-shadow:0 8px 30px rgba(2,6,23,0.06)}
        table{width:100%;border-collapse:collapse}
        thead th{background:linear-gradient(90deg,#bbf7d0,#ecfccb);color:#065f46;padding:12px;text-align:left}
        th,td{padding:12px;border-bottom:1px solid #f1f5f4}
        tr:hover td{background:#fbfff8}
        .low-stock{color:#dc2626;font-weight:700}

        .pagination{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
        .page-item{padding:6px 10px;border-radius:8px;border:1px solid #e6f6ee;background:#fff;cursor:pointer}
        .page-item.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    </style>
</head>

<body>

    <div class="page">
        <div class="top-bar">
            <div class="title">
                <h2>📦 Inventory</h2>
                <p>Danh sách tồn kho — cảnh báo tồn thấp</p>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
                <button class="btn ghost" onclick="goHome()">⬅ Back</button>
                <button class="btn primary" onclick="loadInventory()">Refresh</button>
            </div>
        </div>

        <div class="controls">
            <div class="search"><input id="searchInput" type="text" placeholder="Search by name..." oninput="renderTable()" /></div>
            <div style="margin-left:auto;color:var(--muted);font-size:13px">Rows per page: 5</div>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th style="width:70px">ID</th>
                        <th>Name</th>
                        <th style="width:90px">Unit</th>
                        <th style="width:90px">Stock</th>
                        <th style="width:120px">Price</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
            <div class="pagination" id="pagination"></div>
        </div>

        <div style="height:18px"></div>
        <h3 style="margin:12px 0 6px 0">Inventory by Warehouse</h3>
        <div class="table-card" style="padding:12px" id="warehousesContainer">
            <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px">
                <label class="small" style="margin:0">Select warehouse:</label>
                <select id="warehouseSelect" style="padding:8px;border-radius:8px;border:1px solid #eef6f0;min-width:220px"></select>
                <label class="small" style="margin:0">Select bin:</label>
                <select id="binSelect" style="padding:8px;border-radius:8px;border:1px solid #eef6f0;min-width:220px">
                    <option value="">-- All bins --</option>
                </select>
                <button class="btn primary" id="loadWarehouseBtn" style="padding:8px 12px">Show</button>
            </div>
            <div id="warehouseInventoryArea">Choose a warehouse to view its inventory (ID, Name, Quantity)</div>
        </div>
    </div>

        <script>

        const BASE = "https://localhost:7297/api";

        let fullData = [];
        let warehouses = [];
        let currentPage = 1;
        const rowsPerPage = 5;

        function goHome() { window.location.href = "home.html"; }

        async function api(endpoint) {
            const res = await fetch(BASE + endpoint, { credentials: "include" });
            return await res.json();
        }

        // load components and warehouses list on page load
        async function loadInventory() {
            try {
                const compRes = await api("/storekeeper/components");
                if (!compRes.success) { alert(compRes.msg || 'Failed to load components'); return; }
                const components = compRes.data || [];
                fullData = components.map(c => {
                    const id = c.id ?? c.ID ?? c.componentId ?? c.ComponentId;
                    const qty = Number(c.quantity ?? c.Quantity ?? c.TotalQuantity ?? 0) || 0;
                    return Object.assign({}, c, { _stock: qty });
                });

                // Fetch component-bin entries and aggregate stock per component client-side so frontend shows stock
                try {
                    const binsRes = await api('/storekeeper/bins/components');
                    if (binsRes && binsRes.success && Array.isArray(binsRes.data)) {
                        const agg = {};
                        for (const cb of binsRes.data) {
                            const compId = cb.component_id ?? cb.ComponentId ?? cb.componentId ?? cb.component?.id ?? cb.component?.ComponentId ?? cb.component?.ComponentId ?? cb.component?.ID ?? null;
                            const qty = Number(cb.quantity ?? cb.Quantity ?? 0) || 0;
                            if (compId !== null && compId !== undefined) {
                                const key = String(compId);
                                agg[key] = (agg[key] || 0) + qty;
                            }
                        }
                        // apply aggregated stock to fullData
                        fullData.forEach(c => {
                            const cid = String(c.id ?? c.ID ?? c.componentId ?? c.ComponentId ?? '');
                            if (cid && agg[cid] !== undefined) c._stock = agg[cid];
                        });
                    }
                } catch (e) { console.warn('failed to load component bins for stock aggregation', e); }

                // warehouses for selection
                const wRes = await api('/storekeeper/warehouses');
                warehouses = (wRes && wRes.success) ? (wRes.data || []) : [];
                populateWarehouseSelect();

            } catch (e) { console.error('loadInventory failed', e); alert('Lỗi khi load inventory'); }
        }

        function populateWarehouseSelect() {
            const sel = document.getElementById('warehouseSelect');
            sel.innerHTML = '<option value="">-- Select warehouse --</option>';
            warehouses.forEach(w => {
                const id = w.id ?? w.ID ?? w.warehouseId;
                const name = w.name ?? w.WarehouseName ?? ('Warehouse ' + id);
                const opt = document.createElement('option');
                opt.value = id;
                opt.text = `${id} - ${name}`;
                sel.appendChild(opt);
            });
            const binSel = document.getElementById('binSelect');
            // when warehouse changes populate bin select
            sel.addEventListener('change', async () => {
                const wid = sel.value;
                binSel.innerHTML = '<option value="">-- All bins --</option>';
                if (!wid) return;
                try {
                    const whRes = await api('/storekeeper/warehouses/' + wid);
                    const bins = (whRes && whRes.success && whRes.data) ? (whRes.data.bins ?? whRes.data ?? []) : [];
                    for (const b of bins) {
                        const bid = b.id ?? b.ID ?? b.binId;
                        const name = b.location_in_warehouse ?? b.locationInWarehouse ?? b.binCode ?? ('Bin ' + bid);
                        const opt = document.createElement('option');
                        opt.value = bid;
                        opt.text = `${bid} - ${name}`;
                        binSel.appendChild(opt);
                    }
                } catch (e) { console.warn('failed to load bins for warehouse', wid, e); }
            });

            document.getElementById('loadWarehouseBtn').addEventListener('click', () => {
                const val = sel.value;
                if (!val) { alert('Please select a warehouse'); return; }
                const binVal = binSel.value;
                loadSelectedWarehouseInventory(val, binVal || null);
            });
        }

        // load inventory for selected warehouse and display 3 columns: id, name, quantity
        // optional binId: when provided, show inventory only for that bin
        async function loadSelectedWarehouseInventory(warehouseId, binId = null) {
            const area = document.getElementById('warehouseInventoryArea');
            area.innerHTML = '<div style="padding:18px;text-align:center"><div class="spinner-border text-primary"></div></div>';

            try {
                // fetch transfers once to compute finished 'From' movements per bin
                let finishedByBin = {};
                try {
                    const transfersRes = await api('/storekeeper/transfers');
                    if (transfersRes && transfersRes.success && Array.isArray(transfersRes.data)) {
                        for (const t of transfersRes.data) {
                            const fins = t.finished_components ?? t.finishedComponents ?? t.FinishedTransferRequestComponents ?? [];
                            if (!Array.isArray(fins)) continue;
                            for (const fc of fins) {
                                const type = fc.type ?? fc.Type ?? null;
                                if (type === undefined || type === null) continue;
                                if (Number(type) !== 1) continue; // only "From" movements
                                const binIdKey = String(fc.bin_id ?? fc.binId ?? fc.bin?.id ?? '');
                                const compIdKey = String(fc.component_id ?? fc.componentId ?? fc.component?.id ?? '');
                                const fq = Number(fc.quantity ?? fc.Quantity ?? 0) || 0;
                                if (!binIdKey) continue;
                                finishedByBin[binIdKey] = finishedByBin[binIdKey] || {};
                                finishedByBin[binIdKey][compIdKey] = (finishedByBin[binIdKey][compIdKey] || 0) + fq;
                            }
                        }
                    }
                } catch (e) { console.warn('failed to load transfers', e); }

                // fetch warehouse detail to get bins
                const whRes = await api('/storekeeper/warehouses/' + warehouseId);
                if (!whRes.success || !whRes.data) { area.innerHTML = '<div class="text-danger p-3">Cannot load warehouse bins</div>'; return; }
                const bins = whRes.data.bins ?? whRes.data ?? [];
                // if a specific bin is requested, restrict to that bin
                let binsToProcess = bins;
                if (binId) {
                    const found = bins.find(bb => String(bb.id ?? bb.ID ?? bb.binId) === String(binId));
                    if (found) binsToProcess = [found];
                    else binsToProcess = [{ id: binId }]; // fallback: still try to query bin endpoint by id
                }

                // aggregated qty per component id
                const aggregated = {};

                // prepare a lookup map for names from previously loaded components
                const fullMap = {};
                fullData.forEach(c => { const cid = c.id ?? c.ID ?? c.componentId ?? c.ComponentId; if (cid !== undefined && cid !== null) fullMap[String(cid)] = c; });

                for (const b of binsToProcess) {
                    const bid = b.id ?? b.ID ?? b.binId;
                    try {
                        const cbRes = await api('/storekeeper/bins/' + bid);
                        let dataArr = null;
                        if (cbRes && cbRes.success && cbRes.data) {
                            if (Array.isArray(cbRes.data)) dataArr = cbRes.data;
                            else {
                                const props = ['components','ComponentBins','componentBins','items','data','componentsList'];
                                for (const p of props) if (Array.isArray(cbRes.data[p])) { dataArr = cbRes.data[p]; break; }
                                if (!dataArr) {
                                    for (const k of Object.keys(cbRes.data)) {
                                        const val = cbRes.data[k];
                                        if (Array.isArray(val) && val.length>0) { const el = val[0]; if (el && (el.component_id!==undefined || el.quantity!==undefined)) { dataArr = val; break; } }
                                    }
                                }
                            }
                        }

                        if (Array.isArray(dataArr) && dataArr.length>0) {
                            for (const x of dataArr) {
                                const compIdRaw = x.component_id ?? x.ComponentId ?? x.componentId ?? x.component?.id ?? x.Component?.id ?? x.id ?? x.ID ?? '';
                                const compIdKey = compIdRaw !== undefined && compIdRaw !== null ? String(compIdRaw) : '';
                                const qty = Number(x.quantity ?? x.Quantity ?? x.qty ?? 0) || 0;
                                const finishedForBin = (finishedByBin[String(bid)] && finishedByBin[String(bid)][compIdKey]) ? Number(finishedByBin[String(bid)][compIdKey]||0) : 0;
                                const displayedQty = Math.max(0, qty - finishedForBin);
                                if (!compIdKey) continue;
                                aggregated[compIdKey] = (aggregated[compIdKey] || 0) + displayedQty;
                            }
                        }
                    } catch (e) { console.warn('failed to load bin', bid, e); }
                }

                // build table HTML with 3 columns: id, name, quantity
                let rows = '';
                for (const [compId, qty] of Object.entries(aggregated)) {
                    const meta = fullMap[compId];
                    const name = meta?.metadata?.name ?? meta?.metadata?.Name ?? meta?.name ?? meta?.Name ?? ('#' + compId);
                    rows += `<tr><td style="width:70px">${compId}</td><td>${escapeHtml(name)}</td><td style="width:120px">${qty}</td></tr>`;
                }

                if (!rows) area.innerHTML = '<div class="p-3 text-muted">No components found in this warehouse.</div>';
                else area.innerHTML = `<table style="width:100%;border-collapse:collapse"><thead><tr><th style="width:70px">ID</th><th>Name</th><th style="width:120px">Quantity</th></tr></thead><tbody>${rows}</tbody></table>`;

            } catch (e) { console.error('loadSelectedWarehouseInventory failed', e); area.innerHTML = '<div class="text-danger p-3">Error loading warehouse inventory</div>'; }
        }

        function escapeHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

        function renderTable() { /* keep existing main table logic for overall components */
            const tbody = document.getElementById("inventoryBody");
            const search = document.getElementById("searchInput").value.toLowerCase();
            let filtered = fullData.filter(c => (c.metadata?.name ?? "").toLowerCase().includes(search));
            const totalPages = Math.ceil(filtered.length / rowsPerPage);
            if (currentPage > totalPages) currentPage = 1;
            const start = (currentPage - 1) * rowsPerPage;
            const pageData = filtered.slice(start, start + rowsPerPage);
            tbody.innerHTML = "";
            pageData.forEach(c => {
                const stock = (c._stock ?? c.quantity ?? c.Quantity ?? c.TotalQuantity ?? 0) ?? 0;
                const isLow = stock <= 30;
                const price = c.unit_price ?? c.unitPrice ?? 0;
                tbody.innerHTML += `\n            <tr>\n                <td>${c.id}</td>\n                <td>${c.metadata?.name ?? ''}</td>\n                <td>${c.unit ?? ''}</td>\n                <td class="${isLow ? "low-stock" : ""}">${stock}</td>\n                <td>${price}</td>\n            </tr>`;
            });
            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            const pagination = document.getElementById("pagination");
            pagination.innerHTML = "";
            for (let i = 1; i <= totalPages; i++) {
                pagination.innerHTML += `\n            <span class="page-btn ${i === currentPage ? "active-page" : ""}"\n                  onclick="changePage(${i})">\n                  ${i}\n            </span>`;
            }
        }

        function changePage(page) { currentPage = page; renderTable(); }

        document.addEventListener("DOMContentLoaded", async () => { await loadInventory(); renderTable(); });

    </script>

</body>
</html>
