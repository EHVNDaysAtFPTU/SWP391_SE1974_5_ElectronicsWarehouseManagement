<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Inventory Management</title>

    <style>
        :root{--accent:#10b981;--muted:#6b7280}
        body{font-family:Inter, 'Segoe UI', Roboto, Arial, sans-serif;padding:24px;background:#f6fbf7;color:#0f172a}
        .page{max-width:1200px;margin:0 auto}
        .top-bar{display:flex;justify-content:space-between;align-items:center}
        .title{display:flex;flex-direction:column}
        .title h2{margin:0;font-size:20px}
        .title p{margin:6px 0 0 0;color:var(--muted);font-size:13px}

        .controls{display:flex;gap:12px;align-items:center;margin:18px 0}
        .search input{padding:10px;border-radius:8px;border:1px solid #eef6f0;width:280px}
        .btn{padding:10px 12px;border-radius:8px;border:none;cursor:pointer}
        .btn.ghost{background:transparent;border:1px solid #e6f6ee}
        .btn.primary{background:var(--accent);color:#fff}

        .table-card{background:#fff;border-radius:12px;padding:12px;box-shadow:0 8px 30px rgba(2,6,23,0.06)}
        table{width:100%;border-collapse:collapse}
        thead th{background:linear-gradient(90deg,#bbf7d0,#ecfccb);color:#065f46;padding:12px;text-align:left}
        th,td{padding:12px;border-bottom:1px solid #f1f5f4}
        tr:hover td{background:#fbfff8}
        .low-stock{color:#dc2626;font-weight:700}

        .pagination{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
        .page-item{padding:6px 10px;border-radius:8px;border:1px solid #e6f6ee;background:#fff;cursor:pointer}
        .page-item.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    </style>
</head>

<body>

    <div class="page">
        <div class="top-bar">
            <div class="title">
                <h2>📦 Inventory</h2>
                <p>Danh sách tồn kho — cảnh báo tồn thấp</p>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
                <button class="btn ghost" onclick="goHome()">⬅ Back</button>
                <button class="btn primary" onclick="loadInventory()">Refresh</button>
            </div>
        </div>

        <div class="controls">
            <div class="search"><input id="searchInput" type="text" placeholder="Search by name..." oninput="renderTable()" /></div>
            <div style="margin-left:auto;color:var(--muted);font-size:13px">Rows per page: 5</div>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th style="width:70px">ID</th>
                        <th>Name</th>
                        <th style="width:90px">Unit</th>
                        <th style="width:90px">Stock</th>
                        <th style="width:120px">Price</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
            <div class="pagination" id="pagination"></div>
        </div>

        <div style="height:18px"></div>
        <h3 style="margin:12px 0 6px 0">Inventory by Warehouse / Bin</h3>
        <div id="warehousesContainer"></div>
    </div>

    <script>

        const BASE = "https://localhost:7297/api";

        let fullData = [];
        let currentPage = 1;
        const rowsPerPage = 5;

        /* ================= BACK ================= */
        function goHome() {
            window.location.href = "home.html";
        }

        /* ================= API ================= */
        async function api(endpoint) {
            const res = await fetch(BASE + endpoint, { credentials: "include" });
            return await res.json();
        }

        // helpers to robustly extract component id/name from various API shapes
        function extractComponentIdFromRecord(rec) {
            if (!rec) return null;
            // common direct fields
            if (rec.component_id != null) return rec.component_id;
            if (rec.ComponentId != null) return rec.ComponentId;
            if (rec.componentId != null) return rec.componentId;
            // if nested component object exists
            const comp = rec.component ?? rec.Component ?? null;
            if (comp) {
                if (comp.id != null) return comp.id;
                if (comp.ID != null) return comp.ID;
                if (comp.componentId != null) return comp.componentId;
            }
            // fallback: search any key that looks like component id
            for (const k of Object.keys(rec)) {
                if (/component.*id/i.test(k) && rec[k] != null) return rec[k];
            }
            return null;
        }

        function extractComponentNameFromRecord(rec) {
            if (!rec) return null;
            const comp = rec.component ?? rec.Component ?? null;
            if (comp) {
                if (comp.metadata && (comp.metadata.name || comp.metadata.Name)) return comp.metadata.name ?? comp.metadata.Name;
                if (comp.name) return comp.name;
                if (comp.Name) return comp.Name;
                // metadata might be serialized
                const meta = comp.metadataJson ?? comp.MetadataJson ?? comp.metadatajson ?? null;
                if (meta) {
                    try {
                        const m = typeof meta === 'string' ? JSON.parse(meta) : meta;
                        if (m && (m.name || m.Name)) return m.name ?? m.Name;
                    } catch (e) { /* ignore */ }
                }
            }
            // also check top-level name fields
            if (rec.name) return rec.name;
            if (rec.Name) return rec.Name;
            return null;
        }

        /* ================= LOAD ================= */
        async function loadInventory() {
            try {
                // fetch components list and component-bin entries, aggregate stock from bins
                const [compRes, cbAllRes] = await Promise.all([
                    api('/storekeeper/components'),
                    api('/storekeeper/bins/components')
                ]);
                if (!compRes.success) { alert(compRes.msg || 'Failed to load components'); return; }
                const components = compRes.data || [];
                const cbAll = (cbAllRes && cbAllRes.success && Array.isArray(cbAllRes.data)) ? cbAllRes.data : [];

                // aggregate quantities per component from component-bin records
                const qtyMap = {};
                cbAll.forEach(cb => {
                    const cid = cb.component_id ?? cb.ComponentId ?? cb.componentId ?? cb.componentId;
                    const q = Number(cb.quantity ?? cb.Quantity ?? 0) || 0;
                    if (!cid) return;
                    qtyMap[cid] = (qtyMap[cid] || 0) + q;
                });

                // attach normalized stock using aggregated quantities where available
                fullData = components.map(c => {
                    const id = c.id ?? c.ID ?? c.componentId ?? c.ComponentId;
                    const agg = qtyMap[id] ?? 0;
                    const qty = agg || Number(c.quantity ?? c.Quantity ?? c.TotalQuantity ?? 0) || 0;
                    return Object.assign({}, c, { _stock: qty });
                });

                currentPage = 1;
                renderTable();
                // load per-warehouse/bin breakdown
                await loadWarehousesBreakdown();
            } catch (e) {
                console.error('loadInventory failed', e);
                alert('Lỗi khi load inventory');
            }
        }

        async function loadWarehousesBreakdown() {
            try {
                const wRes = await api('/storekeeper/warehouses');
                if (!wRes.success) return;
                const warehouses = wRes.data || [];
                const container = document.getElementById('warehousesContainer');
                container.innerHTML = '';

                for (const w of warehouses) {
                    const wid = w.id ?? w.ID ?? w.warehouseId;
                    const wname = w.name ?? w.WarehouseName ?? w.warehouseName ?? ('Warehouse ' + wid);
                    const wbox = document.createElement('div');
                    wbox.className = 'table-card';
                    wbox.style.marginTop = '12px';
                    wbox.innerHTML = `<h4 style="margin:6px 0">${wname}</h4><div id="wh-${wid}">Loading bins...</div>`;
                    container.appendChild(wbox);

                    // fetch warehouse full detail to get bins
                    const whRes = await api('/storekeeper/warehouses/' + wid);
                    if (!whRes.success || !whRes.data) { document.getElementById('wh-' + wid).innerText = 'Cannot load bins'; continue; }
                    const bins = whRes.data.bins ?? whRes.data;
                    // fetch all component-bin entries once (avoid missing debug endpoint)
                    const cbAllRes = await api('/storekeeper/bins/components');
                    const cbAll = (cbAllRes && cbAllRes.success && Array.isArray(cbAllRes.data)) ? cbAllRes.data : [];
                    // fetch components list to map id -> name when component object isn't included in cb entries
                    const compsRes = await api('/storekeeper/components');
                    let compList = [];
                    if (compsRes) compList = compsRes.data ?? compsRes;
                    const compNameMap = {};
                    if (Array.isArray(compList)) {
                        for (const cc of compList) {
                            const cid = cc.id ?? cc.ID ?? cc.componentId ?? cc.ComponentId;
                            const cname = cc.metadata?.name ?? cc.metadata?.Name ?? cc.Name ?? cc.name ?? '';
                            if (cid != null) compNameMap[cid] = cname || ('#' + cid);
                        }
                    }

                    // also fill names from component-bin entries in case component objects are embedded there
                    if (Array.isArray(cbAll)) {
                        for (const x of cbAll) {
                            try {
                                const compObj = x.component ?? x.Component ?? null;
                                const cid = compObj?.id ?? compObj?.ID ?? x.component_id ?? x.componentId ?? x.ComponentId ?? compObj?.componentId ?? null;
                                if (!cid) continue;
                                if (compNameMap[cid]) continue; // already known
                                // try several places for name
                                let name = compObj?.metadata?.name ?? compObj?.metadata?.Name ?? compObj?.Name ?? compObj?.name;
                                if (!name) {
                                    // maybe metadata stored as JSON string
                                    const metaJson = compObj?.metadataJson ?? compObj?.MetadataJson ?? x.component_metadata_json ?? x.metadataJson ?? null;
                                    if (metaJson) {
                                        try {
                                            const m = typeof metaJson === 'string' ? JSON.parse(metaJson) : metaJson;
                                            name = m?.name ?? m?.Name ?? m?.fullName ?? m?.FullName;
                                        } catch (e) { /* ignore */ }
                                    }
                                }
                                if (!name) name = '#'+cid;
                                compNameMap[cid] = name;
                            } catch (e) { /* ignore */ }
                        }
                    }
                    // build HTML table per warehouse
                    let html = '<table style="width:100%;border-collapse:collapse"><thead><tr><th style="width:90px">Bin</th><th style="width:90px">ID</th><th>Name</th><th style="width:120px">Stock</th></tr></thead><tbody>';
                    for (const b of bins) {
                        const bid = b.id ?? b.ID ?? b.binId;
                        const bname = b.location_in_warehouse ?? b.locationInWarehouse ?? b.binCode ?? ('Bin ' + bid);
                        // get components in that bin from the pre-fetched component-bin list
                        let rowsForBin = '';
                        const useItems = cbAll.filter(x => {
                            const binIdFromResp = x.bin?.id ?? x.BinId ?? x.bin_id ?? x.binId ?? x.bin?.ID;
                            return Number(binIdFromResp) === Number(bid);
                        });
                        if (useItems.length > 0) {
                            for (let i = 0; i < useItems.length; i++) {
                                const x = useItems[i];
                                const compId = extractComponentIdFromRecord(x) ?? '';
                                let name = extractComponentNameFromRecord(x);
                                if (!name) name = compNameMap[compId] ?? (compId ? ('#' + compId) : 'Unknown');
                                const qty = x.quantity ?? x.Quantity ?? x.Quantity ?? x.amount ?? 0;
                                if (i === 0) {
                                    rowsForBin += `<tr><td>${bname}</td><td>${bid}</td><td style="min-width:240px">${name}</td><td>${qty}</td></tr>`;
                                } else {
                                    rowsForBin += `<tr><td></td><td></td><td style="min-width:240px">${name}</td><td>${qty}</td></tr>`;
                                }
                            }
                        } else {
                            // no components: show one empty row with bin info
                            rowsForBin = `<tr><td>${bname}</td><td>${bid}</td><td style="min-width:240px">${b.description ?? ''}</td><td><i>Empty</i></td></tr>`;
                        }
                        html += rowsForBin;
                    }
                    html += '</tbody></table>';
                    document.getElementById('wh-' + wid).innerHTML = html;
                }
            } catch (e) { console.warn('loadWarehousesBreakdown error', e); }
        }

        /* ================= RENDER TABLE ================= */
        function renderTable() {

            const tbody = document.getElementById("inventoryBody");
            const search = document.getElementById("searchInput").value.toLowerCase();

            let filtered = fullData.filter(c =>
                (c.metadata?.name ?? "").toLowerCase().includes(search)
            );

            const totalPages = Math.ceil(filtered.length / rowsPerPage);
            if (currentPage > totalPages) currentPage = 1;

            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageData = filtered.slice(start, end);

            tbody.innerHTML = "";

            pageData.forEach(c => {

                // prefer aggregated _stock computed from component-bins, fallback to other fields
                const stock = (c._stock ?? c.quantity ?? c.Quantity ?? c.TotalQuantity ?? c.totalQuantity ?? c.stock_quantity ?? c.stock) ?? 0;
                const isLow = stock <= 30;
                const price = c.unit_price ?? c.unitPrice ?? c.UnitPrice ?? 0;

                tbody.innerHTML += `
            <tr>
                <td>${c.id}</td>
                <td>${c.metadata?.name ?? c.metadata?.Name ?? ''}</td>
                <td>${c.unit ?? ''}</td>
                <td class="${isLow ? "low-stock" : ""}">${stock}</td>
                <td>${price}</td>
            </tr>`;
            });

            renderPagination(totalPages);
        }

        /* ================= PAGINATION ================= */
        function renderPagination(totalPages) {

            const pagination = document.getElementById("pagination");
            pagination.innerHTML = "";

            for (let i = 1; i <= totalPages; i++) {
                pagination.innerHTML += `
            <span class="page-btn ${i === currentPage ? "active-page" : ""}"
                  onclick="changePage(${i})">
                  ${i}
            </span>`;
            }
        }

        function changePage(page) {
            currentPage = page;
            renderTable();
        }

        /* ================= INIT ================= */
        document.addEventListener("DOMContentLoaded", loadInventory);


        // Storekeeper inventory view: show full names without backend changes
        (function(){
            const tbody = document.querySelector('#storekeeperInventory tbody');
            async function load(){
                try{
                    const res = await fetch('/api/inventory/bybin');
                    if(!res.ok) return;
                    const items = await res.json();
                    tbody.innerHTML = '';
                    items.forEach(it =>{
                        const tr = document.createElement('tr');
                        tr.innerHTML = `\n                    <td>${escapeHtml(it.bin || '')}</td>\n                    <td>${it.id ?? ''}</td>\n                    <td>${escapeHtml(it.name || it.Name || it.fullName || '')}</td>\n                    <td>${it.stock ?? ''}</td>\n                `;
                        tbody.appendChild(tr);
                    });
                }catch(e){console.error(e);}    
            }
            function escapeHtml(s){if(!s) return '';return String(s).replace(/[&<>\"']/g,function(ch){return ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":"&#39;"})[ch]||ch;});}
            document.addEventListener('DOMContentLoaded', load);
        })();
    </script>

</body>
</html>
