<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Inventory Management</title>

    <style>
        body {
            font-family: Arial;
            padding: 40px;
            background: #f1f5f9;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-box {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }

        input {
            padding: 8px;
            width: 250px;
        }

        button {
            padding: 8px 15px;
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
        }

            button:hover {
                opacity: .9;
            }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #2563eb;
            color: white;
        }

        .low-stock {
            color: red;
            font-weight: bold;
        }

        .pagination {
            margin-top: 20px;
            text-align: center;
        }

        .page-btn {
            padding: 6px 12px;
            margin: 0 3px;
            border: 1px solid #2563eb;
            cursor: pointer;
        }

        .active-page {
            background: #2563eb;
            color: white;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <h2>📦 Inventory List</h2>
        <div>
            <button onclick="goHome()">⬅ Back Home</button>
            <button onclick="loadInventory()">Refresh</button>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by name..." oninput="renderTable()">
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Unit</th>
                <th>Stock</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody id="inventoryBody"></tbody>
    </table>

    <div class="pagination" id="pagination"></div>

    <script>

        const BASE = "https://localhost:7297/api";

        let fullData = [];
        let currentPage = 1;
        const rowsPerPage = 5;

        /* ================= BACK ================= */
        function goHome() {
            window.location.href = "home.html";
        }

        /* ================= API ================= */
        async function api(endpoint) {
            const res = await fetch(BASE + endpoint, { credentials: "include" });
            return await res.json();
        }

        /* ================= LOAD ================= */
        async function loadInventory() {
            const result = await api("/storekeeper/components");

            if (!result.success) {
                alert(result.message);
                return;
            }

            fullData = result.data;
            currentPage = 1;
            renderTable();
        }

        /* ================= RENDER TABLE ================= */
        function renderTable() {

            const tbody = document.getElementById("inventoryBody");
            const search = document.getElementById("searchInput").value.toLowerCase();

            let filtered = fullData.filter(c =>
                (c.metadata?.name ?? "").toLowerCase().includes(search)
            );

            const totalPages = Math.ceil(filtered.length / rowsPerPage);
            if (currentPage > totalPages) currentPage = 1;

            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageData = filtered.slice(start, end);

            tbody.innerHTML = "";

            pageData.forEach(c => {

                const stock = c.stock_quantity ?? c.stock ?? 0;
                const isLow = stock <= 30;

                tbody.innerHTML += `
            <tr>
                <td>${c.id}</td>
                <td>${c.metadata?.name ?? ""}</td>
                <td>${c.unit}</td>
                <td class="${isLow ? "low-stock" : ""}">${stock}</td>
                <td>${c.unit_price}</td>
            </tr>`;
            });

            renderPagination(totalPages);
        }

        /* ================= PAGINATION ================= */
        function renderPagination(totalPages) {

            const pagination = document.getElementById("pagination");
            pagination.innerHTML = "";

            for (let i = 1; i <= totalPages; i++) {
                pagination.innerHTML += `
            <span class="page-btn ${i === currentPage ? "active-page" : ""}"
                  onclick="changePage(${i})">
                  ${i}
            </span>`;
            }
        }

        function changePage(page) {
            currentPage = page;
            renderTable();
        }

        /* ================= INIT ================= */
        document.addEventListener("DOMContentLoaded", loadInventory);

    </script>

</body>
</html>
