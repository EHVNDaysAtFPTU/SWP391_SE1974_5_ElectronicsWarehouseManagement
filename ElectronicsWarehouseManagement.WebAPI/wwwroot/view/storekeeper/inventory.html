<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Inventory Management</title>

    <style>
        body {
            font-family: Arial;
            padding: 40px;
            background: #f1f5f9;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-box {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }

        input {
            padding: 8px;
            width: 250px;
        }

        button {
            padding: 8px 15px;
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
        }

            button:hover {
                opacity: .9;
            }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #2563eb;
            color: white;
        }

        .low-stock {
            color: red;
            font-weight: bold;
        }

        .pagination {
            margin-top: 20px;
            text-align: center;
        }

        .page-btn {
            padding: 6px 12px;
            margin: 0 3px;
            border: 1px solid #2563eb;
            cursor: pointer;
        }

        .active-page {
            background: #2563eb;
            color: white;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <h2>📦 Inventory List</h2>
        <div>
            <button onclick="goHome()">⬅ Back Home</button>
            <button onclick="loadInventory()">Refresh</button>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by name..." oninput="renderTable()">
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Unit</th>
                <th>Stock</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody id="inventoryBody"></tbody>
    </table>

    <div class="pagination" id="pagination"></div>

    <script>

        const BASE = "https://localhost:7297/api";

        let fullData = [];
        let currentPage = 1;
        const rowsPerPage = 5;

        /* ================= BACK ================= */
        function goHome() {
            window.location.href = "home.html";
        }

        /* ================= API ================= */
        async function api(endpoint) {
            const res = await fetch(BASE + endpoint, { credentials: "include" });
            return await res.json();
        }

        /* ================= LOAD ================= */
        async function loadInventory() {
            try {
                // fetch components and component-bins in parallel, then aggregate stock per component
                const [compRes, binsRes] = await Promise.all([
                    api("/storekeeper/components"),
                    api("/storekeeper/component-bins")
                ]);

                if (!compRes.success) {
                    alert(compRes.msg || compRes.message || 'Failed to load components');
                    return;
                }
                if (!binsRes.success) {
                    // if bins endpoint fails, still show components with stock 0
                    console.warn('component-bins API failed, showing components without stocks');
                }

                const components = compRes.data || [];
                const bins = (binsRes.success && binsRes.data) ? binsRes.data : [];

                // aggregate stock per component id from bins
                const stockMap = {};
                bins.forEach(b => {
                    const cid = b.component_id ?? b.componentId ?? b.component?.id ?? b.component?.ID ?? b.ComponentId ?? b.Component?.id;
                    const qty = Number(b.quantity ?? b.Quantity ?? 0) || 0;
                    if (!cid) return;
                    stockMap[cid] = (stockMap[cid] ?? 0) + qty;
                });

                // attach normalized stock and keep original component info
                fullData = components.map(c => {
                    const id = c.id ?? c.ID ?? c.componentId ?? c.ComponentId;
                    return Object.assign({}, c, { _stock: stockMap[id] ?? 0 });
                });

                currentPage = 1;
                renderTable();
            } catch (e) {
                console.error('loadInventory failed', e);
                alert('Lỗi khi load inventory');
            }
        }

        /* ================= RENDER TABLE ================= */
        function renderTable() {

            const tbody = document.getElementById("inventoryBody");
            const search = document.getElementById("searchInput").value.toLowerCase();

            let filtered = fullData.filter(c =>
                (c.metadata?.name ?? "").toLowerCase().includes(search)
            );

            const totalPages = Math.ceil(filtered.length / rowsPerPage);
            if (currentPage > totalPages) currentPage = 1;

            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageData = filtered.slice(start, end);

            tbody.innerHTML = "";

            pageData.forEach(c => {

                // prefer aggregated _stock computed from component-bins, fallback to other fields
                const stock = (c._stock ?? c.quantity ?? c.Quantity ?? c.TotalQuantity ?? c.totalQuantity ?? c.stock_quantity ?? c.stock) ?? 0;
                const isLow = stock <= 30;
                const price = c.unit_price ?? c.unitPrice ?? c.UnitPrice ?? 0;

                tbody.innerHTML += `
            <tr>
                <td>${c.id}</td>
                <td>${c.metadata?.name ?? c.metadata?.Name ?? ''}</td>
                <td>${c.unit ?? ''}</td>
                <td class="${isLow ? "low-stock" : ""}">${stock}</td>
                <td>${price}</td>
            </tr>`;
            });

            renderPagination(totalPages);
        }

        /* ================= PAGINATION ================= */
        function renderPagination(totalPages) {

            const pagination = document.getElementById("pagination");
            pagination.innerHTML = "";

            for (let i = 1; i <= totalPages; i++) {
                pagination.innerHTML += `
            <span class="page-btn ${i === currentPage ? "active-page" : ""}"
                  onclick="changePage(${i})">
                  ${i}
            </span>`;
            }
        }

        function changePage(page) {
            currentPage = page;
            renderTable();
        }

        /* ================= INIT ================= */
        document.addEventListener("DOMContentLoaded", loadInventory);

    </script>

</body>
</html>
