<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Transfer Orders - Storekeeper</title>

    <style>
        body{font-family:Inter, 'Segoe UI', Roboto, Arial, sans-serif;background:#f6f8fb;padding:28px;color:#0f172a}
        .page{max-width:1200px;margin:0 auto}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
        h2{margin:0;font-size:20px}
        .controls{display:flex;gap:8px}
        .btn{padding:8px 12px;border-radius:8px;border:none;cursor:pointer}
        .btn.ghost{background:transparent;border:1px solid #e6eef6}
        .btn.primary{background:#2563eb;color:#fff}
        .table-card{background:#fff;border-radius:12px;padding:12px;box-shadow:0 6px 20px rgba(2,6,23,0.06)}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px;border-bottom:1px solid #f1f5f9;text-align:left}
        th{background:#fafcff;color:#64748b;font-weight:700}
        tr:hover td{background:#fbfdff}
        .status-complete{color:#16a34a;font-weight:700}
        .status-pending{color:#f59e0b;font-weight:700}
        .action-btn{background:#2563eb;color:#fff;padding:6px 10px;border-radius:8px;border:none;cursor:pointer}
        .search{display:flex;gap:8px;align-items:center}
        .search input{padding:8px;border-radius:8px;border:1px solid #eef2f6}
        .modal{display:none;position:fixed;inset:0;background:rgba(2,6,23,0.5);justify-content:center;align-items:center}
        .modal-content{background:#fff;width:900px;padding:18px;border-radius:10px;max-height:90vh;overflow:auto}
    </style>
</head>

<body>

    <div class="page">
        <div class="top-bar">
            <div>
                <h2>Transfer Orders</h2>
                <div style="color:var(--muted);font-size:13px">Danh sách các phiếu chuyển nội bộ</div>
            </div>
            <div class="controls">
                <div class="search">
                    <input id="q" placeholder="Tìm theo mã, kho, bin..." />
                    <button class="btn ghost" onclick="load()">Search</button>
                </div>
                <button class="btn primary" onclick="goHome()">Back</button>
            </div>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Order Code</th>
                        <th>Date</th>
                        <th>From Warehouse</th>
                        <th>From Bin</th>
                        <th>To Warehouse</th>
                        <th>To Bin</th>
                        <th>Total Items</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="data"></tbody>
            </table>
        </div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">X</span>
            <h3>Transfer Detail</h3>
            <div id="detailContent"></div>
        </div>
    </div>

    <script>

        const BASE = "https://localhost:7297/api";

        function getField(obj, ...names) {
            if (!obj) return "-";
            for (const n of names) {
                if (obj[n] !== undefined && obj[n] !== null) return obj[n];
            }
            return "-";
        }

        function getComponents(obj) {
            if (!obj) return [];
            const keys = ['components','Components','transfer_request_components','transferRequestComponents','TransferRequestComponents'];
            for (const k of keys) {
                if (Array.isArray(obj[k])) return obj[k];
            }
            // sometimes components may be present on nested fields
            if (Array.isArray(obj.data)) return obj.data;
            // fallback: try find any array of objects that look like components
            for (const k of Object.keys(obj)) {
                if (Array.isArray(obj[k]) && obj[k].length>0 && (obj[k][0].quantity !== undefined || obj[k][0].component_id !== undefined))
                    return obj[k];
            }
            return [];
        }

        function goHome() {
            window.location = "home.html";
        }

        function getStatusText(status) {
            // Match server TransferStatus enum: 0=Unknown,1=Pending,2=Approved - Waiting Confirm,3=Rejected,4=Confirmed
            switch (status) {
                case 0: return "Unknown";
                case 1: return "Pending";
                case 2: return "Approved - Waiting Confirm";
                case 3: return "Rejected";
                case 4: return "Confirmed";
                default: return "Unknown";
            }
        }

        async function load() {

            let res = await fetch(BASE + "/storekeeper/transfers",
                { credentials: "include" });

            let result = await res.json();

            // 🔥 Transfer type = 3
            const q = (document.getElementById('q')?.value || '').toString().toLowerCase();
            const listSummary = (result.data || []).filter(x => x.type === 3);
            const list = await Promise.all(listSummary.map(async t => {
                try {
                    // fetch full transfer detail first so we have components for total calculation
                    const dres = await fetch(BASE + "/storekeeper/transfers/" + (t.id ?? t.ID ?? t.request_id), { credentials: 'include' });
                    if (dres.ok) {
                        const djson = await dres.json();
                        if (djson?.success && djson.data) t = djson.data;
                    }

                    // ensure bin_from/bin_to objects available; if missing, try bins endpoint
                    const binFromId = t.bin_from_id ?? t.binFromId ?? t.bin_from?.id ?? t.bin_from?.ID;
                    const binToId = t.bin_to_id ?? t.binToId ?? t.bin_to?.id ?? t.bin_to?.ID;

                    if (binFromId && !(t.bin_from && (t.bin_from.location_in_warehouse || t.bin_from.locationInWarehouse || t.bin_from.binCode))) {
                        try {
                            const bres = await fetch(BASE + "/storekeeper/bins/" + binFromId, { credentials: 'include' });
                            if (bres.ok) {
                                const bjson = await bres.json();
                                if (bjson?.success && bjson.data) t.bin_from = bjson.data;
                            }
                        } catch (e) { console.error('binFrom fetch failed', e); }
                    }

                    if (binToId && !(t.bin_to && (t.bin_to.location_in_warehouse || t.bin_to.locationInWarehouse || t.bin_to.binCode))) {
                        try {
                            const bres2 = await fetch(BASE + "/storekeeper/bins/" + binToId, { credentials: 'include' });
                            if (bres2.ok) {
                                const bjson2 = await bres2.json();
                                if (bjson2?.success && bjson2.data) t.bin_to = bjson2.data;
                            }
                        } catch (e) { console.error('binTo fetch failed', e); }
                    }

                    // resolve warehouse names for display (from bin or from direct fields)
                    try {
                        // from
                        let fromName = t.bin_from?.warehouse?.name ?? t.bin_from?.warehouse?.warehouseName ?? t.bin_from?.warehouse ?? t.bin_from?.warehouseName ?? null;
                        if (!fromName) {
                            const fromId = t.bin_from_id ?? t.binFromId ?? t.bin_from?.id ?? t.bin_from?.ID;
                            if (fromId) {
                                const bres = await fetch(BASE + "/storekeeper/bins/" + fromId, { credentials: 'include' });
                                if (bres.ok) {
                                    const bjson = await bres.json();
                                    if (bjson?.success && bjson.data) fromName = bjson.data.warehouse?.name ?? bjson.data.warehouse?.warehouseName ?? bjson.data.warehouse;
                                }
                            }
                        }
                        t._fromWarehouseName = fromName ?? null;
                    } catch (e) { console.error('resolve from warehouse failed', e); }

                    try {
                        // to
                        let toName = t.bin_to?.warehouse?.name ?? t.bin_to?.warehouse?.warehouseName ?? t.bin_to?.warehouse ?? t.bin_to?.warehouseName ?? null;
                        if (!toName) {
                            const toId = t.bin_to_id ?? t.binToId ?? t.bin_to?.id ?? t.bin_to?.ID;
                            if (toId) {
                                const bres2 = await fetch(BASE + "/storekeeper/bins/" + toId, { credentials: 'include' });
                                if (bres2.ok) {
                                    const bjson2 = await bres2.json();
                                    if (bjson2?.success && bjson2.data) toName = bjson2.data.warehouse?.name ?? bjson2.data.warehouse?.warehouseName ?? bjson2.data.warehouse;
                                }
                            }
                        }
                        t._toWarehouseName = toName ?? null;
                    } catch (e) { console.error('resolve to warehouse failed', e); }

                    return t;
                } catch (e) {
                    console.error('detail/bin fetch failed', e);
                    return t;
                }
            }));

            // Group transfers by description and creation time to support multiple bins frontend-only
            const groups = [];
            list.forEach(t => {
                const desc = (t.description ?? '').toString();
                const createdTs = Date.parse(t.creation_date ?? t.creationDate ?? t.creationTime ?? '');
                const creator = (t.creator_id ?? t.CreatorId ?? t.creator ?? t.Creator ?? '').toString();
                
                let foundGroup = groups.find(g => 
                    g.desc === desc && 
                    g.creator === creator && 
                    (!isNaN(createdTs) && !isNaN(g.ts) ? Math.abs(g.ts - createdTs) <= 60000 : true)
                );
                
                if (foundGroup) {
                    foundGroup.items.push(t);
                } else {
                    groups.push({ desc, creator, ts: createdTs, items: [t] });
                }
            });

            let html = "";
            groups.forEach(groupObj => {
                const group = groupObj.items;
                const reqId = group[0].request_id ?? group[0].RequestId ?? group[0].id ?? group[0].ID;
                
                const fromWarehouses = new Set();
                const fromBins = new Set();
                const toWarehouses = new Set();
                const toBins = new Set();
                let totalItems = 0;
                const statuses = new Set();
                
                group.forEach(o => {
                    const fw = o._fromWarehouseName ?? (o.bin_from?.warehouse?.name ?? o.bin_from?.warehouse?.warehouseName ?? o.bin_from?.warehouse) ?? '-';
                    const fb = o.bin_from?.location_in_warehouse ?? o.bin_from?.locationInWarehouse ?? o.bin_from?.binCode ?? '-';
                    if (fw !== '-') fromWarehouses.add(fw);
                    if (fb !== '-') fromBins.add(fb);

                    const tw = o._toWarehouseName ?? (o.bin_to?.warehouse?.name ?? o.bin_to?.warehouse?.warehouseName ?? o.bin_to?.warehouse) ?? '-';
                    const tb = o.bin_to?.location_in_warehouse ?? o.bin_to?.locationInWarehouse ?? o.bin_to?.binCode ?? '-';
                    if (tw !== '-') toWarehouses.add(tw);
                    if (tb !== '-') toBins.add(tb);

                    const comps = getComponents(o);
                    totalItems += comps.reduce((s, c) => s + (c.quantity ?? c.Quantity ?? c.qty ?? c.QuantityDouble ?? 0), 0);
                    statuses.add(o.status ?? o.Status ?? 0);
                });

                let statusText = statuses.size === 1 ? getStatusText(Array.from(statuses)[0]) : 'Multiple';
                let statusClass = "status-pending";
                if (statusText === "Unknown" || statusText === "Rejected") statusClass = "status-complete";
                if (statusText.toLowerCase().includes('confirm') || statusText.toLowerCase().includes('complete') || Array.from(statuses).includes(4)) statusClass = "status-complete";

                const rowText = ((group[0].description ?? '') + ' ' + Array.from(fromWarehouses).join(' ') + ' ' + Array.from(fromBins).join(' ') + ' ' + Array.from(toWarehouses).join(' ') + ' ' + Array.from(toBins).join(' ')).toLowerCase();
                if (q && !rowText.includes(q)) return;

                html += `
<tr>
<td>${group[0].description}</td>
<td>${formatDate(group[0].creation_date ?? group[0].creationDate)}</td>
<td>${Array.from(fromWarehouses).join(', ') || '-'}</td>
<td>${Array.from(fromBins).join(', ') || '-'}</td>
<td>${Array.from(toWarehouses).join(', ') || '-'}</td>
<td>${Array.from(toBins).join(', ') || '-'}</td>
<td>${totalItems}</td>
<td class="${statusClass}">${statusText}</td>
<td>
<button class="detail-btn action-btn" onclick="viewDetail(${reqId})">Detail</button>
</td>
</tr>`;
            });

            document.getElementById("data").innerHTML = html;
        }

        async function viewDetail(id) {
            // chuyển sang trang chi tiết để có thể confirm
            window.location.href = `transfer-detail.html?id=${id}`;
        }

        function closeModal() {
            document.getElementById("detailModal").style.display = "none";
        }

        function formatDate(d) {
            return new Date(d).toLocaleString();
        }

        load();

    </script>

</body>
</html>
