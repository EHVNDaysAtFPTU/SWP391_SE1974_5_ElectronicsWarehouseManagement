<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transfer Orders - Storekeeper</title>

    <style>
        body{font-family:Inter, 'Segoe UI', Roboto, Arial, sans-serif;background:#f6f8fb;padding:28px;color:#0f172a}
        .page{max-width:1200px;margin:0 auto}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
        h2{margin:0;font-size:20px}
        .controls{display:flex;gap:8px}
        .btn{padding:8px 12px;border-radius:8px;border:none;cursor:pointer}
        .btn.ghost{background:transparent;border:1px solid #e6eef6}
        .btn.primary{background:#2563eb;color:#fff}
        .table-card{background:#fff;border-radius:12px;padding:12px;box-shadow:0 6px 20px rgba(2,6,23,0.06)}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px;border-bottom:1px solid #f1f5f9;text-align:left}
        th{background:#fafcff;color:#64748b;font-weight:700}
        tr:hover td{background:#fbfdff}
        .status-complete{color:#16a34a;font-weight:700}
        .status-pending{color:#f59e0b;font-weight:700}
        .action-btn{background:#2563eb;color:#fff;padding:6px 10px;border-radius:8px;border:none;cursor:pointer}
        .search{display:flex;gap:8px;align-items:center}
        .search input{padding:8px;border-radius:8px;border:1px solid #eef2f6}
        .modal{display:none;position:fixed;inset:0;background:rgba(2,6,23,0.5);justify-content:center;align-items:center}
        .modal-content{background:#fff;width:900px;padding:18px;border-radius:10px;max-height:90vh;overflow:auto}
    </style>
</head>

<body>

    <div class="page">
        <div class="top-bar">
            <div>
                <h2>Transfer Orders</h2>
                <div style="color:var(--muted);font-size:13px">Internal transfer requests list</div>
            </div>
            <div class="controls">
                <div class="search">
                    <input id="q" placeholder="Search by code, warehouse, bin..." />
                    <button class="btn ghost" onclick="searchFilter()">Search</button>
                </div>
                <button class="btn primary" onclick="goHome()">Back</button>
            </div>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Order Code</th>
                        <th>Date</th>
                        <th>From Warehouse</th>
                        <th>From Bin</th>
                        <th>To Warehouse</th>
                        <th>To Bin</th>
                        <th>Total Items</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="data"></tbody>
            </table>
            <div id="paginationControls" style="display:flex; justify-content:space-between; align-items:center; margin-top:20px; padding-top:16px; border-top:1px solid #f1f5f9;">
                <div id="pageInfo" class="meta" style="font-size:14px;">Showing 0-0 of 0</div>
                <div style="display:flex; gap:8px;" id="pageButtons">
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">X</span>
            <h3>Transfer Detail</h3>
            <div id="detailContent"></div>
        </div>
    </div>

    <script>

        const BASE = "https://localhost:7297/api";

        function getField(obj, ...names) {
            if (!obj) return "-";
            for (const n of names) {
                if (obj[n] !== undefined && obj[n] !== null) return obj[n];
            }
            return "-";
        }

        function getComponents(obj) {
            if (!obj) return [];
            const keys = ['components','Components','transfer_request_components','transferRequestComponents','TransferRequestComponents'];
            for (const k of keys) {
                if (Array.isArray(obj[k])) return obj[k];
            }
            // sometimes components may be present on nested fields
            if (Array.isArray(obj.data)) return obj.data;
            // fallback: try find any array of objects that look like components
            for (const k of Object.keys(obj)) {
                if (Array.isArray(obj[k]) && obj[k].length>0 && (obj[k][0].quantity !== undefined || obj[k][0].component_id !== undefined))
                    return obj[k];
            }
            return [];
        }

        function goHome() {
            window.location = "home.html";
        }

        function getStatusText(status) {
            // Match server TransferStatus enum: 0=Unknown,1=Pending,2=Approved - Waiting Confirm,3=Rejected,4=Confirmed
        switch (status) {
                case 0: return "Unknown";
                case 1: return "Pending";
                case 2: return "Approved - Waiting Confirm";
                case 3: return "Rejected";
                case 4: return "Finished";
                case 5: return "Missing components";
                case 6: return "Canceled";
                default: return "Unknown";
            }
        }

        // state used by paging and filtering
        let globalGroups = [];
        let filteredGroups = [];
        let currentPage = 1;
        const pageSize = 10;

        async function load() {

            let res = await fetch(BASE + "/storekeeper/transfers",
                { credentials: "include" });

            let result = await res.json();

            // 🔥 Transfer type = 3
            const listSummary = (result.data || []).filter(x => x.type === 3);
            const list = await Promise.all(listSummary.map(async t => {
                try {
                    // fetch full transfer detail first so we have components for total calculation
                    const reqId = t.id ?? t.ID ?? t.request_id ?? t.requestId ?? t.RequestId;
                    const dres = await fetch(BASE + "/storekeeper/transfers/" + reqId, { credentials: 'include' });
                    if (dres.ok) {
                        const djson = await dres.json();
                        if (djson?.success && djson.data) t = djson.data;
                    }

                    // ensure bin_from/bin_to objects available; if missing, try bins endpoint
                    const binFromId = t.bin_from_id ?? t.binFromId ?? t.bin_from?.id ?? t.bin_from?.ID;
                    const binToId = t.bin_to_id ?? t.binToId ?? t.bin_to?.id ?? t.bin_to?.ID;

                    if (binFromId && !(t.bin_from && (t.bin_from.location_in_warehouse || t.bin_from.locationInWarehouse || t.bin_from.binCode)) && !(t.binFrom && (t.binFrom.location_in_warehouse || t.binFrom.locationInWarehouse || t.binFrom.binCode))) {
                        try {
                            const bres = await fetch(BASE + "/storekeeper/bins/" + binFromId, { credentials: 'include' });
                            if (bres.ok) {
                                const bjson = await bres.json();
                                if (bjson?.success && bjson.data) t.bin_from = bjson.data;
                            }
                        } catch (e) { console.error('binFrom fetch failed', e); }
                    }

                    if (binToId && !(t.bin_to && (t.bin_to.location_in_warehouse || t.bin_to.locationInWarehouse || t.bin_to.binCode)) && !(t.binTo && (t.binTo.location_in_warehouse || t.binTo.locationInWarehouse || t.binTo.binCode))) {
                        try {
                            const bres2 = await fetch(BASE + "/storekeeper/bins/" + binToId, { credentials: 'include' });
                            if (bres2.ok) {
                                const bjson2 = await bres2.json();
                                if (bjson2?.success && bjson2.data) t.bin_to = bjson2.data;
                            }
                        } catch (e) { console.error('binTo fetch failed', e); }
                    }

                    // If transfer detail includes finished_components with nested bin, use it as bin_finish
                    const finishedArr = t.finished_components ?? t.finishedComponents ?? t.finished_components_list ?? t.finishedComponentsList;
                    if (Array.isArray(finishedArr) && finishedArr.length > 0) {
                        // finished_components may contain multiple bins for source/target in internal transfers
                        // collect lists for both from (type===1) and to (type===0)
                        t.bin_finish_from_list = [];
                        t.bin_finish_to_list = [];
                        for (const fc of finishedArr) {
                            const binObj = fc.bin ?? fc.Bin ?? null;
                            const binRef = binObj ? binObj : ((fc.bin_id || fc.binId) ? { id: fc.bin_id ?? fc.binId } : null);
                            if (!binRef) continue;
                            if (fc.type === 1) {
                                t.bin_finish_from_list.push(binRef);
                            } else if (fc.type === 0) {
                                t.bin_finish_to_list.push(binRef);
                            } else {
                                // unknown type: treat as destination by default
                                t.bin_finish_to_list.push(binRef);
                            }
                        }
                        // keep single-field fallbacks for consumers expecting them
                        if (!t.bin_finish_from_list.length) t.bin_finish_from = null;
                        else t.bin_finish_from = t.bin_finish_from_list[0];
                        if (!t.bin_finish_to_list.length) t.bin_finish_to = null;
                        else t.bin_finish_to = t.bin_finish_to_list[0];
                        // if none had explicit types, pick largest-quantity as representative for "to"
                        if ((!t.bin_finish_from_list || t.bin_finish_from_list.length === 0) && (!t.bin_finish_to_list || t.bin_finish_to_list.length === 0)) {
                            const fc = finishedArr.reduce((a, b) => ((b.quantity ?? 0) > (a.quantity ?? 0) ? b : a), finishedArr[0]);
                            const binFromFinished = fc.bin ?? fc.Bin ?? null;
                            if (binFromFinished) t.bin_finish_to = binFromFinished;
                            else if (fc.bin_id || fc.binId) t.bin_finish_to = { id: fc.bin_id ?? fc.binId };
                        }
                    }

                    // resolve warehouse names for display (from bin or from direct fields)
                    try {
                        // from
                        const bFrom = t.bin_from ?? t.binFrom;
                        let fromName = bFrom?.warehouse?.name ?? bFrom?.warehouse?.warehouseName ?? bFrom?.warehouse ?? bFrom?.warehouseName ?? null;
                        if (!fromName) {
                            // try top-level warehouse_from field as fallback
                            fromName = t.warehouse_from?.name ?? t.warehouse_from?.warehouseName ?? t.warehouse_from ?? null;
                        }
                        if (!fromName) {
                            const fromId = t.bin_from_id ?? t.binFromId ?? bFrom?.id ?? bFrom?.ID;
                            if (fromId) {
                                const bres = await fetch(BASE + "/storekeeper/bins/" + fromId, { credentials: 'include' });
                                if (bres.ok) {
                                    const bjson = await bres.json();
                                    if (bjson?.success && bjson.data) fromName = bjson.data.warehouse?.name ?? bjson.data.warehouse?.warehouseName ?? bjson.data.warehouse;
                                }
                            }
                        }
                        t._fromWarehouseName = fromName ?? null;
                    } catch (e) { console.error('resolve from warehouse failed', e); }

                    try {
                        // to
                        const bTo = t.bin_to ?? t.binTo;
                        let toName = bTo?.warehouse?.name ?? bTo?.warehouse?.warehouseName ?? bTo?.warehouse ?? bTo?.warehouseName ?? null;
                        if (!toName) {
                            // try top-level warehouse_to field as fallback
                            toName = t.warehouse_to?.name ?? t.warehouse_to?.warehouseName ?? t.warehouse_to ?? null;
                        }
                        if (!toName) {
                            const toId = t.bin_to_id ?? t.binToId ?? bTo?.id ?? bTo?.ID;
                            if (toId) {
                                const bres2 = await fetch(BASE + "/storekeeper/bins/" + toId, { credentials: 'include' });
                                if (bres2.ok) {
                                    const bjson2 = await bres2.json();
                                    if (bjson2?.success && bjson2.data) toName = bjson2.data.warehouse?.name ?? bjson2.data.warehouse?.warehouseName ?? bjson2.data.warehouse;
                                }
                            }
                        }
                        t._toWarehouseName = toName ?? null;
                    } catch (e) { console.error('resolve to warehouse failed', e); }

                    // also resolve finish warehouses if bin_finish_from/to exist
                    try {
                        if (t.bin_finish_from) {
                            const bfFromId = t.bin_finish_from?.warehouse ?? t.bin_finish_from?.warehouse_id ?? t.bin_finish_from?.warehouseId ?? (typeof t.bin_finish_from?.warehouse === 'object' ? t.bin_finish_from.warehouse.id : null) ?? t.warehouse_from_id;
                            if (bfFromId && (!t.bin_finish_from?.warehouse || typeof t.bin_finish_from.warehouse !== 'object')) {
                                try {
                                    const wresF = await fetch(BASE + "/storekeeper/warehouses/" + bfFromId, { credentials: 'include' });
                                    if (wresF.ok) {
                                        const wjsonF = await wresF.json();
                                        if (wjsonF?.success && wjsonF.data) {
                                            t._finishFromWarehouseName = wjsonF.data.name ?? wjsonF.data.warehouseName;
                                            t.bin_finish_from.warehouse = wjsonF.data;
                                        }
                                    }
                                } catch (e) { console.error('bin_finish_from warehouse fetch failed', e); }
                            } else if (t.bin_finish_from?.warehouse && typeof t.bin_finish_from.warehouse === 'object') {
                                t._finishFromWarehouseName = t.bin_finish_from.warehouse.name ?? t.bin_finish_from.warehouse.warehouseName;
                            }
                        }

                        if (t.bin_finish_to) {
                            const bfToId = t.bin_finish_to?.warehouse ?? t.bin_finish_to?.warehouse_id ?? t.bin_finish_to?.warehouseId ?? (typeof t.bin_finish_to?.warehouse === 'object' ? t.bin_finish_to.warehouse.id : null) ?? t.warehouse_to_id;
                            if (bfToId && (!t.bin_finish_to?.warehouse || typeof t.bin_finish_to.warehouse !== 'object')) {
                                try {
                                    const wresT = await fetch(BASE + "/storekeeper/warehouses/" + bfToId, { credentials: 'include' });
                                    if (wresT.ok) {
                                        const wjsonT = await wresT.json();
                                        if (wjsonT?.success && wjsonT.data) {
                                            t._finishToWarehouseName = wjsonT.data.name ?? wjsonT.data.warehouseName;
                                            t.bin_finish_to.warehouse = wjsonT.data;
                                        }
                                    }
                                } catch (e) { console.error('bin_finish_to warehouse fetch failed', e); }
                            } else if (t.bin_finish_to?.warehouse && typeof t.bin_finish_to.warehouse === 'object') {
                                t._finishToWarehouseName = t.bin_finish_to.warehouse.name ?? t.bin_finish_to.warehouse.warehouseName;
                            }
                        }
                    } catch (e) { console.error('resolve finish warehouses failed', e); }

                    return t;
                } catch (e) {
                    console.error('detail/bin fetch failed', e);
                    return t;
                }
            }));

            // Group transfers by description and creation time to support multiple bins frontend-only
            const groups = [];
            list.forEach(t => {
                const desc = (t.description ?? '').toString();
                const createdTs = Date.parse(t.creation_date ?? t.creationDate ?? t.creationTime ?? '');
                const creator = (t.creator_id ?? t.CreatorId ?? t.creator ?? t.Creator ?? '').toString();
                
                let foundGroup = groups.find(g => 
                    g.desc === desc && 
                    g.creator === creator && 
                    (!isNaN(createdTs) && !isNaN(g.ts) ? Math.abs(g.ts - createdTs) <= 60000 : true)
                );
                
                if (foundGroup) {
                    foundGroup.items.push(t);
                } else {
                    groups.push({ desc, creator, ts: createdTs, items: [t] });
                }
            });

            globalGroups = groups;
            searchFilter();
        }

        function searchFilter() {
            const q = (document.getElementById('q')?.value || '').toString().toLowerCase();
                filteredGroups = globalGroups.filter(g => {
                const group = g.items;
                const fromWarehouses = new Set();
                const fromBins = new Set();
                const toWarehouses = new Set();
                const toBins = new Set();
                group.forEach(o => {
                    // prefer separate finished bins when present (support lists)
                    const binFinishFromList = o.bin_finish_from_list ?? o.binFinishFromList ?? null;
                    const binFinishToList = o.bin_finish_to_list ?? o.binFinishToList ?? null;
                    const binFinishFrom = o.bin_finish_from ?? o.binFinishFrom ?? null; // fallback single
                    const binFinishTo = o.bin_finish_to ?? o.binFinishTo ?? null;
                    const bFrom = o.bin_from ?? o.binFrom;
                    const bTo = o.bin_to ?? o.binTo;

                    const isPendingOrApproved = (o.status === 1 || o.Status === 1 || o.status === 2 || o.Status === 2);

                    // collect all source bins
                    if (Array.isArray(binFinishFromList) && binFinishFromList.length>0) {
                        binFinishFromList.forEach(bf => {
                            const fw = (bf?.warehouse?.name ?? bf?.warehouse?.warehouseName ?? o._fromWarehouseName ?? o.warehouse_from?.name ?? '-') ;
                            const fb = isPendingOrApproved ? '<i>Not allocated</i>' : (bf?.location_in_warehouse ?? bf?.locationInWarehouse ?? bf?.binCode ?? '-');
                            if (fw !== '-') fromWarehouses.add(fw);
                            if (fb !== '-') fromBins.add(fb);
                        });
                    } else {
                        const fw = (o._finishFromWarehouseName ?? o._fromWarehouseName ?? (binFinishFrom?.warehouse?.name ?? binFinishFrom?.warehouse?.warehouseName ?? binFinishFrom?.warehouse) ?? (bFrom?.warehouse?.name ?? bFrom?.warehouse?.warehouseName ?? bFrom?.warehouse) ?? '-');
                        const fb = isPendingOrApproved ? '<i>Not allocated</i>' : (binFinishFrom?.location_in_warehouse ?? binFinishFrom?.locationInWarehouse ?? binFinishFrom?.binCode ?? bFrom?.location_in_warehouse ?? bFrom?.locationInWarehouse ?? bFrom?.binCode ?? '-');
                        if (fw !== '-') fromWarehouses.add(fw);
                        if (fb !== '-') fromBins.add(fb);
                    }

                    // collect all destination bins
                    if (Array.isArray(binFinishToList) && binFinishToList.length>0) {
                        binFinishToList.forEach(bt => {
                            const tw = (bt?.warehouse?.name ?? bt?.warehouse?.warehouseName ?? o._toWarehouseName ?? o.warehouse_to?.name ?? '-') ;
                            const tb = isPendingOrApproved ? '<i>Not allocated</i>' : (bt?.location_in_warehouse ?? bt?.locationInWarehouse ?? bt?.binCode ?? '-');
                            if (tw !== '-') toWarehouses.add(tw);
                            if (tb !== '-') toBins.add(tb);
                        });
                    } else {
                        const tw = (o._finishToWarehouseName ?? o._toWarehouseName ?? (binFinishTo?.warehouse?.name ?? binFinishTo?.warehouse?.warehouseName ?? binFinishTo?.warehouse) ?? (bTo?.warehouse?.name ?? bTo?.warehouse?.warehouseName ?? bTo?.warehouse) ?? '-');
                        const tb = isPendingOrApproved ? '<i>Not allocated</i>' : (binFinishTo?.location_in_warehouse ?? binFinishTo?.locationInWarehouse ?? binFinishTo?.binCode ?? bTo?.location_in_warehouse ?? bTo?.locationInWarehouse ?? bTo?.binCode ?? '-');
                        if (tw !== '-') toWarehouses.add(tw);
                        if (tb !== '-') toBins.add(tb);
                    }
                });
                const rowText = ((group[0].description ?? '') + ' ' + Array.from(fromWarehouses).join(' ') + ' ' + Array.from(fromBins).join(' ') + ' ' + Array.from(toWarehouses).join(' ') + ' ' + Array.from(toBins).join(' ')).toLowerCase();
                return rowText.includes(q);
            });
            renderPage(1);
        }

        function renderPage(page) {
            currentPage = page;
            const start = (page - 1) * pageSize;
            const end = start + pageSize;
            const paginated = filteredGroups.slice(start, end);

            let html = "";
            if (paginated.length === 0) {
                html = `<tr><td colspan="9" style="text-align:center; padding:24px; color:#64748b">No data</td></tr>`;
            } else {
                paginated.forEach(groupObj => {
                    const group = groupObj.items;
                    const reqId = group[0].request_id ?? group[0].RequestId ?? group[0].requestId ?? group[0].id ?? group[0].ID;
                    
                    const fromWarehouses = new Set();
                    const fromBins = new Set();
                    const toWarehouses = new Set();
                    const toBins = new Set();
                    let totalItems = 0;
                    const statuses = new Set();
                    
                    group.forEach(o => {
                        // prefer finished bins for from/to when available (support lists)
                        const binFinishFromList = o.bin_finish_from_list ?? o.binFinishFromList ?? null;
                        const binFinishToList = o.bin_finish_to_list ?? o.binFinishToList ?? null;
                        const binFinishFrom = o.bin_finish_from ?? o.binFinishFrom ?? null; // fallback single
                        const binFinishTo = o.bin_finish_to ?? o.binFinishTo ?? null;
                        const bFrom = o.bin_from ?? o.binFrom;
                        const bTo = o.bin_to ?? o.binTo;

                        const isPendingOrApproved = (o.status === 1 || o.Status === 1 || o.status === 2 || o.Status === 2);

                        if (Array.isArray(binFinishFromList) && binFinishFromList.length>0) {
                            binFinishFromList.forEach(bf => {
                                const fw = (bf?.warehouse?.name ?? bf?.warehouse?.warehouseName ?? o._fromWarehouseName ?? o.warehouse_from?.name ?? '-');
                                const fb = isPendingOrApproved ? '<i>Not allocated</i>' : (bf?.location_in_warehouse ?? bf?.locationInWarehouse ?? bf?.binCode ?? '-');
                                if (fw !== '-') fromWarehouses.add(fw);
                                if (fb !== '-') fromBins.add(fb);
                            });
                        } else {
                            const fw = (o._finishFromWarehouseName ?? o._fromWarehouseName ?? (o.warehouse_from?.name ?? o.warehouse_from?.warehouseName) ?? (binFinishFrom?.warehouse?.name ?? binFinishFrom?.warehouse?.warehouseName ?? binFinishFrom?.warehouse) ?? (bFrom?.warehouse?.name ?? bFrom?.warehouse?.warehouseName ?? bFrom?.warehouse) ?? '-');
                            const fb = isPendingOrApproved ? '<i>Not allocated</i>' : (binFinishFrom?.location_in_warehouse ?? binFinishFrom?.locationInWarehouse ?? binFinishFrom?.binCode ?? bFrom?.location_in_warehouse ?? bFrom?.locationInWarehouse ?? bFrom?.binCode ?? '-');
                            if (fw !== '-') fromWarehouses.add(fw);
                            if (fb !== '-') fromBins.add(fb);
                        }

                        if (Array.isArray(binFinishToList) && binFinishToList.length>0) {
                            binFinishToList.forEach(bt => {
                                const tw = (bt?.warehouse?.name ?? bt?.warehouse?.warehouseName ?? o._toWarehouseName ?? o.warehouse_to?.name ?? '-');
                                const tb = isPendingOrApproved ? '<i>Not allocated</i>' : (bt?.location_in_warehouse ?? bt?.locationInWarehouse ?? bt?.binCode ?? '-');
                                if (tw !== '-') toWarehouses.add(tw);
                                if (tb !== '-') toBins.add(tb);
                            });
                        } else {
                            const tw = (o._finishToWarehouseName ?? o._toWarehouseName ?? (o.warehouse_to?.name ?? o.warehouse_to?.warehouseName) ?? (binFinishTo?.warehouse?.name ?? binFinishTo?.warehouse?.warehouseName ?? binFinishTo?.warehouse) ?? (bTo?.warehouse?.name ?? bTo?.warehouse?.warehouseName ?? bTo?.warehouse) ?? '-');
                            const tb = isPendingOrApproved ? '<i>Not allocated</i>' : (binFinishTo?.location_in_warehouse ?? binFinishTo?.locationInWarehouse ?? binFinishTo?.binCode ?? bTo?.location_in_warehouse ?? bTo?.locationInWarehouse ?? bTo?.binCode ?? '-');
                            if (tw !== '-') toWarehouses.add(tw);
                            if (tb !== '-') toBins.add(tb);
                        }

                        const comps = getComponents(o);
                        totalItems += comps.reduce((s, c) => s + (c.quantity ?? c.Quantity ?? c.qty ?? c.QuantityDouble ?? 0), 0);
                        statuses.add(o.status ?? o.Status ?? 0);
                    });

                    let statusText = statuses.size === 1 ? getStatusText(Array.from(statuses)[0]) : 'Multiple';
                    let statusClass = "status-pending";
                    if (statusText === "Unknown" || statusText === "Rejected") statusClass = "status-complete";
                    if (statusText.toLowerCase().includes('confirm') || statusText.toLowerCase().includes('complete') || Array.from(statuses).includes(4)) statusClass = "status-complete";

                    let action = `<button class="detail-btn action-btn" onclick="viewDetail(${reqId})">Detail</button>`;
                    if (Array.from(statuses).includes(1)) {
                        action += ` <button class="btn ghost" onclick="cancelTransfer(${reqId})" style="background:#fff1f0;border:1px solid #fdecec;color:#9f1239;padding:6px 10px;border-radius:8px;margin-left:6px">Cancel</button>`;
                    }

                    html += `<tr>
                        <td>${group[0].description}</td>
                        <td>${formatDate(group[0].creation_date ?? group[0].creationDate)}</td>
                        <td>${Array.from(fromWarehouses).join(', ') || '-'}</td>
                        <td>${Array.from(fromBins).join(', ') || '-'}</td>
                        <td>${Array.from(toWarehouses).join(', ') || '-'}</td>
                        <td>${Array.from(toBins).join(', ') || '-'}</td>
                        <td>${totalItems}</td>
                        <td class="${statusClass}">${statusText}</td>
                        <td>${action}</td>
                    </tr>`;
                });
            }

            document.getElementById("data").innerHTML = html;

            // Update stats
            const totalItems = filteredGroups.length;
            const s = totalItems === 0 ? 0 : start + 1;
            const e = Math.min(start + pageSize, totalItems);
            document.getElementById('pageInfo').innerText = `Showing ${s}-${e} of ${totalItems}`;

            // Render buttons
            const totalPages = Math.ceil(totalItems / pageSize) || 1;
            let btnHtml = "";
            
            // Prev button
            btnHtml += `<button class="btn ghost" onclick="renderPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled style="opacity:0.5"' : ''}>&laquo; Prev</button>`;
            
            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                if (totalPages > 7) {
                    if (i !== 1 && i !== totalPages && Math.abs(i - currentPage) > 1) {
                        if (i === 2 || i === totalPages - 1) btnHtml += `<span style="padding:4px 8px">...</span>`;
                        continue;
                    }
                }
                const activeStyle = i === currentPage ? 'background:#e2e8f0;font-weight:bold;' : '';
                btnHtml += `<button class="btn ghost" style="${activeStyle}" onclick="renderPage(${i})">${i}</button>`;
            }

            // Next button
            btnHtml += `<button class="btn ghost" onclick="renderPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled style="opacity:0.5"' : ''}>Next &raquo;</button>`;
            
            document.getElementById('pageButtons').innerHTML = btnHtml;
        }

        async function viewDetail(id) {
            // chuyển sang trang chi tiết để có thể confirm
            window.location.href = `transfer-detail.html?id=${id}`;
        }

        async function cancelTransfer(id) {
            if (!confirm('Are you sure you want to cancel this transfer?')) return;
            try {
                const res = await fetch(BASE + '/storekeeper/transfers/' + id + '/cancel', { method: 'POST', credentials: 'include' });
                if (!res.ok) {
                    const txt = await res.text().catch(()=>null);
                    return alert('Cancel failed: ' + (txt || res.statusText));
                }
                const json = await res.json();
                if (json?.success) {
                    alert('Transfer canceled');
                    load();
                } else alert(json?.msg || json?.message || 'Error');
            } catch (e) { alert('Network error: ' + e.message); }
        }

        function closeModal() {
            document.getElementById("detailModal").style.display = "none";
        }

        function formatDate(d) {
            return new Date(d).toLocaleString();
        }

        load();

    </script>

</body>
</html>
