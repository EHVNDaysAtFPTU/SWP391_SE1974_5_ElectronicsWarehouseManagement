<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Outbound Detail</title>
    <style>
        :root {
            --muted: #64748b;
            --accent: #ef4444
        }

        body {
            font-family: Inter, 'Segoe UI', Roboto, Arial, sans-serif;
            padding: 24px;
            background: #fff6f6;
            color: #0f172a
        }

        .container {
            max-width: 1000px;
            margin: 0 auto
        }

        .card {
            background: #fff;
            padding: 18px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(2, 6, 23, 0.06)
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px
        }

        .title {
            display: flex;
            flex-direction: column
        }

        h2 {
            margin: 0;
            font-size: 20px
        }

        .meta {
            color: var(--muted);
            font-size: 13px
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px
        }

        .info-block {
            background: #fff6f6;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ffefef
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid #f9f4f4;
            text-align: left
        }

        thead th {
            background: #fff1f0;
            color: #9f1239
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 14px
        }

        .btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer
        }

        .btn.danger {
            background: var(--accent);
            color: #fff
        }

        .btn.ghost {
            background: transparent;
            border: 1px solid #fdecec
        }
        .modal{position:fixed;inset:0;background:rgba(2,6,23,0.4);display:none;justify-content:center;align-items:center;padding:20px}
        .modal.show{display:flex}
        .modal-box{background:#fff;width:100%;max-width:640px;border-radius:8px;padding:16px}
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="title">
                    <button class="btn ghost" onclick="location.href='outbound-list.html'">⬅ Back</button>
                    <h2>Phiếu Xuất</h2>
                    <div class="meta">Chi tiết phiếu xuất kho</div>
                </div>
                <div style="text-align:right">
                    <div id="createdBy" class="meta">Người tạo: -</div>
                    <div id="createdAt" class="meta">Ngày tạo: -</div>
                </div>
            </div>

            <div id="detail"></div>

            <div id="confirmSection" style="display:none; margin-top:20px; background:#fef2f2; border:1px solid #fecaca; padding:16px; border-radius:8px">
                <h4 style="margin-top:0; color:#9f1239">Phân bổ Xuất kho (Outbound)</h4>
                <div style="margin-bottom:8px; color:#0f172a; font-size:14px">Vui lòng chọn sản phẩm, số lượng và Bin nguồn tương ứng để lấy hàng (có thể xuất từ nhiều Bin):</div>
                <table style="width:100%; text-align:left; background:#fff; border-radius:6px; border-collapse: collapse; margin-top:8px;" id="allocationTable">
                    <thead>
                        <tr style="border-bottom:1px solid #fecaca; background:#fef2f2;">
                            <th style="padding:8px">Sản phẩm</th>
                            <th style="padding:8px; width:200px;">Bin nguồn</th>
                            <th style="padding:8px; width:120px;">Số lượng</th>
                            <th style="padding:8px; width:60px;"></th>
                        </tr>
                    </thead>
                    <tbody id="allocationBody">
                    </tbody>
                </table>
                <button class="btn ghost" style="margin-top:12px; font-size:13px; border-color:#fecaca; color:#9f1239" onclick="addAllocationRow()">+ Thêm phân bổ</button>
            </div>

            <div class="actions">
                <button id="confirmBtn" class="btn danger" onclick="confirmOrder()" style="display:none">Confirm</button>
                <button class="btn ghost" onclick="location.href='outbound-list.html'">Back</button>
            </div>
        </div>
    </div>

    <script>
        const BASE = "https://localhost:7297/api";
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        let transfer = null;
    function getTransferRequestId(obj) {
        if (!obj) return null;
        const candidates = [obj.id, obj.ID, obj.request_id, obj.requestId, obj.RequestId];
        for (const c of candidates) {
            if (c !== undefined && c !== null && c !== '') return Number(c);
        }
        return null;
    }
        const componentCache = {};
        const warehouseCache = {};
        const customerCache = {};

        async function load() {
            try {
                const res = await fetch(BASE + '/storekeeper/transfers/' + id, { credentials: 'include' });
                if (!res.ok) {
                    document.getElementById('detail').innerHTML = `<div style="color:#ef4444; font-weight:bold; padding:12px;">Lỗi tải dữ liệu phiếu xuất: Server trả về mã ${res.status}. Vui lòng thử tải lại trang hoặc chờ trong giây lát.</div>`;
                    return;
                }
                const json = await res.json();
                transfer = json.data;
                if (!transfer) {
                    document.getElementById('detail').innerHTML = `<div style="color:#ef4444; font-weight:bold; padding:12px;">Không tìm thấy thông tin phiếu xuất.</div>`;
                    return;
                }
            } catch (err) {
                document.getElementById('detail').innerHTML = `<div style="color:#ef4444; font-weight:bold; padding:12px;">Lỗi mạng hoặc máy chủ không phản hồi: ${err.message}</div>`;
                return;
            }

        
            let related = [];
            related = [];

       
            const relatedDetails = [];
            const seen = new Set();
         
            const mainId = transfer.request_id ?? transfer.RequestId ?? transfer.requestId ?? transfer.id ?? transfer.ID ?? null;
            if (mainId) { relatedDetails.push(transfer); seen.add(String(mainId)); }
            for (const r of related) {
                try {
                    const idToFetch = r.request_id ?? r.RequestId ?? r.requestId ?? r.id ?? r.ID;
                    if (!idToFetch) continue;
                    if (seen.has(String(idToFetch))) continue;
                    const dres = await fetch(BASE + '/storekeeper/transfers/' + idToFetch, { credentials: 'include' });
                    if (dres.ok) {
                        const djson = await dres.json();
                        if (djson?.success && djson.data) { relatedDetails.push(djson.data); seen.add(String(idToFetch)); }
                    }
                } catch (e) {  }
            }
           
            if (!seen.has(String(mainId))) relatedDetails.unshift(transfer);
            transfer._related = relatedDetails;

          
            const allComps = [];
            for (const t of relatedDetails) {
                try { await resolveWarehouses(t); } catch (e) {  }
                const compsT = getComponents(t) || [];
                compsT.forEach(c => allComps.push(c));
                
                try {
                    const finishedArr = t.finished_components ?? t.finishedComponents ?? t.finished_components_list ?? t.finishedComponentsList ?? t.FinishedTransferRequestComponents;
                    if (Array.isArray(finishedArr)) finishedArr.forEach(fc => allComps.push(fc));
                } catch (e) {  }
            }
            await resolveComponentNames(allComps);
            await resolveCustomers(relatedDetails);
            try {
                render();
            } catch (e) {
                console.error('render error', e);
                document.getElementById('detail').innerHTML = '<div style="color:#b91c1c;font-weight:600;padding:12px">Lỗi khi hiển thị chi tiết: ' + (e?.message || e) + '</div>';
            }

        
            const anyApproved = Array.isArray(transfer._related) ? transfer._related.some(t => (t.status ?? t.Status) === 2) : (transfer.status === 2);
            if (anyApproved) {
                document.getElementById('confirmSection').style.display = 'block';
                document.getElementById('confirmBtn').style.display = 'inline-block';
                loadBinsForConfirm();
            }

            async function resolveCustomers(transfers) {
                if (!Array.isArray(transfers) || transfers.length === 0) return;
             
                try {
                    const res = await fetch(BASE + '/storekeeper/customers', { credentials: 'include' });
                    if (!res.ok) return;
                    const json = await res.json();

                    if (!json?.success || !Array.isArray(json.data)) return;
                    json.data.forEach(c => { customerCache[c.id ?? c.customer_id ?? c.customerId] = c; });
                } catch (e) {  }
                transfers.forEach(t => {
                    const cid = t.customer_id ?? t.CustomerId ?? t.customerId ?? t.customer_id ?? null;
                    if (cid && customerCache[cid]) t._customerName = customerCache[cid].name ?? customerCache[cid].customer_name ?? customerCache[cid].displayName ?? customerCache[cid].fullName ?? null;
                });
            }
            
            try {
                const createdBy = transfer.created_by ?? transfer.createdBy ?? transfer.created_by_name ?? transfer.createdByName ?? transfer.owner ?? null;
                const createdAt = transfer.creation_date ?? transfer.creationDate ?? transfer.created_at ?? transfer.createdAt ?? null;
                if (document.getElementById('createdBy')) document.getElementById('createdBy').innerText = 'Người tạo: ' + (createdBy ?? 'Auto');
                if (document.getElementById('createdAt')) document.getElementById('createdAt').innerText = 'Ngày tạo: ' + (createdAt ? new Date(createdAt).toLocaleString('vi-VN') : '-');
            } catch (e) { }
        }

        async function resolveWarehouses(t) {
            if (!t) return;
            try {
               
                let binFrom = t.bin_from ?? t.binFrom ?? null;
                const binFromId = binFrom?.id ?? binFrom?.ID ?? t.bin_from_id ?? t.binFromId;
                if (binFromId && (!binFrom || !(binFrom.location_in_warehouse || binFrom.locationInWarehouse || binFrom.binCode))) {
                    try {
                        const bres = await fetch(BASE + '/storekeeper/bins/' + binFromId, { credentials: 'include' });
                        if (bres.ok) {
                            const bjson = await bres.json();
                            if (bjson?.success && bjson.data) { t.bin_from = bjson.data; binFrom = bjson.data; }
                        }
                    } catch (e) { }
                }

                if (binFrom) {
                    const w = binFrom.warehouse ?? binFrom.Warehouse ?? null;
                    const wid = (typeof binFrom.warehouse === 'object') ? (binFrom.warehouse?.id) : (binFrom.warehouse ?? binFrom.warehouse_id ?? binFrom.warehouseId ?? binFrom.WarehouseId);
                    const needFetch = !w || (typeof w !== 'object');
                    if (needFetch && wid && !warehouseCache[wid]) {
                        try {
                            const wres = await fetch(BASE + '/storekeeper/warehouses/' + wid, { credentials: 'include' });
                            if (wres.ok) {
                                const wjson = await wres.json();
                                if (wjson?.success && wjson.data) warehouseCache[wid] = wjson.data;
                            }
                        } catch (e) { }
                    }
                    if (warehouseCache[wid]) binFrom.warehouse = warehouseCache[wid];
                }

             
                let binTo = t.bin_to ?? t.binTo ?? null;
                const binToId = binTo?.id ?? binTo?.ID ?? t.bin_to_id ?? t.binToId;
                if (binToId && (!binTo || !(binTo.location_in_warehouse || binTo.locationInWarehouse || binTo.binCode))) {
                    try {
                        const bres2 = await fetch(BASE + '/storekeeper/bins/' + binToId, { credentials: 'include' });
                        if (bres2.ok) {
                            const bjson2 = await bres2.json();
                            if (bjson2?.success && bjson2.data) { t.bin_to = bjson2.data; binTo = bjson2.data; }
                        }
                    } catch (e) { }
                }

                if (binTo) {
                    const w3 = binTo.warehouse ?? binTo.Warehouse ?? null;
                    const wid3 = (typeof binTo.warehouse === 'object') ? (binTo.warehouse?.id) : (binTo.warehouse ?? binTo.warehouse_id ?? binTo.warehouseId ?? binTo.WarehouseId);
                    const needFetch3 = !w3 || (typeof w3 !== 'object');
                    if (needFetch3 && wid3 && !warehouseCache[wid3]) {
                        try {
                            const wres3 = await fetch(BASE + '/storekeeper/warehouses/' + wid3, { credentials: 'include' });
                            if (wres3.ok) {
                                const wjson3 = await wres3.json();
                                if (wjson3?.success && wjson3.data) warehouseCache[wid3] = wjson3.data;
                            }
                        } catch (e) { }
                    }
                    if (warehouseCache[wid3]) binTo.warehouse = warehouseCache[wid3];
                }
                
                try {
                    const finishedArr = t.finished_components ?? t.finishedComponents ?? t.finished_components_list ?? t.finishedComponentsList;
                    if (Array.isArray(finishedArr) && finishedArr.length > 0) {
                        t.bin_finish_from = null;
                        t.bin_finish_to = null;
                        const bins = [];
                        for (const fc of finishedArr) {
                            const binObj = fc.bin ?? fc.Bin ?? null;
                            const binRef = binObj ? binObj : ((fc.bin_id || fc.binId) ? { id: fc.bin_id ?? fc.binId } : null);
                            if (!binRef) continue;
                            bins.push(binRef);
                            if (fc.type === 1) t.bin_finish_from = binRef;
                            else if (fc.type === 0) t.bin_finish_to = binRef;
                            else if (!t.bin_finish_to) t.bin_finish_to = binRef;
                        }
                        if (bins.length > 1) t.bin_finish_list = bins;
                        if (!t.bin_finish_from && bins.length === 1) t.bin_finish_to = bins[0];
                       
                        for (const bin of bins) {
                            const bw = bin?.warehouse ?? bin?.warehouse_id ?? bin?.warehouseId ?? (typeof bin?.warehouse === 'object' ? bin.warehouse.id : null) ?? t.warehouse_from_id ?? t.warehouse_to_id;
                            if (bw && (!bin?.warehouse || typeof bin.warehouse !== 'object')) {
                                try {
                                    const wres = await fetch(BASE + '/storekeeper/warehouses/' + bw, { credentials: 'include' });
                                    if (wres.ok) {
                                        const wjson = await wres.json();
                                        if (wjson?.success && wjson.data) bin.warehouse = wjson.data;
                                    }
                                } catch (e) { console.error('bin finish warehouse fetch failed', e); }
                            }
                        }
                       
                        if (!t._fromWarehouseId && t.bin_finish_from) {
                            const bf = t.bin_finish_from;
                            t._fromWarehouseId = bf?.warehouse?.id ?? bf?.warehouse_id ?? bf?.warehouseId ?? null;
                        }
                        if (!t._toWarehouseId && t.bin_finish_to) {
                            const bt = t.bin_finish_to;
                            t._toWarehouseId = bt?.warehouse?.id ?? bt?.warehouse_id ?? bt?.warehouseId ?? null;
                        }
                    }
                } catch(e) {  }
            } catch (e) { console.error('resolveWarehouses failed', e); }
        }

        async function resolveComponentNames(comps) {
            if (!Array.isArray(comps)) return;
            await Promise.all(comps.map(async c => {
                const currentName = getComponentName(c);
                if (currentName && !currentName.startsWith('Component #')) return;
                const id = c.component_id ?? c.componentId ?? c.component?.id;
                if (!id) return;
                if (componentCache[id]) {
                    c.component = c.component ?? {};
                    c.component.metadata = componentCache[id].metadata ?? componentCache[id].Metadata ?? componentCache[id];
                    return;
                }
                try {
                    const cres = await fetch(BASE + '/storekeeper/components/' + id, { credentials: 'include' });
                    if (!cres.ok) return;
                    const cjson = await cres.json();
                    if (cjson?.success && cjson.data) {
                        componentCache[id] = cjson.data;
                        c.component = c.component ?? {};
                        c.component.metadata = cjson.data.metadata ?? cjson.data.Metadata ?? cjson.data;
                    }
                } catch (e) { console.error('component fetch failed', e); }
            }));
        }

        function getComponents(obj) {
            if (!obj) return [];
            const keys = ['components', 'Components', 'transfer_request_components', 'transferRequestComponents', 'TransferRequestComponents', 'data'];
            for (const k of keys) if (Array.isArray(obj[k])) return obj[k];
            for (const k of Object.keys(obj)) {
                if (Array.isArray(obj[k]) && obj[k].length > 0 && (obj[k][0].quantity !== undefined || obj[k][0].component_id !== undefined))
                    return obj[k];
            }
            return [];
        }

        function getComponentName(c) {
            return c?.name ?? c?.Name ?? c?.metadata?.name ?? c?.Metadata?.name ?? c?.component?.metadata?.name ?? c?.component?.metadata?.Name ?? ('Component #' + (c.component_id ?? c.componentId ?? c.component?.id ?? '?'));
        }

        function getCustomerInfo(t) {
            if (!t) return null;
         
            const c = t.customer ?? t.customer_info_json ?? t.customer_info ?? t.customer_info_json_parsed ?? null;
            if (c) {
                if (typeof c === 'string') {
                    try { const parsed = JSON.parse(c); return parsed.name ?? parsed.displayName ?? parsed.fullname ?? parsed.contact ?? parsed.company ?? c; } catch (e) { return c; }
                }
                return c.name ?? c.displayName ?? c.fullname ?? c.company ?? JSON.stringify(c);
            }
            
            const id = t.customer_id ?? t.customerId ?? t.customerId ?? null;
            if (id) return 'Customer ID: ' + id;
            return null;
        }

        let globalProductsMap = {}; 

        function render() {
            if (!transfer) return;
            function getStatusText(status) {
                switch (status) {
                    case 0: return 'Unknown';
                    case 1: return 'Pending';
                    case 2: return 'Approved - Waiting Confirm';
                    case 3: return 'Rejected';
                    case 5: return 'Missing components';
                    default: return 'Completed';
                }
            }
            
            const related = transfer._related ?? [transfer];

            const statusSet = new Set(related.map(t => t.status ?? t.Status ?? 0));
            let statusText = statusSet.size === 1 ? getStatusText(Array.from(statusSet)[0]) : 'Multiple';

           
            const binSet = new Set();
            const bins = [];
           
            const compRequestedTotals = {}; 
            const compFinishedTotals = {}; 
            const productsMap = {}; 

            related.forEach(t => {
                
                const binFinishFrom = t.bin_finish_from ?? t.binFinishFrom ?? null;
                const binFrom = t.bin_from ?? t.binFrom ?? null;
                const binName = binFinishFrom ? (binFinishFrom.location_in_warehouse ?? binFinishFrom.locationInWarehouse ?? binFinishFrom.binCode ?? (binFinishFrom.id ?? binFinishFrom.ID)) : (binFrom ? (binFrom.location_in_warehouse ?? binFrom.locationInWarehouse ?? binFrom.binCode ?? binFrom.code ?? (binFrom.id ?? binFrom.ID)) : (t.bin_from_id ?? t.binFromId ?? '-'));
                const whName = (t._finishFromWarehouseName ?? t._fromWarehouseName ?? (binFinishFrom?.warehouse?.name ?? binFinishFrom?.warehouse?.warehouseName ?? binFinishFrom?.warehouse) ?? (binFrom?.warehouse?.warehouseName ?? binFrom?.warehouse?.name ?? binFrom?.warehouse)) ?? '-';
                const key = `${whName}||${binName}`;
                if (!binSet.has(key)) { binSet.add(key); bins.push({ warehouse: whName, bin: binName }); }

                const comps = getComponents(t);
                comps.forEach(c => {
                    const cidRaw = c.component_id ?? c.componentId ?? c.component?.id ?? c.component?.componentId ?? 'unknown';
                    const cid = String(cidRaw);
                    const name = getComponentName(c);
                    const qty = Number(c.quantity ?? c.Quantity ?? c.qty ?? c.component?.quantity ?? 0) || 0;
                    if (!compRequestedTotals[cid]) compRequestedTotals[cid] = { name: name, total: 0 };
                    if (!compRequestedTotals[cid].name || compRequestedTotals[cid].name.startsWith('Component #')) compRequestedTotals[cid].name = name;
                    compRequestedTotals[cid].total += qty;
                });

                try {
                    const finishedArr = t.finished_components ?? t.finishedComponents ?? t.finished_components_list ?? t.finishedComponentsList ?? t.FinishedTransferRequestComponents;
                    if (Array.isArray(finishedArr)) {
                        finishedArr.forEach(fc => {
                            const type = fc.type ?? fc.Type ?? null;
                            if (type === undefined || type === null) return;
                            if (Number(type) !== 1) return; 

                            if (Number(type) !== 1) return; 
                            const fcid = String(fc.component_id ?? fc.componentId ?? fc.component?.id ?? fc.component?.componentId ?? 'unknown');
                            const fq = Number(fc.quantity ?? fc.Quantity ?? 0) || 0;
                            compFinishedTotals[fcid] = (compFinishedTotals[fcid] || 0) + fq;
                        });
                    }
                } catch (e) { }
            });

       
            Object.keys(compRequestedTotals).forEach(k => {
                const req = Number(compRequestedTotals[k].total || 0);
                const fin = Number(compFinishedTotals[k] || 0);
                const remaining = Math.max(0, req - fin);
                productsMap[k] = { name: compRequestedTotals[k].name, total: remaining };
            });

            globalProductsMap = productsMap;

           
            let warehouseDisplayHtml = '';
            if (bins.length > 0) {
                warehouseDisplayHtml = bins.map(b => b.warehouse + ' / ' + b.bin).join('<br/>');
            } else {
                const wfName = transfer.warehouse_from?.name ?? transfer.warehouse_from_name ?? transfer.warehouse_from ?? transfer.warehouseFrom?.name ?? transfer.warehouse?.name ?? null;
                const wtName = transfer.warehouse_to?.name ?? transfer.warehouse_to_name ?? transfer.warehouse_to ?? transfer.warehouseTo?.name ?? null;
                if (wfName || wtName) warehouseDisplayHtml = (wfName ?? '-') + ' / ' + (wtName ?? '-'); else warehouseDisplayHtml = '- / -';
            }

            let html = `
                <div class="info-grid">
                    <div class="info-block">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start">
                            <div>
                                <div style="font-weight:700">Description</div>
                                <div class="meta" id="descText">${transfer.description ?? '-'}</div>
                            </div>
                            <div style="margin-left:12px">
                                <div style="display:flex;gap:8px">
                                    <button id="editDescBtn" class="btn ghost" style="padding:6px 10px;font-size:13px" onclick="openEditDesc()">Edit</button>
                                    <button id="editFullBtn" class="btn ghost" style="padding:6px 10px;font-size:13px" onclick="openFullEdit()">Edit Full</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="info-block">
                        <div style="font-weight:700">Status</div>
                        <div class="meta">${statusText}</div>
                        <div style="height:8px"></div>
                        <div style="font-weight:700">From Warehouse / Bin(s)</div>
                        <div class="meta">${warehouseDisplayHtml}</div>
                        <div style="height:6px"></div>
                        <div style="font-weight:700">Customer</div>
                        <div class="meta">${transfer._customerName ?? getCustomerInfo(transfer) ?? (transfer.customer_id ? ('Customer ID: ' + transfer.customer_id) : '-')}</div>
                    </div>
                </div>
                <hr />
                <h4>Products (aggregated)</h4>
                <div class="table-card">
                    <table>
                        <thead>
                            <tr><th>Name</th><th style="width:120px">Số lượng</th></tr>
                        </thead>
                        <tbody>
`;

            Object.values(productsMap).forEach(p => {
                html += `<tr><td>${p.name}</td><td>${p.total}</td></tr>`;
            });

            html += `</tbody></table></div>`;

          
            const finishedRows = [];
            try {
             
                const relatedArr = transfer._related ?? [transfer];
                const rowMap = new Map(); 
                function _norm(v){ if (v === null || v === undefined) return ''; try { return String(v).replace(/<[^>]+>/g,'').trim().toLowerCase(); } catch(e){ return String(v); } }
                relatedArr.forEach(t => {
                    const finishedArr = t.finished_components ?? t.finishedComponents ?? t.finished_components_list ?? t.finishedComponentsList ?? t.FinishedTransferRequestComponents;
                    if (!Array.isArray(finishedArr)) return;
                    finishedArr.forEach(fc => {
                        const name = getComponentName(fc) || getComponentName({ component_id: fc.component_id, component: fc.component });
                        const qty = Number(fc.quantity ?? fc.Quantity ?? 0) || 0;
                        const dir = (fc.type === 1) ? 'From' : (fc.type === 0 ? 'To' : '-');
                        const bin = fc.bin ?? fc.Bin ?? null;
                        const wh = bin?.warehouse?.name ?? bin?.warehouse?.warehouseName ?? t._fromWarehouseName ?? t._toWarehouseName ?? '-';
                        const binLoc = bin?.location_in_warehouse ?? bin?.locationInWarehouse ?? bin?.binCode ?? '-';
                        const key = `${_norm(name)}||${_norm(wh)}||${_norm(binLoc)}`;
                        if (!rowMap.has(key)) {
                            rowMap.set(key, { product: name, warehouse: wh, bin: binLoc, fromQty: 0, toQty: 0 });
                        }
                        const entry = rowMap.get(key);
                        if (dir === 'From') entry.fromQty = (entry.fromQty || 0) + qty;
                        else if (dir === 'To') entry.toQty = (entry.toQty || 0) + qty;
                    });
                });
              
                for (const v of rowMap.values()) {
                    if ((v.fromQty || 0) > 0) finishedRows.push({ product: v.product, quantity: v.fromQty, direction: 'From', warehouse: v.warehouse, bin: v.bin });
                    else if ((v.toQty || 0) > 0) finishedRows.push({ product: v.product, quantity: v.toQty, direction: 'To', warehouse: v.warehouse, bin: v.bin });
                }
            } catch(e) {  }

            if (finishedRows.length > 0) {
                html += `<h4 style="margin-top:18px">Movements</h4>`;
                html += `<div class="table-card"><table><thead><tr><th>Product</th><th style="width:100px">Quantity</th><th style="width:80px">Direction</th><th>Warehouse</th><th style="width:120px">Bin</th></tr></thead><tbody>`;
                finishedRows.forEach(r => {
                    html += `<tr><td style="font-weight:500">${r.product}</td><td>${r.quantity}</td><td>${r.direction}</td><td>${r.warehouse}</td><td>${r.bin}</td></tr>`;
                });
                html += `</tbody></table></div>`;
            }

            document.getElementById('detail').innerHTML = html;
         
            try { const eb = document.getElementById('editDescBtn'); if (eb) eb.style.display = (transfer.status === 1 ? 'inline-block' : 'none'); const ef = document.getElementById('editFullBtn'); if(ef) ef.style.display = (transfer.status === 1 ? 'inline-block' : 'none'); } catch(e){}

            
            if (statusSet.has(2) || transfer.status === 2) {
                document.getElementById('confirmBtn').style.display = 'inline-block';
            } else {
                document.getElementById('confirmBtn').style.display = 'none';
            }
        }

        let availableBins = [];
        let orderProducts = [];
        let binAvailabilityByBin = {};

        async function loadBinsForConfirm() {
            try {
                orderProducts = Object.keys(globalProductsMap).map(cid => ({
                    id: cid,
                    name: globalProductsMap[cid].name,
                    maxQty: globalProductsMap[cid].total
                }));

                document.getElementById('allocationBody').innerHTML = '';
                orderProducts.forEach(p => addAllocationRow(p.id, p.maxQty));

                let wId = transfer.warehouse_from_id ?? transfer.warehouseFromId ?? transfer.warehouse?.id ?? transfer.warehouse_id;
                if (!wId && transfer.bin_from) wId = transfer.bin_from.warehouse?.id ?? transfer.bin_from.warehouse_id ?? transfer.bin_from.warehouseId;
                if (!wId && transfer.bin_to) wId = transfer.bin_to.warehouse?.id ?? transfer.bin_to.warehouse_id ?? transfer.bin_to.warehouseId;
                
                if (!wId) {
                    console.warn('Không tìm thấy kho nguồn.');
                    return;
                }
                const res = await fetch(BASE + '/storekeeper/warehouses/' + wId, { credentials: 'include' });
                if (!res.ok) return;
                const json = await res.json();
                if (!json.success || !json.data) return;
                availableBins = json.data.bins ?? json.data;
                
                // Reload rows with populated bins
                document.getElementById('allocationBody').innerHTML = '';
                orderProducts.forEach(p => addAllocationRow(p.id, p.maxQty));

                // Load stock for all available bins sequentially to allow validation later
                for (let b of availableBins) {
                    const binId = b.id ?? b.ID ?? b.binId;
                    if (!binId) continue;
                    try {
                        const bres = await fetch(BASE + '/storekeeper/bins/' + binId, { credentials: 'include' });
                        if (!bres.ok) continue;
                        const bjson = await bres.json();
                        if (bjson?.success) {
                            const dataArr = Array.isArray(bjson.data) ? bjson.data : (Array.isArray(bjson.data?.components) ? bjson.data.components : null);
                            if (Array.isArray(dataArr)) {
                                binAvailabilityByBin[binId] = {};
                                for (const cb of dataArr) {
                                    const cid = cb.component_id ?? cb.ComponentId ?? cb.componentId ?? cb.component?.componentId ?? cb.component?.id;
                                    const qty = parseFloat(cb.quantity ?? cb.Quantity ?? cb.component?.quantity ?? cb.Quantity ?? 0) || 0;
                                    if (cid) binAvailabilityByBin[binId][cid] = qty;
                                }
                            }
                        }
                    } catch(e) { }
                }
            } catch (e) {
                console.error('loadBins err', e);
            }
        }

        function addAllocationRow(defaultProductId = '', defaultQty = '') {
            const tbody = document.getElementById('allocationBody');
            const row = document.createElement('tr');
            row.style.borderBottom = '1px solid #f9fafb';

            let productOptions = '<option value="">-- Chọn sản phẩm --</option>';
            orderProducts.forEach(p => {
                const selected = p.id == defaultProductId ? 'selected' : '';
                productOptions += `<option value="${p.id}" ${selected}>${p.name} (cần xuất: ${p.maxQty})</option>`;
            });

            let binOptions = '<option value="">-- Chọn Bin --</option>';
            availableBins.forEach(b => {
                const lbl = b.location_in_warehouse ?? b.locationInWarehouse ?? b.binCode ?? ('Bin ' + b.id);
                binOptions += `<option value="${b.id ?? b.ID ?? b.binId}">${lbl}</option>`;
            });

            row.innerHTML = `
                <td style="padding:8px"><select class="alloc-product" style="width:100%; padding:6px; border-radius:4px; border:1px solid #ccc">${productOptions}</select></td>
                <td style="padding:8px"><select class="alloc-bin" style="width:100%; padding:6px; border-radius:4px; border:1px solid #ccc">${binOptions}</select></td>
                <td style="padding:8px"><input type="number" class="alloc-qty" value="${defaultQty}" min="1" style="width:100px; padding:6px; border-radius:4px; border:1px solid #ccc"></td>
                <td style="padding:8px; text-align:center"><button class="btn ghost" style="color:#ef4444; border-color:#fca5a5; padding:4px 8px" onclick="this.closest('tr').remove()">X</button></td>
            `;
            tbody.appendChild(row);
        }

        async function confirmOrder() {
            // Build allocations
            const rows = Array.from(document.querySelectorAll('#allocationBody tr'));
            if (rows.length === 0) return alert('Vui lòng thêm ít nhất 1 phân bổ.');

            const allocationSummary = {};
            const globalBinsFromPayload = {};

            for (let i = 0; i < rows.length; i++) {
                const r = rows[i];
                const pId = r.querySelector('.alloc-product').value;
                const bId = r.querySelector('.alloc-bin').value;
                const qty = Number(r.querySelector('.alloc-qty').value) || 0;

                if (!pId) return alert(`Dòng ${i+1}: Vui lòng chọn sản phẩm.`);
                if (!bId) return alert(`Dòng ${i+1}: Vui lòng chọn Bin.`);
                if (qty <= 0) return alert(`Dòng ${i+1}: Số lượng phải lớn hơn 0.`);

                const stock = (binAvailabilityByBin[bId] && binAvailabilityByBin[bId][pId]) ? binAvailabilityByBin[bId][pId] : 0;
                let alreadyAllocated = globalBinsFromPayload[bId]?.[pId] || 0;
                if (qty + alreadyAllocated > stock) {
                    const pNameElem = r.querySelector('.alloc-product');
                    const bNameElem = r.querySelector('.alloc-bin');
                    const pName = pNameElem.options[pNameElem.selectedIndex]?.text.split(' (')[0] || pId;
                    const bName = bNameElem.options[bNameElem.selectedIndex]?.text || bId;
                    return alert(`Dòng ${i+1}: Tồn kho của [${bName}] không đủ! (Chỉ còn ${stock} cho sản phẩm "${pName}")`);
                }

                allocationSummary[pId] = (allocationSummary[pId] || 0) + qty;
                if (!globalBinsFromPayload[bId]) globalBinsFromPayload[bId] = {};
                globalBinsFromPayload[bId][pId] = (globalBinsFromPayload[bId][pId] || 0) + qty;
            }

            // Compare requested vs allocated
            const diffs = [];
            for (const p of orderProducts) {
                const requested = p.maxQty;
                const allocated = allocationSummary[p.id] || 0;
                // Prevent confirming when allocated quantity exceeds requested quantity
                if (allocated > requested) {
                    return alert(`Đã phân bổ (${allocated}) nhiều hơn yêu cầu (${requested}) cho "${p.name}". Vui lòng điều chỉnh phân bổ.`);
                }
                if (allocated !== requested) diffs.push({ id: p.id, name: p.name, requested, allocated });
            }

            if (diffs.length > 0) {
                let msg = 'Phân bổ không khớp so với yêu cầu:\n';
                diffs.forEach(d => msg += `- ${d.name}: yêu cầu ${d.requested}, đã phân bổ ${d.allocated}\n`);
                msg += '\nBạn có chắc chỉ chuyển những sản phẩm này với số lượng này không?';
                if (!confirm(msg)) return;
            } else {
                if (!confirm('Xác nhận phân bổ và lưu kho?')) return;
            }

            // build pairMap for submitting (same logic as before)
            const pairMap = {};
            for (let i = 0; i < rows.length; i++) {
                const r = rows[i];
                const pId = parseInt(r.querySelector('.alloc-product').value) || 0;
                const bId = parseInt(r.querySelector('.alloc-bin').value) || 0;
                const qty = Number(r.querySelector('.alloc-qty').value) || 0;
                if (!pairMap[bId]) pairMap[bId] = {};
                pairMap[bId][pId] = (pairMap[bId][pId] || 0) + qty;
            }

            // Submit single confirm for the current transfer only using user's allocations (bins_from)
            const reqId = transfer.request_id ?? transfer.RequestId ?? transfer.requestId ?? transfer.id ?? transfer.ID;
            if (reqId === null || reqId === undefined) return alert('Cannot determine transfer request ID to confirm.');

            // Only include components that belong to this transfer
            // Build payload from user-selected allocations (bins_from). Do not include bins_to for outbound.
            const payload = { request_id: reqId, bins_from: [] };
            for (const [binId, compsObj] of Object.entries(pairMap)) {
                const compsArr = Object.keys(compsObj).map(cid => ({ component_id: parseInt(cid), quantity: compsObj[cid] }));
                if (compsArr.length > 0) {
                    payload.bins_from.push({ bin_id: parseInt(binId), components: compsArr });
                }
            }

            console.debug('Confirm payload (single transfer):', payload);
            if (payload.bins_from.length === 0) return alert('No bins selected that match this transfer.');

            try {
                // log payload for debugging
                console.debug('Confirm payload (single transfer):', payload);
                const res = await fetch(BASE + '/storekeeper/transfers/confirm', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(payload)
                });
                if (!res.ok) { const txt = await res.text().catch(()=>null); return alert('Operation failed: ' + (txt || res.statusText)); }
                const j = await res.json(); if (!j?.success) return alert('Operation failed: ' + (j?.msg || j?.message || 'Error'));
                alert('Outbound processed successfully'); location.href='outbound-list.html';
            } catch (e) { alert('Operation failed: ' + e.message); location.reload(); }
        }

        load();
    </script>
    <!-- Full edit modal -->
    <div id="editFullModal" class="modal">
        <div class="modal-box">
            <h3>Edit Transfer (Full)</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px">
                <div>
                    <label>Description</label>
                    <textarea id="fullDesc" style="width:100%;height:60px;padding:8px;border-radius:6px;border:1px solid #e6edf6"></textarea>
                </div>
                <div>
                    <label>Customer / Supplier</label>
                    <select id="fullCustomer" style="width:100%;padding:8px;border-radius:6px;border:1px solid #e6edf6"><option value="">-- None --</option></select>
                </div>
            </div>
            <div style="margin-top:10px">
                <label>Source Warehouse</label>
                <select id="fullWarehouseFrom" style="width:100%;padding:8px;border-radius:6px;border:1px solid #e6edf6"><option value="">-- Select --</option></select>
            </div>

            <h4 style="margin-top:12px">Products</h4>
            <div style="max-height:280px;overflow:auto;border:1px solid #fef0ef;border-radius:6px;padding:8px;margin-top:8px">
                <table style="width:100%;border-collapse:collapse">
                    <thead><tr><th>Product</th><th style="width:120px">Qty</th><th style="width:140px">Unit Price</th><th style="width:56px"></th></tr></thead>
                    <tbody id="fullComponentsBody"></tbody>
                </table>
                <div style="margin-top:8px"><button class="btn ghost" onclick="addFullComponentRow()">+ Add product</button></div>
            </div>

            <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end">
                <button class="btn ghost" onclick="closeFullEdit()">Cancel</button>
                <button class="btn danger" onclick="submitFullEdit()">Save changes</button>
            </div>
        </div>
    </div>

    <script>
        async function openFullEdit(){
            if (!transfer) return alert('No transfer loaded');
            if (transfer.status !== 1) return alert('Only pending transfers can be edited');
            await loadEditResources();
            document.getElementById('fullDesc').value = transfer.description ?? '';
            try{ const wf = document.getElementById('fullWarehouseFrom'); if(wf) wf.value = transfer.warehouse_from_id ?? transfer.warehouseFromId ?? transfer._fromWarehouseId ?? (transfer.warehouse?.id ?? ''); }catch(e){}
            try{ const sc = document.getElementById('fullCustomer'); if(sc){ const cid = transfer.customer_id ?? transfer.customerId ?? null; if(cid) sc.value = cid; }}catch(e){}
            const body = document.getElementById('fullComponentsBody'); body.innerHTML = '';
            const comps = getComponents(transfer) || [];
            // populate rows as-is (no auto-aggregation) and do not trigger merging
            comps.forEach(c => {
                const cid = c.component_id ?? c.componentId ?? c.component?.id;
                const name = getComponentName(c);
                const qty = c.quantity ?? c.qty ?? c.Quantity ?? 0;
                const price = c.unit_price ?? c.unitPrice ?? c.UnitPrice ?? 0;
                addFullComponentRow(cid, qty, price, name);
            });
            document.getElementById('editFullModal').classList.add('show');
        }

        function closeFullEdit(){ document.getElementById('editFullModal').classList.remove('show'); }

        let editComponentsCache = [];
        async function loadEditResources(){
            try{ const cres = await fetch(BASE + '/storekeeper/components', { credentials: 'include' }); if (cres.ok){ const cj = await cres.json(); if(cj?.success && Array.isArray(cj.data)) editComponentsCache = cj.data; }}catch(e){}
            try{ const wres = await fetch(BASE + '/storekeeper/warehouses', { credentials: 'include' }); if (wres.ok){ const wj = await wres.json(); if(wj?.success && Array.isArray(wj.data)){ const wf = document.getElementById('fullWarehouseFrom'); const wt = document.getElementById('fullWarehouseTo'); if(wf) wf.innerHTML = '<option value="">-- Select --</option>'; if(wt) wt.innerHTML = '<option value="">-- Select --</option>'; wj.data.forEach(w => { const id = w.id ?? w.ID ?? w.warehouseId; const name = w.name ?? w.warehouseName ?? id; if(wf) wf.innerHTML += `<option value="${id}">${name}</option>`; if(wt) wt.innerHTML += `<option value="${id}">${name}</option>`; }); }}}catch(e){}
            try{ const cres = await fetch(BASE + '/storekeeper/customers', { credentials: 'include' }); if (cres.ok){ const cj = await cres.json(); if(cj?.success && Array.isArray(cj.data)){ const sc = document.getElementById('fullCustomer'); if(sc){ sc.innerHTML = '<option value="">-- None --</option>'; cj.data.forEach(c => { const id = c.id ?? c.ID ?? c.customerId; const name = c.name ?? c.displayName ?? c.contact ?? id; const opt = document.createElement('option'); opt.value = id; opt.text = name; opt.dataset.raw = JSON.stringify(c); sc.appendChild(opt); }); }}}}catch(e){}
        }

        function addFullComponentRow(defaultComponentId = '', defaultQty = '', defaultPrice = 0, defaultName){
            const tbody = document.getElementById('fullComponentsBody');
            const tr = document.createElement('tr');
            let productOptions = '<option value="">-- Select product --</option>';
            (editComponentsCache || []).forEach(p => { const id = p.componentId ?? p.id; const name = p.metadata?.name ?? p.name ?? ('Product #' + id); const sel = (id == defaultComponentId) ? 'selected' : ''; productOptions += `<option value="${id}" ${sel}>${name}</option>`; });
            if(defaultName && !Array.from((editComponentsCache||[]).map(x=>x.componentId??x.id)).includes(Number(defaultComponentId))){ productOptions += `<option value="${defaultComponentId}" selected>${defaultName}</option>`; }
            tr.innerHTML = `
                <td style="padding:8px"><select class="full-comp-select" style="width:100%;padding:6px;border-radius:4px;border:1px solid #ccc">${productOptions}</select></td>
                <td style="padding:8px"><input type="number" class="full-comp-qty" value="${defaultQty}" min="1" style="width:100px;padding:6px;border-radius:4px;border:1px solid #ccc"></td>
                <td style="padding:8px"><input type="number" class="full-comp-price" value="${defaultPrice}" min="0" step="0.01" style="width:120px;padding:6px;border-radius:4px;border:1px solid #ccc"></td>
                <td style="padding:8px; text-align:center"><button class="btn ghost" style="color:#ef4444; border-color:#fca5a5; padding:4px 8px" onclick="this.closest('tr').remove()">X</button></td>
            `;
            tbody.appendChild(tr);
        }

        async function submitFullEdit(){
            const desc = document.getElementById('fullDesc').value || '';
            const wf = parseInt(document.getElementById('fullWarehouseFrom').value) || null;
            const sc = document.getElementById('fullCustomer').value || null;
            const rows = Array.from(document.querySelectorAll('#fullComponentsBody tr'));
            if(rows.length === 0) return alert('Please add at least one product');

            const raw = [];
            for(let i=0;i<rows.length;i++){
                const r = rows[i];
                const compId = parseInt(r.querySelector('.full-comp-select').value) || 0;
                const qty = parseFloat(r.querySelector('.full-comp-qty').value) || 0;
                const price = parseFloat(r.querySelector('.full-comp-price').value) || null;
                if(!compId) return alert(`Row ${i+1}: please select product`);
                if(qty <= 0) return alert(`Row ${i+1}: quantity must be > 0`);
                raw.push({ component_id: compId, quantity: qty, unit_price: price });
            }

            // aggregate duplicates by component_id to avoid creating duplicated component rows on server
            const compMap = {};
            raw.forEach(x => {
                const k = String(x.component_id);
                if (!compMap[k]) compMap[k] = { component_id: x.component_id, quantity: 0, unit_price: x.unit_price };
                compMap[k].quantity += Number(x.quantity) || 0;
                // prefer first non-null unit_price
                if ((compMap[k].unit_price === null || compMap[k].unit_price === undefined) && (x.unit_price !== null && x.unit_price !== undefined)) compMap[k].unit_price = x.unit_price;
            });
            const componentsPayload = Object.values(compMap).map(c => {
                const out = { component_id: c.component_id, quantity: c.quantity };
                if (c.unit_price !== null && c.unit_price !== undefined) out.unit_price = c.unit_price;
                return out;
            });

            const payload = { desc: desc, components: componentsPayload };
            if(wf) payload.warehouse_from_id = wf;
            if(sc) payload.customer_id = parseInt(sc);

            try{
                const reqId = getTransferRequestId(transfer) ?? Number(id);
                console.log('submitFullEdit: PATCH', reqId, payload);
                const res = await fetch(BASE + '/storekeeper/transfers/' + reqId, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(payload) });
                const rawText = await res.text().catch(()=>null);
                console.log('submitFullEdit: raw response', res.status, rawText);
                if(!res.ok){ return alert('Update failed: ' + (rawText || res.statusText)); }
                const j = rawText ? JSON.parse(rawText) : null;
                console.log('submitFullEdit: parsed response', j);
                if(!j?.success) return alert(j?.msg || j?.message || 'Update failed');
                // update local transfer components to reflect exactly what user saved (avoid showing server-side duplicate entries)
                try {
                    transfer.components = componentsPayload.map(c => ({ component_id: c.component_id, quantity: c.quantity, unit_price: c.unit_price }));
                    await resolveComponentNames(getComponents(transfer));
                    await resolveWarehouses(transfer);
                } catch(e) {}
                closeFullEdit(); alert('Updated'); try{ render(); }catch(e){}
            }catch(e){ alert('Network error: ' + e.message); }
        }
    </script>
    <!-- Edit description modal -->

            <h3>Edit Description</h3>

                    method: 'PATCH', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(payload)
                });

                console.log('submitEditDesc: raw response', res.status, rawText);
                if (!res.ok) { return alert('Update failed: ' + (rawText || res.statusText)); }
                const j = rawText ? JSON.parse(rawText) : null;
                console.log('submitEditDesc: parsed response', j);
                if (!j?.success) return alert(j?.msg || j?.message || 'Update failed');
                transfer.description = val;
                const el = document.getElementById('descText'); if (el) el.innerText = val || '-';
                closeEditDesc();
                alert('Updated');
            }catch(e){ console.error('submitEditDesc: network error', e); alert('Network error: ' + e.message); }
        }
    </script>
