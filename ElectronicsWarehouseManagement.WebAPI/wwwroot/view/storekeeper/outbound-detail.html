<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Outbound Detail</title>
    <style>
        :root {
            --muted: #64748b;
            --accent: #ef4444
        }

        body {
            font-family: Inter, 'Segoe UI', Roboto, Arial, sans-serif;
            padding: 24px;
            background: #fff6f6;
            color: #0f172a
        }

        .container {
            max-width: 1000px;
            margin: 0 auto
        }

        .card {
            background: #fff;
            padding: 18px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(2, 6, 23, 0.06)
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px
        }

        .title {
            display: flex;
            flex-direction: column
        }

        h2 {
            margin: 0;
            font-size: 20px
        }

        .meta {
            color: var(--muted);
            font-size: 13px
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px
        }

        .info-block {
            background: #fff6f6;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ffefef
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid #f9f4f4;
            text-align: left
        }

        thead th {
            background: #fff1f0;
            color: #9f1239
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 14px
        }

        .btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer
        }

        .btn.danger {
            background: var(--accent);
            color: #fff
        }

        .btn.ghost {
            background: transparent;
            border: 1px solid #fdecec
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="title">
                    <button class="btn ghost" onclick="location.href='outbound-list.html'">⬅ Back</button>
                    <h2>Phiếu Xuất</h2>
                    <div class="meta">Chi tiết phiếu xuất kho</div>
                </div>
                <div style="text-align:right">
                    <div id="createdBy" class="meta">Người tạo: -</div>
                    <div id="createdAt" class="meta">Ngày tạo: -</div>
                </div>
            </div>

            <div id="detail"></div>

            <div id="confirmSection" style="display:none; margin-top:20px; background:#fef2f2; border:1px solid #fecaca; padding:16px; border-radius:8px">
                <h4 style="margin-top:0; color:#9f1239">Phân bổ Xuất kho (Outbound)</h4>
                <div style="margin-bottom:8px; color:#0f172a; font-size:14px">Vui lòng chọn sản phẩm, số lượng và Bin nguồn tương ứng để lấy hàng (có thể xuất từ nhiều Bin):</div>
                <table style="width:100%; text-align:left; background:#fff; border-radius:6px; border-collapse: collapse; margin-top:8px;" id="allocationTable">
                    <thead>
                        <tr style="border-bottom:1px solid #fecaca; background:#fef2f2;">
                            <th style="padding:8px">Sản phẩm</th>
                            <th style="padding:8px; width:200px;">Bin nguồn</th>
                            <th style="padding:8px; width:120px;">Số lượng</th>
                            <th style="padding:8px; width:60px;"></th>
                        </tr>
                    </thead>
                    <tbody id="allocationBody">
                    </tbody>
                </table>
                <button class="btn ghost" style="margin-top:12px; font-size:13px; border-color:#fecaca; color:#9f1239" onclick="addAllocationRow()">+ Thêm phân bổ</button>
            </div>

            <div class="actions">
                <button id="confirmBtn" class="btn danger" onclick="confirmOrder()" style="display:none">Xác nhận</button>
                <button class="btn ghost" onclick="location.href='outbound-list.html'">Quay lại</button>
            </div>
        </div>
    </div>

    <script>
        const BASE = "https://localhost:7297/api";
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        let transfer = null;
        const componentCache = {};
        const warehouseCache = {};
        const customerCache = {};

        async function load() {
            try {
                const res = await fetch(BASE + '/storekeeper/transfers/' + id, { credentials: 'include' });
                if (!res.ok) {
                    document.getElementById('detail').innerHTML = `<div style="color:#ef4444; font-weight:bold; padding:12px;">Lỗi tải dữ liệu phiếu xuất: Server trả về mã ${res.status}. Vui lòng thử tải lại trang hoặc chờ trong giây lát.</div>`;
                    return;
                }
                const json = await res.json();
                transfer = json.data;
                if (!transfer) {
                    document.getElementById('detail').innerHTML = `<div style="color:#ef4444; font-weight:bold; padding:12px;">Không tìm thấy thông tin phiếu xuất.</div>`;
                    return;
                }
            } catch (err) {
                document.getElementById('detail').innerHTML = `<div style="color:#ef4444; font-weight:bold; padding:12px;">Lỗi mạng hoặc máy chủ không phản hồi: ${err.message}</div>`;
                return;
            }

            // find related transfers that likely belong to the same outbound (same description and close creation time)
            let related = [];
            try {
                const listRes = await fetch(BASE + '/storekeeper/transfers', { credentials: 'include' });
                if (listRes.ok) {
                    const listJson = await listRes.json();
                    if (listJson?.success && Array.isArray(listJson.data)) {
                        const all = listJson.data.filter(t => t.type === 2);
                        const baseDesc = (transfer.description ?? '').toString();
                        const baseCreated = Date.parse(transfer.creation_date ?? transfer.creationDate ?? transfer.creationTime ?? transfer.CreationDate ?? '');
                        const baseCreator = transfer.creator_id ?? transfer.CreatorId ?? transfer.creator ?? transfer.Creator ?? null;
                        related = all.filter(t => {
                            try {
                                if ((t.description ?? '').toString() !== baseDesc) return false;
                                const tCreator = (t.creator_id ?? t.CreatorId ?? t.creator ?? t.Creator ?? '').toString();
                                const baseCreatorStr = (baseCreator ?? '').toString();
                                if (baseCreatorStr && tCreator && baseCreatorStr !== tCreator) return false;

                                const tCreated = Date.parse(t.creation_date ?? t.creationDate ?? t.creationTime ?? '');
                                if (!isNaN(baseCreated) && !isNaN(tCreated)) {
                                    return Math.abs(baseCreated - tCreated) <= 60000;
                                }
                                return true;
                            } catch (e) { return false; }
                        });
                    }
                }
            } catch (e) { /* ignore */ }

            // fetch full details for related transfers and aggregate (dedupe by id)
            const relatedDetails = [];
            const seen = new Set();
            // include original transfer first
            const mainId = transfer.request_id ?? transfer.RequestId ?? transfer.requestId ?? transfer.id ?? transfer.ID ?? null;
            if (mainId) { relatedDetails.push(transfer); seen.add(String(mainId)); }
            for (const r of related) {
                try {
                    const idToFetch = r.request_id ?? r.RequestId ?? r.requestId ?? r.id ?? r.ID;
                    if (!idToFetch) continue;
                    if (seen.has(String(idToFetch))) continue;
                    const dres = await fetch(BASE + '/storekeeper/transfers/' + idToFetch, { credentials: 'include' });
                    if (dres.ok) {
                        const djson = await dres.json();
                        if (djson?.success && djson.data) { relatedDetails.push(djson.data); seen.add(String(idToFetch)); }
                    }
                } catch (e) { /* ignore */ }
            }
            // ensure transfer itself is present
            if (!seen.has(String(mainId))) relatedDetails.unshift(transfer);
            transfer._related = relatedDetails;

            // resolve warehouses and component names across all related transfers
            const allComps = [];
            for (const t of relatedDetails) {
                try { await resolveWarehouses(t); } catch (e) { /* ignore */ }
                const compsT = getComponents(t) || [];
                compsT.forEach(c => allComps.push(c));
            }
            await resolveComponentNames(allComps);
            await resolveCustomers(relatedDetails);
            try {
                render();
            } catch (e) {
                console.error('render error', e);
                document.getElementById('detail').innerHTML = '<div style="color:#b91c1c;font-weight:600;padding:12px">Lỗi khi hiển thị chi tiết: ' + (e?.message || e) + '</div>';
            }

            // hiển thị nút confirm nếu status = 2 (Approved)
            if (transfer.status === 2) {
                document.getElementById('confirmSection').style.display = 'block';
                document.getElementById('confirmBtn').style.display = 'inline-block';
                loadBinsForConfirm();
            }

            async function resolveCustomers(transfers) {
                if (!Array.isArray(transfers) || transfers.length === 0) return;
                // try to fetch all customers once
                try {
                    const res = await fetch(BASE + '/storekeeper/customers', { credentials: 'include' });
                    if (!res.ok) return;
                    const json = await res.json();

                    if (!json?.success || !Array.isArray(json.data)) return;
                    json.data.forEach(c => { customerCache[c.id ?? c.customer_id ?? c.customerId] = c; });
                } catch (e) { /* ignore */ }
                transfers.forEach(t => {
                    const cid = t.customer_id ?? t.CustomerId ?? t.customerId ?? t.customer_id ?? null;
                    if (cid && customerCache[cid]) t._customerName = customerCache[cid].name ?? customerCache[cid].customer_name ?? customerCache[cid].displayName ?? customerCache[cid].fullName ?? null;
                });
            }
            // set created info (non-intrusive)
            try {
                const createdBy = transfer.created_by ?? transfer.createdBy ?? transfer.created_by_name ?? transfer.createdByName ?? transfer.owner ?? null;
                const createdAt = transfer.creation_date ?? transfer.creationDate ?? transfer.created_at ?? transfer.createdAt ?? null;
                if (document.getElementById('createdBy')) document.getElementById('createdBy').innerText = 'Người tạo: ' + (createdBy ?? 'Auto');
                if (document.getElementById('createdAt')) document.getElementById('createdAt').innerText = 'Ngày tạo: ' + (createdAt ? new Date(createdAt).toLocaleString('vi-VN') : '-');
            } catch (e) {/* ignore */ }
        }

        async function resolveWarehouses(t) {
            if (!t) return;
            try {
                // bin_from
                let binFrom = t.bin_from ?? t.binFrom ?? null;
                const binFromId = binFrom?.id ?? binFrom?.ID ?? t.bin_from_id ?? t.binFromId;
                if (binFromId && (!binFrom || !(binFrom.location_in_warehouse || binFrom.locationInWarehouse || binFrom.binCode))) {
                    try {
                        const bres = await fetch(BASE + '/storekeeper/bins/' + binFromId, { credentials: 'include' });
                        if (bres.ok) {
                            const bjson = await bres.json();
                            if (bjson?.success && bjson.data) { t.bin_from = bjson.data; binFrom = bjson.data; }
                        }
                    } catch (e) { }
                }

                if (binFrom) {
                    const w = binFrom.warehouse ?? binFrom.Warehouse ?? null;
                    const wid = (typeof binFrom.warehouse === 'object') ? (binFrom.warehouse?.id) : (binFrom.warehouse ?? binFrom.warehouse_id ?? binFrom.warehouseId ?? binFrom.WarehouseId);
                    const needFetch = !w || (typeof w !== 'object');
                    if (needFetch && wid && !warehouseCache[wid]) {
                        try {
                            const wres = await fetch(BASE + '/storekeeper/warehouses/' + wid, { credentials: 'include' });
                            if (wres.ok) {
                                const wjson = await wres.json();
                                if (wjson?.success && wjson.data) warehouseCache[wid] = wjson.data;
                            }
                        } catch (e) { }
                    }
                    if (warehouseCache[wid]) binFrom.warehouse = warehouseCache[wid];
                }

                // bin_to
                let binTo = t.bin_to ?? t.binTo ?? null;
                const binToId = binTo?.id ?? binTo?.ID ?? t.bin_to_id ?? t.binToId;
                if (binToId && (!binTo || !(binTo.location_in_warehouse || binTo.locationInWarehouse || binTo.binCode))) {
                    try {
                        const bres2 = await fetch(BASE + '/storekeeper/bins/' + binToId, { credentials: 'include' });
                        if (bres2.ok) {
                            const bjson2 = await bres2.json();
                            if (bjson2?.success && bjson2.data) { t.bin_to = bjson2.data; binTo = bjson2.data; }
                        }
                    } catch (e) { }
                }

                if (binTo) {
                    const w3 = binTo.warehouse ?? binTo.Warehouse ?? null;
                    const wid3 = (typeof binTo.warehouse === 'object') ? (binTo.warehouse?.id) : (binTo.warehouse ?? binTo.warehouse_id ?? binTo.warehouseId ?? binTo.WarehouseId);
                    const needFetch3 = !w3 || (typeof w3 !== 'object');
                    if (needFetch3 && wid3 && !warehouseCache[wid3]) {
                        try {
                            const wres3 = await fetch(BASE + '/storekeeper/warehouses/' + wid3, { credentials: 'include' });
                            if (wres3.ok) {
                                const wjson3 = await wres3.json();
                                if (wjson3?.success && wjson3.data) warehouseCache[wid3] = wjson3.data;
                            }
                        } catch (e) { }
                    }
                    if (warehouseCache[wid3]) binTo.warehouse = warehouseCache[wid3];
                }
            } catch (e) { console.error('resolveWarehouses failed', e); }
        }

        async function resolveComponentNames(comps) {
            if (!Array.isArray(comps)) return;
            await Promise.all(comps.map(async c => {
                const currentName = getComponentName(c);
                if (currentName && !currentName.startsWith('Component #')) return;
                const id = c.component_id ?? c.componentId ?? c.component?.id;
                if (!id) return;
                if (componentCache[id]) {
                    c.component = c.component ?? {};
                    c.component.metadata = componentCache[id].metadata ?? componentCache[id].Metadata ?? componentCache[id];
                    return;
                }
                try {
                    const cres = await fetch(BASE + '/storekeeper/components/' + id, { credentials: 'include' });
                    if (!cres.ok) return;
                    const cjson = await cres.json();
                    if (cjson?.success && cjson.data) {
                        componentCache[id] = cjson.data;
                        c.component = c.component ?? {};
                        c.component.metadata = cjson.data.metadata ?? cjson.data.Metadata ?? cjson.data;
                    }
                } catch (e) { console.error('component fetch failed', e); }
            }));
        }

        function getComponents(obj) {
            if (!obj) return [];
            const keys = ['components', 'Components', 'transfer_request_components', 'transferRequestComponents', 'TransferRequestComponents', 'data'];
            for (const k of keys) if (Array.isArray(obj[k])) return obj[k];
            for (const k of Object.keys(obj)) {
                if (Array.isArray(obj[k]) && obj[k].length > 0 && (obj[k][0].quantity !== undefined || obj[k][0].component_id !== undefined))
                    return obj[k];
            }
            return [];
        }

        function getComponentName(c) {
            return c?.name ?? c?.Name ?? c?.metadata?.name ?? c?.Metadata?.name ?? c?.component?.metadata?.name ?? c?.component?.metadata?.Name ?? ('Component #' + (c.component_id ?? c.componentId ?? c.component?.id ?? '?'));
        }

        function getCustomerInfo(t) {
            if (!t) return null;
            // try several fields
            const c = t.customer ?? t.customer_info_json ?? t.customer_info ?? t.customer_info_json_parsed ?? null;
            if (c) {
                if (typeof c === 'string') {
                    try { const parsed = JSON.parse(c); return parsed.name ?? parsed.displayName ?? parsed.fullname ?? parsed.contact ?? parsed.company ?? c; } catch (e) { return c; }
                }
                return c.name ?? c.displayName ?? c.fullname ?? c.company ?? JSON.stringify(c);
            }
            // fallback to customer_id
            const id = t.customer_id ?? t.customerId ?? t.customerId ?? null;
            if (id) return 'Customer ID: ' + id;
            return null;
        }

        let globalProductsMap = {}; // compId -> { name, total }

        function render() {
            if (!transfer) return;
            function getStatusText(status) {
                switch (status) {
                    case 0: return 'Unknown';
                    case 1: return 'Pending';
                    case 2: return 'Approved - Waiting Confirm';
                    case 3: return 'Rejected';
                    default: return 'Completed';
                }
            }
            // If we have related transfers grouped (multiple source bins for one outbound), aggregate info
            const related = transfer._related ?? [transfer];

            const statusSet = new Set(related.map(t => t.status ?? t.Status ?? 0));
            let statusText = statusSet.size === 1 ? getStatusText(Array.from(statusSet)[0]) : 'Multiple';

            // collect bins and warehouses (deduped)
            const binSet = new Set();
            const bins = [];
            const productsMap = {}; // compId -> { name, total }

            related.forEach(t => {
                const binFrom = t.bin_from ?? t.binFrom ?? null;
                const binName = binFrom ? (binFrom.location_in_warehouse ?? binFrom.locationInWarehouse ?? binFrom.binCode ?? binFrom.code ?? (binFrom.id ?? binFrom.ID)) : (t.bin_from_id ?? t.binFromId ?? '-');
                const whName = (binFrom?.warehouse?.warehouseName ?? binFrom?.warehouse?.name ?? binFrom?.warehouse) ?? (t._fromWarehouseName ?? '-');
                const key = `${whName}||${binName}`;
                if (!binSet.has(key)) { binSet.add(key); bins.push({ warehouse: whName, bin: binName }); }

                const comps = getComponents(t);
                comps.forEach(c => {
                    const cid = c.component_id ?? c.componentId ?? c.component?.id ?? 'unknown';
                    const name = getComponentName(c);
                    const qty = parseFloat(c.quantity ?? c.Quantity ?? c.qty ?? 0) || 0;
                    if (!productsMap[cid]) productsMap[cid] = { name: name, total: 0 };
                    productsMap[cid].total += qty;
                });
            });
            globalProductsMap = productsMap;

            let html = `
                <div class="info-grid">
                    <div class="info-block">
                        <div style="font-weight:700">Description</div>
                        <div class="meta">${transfer.description ?? '-'}</div>
                    </div>
                    <div class="info-block">
                        <div style="font-weight:700">Status</div>
                        <div class="meta">${statusText}</div>
                        <div style="height:8px"></div>
                        <div style="font-weight:700">From Warehouse / Bin(s)</div>
                        <div class="meta">${bins.map(b => b.warehouse + ' / ' + b.bin).join('<br/>')}</div>
                        <div style="height:6px"></div>
                        <div style="font-weight:700">Customer</div>
                        <div class="meta">${transfer._customerName ?? getCustomerInfo(transfer) ?? (transfer.customer_id ? ('Customer ID: ' + transfer.customer_id) : '-')}</div>
                    </div>
                </div>
                <hr />
                <h4>Products (aggregated)</h4>
                <div class="table-card">
                    <table>
                        <thead>
                            <tr><th>Name</th><th style="width:120px">Số lượng</th></tr>
                        </thead>
                        <tbody>
`;

            Object.values(productsMap).forEach(p => {
                html += `<tr><td>${p.name}</td><td>${p.total}</td></tr>`;
            });

            html += `</tbody></table></div>`;

            document.getElementById('detail').innerHTML = html;

            // show confirm button for statuses that require confirmation
            if (transfer.status === 2) {
                document.getElementById('confirmBtn').style.display = 'inline-block';
            } else {
                document.getElementById('confirmBtn').style.display = 'none';
            }
        }

        let availableBins = [];
        let orderProducts = [];
        let binAvailabilityByBin = {};

        async function loadBinsForConfirm() {
            try {
                // Populate orderProducts from productsMap
                orderProducts = Object.keys(globalProductsMap).map(cid => ({
                    id: cid,
                    name: globalProductsMap[cid].name,
                    maxQty: globalProductsMap[cid].total
                }));

                // Add initial row for each product
                document.getElementById('allocationBody').innerHTML = '';
                orderProducts.forEach(p => addAllocationRow(p.id, p.maxQty));

                let wId = transfer.warehouse_from_id ?? transfer.warehouseFromId ?? transfer.warehouse?.id ?? transfer.warehouse_id;
                if (!wId && transfer.bin_from) wId = transfer.bin_from.warehouse?.id ?? transfer.bin_from.warehouse_id ?? transfer.bin_from.warehouseId;
                if (!wId && transfer.bin_to) wId = transfer.bin_to.warehouse?.id ?? transfer.bin_to.warehouse_id ?? transfer.bin_to.warehouseId;
                
                if (!wId) {
                    console.warn('Không tìm thấy kho nguồn.');
                    return;
                }
                const res = await fetch(BASE + '/storekeeper/warehouses/' + wId, { credentials: 'include' });
                if (!res.ok) return;
                const json = await res.json();
                if (!json.success || !json.data) return;
                availableBins = json.data.bins ?? json.data;
                
                // Reload rows with populated bins
                document.getElementById('allocationBody').innerHTML = '';
                orderProducts.forEach(p => addAllocationRow(p.id, p.maxQty));

                // Load stock for all available bins sequentially to allow validation later
                for (let b of availableBins) {
                    const binId = b.id ?? b.ID ?? b.binId;
                    if (!binId) continue;
                    try {
                        const bres = await fetch(BASE + '/storekeeper/bins/' + binId, { credentials: 'include' });
                        if (!bres.ok) continue;
                        const bjson = await bres.json();
                        if (bjson?.success) {
                            const dataArr = Array.isArray(bjson.data) ? bjson.data : (Array.isArray(bjson.data?.components) ? bjson.data.components : null);
                            if (Array.isArray(dataArr)) {
                                binAvailabilityByBin[binId] = {};
                                for (const cb of dataArr) {
                                    const cid = cb.component_id ?? cb.ComponentId ?? cb.componentId ?? cb.component?.componentId ?? cb.component?.id;
                                    const qty = parseFloat(cb.quantity ?? cb.Quantity ?? cb.component?.quantity ?? cb.Quantity ?? 0) || 0;
                                    if (cid) binAvailabilityByBin[binId][cid] = qty;
                                }
                            }
                        }
                    } catch(e) { }
                }
            } catch (e) {
                console.error('loadBins err', e);
            }
        }

        function addAllocationRow(defaultProductId = '', defaultQty = '') {
            const tbody = document.getElementById('allocationBody');
            const row = document.createElement('tr');
            row.style.borderBottom = '1px solid #f9fafb';

            let productOptions = '<option value="">-- Chọn sản phẩm --</option>';
            orderProducts.forEach(p => {
                const selected = p.id == defaultProductId ? 'selected' : '';
                productOptions += `<option value="${p.id}" ${selected}>${p.name} (cần xuất: ${p.maxQty})</option>`;
            });

            let binOptions = '<option value="">-- Chọn Bin --</option>';
            availableBins.forEach(b => {
                const lbl = b.location_in_warehouse ?? b.locationInWarehouse ?? b.binCode ?? ('Bin ' + b.id);
                binOptions += `<option value="${b.id ?? b.ID ?? b.binId}">${lbl}</option>`;
            });

            row.innerHTML = `
                <td style="padding:8px"><select class="alloc-product" style="width:100%; padding:6px; border-radius:4px; border:1px solid #ccc">${productOptions}</select></td>
                <td style="padding:8px"><select class="alloc-bin" style="width:100%; padding:6px; border-radius:4px; border:1px solid #ccc">${binOptions}</select></td>
                <td style="padding:8px"><input type="number" class="alloc-qty" value="${defaultQty}" min="1" style="width:100px; padding:6px; border-radius:4px; border:1px solid #ccc"></td>
                <td style="padding:8px; text-align:center"><button class="btn ghost" style="color:#ef4444; border-color:#fca5a5; padding:4px 8px" onclick="this.closest('tr').remove()">X</button></td>
            `;
            tbody.appendChild(row);
        }

        async function confirmOrder() {
            if (!confirm('Xác nhận xuất kho với các phân bổ này?')) return;

            const related = transfer._related ?? [transfer];
            const isValidStatus = related.some(t => t.status === 2 || t.status === 1);
            if (!isValidStatus) return alert('Phiếu này không ở trạng thái chờ xác nhận.');

            const rows = Array.from(document.querySelectorAll('#allocationBody tr'));
            if (rows.length === 0) return alert('Vui lòng thêm ít nhất 1 phân bổ.');

            // Validate allocations
            const allocationSummary = {}; // product_id -> total allocated
            const globalBinsFromPayload = {}; // bin_id -> { component_id: qty }

            for (let i = 0; i < rows.length; i++) {
                const r = rows[i];
                const pId = r.querySelector('.alloc-product').value;
                const bId = r.querySelector('.alloc-bin').value;
                const qty = Number(r.querySelector('.alloc-qty').value) || 0;

                if (!pId) return alert(`Dòng ${i+1}: Vui lòng chọn sản phẩm.`);
                if (!bId) return alert(`Dòng ${i+1}: Vui lòng chọn Bin.`);
                if (qty <= 0) return alert(`Dòng ${i+1}: Số lượng phải lớn hơn 0.`);

                // validate against stock
                const stock = (binAvailabilityByBin[bId] && binAvailabilityByBin[bId][pId]) ? binAvailabilityByBin[bId][pId] : 0;
                let alreadyAllocated = globalBinsFromPayload[bId]?.[pId] || 0;
                if (qty + alreadyAllocated > stock) {
                    const pNameElem = r.querySelector('.alloc-product');
                    const bNameElem = r.querySelector('.alloc-bin');
                    const pName = pNameElem.options[pNameElem.selectedIndex]?.text.split(' (')[0] || pId;
                    const bName = bNameElem.options[bNameElem.selectedIndex]?.text || bId;
                    return alert(`Dòng ${i+1}: Tồn kho của [${bName}] không đủ! (Chỉ còn ${stock} cho sản phẩm "${pName}")`);
                }

                allocationSummary[pId] = (allocationSummary[pId] || 0) + qty;

                if (!globalBinsFromPayload[bId]) globalBinsFromPayload[bId] = {};
                globalBinsFromPayload[bId][pId] = (globalBinsFromPayload[bId][pId] || 0) + qty;
            }

            // Check if allocations match request exactly (optional but good practice)
            for (const p of orderProducts) {
                const sum = allocationSummary[p.id] || 0;
                if (sum !== p.maxQty) {
                    return alert(`Sản phẩm "${p.name}" được yêu cầu xuất ${p.maxQty}, nhưng bạn đã phân bổ tổng ${sum}. Vui lòng phân bổ cho khớp.`);
                }
            }

            let errMsg = '';
            let allSuccess = true;

            // Fulfill the related transfers exactly using the global binsFromPayload
            for (const t of related) {
                const reqId = t.id ?? t.ID ?? t.request_id ?? t.requestId ?? t.RequestId;
                if (!reqId || t.status === 4 || t.status === 0 || t.status === 3) continue;

                const comps = getComponents(t) || [];
                const compsPayload = comps.map(c => ({ component_id: c.component_id ?? c.componentId ?? c.component?.id, quantity: Number((c.quantity ?? c.qty ?? c.Quantity) || 0) }));

                if (compsPayload.length === 0) continue;

                const binsFrom = [];
                for (const comp of compsPayload) {
                    let qtyRemaining = comp.quantity;
                    for (const [binId, compsMap] of Object.entries(globalBinsFromPayload)) {
                        if (qtyRemaining <= 0) break;
                        const avail = compsMap[comp.component_id] || 0;
                        if (avail > 0) {
                            const take = Math.min(qtyRemaining, avail);
                            compsMap[comp.component_id] -= take;
                            qtyRemaining -= take;
                            
                            let existingBin = binsFrom.find(b => b.bin_id === parseInt(binId));
                            if (!existingBin) {
                                existingBin = { bin_id: parseInt(binId), components: [] };
                                binsFrom.push(existingBin);
                            }
                            existingBin.components.push({ component_id: parseInt(comp.component_id), quantity: take });
                        }
                    }
                    if (qtyRemaining > 0) {
                        errMsg = 'Hệ thống không thể khớp phân bổ với đơn hàng ban đầu. Vui lòng tải lại trang và thử lại.';
                        allSuccess = false;
                        break;
                    }
                }
                
                if (!allSuccess) break;

                const payload = { request_id: reqId, bins_from: binsFrom };

                try {
                    const res = await fetch(BASE + '/storekeeper/transfers/confirm', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(payload)
                    });
                    if (!res.ok) {
                        const txt = await res.text().catch(() => null);
                        allSuccess = false;
                        let msg = txt || res.statusText;
                        try { const obj = JSON.parse(txt); if (obj.msg || obj.message) msg = obj.msg || obj.message; } catch (e) { }
                        errMsg = msg;
                        break;
                    }
                    const json = await res.json();
                    if (!json?.success) {
                        allSuccess = false;
                        errMsg = json?.msg || json?.message || 'Lỗi xử lý';
                        break;
                    }
                } catch (e) {
                    allSuccess = false;
                    errMsg = e.message;
                    break;
                }
            }

            if (allSuccess) {
                alert('Đã xác nhận xuất kho thành công!');
                location.href = 'outbound-list.html';
            } else {
                alert('Xác nhận một phần thất bại: ' + errMsg);
                location.reload();
            }
        }

        load();
    </script>
</body>
