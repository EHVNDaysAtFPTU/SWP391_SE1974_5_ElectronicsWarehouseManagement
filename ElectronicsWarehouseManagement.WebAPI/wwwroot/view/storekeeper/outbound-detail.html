<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Outbound Detail</title>
    <style>
        :root{--muted:#64748b;--accent:#ef4444}
        body{font-family:Inter, 'Segoe UI', Roboto, Arial, sans-serif;padding:24px;background:#fff6f6;color:#0f172a}
        .container{max-width:1000px;margin:0 auto}
        .card{background:#fff;padding:18px;border-radius:12px;box-shadow:0 10px 30px rgba(2,6,23,0.06)}
        .header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
        .title{display:flex;flex-direction:column}
        h2{margin:0;font-size:20px}
        .meta{color:var(--muted);font-size:13px}
        .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
        .info-block{background:#fff6f6;padding:12px;border-radius:8px;border:1px solid #ffefef}
        table{width:100%;border-collapse:collapse;margin-top:12px}
        th,td{padding:10px;border-bottom:1px solid #f9f4f4;text-align:left}
        thead th{background:#fff1f0;color:#9f1239}
        .actions{display:flex;gap:8px;margin-top:14px}
        .btn{padding:8px 12px;border-radius:8px;border:none;cursor:pointer}
        .btn.danger{background:var(--accent);color:#fff}
        .btn.ghost{background:transparent;border:1px solid #fdecec}
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="title">
                    <button class="btn ghost" onclick="location.href='outbound-list.html'">⬅ Back</button>
                    <h2>Phiếu Xuất</h2>
                    <div class="meta">Chi tiết phiếu xuất kho</div>
                </div>
                <div style="text-align:right">
                    <div id="createdBy" class="meta">Người tạo: -</div>
                    <div id="createdAt" class="meta">Ngày tạo: -</div>
                </div>
            </div>

            <div id="detail"></div>

            <div class="actions">
                <button id="confirmBtn" class="btn danger" onclick="confirmOrder()" style="display:none">Xác nhận</button>
                <button class="btn ghost" onclick="location.href='outbound-list.html'">Quay lại</button>
            </div>
        </div>
    </div>

    <script>
        const BASE = "https://localhost:7297/api";
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        let transfer = null;
        const componentCache = {};
        const warehouseCache = {};

        async function load() {
            const res = await fetch(BASE + '/storekeeper/transfers/' + id, { credentials: 'include' });
            const json = await res.json();
            transfer = json.data;

            const comps = getComponents(transfer);
            await resolveComponentNames(comps);
            await resolveWarehouses(transfer);
            render();
            // set created info (non-intrusive)
            try{
                const createdBy = transfer.created_by ?? transfer.createdBy ?? transfer.created_by_name ?? transfer.createdByName ?? transfer.owner ?? null;
                const createdAt = transfer.creation_date ?? transfer.creationDate ?? transfer.created_at ?? transfer.createdAt ?? null;
                if(document.getElementById('createdBy')) document.getElementById('createdBy').innerText = 'Người tạo: ' + (createdBy ?? 'Auto');
                if(document.getElementById('createdAt')) document.getElementById('createdAt').innerText = 'Ngày tạo: ' + (createdAt ? new Date(createdAt).toLocaleString('vi-VN') : '-');
            }catch(e){/* ignore */}
        }

        async function resolveWarehouses(t) {
            if (!t) return;
            try {
                const binFrom = t.bin_from ?? t.binFrom ?? null;
                if (binFrom) {
                    const w = binFrom.warehouse ?? binFrom.Warehouse ?? null;
                    const wid = (typeof binFrom.warehouse === 'object') ? (binFrom.warehouse?.id) : (binFrom.warehouse ?? binFrom.warehouse_id ?? binFrom.warehouseId ?? binFrom.WarehouseId);
                    const needFetch = !w || (typeof w !== 'object');
                    if (needFetch && wid && !warehouseCache[wid]) {
                        try {
                            const wres = await fetch(BASE + '/storekeeper/warehouses/' + wid, { credentials: 'include' });
                            if (wres.ok) {
                                const wjson = await wres.json();
                                if (wjson?.success && wjson.data) warehouseCache[wid] = wjson.data;
                            }
                        } catch (e) { console.error('warehouse fetch failed', e); }
                    }
                    if (warehouseCache[wid]) binFrom.warehouse = warehouseCache[wid];
                }
                // if binFrom exists but lacks location, try fetch full bin
                try{
                    const binFromId = binFrom?.id ?? binFrom?.ID ?? t.bin_from_id ?? t.binFromId;
                    if(binFromId && !(binFrom.location_in_warehouse || binFrom.locationInWarehouse || binFrom.binCode)){
                        const bres = await fetch(BASE + '/storekeeper/bins/' + binFromId, { credentials: 'include' });
                        if(bres.ok){ const bjson = await bres.json(); if(bjson?.success && bjson.data) t.bin_from = bjson.data; }
                    }
                }catch(e){ /* ignore */ }
                // also resolve bin_to if present
                const binTo = t.bin_to ?? t.binTo ?? null;
                if (binTo) {
                    const w3 = binTo.warehouse ?? binTo.Warehouse ?? null;
                    const wid3 = (typeof binTo.warehouse === 'object') ? (binTo.warehouse?.id) : (binTo.warehouse ?? binTo.warehouse_id ?? binTo.warehouseId ?? binTo.WarehouseId);
                    const needFetch3 = !w3 || (typeof w3 !== 'object');
                    if (needFetch3 && wid3 && !warehouseCache[wid3]) {
                        try {
                            const wres3 = await fetch(BASE + '/storekeeper/warehouses/' + wid3, { credentials: 'include' });
                            if (wres3.ok) {
                                const wjson3 = await wres3.json();
                                if (wjson3?.success && wjson3.data) warehouseCache[wid3] = wjson3.data;
                            }
                        } catch (e) { console.error('warehouse fetch failed', e); }
                    }
                    if (warehouseCache[wid3]) binTo.warehouse = warehouseCache[wid3];
                    // if binTo exists but lacks location, try fetch full bin
                    try{
                        const binToId = binTo?.id ?? binTo?.ID ?? t.bin_to_id ?? t.binToId;
                        if(binToId && !(binTo.location_in_warehouse || binTo.locationInWarehouse || binTo.binCode)){
                            const bres2 = await fetch(BASE + '/storekeeper/bins/' + binToId, { credentials: 'include' });
                            if(bres2.ok){ const bjson2 = await bres2.json(); if(bjson2?.success && bjson2.data) t.bin_to = bjson2.data; }
                        }
                    }catch(e){ /* ignore */ }
                }
            } catch (e) { console.error('resolveWarehouses failed', e); }
        }

        async function resolveComponentNames(comps) {
            if (!Array.isArray(comps)) return;
            await Promise.all(comps.map(async c => {
                const currentName = getComponentName(c);
                if (currentName && !currentName.startsWith('Component #')) return;
                const id = c.component_id ?? c.componentId ?? c.component?.id;
                if (!id) return;
                if (componentCache[id]) {
                    c.component = c.component ?? {};
                    c.component.metadata = componentCache[id].metadata ?? componentCache[id].Metadata ?? componentCache[id];
                    return;
                }
                try {
                    const cres = await fetch(BASE + '/storekeeper/components/' + id, { credentials: 'include' });
                    if (!cres.ok) return;
                    const cjson = await cres.json();
                    if (cjson?.success && cjson.data) {
                        componentCache[id] = cjson.data;
                        c.component = c.component ?? {};
                        c.component.metadata = cjson.data.metadata ?? cjson.data.Metadata ?? cjson.data;
                    }
                } catch (e) { console.error('component fetch failed', e); }
            }));
        }

        function getComponents(obj) {
            if (!obj) return [];
            const keys = ['components', 'Components', 'transfer_request_components', 'transferRequestComponents', 'TransferRequestComponents', 'data'];
            for (const k of keys) if (Array.isArray(obj[k])) return obj[k];
            for (const k of Object.keys(obj)) {
                if (Array.isArray(obj[k]) && obj[k].length > 0 && (obj[k][0].quantity !== undefined || obj[k][0].component_id !== undefined))
                    return obj[k];
            }
            return [];
        }

        function getComponentName(c) {
            return c?.name ?? c?.Name ?? c?.metadata?.name ?? c?.Metadata?.name ?? c?.component?.metadata?.name ?? c?.component?.metadata?.Name ?? ('Component #' + (c.component_id ?? c.componentId ?? c.component?.id ?? '?'));
        }

        function render() {
            if (!transfer) return;
            function getStatusText(status){
                switch(status){
                    case 0: return 'Unknown';
                    case 1: return 'Pending';
                    case 2: return 'Approved - Waiting Confirm';
                    case 3: return 'Rejected';
                    default: return 'Completed';
                }
            }

            const fromWarehouse = transfer.bin_from?.warehouse?.warehouseName ?? transfer.bin_from?.warehouse?.name ?? '-';
            const fromBin = transfer.bin_from?.location_in_warehouse ?? transfer.bin_from?.locationInWarehouse ?? transfer.bin_from?.binCode ?? transfer.bin_from?.code ?? '-';
            const toWarehouse = transfer.bin_to?.warehouse?.warehouseName ?? transfer.bin_to?.warehouse?.name ?? '-';
            const toBin = transfer.bin_to?.location_in_warehouse ?? transfer.bin_to?.locationInWarehouse ?? transfer.bin_to?.binCode ?? transfer.bin_to?.code ?? '-';
            const statusText = getStatusText(transfer.status);

            let html = `
                <div class="info-grid">
                    <div class="info-block">
                        <div style="font-weight:700">Description</div>
                        <div class="meta">${transfer.description ?? '-'}</div>
                    </div>
                    <div class="info-block">
                        <div style="font-weight:700">Status</div>
                        <div class="meta">${statusText}</div>
                        <div style="height:8px"></div>
                        <div style="font-weight:700">From Warehouse / Bin</div>
                        <div class="meta">${fromWarehouse} / ${fromBin}</div>
                        <div style="height:6px"></div>
                        <div style="font-weight:700">To Warehouse / Bin</div>
                        <div class="meta">${toWarehouse} / ${toBin}</div>
                    </div>
                </div>
                <hr />
                <h4>Products</h4>
                <div class="table-card">
                    <table>
                        <thead>
                            <tr><th>Name</th><th style="width:120px">Số lượng</th></tr>
                        </thead>
                        <tbody>
`;

            const comps = getComponents(transfer);
            comps.forEach(c => {
                const name = getComponentName(c);
                const qty = c.quantity ?? c.Quantity ?? c.qty ?? 0;
                html += `<tr><td>${name}</td><td>${qty}</td></tr>`;
            });

            html += `</tbody></table></div>`;

            document.getElementById('detail').innerHTML = html;

            // show confirm button for statuses that require confirmation
            if (transfer.status === 2) {
                document.getElementById('confirmBtn').style.display = 'inline-block';
            } else {
                document.getElementById('confirmBtn').style.display = 'none';
            }
        }

        async function confirmOrder() {
            if (!confirm('Xác nhận đơn?')) return;

            const comps = getComponents(transfer);
            const payload = {
                request_id: transfer.id,
                bins: [{
                    bin_id: transfer.bin_from_id ?? transfer.binFromId ?? transfer.bin_from?.id ?? transfer.bin_from?.ID ?? null,
                    components: comps.map(c => ({ component_id: c.component_id ?? c.componentId ?? c.component?.id, quantity: c.quantity ?? c.qty ?? c.Quantity }))
                }]
            };

            const res = await fetch(BASE + '/storekeeper/confirm-transfer', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(payload)
            });
            const json = await res.json();
            if (json?.success) {
                alert('Confirmed');
                location.href = 'outbound-list.html';
            } else {
                alert(json?.msg ?? json?.message ?? 'Error');
            }
        }

        load();
    </script>
</body>
</html>
