<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phiếu Chuyển Kho</title>

    <style>
        body {
            font-family: Segoe UI;
            background: #eef2f7;
            padding: 30px
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,.08)
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600
        }

        .back {
            background: #64748b;
            color: white
        }

        .add {
            background: #2563eb;
            color: white;
            margin-top: 15px
        }

        .save {
            background: #f59e0b;
            color: white;
            margin-top: 20px
        }

        .remove {
            background: #ef4444;
            color: white
        }

        input, select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            width: 100%
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px
        }

        th, td {
            border: 1px solid #e5e7eb;
            padding: 8px;
            text-align: center
        }

        th {
            background: #f1f5f9
        }

        .total {
            text-align: right;
            font-weight: bold;
            margin-top: 10px
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.4);
            display: none;
            justify-content: center;
            align-items: center
        }

        .modal-box {
            background: white;
            width: 600px;
            max-height: 500px;
            overflow: auto;
            padding: 20px;
            border-radius: 12px
        }

        .modal-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer
        }

            .modal-item:hover {
                background: #f1f5f9
            }
    </style>
</head>

<body>

    <div class="card">

        <div class="top" style="align-items:flex-start">
            <div>
                <h2>🔄 PHIẾU CHUYỂN KHO</h2>
                <p style="margin:6px 0 0 0;color:#6b7280;font-size:13px">Tạo phiếu chuyển nội bộ giữa các bin.</p>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px">
                <div>
                    <button class="back btn ghost" onclick="location.href='home.html'">⬅ Quay lại</button>
                    <button class="btn primary" onclick="openModal()">+ Thêm sản phẩm</button>
                </div>
                <div style="background:#fbfdff;border:1px solid #eef2ff;padding:8px;border-radius:8px;width:260px">
                    <div style="font-size:13px;color:#6b7280">Người tạo</div>
                    <div id="createdBy" style="font-weight:600">Auto</div>
                    <div style="height:8px"></div>
                    <div style="font-size:13px;color:#6b7280">Ngày tạo</div>
                    <div id="createdAt">-</div>
                </div>
            </div>
        </div>

        <br>

        <label>Mô tả:</label>
        <input id="desc">

        <br><br>

        <div class="row">
            <div>
                <label>Kho xuất:</label>
                <select id="warehouseFrom" onchange="loadBinsFrom()"></select>
            </div>

            <div>
                <label>Bin xuất:</label>
                <div style="display:flex;gap:8px;align-items:center">
                    <select id="binFrom" multiple style="height:120px;flex:1"></select>
                    <div style="display:flex;flex-direction:column;gap:6px">
                        <button type="button" onclick="selectAllBins(true)" style="padding:6px 8px;border-radius:6px;">Chọn tất cả</button>
                        <button type="button" onclick="selectAllBins(false)" style="padding:6px 8px;border-radius:6px;">Bỏ chọn</button>
                    </div>
                </div>
            </div>
        </div>

        <br>

        <div class="row">
            <div>
                <label>Kho nhập:</label>
                <select id="warehouseTo" onchange="loadBinsTo()"></select>
            </div>

            <div>
                <label>Bin nhập:</label>
                <select id="binTo"></select>
            </div>
        </div>

        <button class="add" onclick="openModal()">+ Thêm sản phẩm</button>

        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Tên hàng</th>
                    <th>Đơn vị</th>
                    <th>Số lượng</th>
                    <th>X</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="total">
            Tổng số lượng: <span id="totalMoney">0</span>
        </div>

        <button class="save" onclick="submitTransfer()">Lưu Phiếu</button>

    </div>

    <!-- MODAL -->
    <div id="modal" class="modal">
        <div class="modal-box">
            <h3>Danh sách sản phẩm</h3>
            <div id="productList"></div>
            <br>
            <button onclick="closeModal()">Đóng</button>
        </div>
    </div>

    <script>

        const BASE = "https://localhost:7297/api/storekeeper";
        let components = [];
        let count = 0;

        /* LOAD WAREHOUSE */
        async function loadWarehouses() {
            try {
                const res = await fetch(BASE + "/warehouses", { credentials: "include" });
                if (!res.ok) { console.error(await res.text()); return alert('API warehouse lỗi'); }
                const json = await res.json();
                if (!json.success || !json.data) return alert('Không load được warehouse');

                const from = document.getElementById('warehouseFrom');
                const to = document.getElementById('warehouseTo');
                from.innerHTML = '';
                to.innerHTML = '';

                json.data.forEach(w => {
                    const id = w.warehouseId ?? w.id;
                    const name = w.warehouseName ?? w.name ?? id;
                    from.innerHTML += `<option value="${id}">${name}</option>`;
                    to.innerHTML += `<option value="${id}">${name}</option>`;
                });

                loadBinsFrom();
                loadBinsTo();
            }
            catch (err) { console.error('loadWarehouses error', err); alert('Lỗi khi load warehouse'); }
        }

        /* LOAD BIN FROM */
        async function loadBinsFrom() {
            try {
                const wid = document.getElementById('warehouseFrom').value;
                const select = document.getElementById('binFrom');
                select.innerHTML = '';
                if (!wid) return;
                const res = await fetch(BASE.replace('/storekeeper','') + '/storekeeper/warehouses/' + wid, { credentials: 'include' });
                if (!res.ok) { console.error(await res.text()); return alert('API bins lỗi'); }
                const json = await res.json();
                if (!json.success || !json.data) return alert('Không load được bin');

                const bins = json.data.bins ?? json.data;
                bins.forEach(b => {
                    const id = b.id ?? b.ID ?? b.binId;
                    const code = b.location_in_warehouse ?? b.locationInWarehouse ?? b.binCode ?? 'Bin #' + id;
                    select.innerHTML += `<option value="${id}">${code}</option>`;
                });
                // when user changes selection (multi-select), reload availability
                select.addEventListener('change', function(){ loadSelectedBinsContents(); });
                // load availability for initially selected bins
                await loadSelectedBinsContents();
            }
            catch (err) { console.error('loadBinsFrom error', err); alert('Lỗi khi load bin'); }
        }

        // Select or deselect all options in the binFrom select
        function selectAllBins(selectAll) {
            const sel = document.getElementById('binFrom');
            if(!sel) return;
            for (let i = 0; i < sel.options.length; i++) sel.options[i].selected = !!selectAll;
            loadSelectedBinsContents();
        }

        /* LOAD BIN TO */
        async function loadBinsTo() {
            try {
                const wid = document.getElementById('warehouseTo').value;
                const select = document.getElementById('binTo');
                select.innerHTML = '';
                if (!wid) return;
                const res = await fetch(BASE.replace('/storekeeper','') + '/storekeeper/warehouses/' + wid, { credentials: 'include' });
                if (!res.ok) { console.error(await res.text()); return alert('API bins lỗi'); }
                const json = await res.json();
                if (!json.success || !json.data) return alert('Không load được bin');

                const bins = json.data.bins ?? json.data;
                bins.forEach(b => {
                    const id = b.id ?? b.ID ?? b.binId;
                    const code = b.location_in_warehouse ?? b.locationInWarehouse ?? b.binCode ?? 'Bin #' + id;
                    select.innerHTML += `<option value="${id}">${code}</option>`;
                });
            }
            catch (err) { console.error('loadBinsTo error', err); alert('Lỗi khi load bin'); }
        }

        /* LOAD COMPONENT */
        async function loadComponents() {
            const res = await fetch(BASE + "/components", { credentials: "include" });
            const json = await res.json();
            if (!json.success) return alert("Không load được sản phẩm");
            components = json.data;
        }

        // similar to outbound: maintain availability per selected source bin and aggregated
        let binAvailabilityByBin = {}; // { binId: { compId: qty } }
        let aggregatedAvailability = {}; // { compId: totalQtyAcrossSelectedBins }

        async function loadSelectedBinsContents(){
            try{
                binAvailabilityByBin = {};
                aggregatedAvailability = {};
                const sel = document.getElementById('binFrom');
                if(!sel) return;
                const selected = Array.from(sel.selectedOptions).map(o => o.value).filter(v=>v);
                if(selected.length === 0) return;

                for(const binId of selected){
                    binAvailabilityByBin[binId] = {};
                    try{
                        const res = await fetch(BASE + '/debug/bin/' + binId, { credentials: 'include' });
                        if(!res.ok) continue;
                        const json = await res.json();
                        if(!json.success || !Array.isArray(json.data)) continue;
                        for(const cb of json.data){
                            const cid = cb.component_id ?? cb.ComponentId ?? cb.componentId;
                            const qty = parseFloat(cb.quantity ?? cb.Quantity ?? 0) || 0;
                            if(!cid) continue;
                            binAvailabilityByBin[binId][cid] = qty;
                            aggregatedAvailability[cid] = (aggregatedAvailability[cid] || 0) + qty;
                        }
                    }catch(e){ console.warn('loadSelectedBinsContents single bin error', binId, e); }
                }

                // after loading, re-render product list (if modal open) so availability shows new totals
                try{ if(document.getElementById('modal').style.display === 'flex') renderList(); }catch(e){}
                // also update any existing rows' available values based on their selected per-row bin
                document.querySelectorAll('#tableBody tr').forEach(r => {
                    const compId = r.cells[1].dataset.id;
                    const selEl = r.querySelector('select[data-row-bin]');
                    if(selEl){
                        const chosen = selEl.value;
                        const avail = (binAvailabilityByBin[chosen] && binAvailabilityByBin[chosen][compId]) ? binAvailabilityByBin[chosen][compId] : 0;
                        r.dataset.available = avail;
                        const inp = r.querySelector('input[type=number]');
                        if(inp){ inp.max = avail; if(parseFloat(inp.value) > avail) inp.value = avail; }
                    } else {
                        // if no per-row select, set aggregated availability
                        const avail = aggregatedAvailability[compId] || 0;
                        r.dataset.available = avail;
                        const inp = r.querySelector('input[type=number]');
                        if(inp){ inp.max = avail; if(parseFloat(inp.value) > avail) inp.value = avail; }
                    }
                });
                calc();
            }catch(e){ console.warn('loadSelectedBinsContents error', e); }
        }

        /* MODAL */
        function openModal() { renderList(); document.getElementById("modal").style.display = "flex"; }
        function closeModal() { document.getElementById("modal").style.display = "none"; }

        /* RENDER PRODUCT */
        function renderList() {
            const list = document.getElementById("productList");
            list.innerHTML = "";
            const sel = document.getElementById('binFrom');
            const selectedBinIds = sel ? Array.from(sel.selectedOptions).map(o => o.value).filter(v => v) : [];

            components.forEach(c => {
                const id = c.componentId ?? c.id;
                const name = c.name ?? c.metadata?.name ?? "No name";
                const unit = c.unit ?? "N/A";
                const totalAvail = c.quantity ?? c.TotalQuantity ?? c.totalQuantity ?? 0;

                // If user selected any bins, only show components that have availability in selected bins
                const aggAvail = aggregatedAvailability[id] ?? aggregatedAvailability[id?.toString?.()] ?? 0;
                if (selectedBinIds.length > 0) {
                    if (!aggAvail || aggAvail <= 0) return; // skip items not present in selected bin(s)
                    list.innerHTML += `
<div class="modal-item"
onclick="addItemAsync(${id},'${name}','${unit}', ${aggAvail})">
<b>${name}</b><br>
Đơn vị: ${unit} · Có: ${aggAvail}
</div>`;
                } else {
                    // no bin selected: show all components with their total availability
                    list.innerHTML += `
<div class="modal-item"
onclick="addItemAsync(${id},'${name}','${unit}', ${totalAvail})">
<b>${name}</b><br>
Đơn vị: ${unit} · Có: ${totalAvail}
</div>`;
                }
            });
        }

        /* ADD ROW */
        async function addItemAsync(id, name, unit, available) {
            // refresh selected bins availability
            await loadSelectedBinsContents();
            const sel = document.getElementById('binFrom');
            const selected = sel ? Array.from(sel.selectedOptions).map(o => ({ id: o.value, label: o.text })) : [];
            const aggAvail = aggregatedAvailability[id] ?? aggregatedAvailability[id?.toString?.()] ?? 0;
            return addItem(id, name, unit, aggAvail, selected);
        }

        function addItem(id, name, unit, available, selectedBins) {
            count++;

            let binCellHtml = '';
            let initialAvail = available;
            if (selectedBins && selectedBins.length > 1) {
                // filter selected bins to those that actually contain this component
                const filtered = selectedBins.filter(b => {
                    const q = (binAvailabilityByBin[b.id] && binAvailabilityByBin[b.id][id]) ? binAvailabilityByBin[b.id][id] : 0;
                    return q > 0;
                });
                if (filtered.length === 0) {
                    alert('Sản phẩm "' + name + '" không có trong các bin đã chọn. Vui lòng chọn bin khác.');
                    return;
                }
                binCellHtml = '<select data-row-bin onchange="onRowBinChange(this)">';
                for (const b of filtered) binCellHtml += `<option value="${b.id}">${b.label}</option>`;
                binCellHtml += '</select>';
                const firstBinId = filtered[0].id;
                initialAvail = (binAvailabilityByBin[firstBinId] && binAvailabilityByBin[firstBinId][id]) ? binAvailabilityByBin[firstBinId][id] : available;
            }

            const row = `
<tr data-available="${initialAvail}">
<td>${count}</td>
<td data-id="${id}">${name}</td>
<td>${unit}</td>
<td>${binCellHtml ? binCellHtml : ''}<input type="number" value="1" min="1" max="${initialAvail}" onchange="calc()" style="width:80px;margin-left:8px"></td>
<td><button class="remove" onclick="removeRow(this)">X</button></td>
</tr>`;
            document.getElementById("tableBody").insertAdjacentHTML("beforeend", row);
            closeModal();
            calc();
        }

        function removeRow(btn) { btn.closest("tr").remove(); calc(); }

        /* CALC */
        function calc() {
            let total = 0;
            document.querySelectorAll("#tableBody tr").forEach(r => {
                const inpEl = r.querySelector('input[type=number]');
                const q = parseFloat(inpEl?.value) || 0;
                // validate against available
                const avail = parseFloat(r.dataset.available) || Infinity;
                if (q > avail) { if(inpEl) inpEl.style.borderColor = '#ef4444'; } else { if(inpEl) inpEl.style.borderColor = ''; }
                total += q;
            });
            document.getElementById("totalMoney").innerText = total;
        }

        /* SUBMIT */
        async function submitTransfer() {

            const selFrom = document.getElementById('binFrom');
            const selectedFrom = selFrom ? Array.from(selFrom.selectedOptions).map(o=>o.value) : [];
            const binTo = parseInt(document.getElementById("binTo").value);

            if (selectedFrom.length === 0) return alert('Chưa chọn bin nguồn');
            if (!binTo) return alert('Chưa chọn bin đích');

            const rows = document.querySelectorAll("#tableBody tr");
            if (rows.length === 0) return alert("Chưa có sản phẩm");

            // group by chosen source bin per row
            const payloadByBin = {};

            for (const r of rows) {
                const compId = parseInt(r.cells[1].dataset.id);
                const inp = r.querySelector('input[type=number]');
                const qty = parseInt(inp?.value) || 0;
                const perRowBinSel = r.querySelector('select[data-row-bin]');
                const chosenBin = perRowBinSel ? perRowBinSel.value : selectedFrom[0];
                const avail = parseFloat(r.dataset.available) || Infinity;
                if (qty > avail) return alert('Số lượng yêu cầu (' + qty + ") vượt quá tồn kho trong BIN cho sản phẩm ID " + compId + ". Có: " + avail);

                if (!payloadByBin[chosenBin]) payloadByBin[chosenBin] = { desc: document.getElementById('desc').value, bin_from_id: parseInt(chosenBin), bin_to_id: binTo, components: [] };
                payloadByBin[chosenBin].components.push({ component_id: compId, quantity: qty });
            }

            // send one internal transfer request per source bin
            for (const binId of Object.keys(payloadByBin)) {
                const payload = payloadByBin[binId];
                const res = await fetch(BASE + "/transfers/transfer/create", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify(payload)
                });
                if(!res.ok){ const txt = await res.text().catch(()=>null); console.error('server error', txt || res.statusText); return alert('Tạo thất bại cho bin ' + binId + ': ' + (txt || res.statusText)); }
                const json = await res.json().catch(()=>null);
                if(!json || !json.success) return alert('Tạo thất bại cho bin ' + binId + ': ' + (json?.msg || 'unknown'));
            }

            alert('Tạo phiếu chuyển thành công cho ' + Object.keys(payloadByBin).length + ' bin(s).');
            location.reload();
        }

        /* INIT */
        loadWarehouses();
        loadComponents();

        // populate creator name and date from backend if available
        async function setCreatorAndDate(){
            try{
                const apiRoot = BASE.replace('/storekeeper','');
                const res = await fetch(apiRoot + '/me/info', { credentials: 'include' });
                const elBy = document.getElementById('createdBy');
                const elAt = document.getElementById('createdAt');
                if(elAt) elAt.innerText = new Date().toLocaleString('vi-VN');
                if(!elBy) return;
                if(res && res.ok){
                    const j = await res.json().catch(()=>null);
                    if(j && j.success && j.data){
                        const u = j.data;
                        const display = u.display_name ?? u.DisplayName ?? u.username ?? u.Username ?? u.fullname ?? u.FullName;
                        elBy.innerText = (display || '').toString() || elBy.innerText || 'Auto';
                        return;
                    }
                }
                // fallback to cookies
                function _getCookie(name){ const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)'); return v ? decodeURIComponent(v.pop()) : null; }
                elBy.innerText = _getCookie('username') || _getCookie('displayName') || _getCookie('fullname') || elBy.innerText || 'Auto';
            }catch(e){ console.warn('setCreatorAndDate error', e); }
        }
        setCreatorAndDate();

    </script>

    <script>
        (function(){
            function _getCookie(name){ const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)'); return v ? decodeURIComponent(v.pop()) : null; }
            try{
                const elBy = document.getElementById('createdBy'); if(elBy){ elBy.innerText = _getCookie('username') || _getCookie('displayName') || _getCookie('fullname') || elBy.innerText || 'Auto'; }
                const elAt = document.getElementById('createdAt'); if(elAt) elAt.innerText = new Date().toLocaleString('vi-VN');
            }catch(e){}
        })();
    </script>
</body>
</html>
