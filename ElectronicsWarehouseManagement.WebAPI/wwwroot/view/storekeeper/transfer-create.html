<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transfer Request</title>

    <style>
        body {
            font-family: Segoe UI;
            background: #eef2f7;
            padding: 30px
        }



        .card {
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,.08)
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600
        }

        .back {
            background: #64748b;
            color: white
        }

        .add {
            background: #2563eb;
            color: white;
            margin-top: 15px
        }

        .save {
            background: #f59e0b;
            color: white;
            margin-top: 20px
        }

        .remove {
            background: #ef4444;
            color: white
        }

        input, select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            width: 100%
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px
        }

        th, td {
            border: 1px solid #e5e7eb;
            padding: 8px;
            text-align: center
        }

        th {
            background: #f1f5f9
        }

        .total {
            text-align: right;
            font-weight: bold;
            margin-top: 10px
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.4);
            display: none;
            justify-content: center;
            align-items: center
        }

        .modal-box {
            background: white;
            width: 600px;
            max-height: 500px;
            overflow: auto;
            padding: 20px;
            border-radius: 12px
        }

        .modal-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer
        }

            .modal-item:hover {
                background: #f1f5f9
            }
    </style>
</head>

<body>

    <div class="card">

        <div class="top" style="align-items:flex-start">
            <div>
                <h2>🔄 TRANSFER REQUEST</h2>
                <p style="margin:6px 0 0 0;color:#6b7280;font-size:13px">Create internal transfer requests between bins.</p>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px">
                <div>
                    <button class="back btn ghost" onclick="location.href='home.html'">⬅ Back</button>
                    <button class="btn primary" onclick="openModal()">+ Add product</button>
                </div>
                <div style="background:#fbfdff;border:1px solid #eef2ff;padding:8px;border-radius:8px;width:260px">
                    <div style="font-size:13px;color:#6b7280">Created by</div>
                    <div id="createdBy" style="font-weight:600">Auto</div>
                    <div style="height:8px"></div>
                    <div style="font-size:13px;color:#6b7280">Created at</div>
                    <div id="createdAt">-</div>
                </div>
            </div>
        </div>

        <br>

        <label>Description:</label>
        <input id="desc" placeholder="Enter description" />

        <br><br>

        <div class="row" style="grid-template-columns:1fr;">
            <div>
                <label>From Warehouse:</label>
                <select id="warehouseFrom" onchange="loadBinsFrom()"></select>
            </div>

            <div style="display:none">
                <label>Bin xuất (Tự động):</label>
                <div style="display:flex;gap:8px;align-items:center">
                    <div id="binFromContainer"></div>
                </div>
            </div>
        </div>

        <br>

        <div class="row" style="grid-template-columns:1fr;">
            <div>
                <label>To Warehouse:</label>
                <select id="warehouseTo" onchange="loadBinsTo()"></select>
            </div>

            <div style="display:none">
                <label>Bin nhập (Tự động):</label>
                <select id="binTo"></select>
            </div>
        </div>

        <button class="add" onclick="openModal()">+ Add product</button>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Product</th>
                    <th>Unit</th>
                    <th>Quantity</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="total">
            Total quantity: <span id="totalMoney">0</span>
        </div>

        <button class="save" onclick="submitTransfer()">Save Request</button>

    </div>

    <div id="modal" class="modal">
        <div class="modal-box">
            <h3>Product List</h3>
            <div id="productList"></div>
            <br>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>

        const BASE = "https://localhost:7297/api/storekeeper";
        let components = [];
        let count = 0;

        async function loadWarehouses() {
            try {
                const res = await fetch(BASE + "/warehouses", { credentials: "include" });
                if (!res.ok) { console.error(await res.text()); return alert('Warehouse API error'); }
                const json = await res.json();
                if (!json.success || !json.data) return alert('Unable to load warehouses');

                const from = document.getElementById('warehouseFrom');
                const to = document.getElementById('warehouseTo');
                from.innerHTML = '';
                to.innerHTML = '';

                json.data.forEach(w => {
                    const id = w.warehouseId ?? w.id;
                    const name = w.warehouseName ?? w.name ?? id;
                    from.innerHTML += `<option value="${id}">${name}</option>`;
                    to.innerHTML += `<option value="${id}">${name}</option>`;
                });

                loadBinsFrom();
                loadBinsTo();
            }
            catch (err) { console.error('loadWarehouses error', err); alert('Error loading warehouses'); }
        }

        async function loadBinsFrom() {
            try {
                const wid = document.getElementById('warehouseFrom').value;
                const container = document.getElementById('binFromContainer');
                if (container) container.innerHTML = '';
                if (!wid) return;
                const res = await fetch(BASE.replace('/storekeeper','') + '/storekeeper/warehouses/' + wid, { credentials: 'include' });
                if (!res.ok) { console.error(await res.text()); return alert('Bins API error'); }
                const json = await res.json();
                if (!json.success || !json.data) return alert('Unable to load bins');

                const bins = json.data.bins ?? json.data;
                bins.forEach(b => {
                    const id = b.id ?? b.ID ?? b.binId;
                    const code = b.location_in_warehouse ?? b.locationInWarehouse ?? b.binCode ?? 'Bin #' + id;
                    const html = `<div style="display:flex;align-items:center;gap:8px;padding:4px"><input type="checkbox" checked data-label="${code}" value="${id}" id="binchk-${id}"><label for="binchk-${id}">${code}</label></div>`;
                    if (container) container.innerHTML += html;
                });
                // when user changes selection (multi-select), ensure no conflict with binTo then reload availability
                if (container) container.addEventListener('change', function(){ ensureDistinctBins(); loadSelectedBinsContents(); });
                // load availability for initially selected bins
                await loadSelectedBinsContents();
            }
            catch (err) { console.error('loadBinsFrom error', err); alert('Error loading bins'); }
        }

        function ensureDistinctBins() {
            let conflictRemoved = false;
            const binTo = document.getElementById('binTo');
            if (!binTo || !binTo.value) return false;
            const cbs = document.querySelectorAll('#binFromContainer input[type="checkbox"]:checked');
            cbs.forEach(cb => {
                if (cb.value === binTo.value) {
                    cb.checked = false;
                    conflictRemoved = true;
                    const label = cb.dataset.label || cb.getAttribute('data-label') || cb.value;
                    alert('Source bin and destination bin cannot be the same ("' + label + '"). The source bin has been automatically unselected.');
                }
            });
            return conflictRemoved;
        }

        // Select or deselect all options in the binFrom container
        function selectAllBins(selectAll) {
            const container = document.getElementById('binFromContainer');
            if(!container) return;
            container.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = !!selectAll);
            // ensure destination bin isn't selected as source
            if (!ensureDistinctBins()) {
                loadSelectedBinsContents();
            } else {
                // if conflict was removed, reload availability
                loadSelectedBinsContents();
            }
        }

        async function loadBinsTo() {
            try {
                const wid = document.getElementById('warehouseTo').value;
                const select = document.getElementById('binTo');
                select.innerHTML = '';
                if (!wid) return;
                const res = await fetch(BASE.replace('/storekeeper','') + '/storekeeper/warehouses/' + wid, { credentials: 'include' });
                if (!res.ok) { console.error(await res.text()); return alert('Bins API error'); }
                const json = await res.json();
                if (!json.success || !json.data) return alert('Unable to load bins');

                const bins = json.data.bins ?? json.data;
                bins.forEach(b => {
                    const id = b.id ?? b.ID ?? b.binId;
                    const code = b.location_in_warehouse ?? b.locationInWarehouse ?? b.binCode ?? 'Bin #' + id;
                    select.innerHTML += `<option value="${id}">${code}</option>`;
                });
                // when destination bin changes, ensure it doesn't conflict with selected source bins
                select.addEventListener('change', function(){ if (ensureDistinctBins()) loadSelectedBinsContents(); });
            }
            catch (err) { console.error('loadBinsTo error', err); alert('Error loading bins'); }
        }

        async function loadComponents() {
            try {
                const res = await fetch(BASE + "/components", { credentials: "include" });
                console.debug('loadComponents status', res.status);
                const json = await res.json().catch(() => null);
                console.debug('loadComponents response', json);
                if (!json || !json.success) { console.warn('Cannot load components', json); return; }
                components = json.data || [];
                console.debug('components loaded, count=', components.length);
            } catch (e) {
                console.error('loadComponents error', e);
            }
        }

        // similar to outbound: maintain availability per selected source bin and aggregated
        let binAvailabilityByBin = {}; // { binId: { compId: qty } }
        let aggregatedAvailability = {}; // { compId: totalQtyAcrossSelectedBins }

        // handle per-row bin change: update availability for that row and ensure quantity limits
        function onRowBinChange(selectEl) {
            const tr = selectEl.closest('tr');
            if (!tr) return;
            const compId = tr.cells[1].dataset.id;
            const chosen = selectEl.value;
            let avail = 0;
            if (chosen) {
                avail = (binAvailabilityByBin[chosen] && binAvailabilityByBin[chosen][compId]) ? binAvailabilityByBin[chosen][compId] : 0;
            } else {
                avail = aggregatedAvailability[compId] || 0;
            }
            tr.dataset.available = avail;
            const inp = tr.querySelector('input[type=number]');
            if (inp) {
                inp.max = avail;
                if (parseFloat(inp.value) > avail) inp.value = avail;
            }
            calc();
        }

        function getSelectedBins() {
            const container = document.getElementById('binFromContainer');
            if (container) {
                return Array.from(container.querySelectorAll('input[type=checkbox]:checked')).map(cb => ({ id: cb.value, label: cb.dataset.label || cb.getAttribute('data-label') || cb.nextElementSibling?.innerText || cb.value }));
            }
            const sel = document.getElementById('binFrom');
            if (sel && sel.selectedOptions) return Array.from(sel.selectedOptions).map(o => ({ id: o.value, label: o.text }));
            return [];
        }

        async function loadSelectedBinsContents(){
            try{
                binAvailabilityByBin = {};
                aggregatedAvailability = {};
                const selected = getSelectedBins().map(b => b.id).filter(v=>v);
                if(selected.length === 0) return;

                for(const binId of selected){
                    binAvailabilityByBin[binId] = {};
                    try{
                        // fetch bin details (components) from server
                        const res = await fetch(BASE + '/bins/' + binId, { credentials: 'include' });
                        if(!res.ok) continue;
                        const json = await res.json();
                        if(!json.success) continue;
                        const dataArr = Array.isArray(json.data) ? json.data : (Array.isArray(json.data?.components) ? json.data.components : null);
                        if(!Array.isArray(dataArr)) continue;
                        for(const cb of dataArr){
                            const cid = cb.component_id ?? cb.ComponentId ?? cb.componentId ?? cb.component?.componentId ?? cb.component?.id;
                            const qty = parseFloat(cb.quantity ?? cb.Quantity ?? cb.component?.quantity ?? 0) || 0;
                            if(!cid) continue;
                            binAvailabilityByBin[binId][cid] = qty;
                            aggregatedAvailability[cid] = (aggregatedAvailability[cid] || 0) + qty;
                        }
                    }catch(e){ console.warn('loadSelectedBinsContents single bin error', binId, e); }
                }

                // after loading, re-render product list (if modal open) so availability shows new totals
                try{ if(document.getElementById('modal').style.display === 'flex') renderList(); }catch(e){}
                // also update any existing rows' available values based on their selected per-row bin
                const selectedBins = getSelectedBins();
                document.querySelectorAll('#tableBody tr').forEach(r => {
                    const compId = r.cells[1].dataset.id;
                    let selEl = r.querySelector('select[data-row-bin]');
                    
                    if (selectedBins.length > 1) {
                        const filtered = selectedBins.filter(b => (binAvailabilityByBin[b.id] && binAvailabilityByBin[b.id][compId]) > 0);
                        if (filtered.length > 1) { // only show dropdown if the item actually exists in >= 2 chosen bins
                            if (!selEl) {
                                selEl = document.createElement('select');
                                selEl.setAttribute('data-row-bin', 'true');
                                selEl.style.marginRight = '8px';
                                selEl.onchange = function() { onRowBinChange(this); };
                                r.cells[3].insertBefore(selEl, r.cells[3].firstChild);
                            }
                            const oldVal = selEl.value;
                    selEl.innerHTML = '<option value="">-- Auto select --</option>';
                            filtered.forEach(b => {
                                const opt = document.createElement('option');
                                opt.value = b.id;
                                opt.innerText = b.label;
                                selEl.appendChild(opt);
                            });
                            if (oldVal && filtered.some(b => b.id == oldVal)) selEl.value = oldVal;
                            else selEl.value = ''; // default auto
                        } else if (selEl) {
                            selEl.remove();
                            selEl = null;
                        }
                    } else if (selEl) {
                        selEl.remove();
                        selEl = null;
                    }

                    if (selEl) {
                        const chosen = selEl.value;
                        const avail = (binAvailabilityByBin[chosen] && binAvailabilityByBin[chosen][compId]) ? binAvailabilityByBin[chosen][compId] : 0;
                        r.dataset.available = avail;
                        const inp = r.querySelector('input[type=number]');
                        if(inp){ inp.max = avail; if(parseFloat(inp.value) > avail) inp.value = avail; }
                    } else {
                        // if no per-row select, set aggregated availability
                        const avail = aggregatedAvailability[compId] || 0;
                        r.dataset.available = avail;
                        const inp = r.querySelector('input[type=number]');
                        if(inp){ inp.max = avail; if(parseFloat(inp.value) > avail) inp.value = avail; }
                    }
                });
                calc();
            }catch(e){ console.warn('loadSelectedBinsContents error', e); }
        }

        /* MODAL */
        function openModal() { renderList(); document.getElementById("modal").style.display = "flex"; }
        function closeModal() { document.getElementById("modal").style.display = "none"; }

        /* RENDER PRODUCT */
        function renderList() {
            const list = document.getElementById("productList");
            list.innerHTML = "";
            const selectedBinIds = getSelectedBins().map(b => b.id).filter(v => v);
            console.debug('renderList selectedBinIds=', selectedBinIds, 'components.count=', components.length);

            components.forEach(c => {
                const id = c.componentId ?? c.id;
                const name = c.name ?? c.metadata?.name ?? "No name";
                const unit = c.unit ?? "N/A";
                const totalAvail = c.quantity ?? c.TotalQuantity ?? c.totalQuantity ?? 0;

                // If user selected any bins, only show components that have availability in selected bins
                const aggAvail = aggregatedAvailability[id] ?? aggregatedAvailability[id?.toString?.()] ?? 0;
                if (selectedBinIds.length > 0) {
                    if (!aggAvail || aggAvail <= 0) return; // skip items not present in selected bin(s)
                    list.innerHTML += `
<div class="modal-item" 
onclick="addItemAsync(${id},'${name}','${unit}', ${aggAvail})">
<b>${name}</b><br>
Unit: ${unit} · Available: ${aggAvail}
</div>`;
                } else {
                    // no bin selected: show all components with their total availability
                    list.innerHTML += `
<div class="modal-item" 
onclick="addItemAsync(${id},'${name}','${unit}', ${totalAvail})">
<b>${name}</b><br>
Unit: ${unit} · Available: ${totalAvail}
</div>`;
                }
            });
        }

        /* ADD ROW */
        function addItemAsync(id, name, unit, available) {
            // no bin selection: just add item with provided available quantity
            return addItem(id, name, unit, available, []);
        }

        function addItem(id, name, unit, available, selectedBins) {
            count++;
            const initialAvail = available;
            const row = `
<tr data-available="${initialAvail}">
<td>${count}</td>
<td data-id="${id}">${name}</td>
<td>${unit}</td>
<td><input type="number" value="1" min="1" max="${initialAvail}" onchange="calc()" style="width:80px;margin-left:8px"></td>
<td><button class="remove" onclick="removeRow(this)">X</button></td>
</tr>`;
            document.getElementById("tableBody").insertAdjacentHTML("beforeend", row);
            closeModal();
            calc();
        }

        function removeRow(btn) { btn.closest("tr").remove(); calc(); }

        /* CALC */
        function calc() {
            let total = 0;
            document.querySelectorAll("#tableBody tr").forEach(r => {
                const inpEl = r.querySelector('input[type=number]');
                const q = parseFloat(inpEl?.value) || 0;
                // validate against available
                const avail = parseFloat(r.dataset.available) || Infinity;
                if (q > avail) { if(inpEl) inpEl.style.borderColor = '#ef4444'; } else { if(inpEl) inpEl.style.borderColor = ''; }
                total += q;
            });
            document.getElementById("totalMoney").innerText = total;
        }

        /* SUBMIT */
        async function submitTransfer() {

            const selectedFrom = getSelectedBins().map(b => b.id);
            const binTo = parseInt(document.getElementById("binTo").value);

            if (selectedFrom.length === 0) return alert('No source bins selected');
            if (!binTo) return alert('No destination bin selected');

            const rows = document.querySelectorAll("#tableBody tr");
            if (rows.length === 0) return alert("No products added");

            // group by source bin and auto-distribute quantities if needed
            const payloadByBin = {};
            let binTracker = 0; // for round-robin distribution to naturally split rows across checked bins

            for (const r of rows) {
                const compId = parseInt(r.cells[1].dataset.id);
                const inp = r.querySelector('input[type=number]');
                let qtyRemaining = parseInt(inp?.value) || 0;
                
                const avail = parseFloat(r.dataset.available) || Infinity;
                if (qtyRemaining > avail) return alert('Requested quantity (' + qtyRemaining + ") exceeds total available stock for product ID " + compId + ". Available: " + avail);

                const perRowBinSel = r.querySelector('select[data-row-bin]');
                
                // If user specifies a specific bin via dropdown, try to take from it first
                if (perRowBinSel && perRowBinSel.value) {
                    const cb = perRowBinSel.value;
                    const stockInCb = (binAvailabilityByBin[cb] && binAvailabilityByBin[cb][compId]) ? binAvailabilityByBin[cb][compId] : 0;
                    const take = Math.min(qtyRemaining, stockInCb);
                    if (take > 0) {
                        if (!payloadByBin[cb]) payloadByBin[cb] = { desc: document.getElementById('desc').value, bin_from_id: parseInt(cb), bin_to_id: binTo, warehouse_from_id: parseInt(document.getElementById('warehouseFrom').value) || null, warehouse_to_id: parseInt(document.getElementById('warehouseTo').value) || null, components: [] };
                        payloadByBin[cb].components.push({ component_id: compId, quantity: take });
                        qtyRemaining -= take;
                    }
                }

                // If still quantity remaining, auto-distribute across other selected bins in round-robin fashion
                let startIdx = binTracker % selectedFrom.length;
                let sfCount = selectedFrom.length;

                for (let i = 0; i < sfCount; i++) {
                    if (qtyRemaining <= 0) break;
                    const sf = selectedFrom[(startIdx + i) % sfCount];
                    
                    const stock = (binAvailabilityByBin[sf] && binAvailabilityByBin[sf][compId]) ? binAvailabilityByBin[sf][compId] : 0;
                    if (stock > 0) {
                        let alreadyTaken = 0;
                        if (payloadByBin[sf]) {
                            const existingComp = payloadByBin[sf].components.find(c => c.component_id === compId);
                            if (existingComp) alreadyTaken = existingComp.quantity;
                        }
                        const actualAvail = stock - alreadyTaken;
                        if (actualAvail > 0) {
                            const take = Math.min(qtyRemaining, actualAvail);
                            if (!payloadByBin[sf]) payloadByBin[sf] = { desc: document.getElementById('desc').value, bin_from_id: parseInt(sf), bin_to_id: binTo, warehouse_from_id: parseInt(document.getElementById('warehouseFrom').value) || null, warehouse_to_id: parseInt(document.getElementById('warehouseTo').value) || null, components: [] };
                            
                            const existingComp = payloadByBin[sf].components.find(c => c.component_id === compId);
                            if (existingComp) existingComp.quantity += take;
                            else payloadByBin[sf].components.push({ component_id: compId, quantity: take });
                            
                            qtyRemaining -= take;
                        }
                    }
                }
                
                // advance round-robin so next row targets the next checked bin natively
                binTracker++;

                // fallback if somehow still remaining
                if (qtyRemaining > 0) {
                    const fallbackBin = selectedFrom[0];
                    if (!payloadByBin[fallbackBin]) payloadByBin[fallbackBin] = { desc: document.getElementById('desc').value, bin_from_id: parseInt(fallbackBin), bin_to_id: binTo, warehouse_from_id: parseInt(document.getElementById('warehouseFrom').value) || null, warehouse_to_id: parseInt(document.getElementById('warehouseTo').value) || null, components: [] };
                    const existingComp = payloadByBin[fallbackBin].components.find(c => c.component_id === compId);
                    if (existingComp) existingComp.quantity += qtyRemaining;
                    else payloadByBin[fallbackBin].components.push({ component_id: compId, quantity: qtyRemaining });
                }
            }

            // create single internal transfer request for all products (do not create one request per bin)
            // aggregate components across rows
            const compMap = {};
            for (const r of rows) {
                const compId = parseInt(r.cells[1].dataset.id);
                const qty = Number(r.querySelector('input[type=number]').value) || 0;
                if (!compMap[compId]) compMap[compId] = 0;
                compMap[compId] += qty;
            }
            const componentsPayload = Object.keys(compMap).map(k => ({ component_id: parseInt(k), quantity: compMap[k] }));

            const payload = {
                desc: document.getElementById('desc').value || '',
                warehouse_from_id: parseInt(document.getElementById('warehouseFrom').value) || null,
                warehouse_to_id: parseInt(document.getElementById('warehouseTo').value) || null,
                components: componentsPayload,
                bin_from_ids: selectedFrom // keep selected source bins for client reference (server ignores unknown extra fields)
            };

            try {
                const res = await fetch(BASE + "/transfers/transfer/create", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify(payload)
                });
                if(!res.ok){ const txt = await res.text().catch(()=>null); console.error('server error', txt || res.statusText); return alert('Creation failed: ' + (txt || res.statusText)); }
                const json = await res.json().catch(()=>null);
                if(!json || !json.success) return alert('Creation failed: ' + (json?.msg || 'unknown'));
                alert('Transfer request created successfully.');
                location.reload();
            } catch(e) {
                alert('Network error: ' + e.message);
            }
        }

        /* INIT */
        loadWarehouses();
        loadComponents();

        // populate creator name and date from backend if available
        async function setCreatorAndDate(){
            try{
                const apiRoot = BASE.replace('/storekeeper','');
                const res = await fetch(apiRoot + '/me/info', { credentials: 'include' });
                const elBy = document.getElementById('createdBy');
                const elAt = document.getElementById('createdAt');
                if(elAt) elAt.innerText = new Date().toLocaleString();
                if(!elBy) return;
                if(res && res.ok){
                    const j = await res.json().catch(()=>null);
                    if(j && j.success && j.data){
                        const u = j.data;
                        const display = u.display_name ?? u.DisplayName ?? u.username ?? u.Username ?? u.fullname ?? u.FullName;
                        elBy.innerText = (display || '').toString() || elBy.innerText || 'Auto';
                        return;
                    }
                }
                // fallback to cookies
                function _getCookie(name){ const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)'); return v ? decodeURIComponent(v.pop()) : null; }
