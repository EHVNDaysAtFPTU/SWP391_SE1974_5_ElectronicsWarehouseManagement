<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phiếu Xuất Kho</title>

    <style>
        body {
            font-family: Segoe UI;
            background: #eef2f7;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,.08);
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .back {
            background: #64748b;
            color: white;
        }

        .add {
            background: #2563eb;
            color: white;
            margin-top: 15px;
        }

        .save {
            background: #ef4444;
            color: white;
            margin-top: 20px;
        }

        .remove {
            background: #ef4444;
            color: white;
        }

        input, select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            width: 100%;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #e5e7eb;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #f1f5f9;
        }

        .total {
            text-align: right;
            font-weight: bold;
            margin-top: 10px;
            font-size: 16px;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.4);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: white;
            width: 600px;
            max-height: 500px;
            overflow: auto;
            padding: 20px;
            border-radius: 12px;
        }

        .modal-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

            .modal-item:hover {
                background: #f1f5f9;
            }
    </style>
</head>

<body>

    <div class="card">

        <div class="top" style="align-items:flex-start">
            <div>
                <h2>📤 PHIẾU XUẤT KHO</h2>
                <p style="margin:6px 0 0 0;color:#6b7280;font-size:13px">Tạo phiếu xuất, chọn kho và bin nguồn để trừ tồn.</p>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px">
                <div>
                    <button class="back btn ghost" onclick="location.href='home.html'">⬅ Quay lại</button>
                    <button class="btn primary" onclick="openModal()">+ Thêm sản phẩm</button>
                </div>
                <div style="background:#fbfdff;border:1px solid #eef2ff;padding:8px;border-radius:8px;width:260px">
                    <div style="font-size:13px;color:#6b7280">Người tạo</div>
                    <div id="createdBy" style="font-weight:600">Auto</div>
                    <div style="height:8px"></div>
                    <div style="font-size:13px;color:#6b7280">Ngày tạo</div>
                    <div id="createdAt">-</div>
                </div>
            </div>
        </div>

        <br>

        <label>Mô tả:</label>
        <input id="desc" placeholder="Nhập mô tả đơn">

        <br><br>

        <div class="row">
            <div>
                <label>Chọn Kho:</label>
                <select id="warehouse" onchange="loadBinsByWarehouse()"></select>
            </div>

            <div>
                <label>Chọn Bin xuất:</label>
                <!-- allow selecting multiple source bins; user can pick which bin per product row -->
                <div style="display:flex;gap:8px;align-items:center">
                    <!-- multi-bin container: rendered as checkboxes for easier multi-select -->
                    <div id="binFromContainer" style="height:120px;flex:1;overflow:auto;padding:6px;border:1px solid #d1d5db;border-radius:6px;background:#fff"></div>
                    <div style="display:flex;flex-direction:column;gap:6px">
                        <button type="button" onclick="selectAllBins(true)" title="Chọn tất cả" style="padding:6px 8px;border-radius:6px;">Chọn tất cả</button>
                        <button type="button" onclick="selectAllBins(false)" title="Bỏ chọn tất cả" style="padding:6px 8px;border-radius:6px;">Bỏ chọn</button>
                    </div>
                </div>
            </div>
        </div>

        <br>

        <div style="display:flex;gap:12px;margin-top:12px">
            <div style="flex:1">
                <label>Customer</label>
                <select id="customerSelect"><option value="">-- Không chọn --</option></select>
            </div>
            <div style="width:320px">
                <label>Người nhận</label>
                <input id="recipientInput" placeholder="Nhập tên người nhận (tùy chọn)" />
            </div>
        </div>

        <button class="add" onclick="openModal()">+ Thêm sản phẩm</button>

        <table>
            <thead>
                <tr>
                    <th style="width:60px;text-align:center">STT</th>
                    <th>Tên hàng</th>
                    <th style="width:140px;text-align:center">Đơn vị</th>
                    <th style="width:140px;text-align:center">Số lượng</th>
                    <th style="width:80px;text-align:center">&nbsp;</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="total" style="display:flex;justify-content:flex-end;align-items:center;margin-top:12px">
            Tổng số lượng: <span id="totalMoney" style="margin-left:8px;font-weight:700">0</span>
        </div>

        <button class="save" onclick="submitOutbound()">Lưu Phiếu</button>

    </div>

    <!-- MODAL -->
    <div id="modal" class="modal">
        <div class="modal-box">
            <h3>Danh sách sản phẩm</h3>
            <div id="productList"></div>
            <br>
            <button onclick="closeModal()">Đóng</button>
        </div>
    </div>

    <script>

        const BASE = "https://localhost:7297/api/storekeeper";
        let components = [];
        let count = 0;
        let binAvailability = {}; // map componentId -> quantity available in selected bin

        // handle per-row bin change: update availability for that row and ensure quantity limits
        function onRowBinChange(selectEl) {
            const tr = selectEl.closest('tr');
            if (!tr) return;
            const compId = tr.cells[1].dataset.id;
            const chosen = selectEl.value;
            const avail = (binAvailabilityByBin[chosen] && binAvailabilityByBin[chosen][compId]) ? binAvailabilityByBin[chosen][compId] : 0;
            tr.dataset.available = avail;
            const inp = tr.querySelector('input[type=number]');
            if (inp) {
                inp.max = avail;
                if (parseFloat(inp.value) > avail) inp.value = avail;
            }
            calc();
        }

        /* LOAD WAREHOUSE */
        async function loadWarehouses() {
            try {
                const res = await fetch(BASE + "/warehouses", { credentials: "include" });
                if (!res.ok) { console.error(await res.text()); return alert('API warehouse lỗi'); }
                const json = await res.json();
                if (!json.success || !json.data) return alert('Không load được warehouse');

                const select = document.getElementById('warehouse');
                select.innerHTML = '';
                json.data.forEach(w => {
                    const id = w.id ?? w.ID ?? w.warehouseId;
                    const name = w.name ?? w.Name ?? w.warehouseName ?? id;
                    select.innerHTML += `<option value="${id}">${name}</option>`;
                });

                loadBinsByWarehouse();
            }
            catch (err) { console.error('loadWarehouses error', err); alert('Lỗi khi load warehouse'); }
        }

        /* LOAD BIN */
        async function loadBinsByWarehouse() {
            try {
                const warehouseId = document.getElementById('warehouse').value;
                const container = document.getElementById('binFromContainer');
                if (container) container.innerHTML = '';
                if (!warehouseId) return;

                const res = await fetch(BASE.replace('/storekeeper','') + '/storekeeper/warehouses/' + warehouseId, { credentials: 'include' });
                if (!res.ok) { console.error(await res.text()); return alert('API bins lỗi'); }
                const json = await res.json();
                if (!json.success || !json.data) return alert('Không load được bin');

                const bins = json.data.bins ?? json.data;
                // container already cleared above
                bins.forEach(b => {
                    const id = b.id ?? b.ID ?? b.binId;
                    const code = b.location_in_warehouse ?? b.locationInWarehouse ?? b.binCode ?? 'Bin #' + id;
                    const html = `<div style="display:flex;align-items:center;gap:8px;padding:4px"><input type="checkbox" data-label="${code}" value="${id}" id="binchk-${id}"><label for="binchk-${id}">${code}</label></div>`;
                    container.innerHTML += html;
                });
                // load availability for the initially selected bin(s)
                await loadSelectedBinsContents();
                // update availability when user changes bin selection (delegate)
                container.addEventListener('change', function(){ loadSelectedBinsContents(); });
            }
            catch (err) { console.error('loadBinsByWarehouse error', err); alert('Lỗi khi load bin'); }
        }

// load components availability for selected bins (multiple)
let binAvailabilityByBin = {}; // { binId: { compId: qty } }
let aggregatedAvailability = {}; // { compId: totalQtyAcrossSelectedBins }

function getSelectedBins() {
    const container = document.getElementById('binFromContainer');
    if (container) {
        return Array.from(container.querySelectorAll('input[type=checkbox]:checked')).map(cb => ({ id: cb.value, label: cb.dataset.label || cb.getAttribute('data-label') || cb.nextElementSibling?.innerText || cb.value }));
    }
    const sel = document.getElementById('binFrom');
    if (sel && sel.selectedOptions) return Array.from(sel.selectedOptions).map(o => ({ id: o.value, label: o.text }));
    return [];
}

        async function loadSelectedBinsContents(){
            try{
                binAvailabilityByBin = {};
                aggregatedAvailability = {};
                const selected = getSelectedBins().map(b => b.id).filter(v => v);
                if(selected.length === 0) return;

                for(const binId of selected){
                    binAvailabilityByBin[binId] = {};
                    try{
                        // fetch bin details (components) from server
                        const res = await fetch(BASE + '/bins/' + binId, { credentials: 'include' });
                        if(!res.ok) continue;
                        const json = await res.json();
                        if(!json.success) continue;
                        // server may return either an array (legacy) or an object with .components
                        const dataArr = Array.isArray(json.data) ? json.data : (Array.isArray(json.data?.components) ? json.data.components : null);
                        if(!Array.isArray(dataArr)) continue;
                        for(const cb of dataArr){
                            const cid = cb.component_id ?? cb.ComponentId ?? cb.componentId ?? cb.component?.componentId ?? cb.component?.id;
                            const qty = parseFloat(cb.quantity ?? cb.Quantity ?? cb.component?.quantity ?? cb.Quantity ?? 0) || 0;
                            if(!cid) continue;
                            binAvailabilityByBin[binId][cid] = qty;
                            aggregatedAvailability[cid] = (aggregatedAvailability[cid] || 0) + qty;
                        }
                    }catch(e){ console.warn('loadSelectedBinsContents single bin error', binId, e); }
                }

                // after loading, re-render product list (if modal open) so availability shows new totals
                try{ if(document.getElementById('modal').style.display === 'flex') renderList(); }catch(e){}
                // also update any existing rows' available values based on their selected per-row bin
                document.querySelectorAll('#tableBody tr').forEach(r => {
                    const compId = r.cells[1].dataset.id;
                    const selEl = r.querySelector('select[data-row-bin]');
                    if(selEl){
                        const chosen = selEl.value;
                        const avail = (binAvailabilityByBin[chosen] && binAvailabilityByBin[chosen][compId]) ? binAvailabilityByBin[chosen][compId] : 0;
                        r.dataset.available = avail;
                        const inp = r.querySelector('input[type=number]');
                        if(inp){ inp.max = avail; if(parseFloat(inp.value) > avail) inp.value = avail; }
                    } else {
                        // if no per-row select, set aggregated availability
                        const avail = aggregatedAvailability[compId] || 0;
                        r.dataset.available = avail;
                        const inp = r.querySelector('input[type=number]');
                        if(inp){ inp.max = avail; if(parseFloat(inp.value) > avail) inp.value = avail; }
                    }
                });
                calc();
            }catch(e){ console.warn('loadSelectedBinsContents error', e); }
        }

// Select or deselect all options in the binFrom container
function selectAllBins(selectAll) {
    const container = document.getElementById('binFromContainer');
    if (!container) return;
    container.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = !!selectAll);
    loadSelectedBinsContents();
}

        /* LOAD COMPONENT */
        async function loadComponents() {
            const res = await fetch(BASE + "/components", { credentials: "include" });
            const json = await res.json();
            if (!json.success) return alert("Không load được sản phẩm");
            components = json.data;
        }

        /* LOAD CUSTOMERS */
        async function loadCustomers(){
            try{
                const res = await fetch(BASE.replace('/storekeeper','') + '/storekeeper/customers', { credentials: 'include' });
                if(!res.ok) { console.warn('customers fetch failed', await res.text()); return; }
                const json = await res.json();
                console.log('loadCustomers response', json);
                if(!json.success || !json.data) return;
                const select = document.getElementById('customerSelect');
                if(!select) return;
                select.innerHTML = '';
                const emptyOpt = document.createElement('option');
                emptyOpt.value = '';
                emptyOpt.text = '-- Không chọn --';
                select.appendChild(emptyOpt);
                json.data.forEach(ci => {
                    try{
                        const opt = document.createElement('option');
                        opt.value = (ci.id ?? ci.ID ?? ci.customerId ?? ci.customer_id ?? '');
                        opt.text = ci.name ?? ci.Name ?? ci.displayName ?? ci.customerName ?? ci.CustomerName ?? (ci.contact ?? 'Khách hàng');
                        opt.dataset.raw = JSON.stringify(ci);
                        select.appendChild(opt);
                    }catch(e){ /* ignore this item */ }
                });
                if(Array.isArray(json.data) && json.data.length === 0) console.warn('customers list is empty');
            }catch(e){ console.warn('loadCustomers error', e); }
        }

        /* MODAL */
        function openModal() { renderList(); document.getElementById("modal").style.display = "flex"; }
        function closeModal() { document.getElementById("modal").style.display = "none"; }

        /* RENDER LIST */
        function renderList() {

            const list = document.getElementById("productList");
            list.innerHTML = "";
            const selectedBinIds = getSelectedBins().map(b => b.id).filter(v => v);

            components.forEach(c => {
                const id = c.componentId ?? c.id;
                const name = c.name ?? c.metadata?.name ?? "No name";
                const unit = c.unit ?? "N/A";
                const totalAvail = c.quantity ?? c.TotalQuantity ?? c.totalQuantity ?? 0;

                // If user selected any bins, only show components that have availability in selected bins
                const aggAvail = aggregatedAvailability[id] ?? aggregatedAvailability[id?.toString?.()] ?? 0;
                if (selectedBinIds.length > 0) {
                    if (!aggAvail || aggAvail <= 0) return; // skip items not present in selected bin(s)
                    list.innerHTML += `
<div class="modal-item"
onclick="addItemAsync(${id},'${name}','${unit}', ${aggAvail})">
<b>${name}</b><br>
Đơn vị: ${unit} · Có: ${aggAvail}
</div>`;
                } else {
                    // no bin selected: show all components with their total availability
                    list.innerHTML += `
<div class="modal-item"
onclick="addItemAsync(${id},'${name}','${unit}', ${totalAvail})">
<b>${name}</b><br>
Đơn vị: ${unit} · Có: ${totalAvail}
</div>`;
                }
            });
        }

        /* ADD ROW */
        async function addItemAsync(id, name, unit, available) {
            // refresh selected bins availability
            await loadSelectedBinsContents();
            const selected = getSelectedBins();
            // if multiple bins selected, we'll allow user to choose source bin per-row via a select in the table row
            // compute aggregated availability for this component
            const aggAvail = aggregatedAvailability[id] ?? aggregatedAvailability[id.toString()] ?? 0;
            return addItem(id, name, unit, aggAvail, selected);
        }

        function addItem(id, name, unit, available, selectedBins) {

            // prevent adding if no stock available in selected bin
            const avail = parseFloat(available) || 0;
            if (avail <= 0) {
                alert('Sản phẩm "' + name + '" hiện không có trong bin đã chọn.');
                return;
            }

            count++;

            const rowId = 'row-' + Date.now() + '-' + Math.floor(Math.random()*1000);
            // if multiple bins selected, include a per-row select to choose which bin to take from
            let binCellHtml = '';
            let initialAvail = avail;
            if (selectedBins && selectedBins.length > 1) {
                // filter selected bins to those that actually contain this component
                const filtered = selectedBins.filter(b => {
                    const q = (binAvailabilityByBin[b.id] && binAvailabilityByBin[b.id][id]) ? binAvailabilityByBin[b.id][id] : 0;
                    return q > 0;
                });
                if (filtered.length === 0) {
                    alert('Sản phẩm "' + name + '" không có trong các bin đã chọn. Vui lòng chọn bin khác.');
                    return;
                }
                binCellHtml = '<select data-row-bin onchange="onRowBinChange(this)">';
                for (const b of filtered) binCellHtml += `<option value="${b.id}">${b.label}</option>`;
                binCellHtml += '</select>';
                // set initial availability to the first filtered bin
                const firstBinId = filtered[0].id;
                initialAvail = (binAvailabilityByBin[firstBinId] && binAvailabilityByBin[firstBinId][id]) ? binAvailabilityByBin[firstBinId][id] : avail;
            }

            const row = `
<tr id="${rowId}" data-available="${initialAvail}">
<td style="text-align:center">${count}</td>
<td data-id="${id}">${name}</td>
<td style="text-align:center">${unit}</td>
<td style="text-align:center">${binCellHtml ? binCellHtml : ''}</td>
<td style="text-align:center"><input type="number" value="1" min="1" max="${initialAvail}" onchange="onQtyChange(this)" style="width:100px;padding:6px;border-radius:6px;border:1px solid #d1d5db;text-align:center"></td>
<td style="text-align:center"><button class="remove" onclick="removeRow(this)" style="background:#ef4444;color:#fff;border:none;padding:6px 10px;border-radius:6px;cursor:pointer">X</button></td>
</tr>`;

            document.getElementById("tableBody").insertAdjacentHTML("beforeend", row);
            closeModal();
            calc();
        }

        function onQtyChange(input) {
            // ensure value is within [1, max]
            const max = parseFloat(input.getAttribute('max')) || Infinity;
            let v = parseFloat(input.value) || 0;
            if (v < 1) v = 1;
            if (v > max) {
                input.value = max;
                input.style.borderColor = '#ef4444';
            } else {
                input.style.borderColor = '';
            }
            calc();
        }

        function removeRow(btn) {
            btn.closest("tr").remove();
            calc();
        }

        /* CALC */
        function calc() {

            let total = 0;

            document.querySelectorAll("#tableBody tr").forEach(r => {
                const inpEl = r.querySelector('input[type=number]');
                const qty = parseFloat(inpEl?.value) || 0;
                // validate against available
                const avail = parseFloat(r.dataset.available) || Infinity;
                if (qty > avail) {
                    // mark input red
                    if (inpEl) inpEl.style.borderColor = '#ef4444';
                } else {
                    if (inpEl) inpEl.style.borderColor = '';
                }
                total += qty;
            });

            document.getElementById("totalMoney").innerText = total;
            // disable save button if any invalid quantity
            const anyInvalid = Array.from(document.querySelectorAll('#tableBody tr')).some(r => {
                const inpEl = r.querySelector('input[type=number]');
                const q = parseFloat(inpEl?.value) || 0;
                const a = parseFloat(r.dataset.available) || Infinity;
                return q > a || q < 1;
            });
            const saveBtn = document.querySelector('.save');
            if (saveBtn) saveBtn.disabled = anyInvalid;
        }

        /* SUBMIT */
        async function submitOutbound() {

            const rows = document.querySelectorAll("#tableBody tr");
            if (rows.length === 0) return alert("Chưa có sản phẩm");

            // Build grouped payloads per source bin. If user used multiple source bins in rows,
            // create one transfer request per bin (server accepts single bin_from_id per request).
            const payloadByBin = {}; // binId -> { desc, bin_from_id, bin_to_id, components: [] }

            rows.forEach(r => {
                const compId = parseInt(r.cells[1].dataset.id);
                const qty = parseInt(r.querySelector('input[type=number]').value);
                const perRowBinSel = r.querySelector('select[data-row-bin]');
                const chosenBin = perRowBinSel ? perRowBinSel.value : (getSelectedBins()[0]?.id);
                const avail = parseFloat(r.dataset.available) || Infinity;
                if (qty > avail) {
                    return alert('Số lượng yêu cầu (' + qty + ") vượt quá tồn kho trong BIN cho sản phẩm ID " + compId + ". Có: " + avail);
                }
                // also validate against component total quantity (server-side uses component.TotalQuantity)
                try{
                    const compObj = components.find(c => (c.componentId ?? c.id) == compId) || {};
                    const total = parseFloat(compObj.quantity ?? compObj.TotalQuantity ?? compObj.totalQuantity ?? Infinity);
                    if (qty > total) {
                        return alert('Số lượng yêu cầu (' + qty + ") vượt quá tổng tồn kho cho sản phẩm ID " + compId + ". Tổng: " + total);
                    }
                }catch(e){ /* ignore */ }

                if(!chosenBin) return alert('Chưa chọn bin nguồn cho một hoặc nhiều sản phẩm.');
                if(!payloadByBin[chosenBin]) payloadByBin[chosenBin] = { desc: document.getElementById("desc").value, bin_from_id: parseInt(chosenBin), bin_to_id: null, components: [] };
                payloadByBin[chosenBin].components.push({ component_id: compId, quantity: qty });
            });

            // attach customer/recipient info and warehouse id
            try{
                const sel = document.getElementById('customerSelect');
                const recip = document.getElementById('recipientInput');
                Object.values(payloadByBin).forEach(p => {
                    // include warehouse id (source)
                    try{ const wid = parseInt(document.getElementById('warehouse').value); if(!isNaN(wid)) p.warehouse_from_id = wid; } catch(e){}
                    if(sel && sel.value) {
                        const id = parseInt(sel.value);
                        if(!isNaN(id)) p.customer_id = id;
                    }
                    if(recip && recip.value) p.recipient = recip.value;
                    try{
                        const opt = sel.options[sel.selectedIndex];
                        if(opt && opt.dataset && opt.dataset.raw) p.customer_info_json = JSON.parse(opt.dataset.raw);
                    }catch(e){}
                });
            }catch(e){ /* ignore */ }

            console.log("SEND grouped:", payloadByBin);

            // send requests sequentially
            for(const binId of Object.keys(payloadByBin)){
                const payload = payloadByBin[binId];
                const res = await fetch(BASE + "/transfers/outbound/create", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify(payload)
                });
                if(!res.ok){ const txt = await res.text().catch(()=>null); console.error('server error', txt || res.statusText); return alert('Tạo thất bại cho bin ' + binId + ': ' + (txt || res.statusText)); }
                const json = await res.json().catch(()=>null);
                if(!json || !json.success) return alert('Tạo thất bại cho bin ' + binId + ': ' + (json?.msg || 'unknown'));
            }

            alert('Tạo phiếu xuất thành công cho ' + Object.keys(payloadByBin).length + ' bin(s).');
            location.reload();
        }

        /* INIT */
        loadWarehouses();
        loadComponents();
        loadCustomers();
        // populate creator name and date from backend if available
        async function setCreatorAndDate(){
            try{
                const apiRoot = BASE.replace('/storekeeper','');
                const res = await fetch(apiRoot + '/me/info', { credentials: 'include' });
                const elBy = document.getElementById('createdBy');
                const elAt = document.getElementById('createdAt');
                if(elAt) elAt.innerText = new Date().toLocaleString('vi-VN');
                if(!elBy) return;
                if(res && res.ok){
                    const j = await res.json().catch(()=>null);
                    if(j && j.success && j.data){
                        const u = j.data;
                        const display = u.display_name ?? u.DisplayName ?? u.username ?? u.Username ?? u.fullname ?? u.FullName;
                        elBy.innerText = (display || '').toString() || elBy.innerText || 'Auto';
                        return;
                    }
                }
                // fallback to cookies
                function _getCookie(name){ const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)'); return v ? decodeURIComponent(v.pop()) : null; }
                elBy.innerText = _getCookie('username') || _getCookie('displayName') || _getCookie('fullname') || elBy.innerText || 'Auto';
            }catch(e){ console.warn('setCreatorAndDate error', e); }
        }
        setCreatorAndDate();

    </script>
    <script>
        async function submitOutbound(){
            const rows = document.querySelectorAll('#tableBody tr');
            if(rows.length === 0) return alert('Chưa có sản phẩm');

            // require customer selected
            try{
                const selReq = document.getElementById('customerSelect');
                if (!selReq || !selReq.value) {
                    return alert('Vui lòng chọn customer trước khi tạo phiếu (bắt buộc).');
                }
            }catch(e){ /* ignore */ }

            // build payload similar to inbound
            const componentList = [];
            document.querySelectorAll('#tableBody tr').forEach(r => {
                const compId = r.cells[1].dataset.id;
                const qty = parseFloat(r.querySelector('input[type=number]')?.value) || 0;
                componentList.push({ component_id: parseInt(compId), quantity: qty });
            });

            const payload = {
                desc: document.getElementById('desc')?.value || '',
                warehouse_from_id: parseInt(document.getElementById('warehouse')?.value) || null,
                bin_from_id: null,
                components: componentList
            };

            try{
                const sel = document.getElementById('customerSelect');
                const opt = sel.options[sel.selectedIndex];
                if(opt && opt.value){ payload.customer_id = parseInt(opt.value); }
            }catch(e){}

            // send
            const res = await fetch(BASE + '/transfers/outbound/create', {
                method: 'POST', headers: { 'Content-Type':'application/json' }, credentials: 'include', body: JSON.stringify(payload)
            });
            if(!res.ok){ alert('Tạo thất bại'); return; }
            const j = await res.json(); if(!j.success) return alert('Tạo thất bại: ' + (j.msg || ''));
            alert('Tạo phiếu xuất thành công'); location.reload();
        }
    </script>
    <!-- removed duplicate/simple submitOutbound; use grouped submitOutbound above which handles multi-bin payloads -->

    <script>
        // Non-intrusive: set createdBy (prefer username cookie) and createdAt
        (function(){
            function _getCookie(name){ const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)'); return v ? decodeURIComponent(v.pop()) : null; }
            try{
                const elBy = document.getElementById('createdBy'); if(elBy){ elBy.innerText = _getCookie('username') || _getCookie('displayName') || _getCookie('fullname') || elBy.innerText || 'Auto'; }
                const elAt = document.getElementById('createdAt'); if(elAt) elAt.innerText = new Date().toLocaleString('vi-VN');
            }catch(e){}
        })();
    </script>
