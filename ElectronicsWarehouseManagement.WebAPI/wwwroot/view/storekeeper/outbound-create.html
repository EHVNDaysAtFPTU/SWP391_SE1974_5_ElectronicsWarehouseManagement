<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Outbound Shipment</title>

    <style>
        body {
            font-family: Segoe UI;
            background: #eef2f7;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, .08);
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .back {
            background: #64748b;
            color: white;
        }

        .add {
            background: #2563eb;
            color: white;
            margin-top: 15px;
        }

        .save {
            background: #ef4444;
            color: white;
            margin-top: 20px;
        }

        .remove {
            background: #ef4444;
            color: white;
        }

        input,
        select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            width: 100%;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #e5e7eb;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #f1f5f9;
        }

        .total {
            text-align: right;
            font-weight: bold;
            margin-top: 10px;
            font-size: 16px;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .4);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: white;
            width: 600px;
            max-height: 500px;
            overflow: auto;
            padding: 20px;
            border-radius: 12px;
        }

        .modal-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        .modal-item:hover {
            background: #f1f5f9;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="top" style="align-items:flex-start">
            <div>
                <h2>📤 OUTBOUND SHIPMENT</h2>
                <p style="margin:6px 0 0 0;color:#6b7280;font-size:13px">Create an outbound, select warehouse and source bin to decrease stock.</p>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px">
                <div>
                    <button class="back btn ghost" onclick="location.href='home.html'">⬅ Back</button>
                    <button class="btn primary" onclick="openModal()">+ Add product</button>
                </div>
                <div style="background:#fbfdff;border:1px solid #eef2ff;padding:8px;border-radius:8px;width:260px">
                    <div style="font-size:13px;color:#6b7280">Created by</div>
                    <div id="createdBy" style="font-weight:600">Auto</div>
                    <div style="height:8px"></div>
                    <div style="font-size:13px;color:#6b7280">Created at</div>
                    <div id="createdAt">-</div>
                </div>
            </div>
        </div>

        <br>

        <label>Description:</label>
        <input id="desc" placeholder="Enter order description">

        <br><br>

        <div class="row">
            <div>
                <label>Select Warehouse:</label>
                <select id="warehouse" onchange="loadWarehouseAvailability()"></select>
            </div>
            <div>

            </div>
        </div>

        <br>

        <div style="display:flex;gap:12px;margin-top:12px">
            <div style="flex:1">
                <label>Customer</label>
                <select id="customerSelect">
                    <option value="">-- Not selected --</option>
                </select>
            </div>
            <div style="width:320px">
                <label>Recipient</label>
                <input id="recipientInput" placeholder="Enter recipient name (optional)" />
            </div>
        </div>

        <button class="add" onclick="openModal()">+ Add product</button>

        <table>
            <thead>
                <tr>
                    <th style="width:60px;text-align:center">No.</th>
                    <th>Product Name</th>
                    <th style="width:140px;text-align:center">Unit</th>
                    <th style="width:140px;text-align:center">Quantity</th>
                    <th style="width:80px;text-align:center">&nbsp;</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="total" style="display:flex;justify-content:flex-end;align-items:center;margin-top:12px">
            Total quantity: <span id="totalMoney" style="margin-left:8px;font-weight:700">0</span>
        </div>

        <button class="save" onclick="submitOutbound()">Save</button>

    </div>


    <div id="modal" class="modal">
        <div class="modal-box">
            <h3>Product List</h3>
            <div id="productList"></div>
            <br>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>

        const BASE = "https://localhost:7297/api/storekeeper";
        let components = [];
        let count = 0;
        let binAvailability = {};

        function onRowBinChange(selectEl) {
            const tr = selectEl.closest('tr');
            if (!tr) return;
            const compId = tr.cells[1].dataset.id;
            const chosen = selectEl.value;
            let avail = 0;
            if (chosen) {
                avail = (binAvailabilityByBin[chosen] && binAvailabilityByBin[chosen][compId]) ? binAvailabilityByBin[chosen][compId] : 0;
            } else {
                avail = aggregatedAvailability[compId] || 0;
            }
            tr.dataset.available = avail;
            const inp = tr.querySelector('input[type=number]');
            if (inp) {
                inp.max = avail;
                if (parseFloat(inp.value) > avail) inp.value = avail;
            }
            calc();
        }

        async function loadWarehouses() {
            try {
                const res = await fetch(BASE + "/warehouses", { credentials: "include" });
                if (!res.ok) { console.error(await res.text()); return alert('Warehouse API error'); }
                const json = await res.json();
                if (!json.success || !json.data) return alert('Unable to load warehouses');

                const select = document.getElementById('warehouse');
                select.innerHTML = '';
                json.data.forEach(w => {
                    const id = w.id ?? w.ID ?? w.warehouseId;
                    const name = w.name ?? w.Name ?? w.warehouseName ?? id;
                    select.innerHTML += `<option value="${id}">${name}</option>`;
                });

                loadWarehouseAvailability();
            }
            catch (err) { console.error('loadWarehouses error', err); alert('Error loading warehouses'); }
        }

        let aggregatedAvailability = {};

        async function loadWarehouseAvailability() {
            try {
                aggregatedAvailability = {};
                const warehouseId = document.getElementById('warehouse').value;
                if (!warehouseId) return;

                const res = await fetch(BASE.replace('/storekeeper', '') + '/storekeeper/warehouses/' + warehouseId, { credentials: 'include' });
                if (!res.ok) return;
                const json = await res.json();
                if (!json.success || !json.data) return;

                const bins = json.data.bins ?? json.data;
                const binIds = bins.map(b => b.id ?? b.ID ?? b.binId);


                for (const binId of binIds) {
                    try {
                        const bres = await fetch(BASE + '/bins/' + binId, { credentials: 'include' });
                        if (!bres.ok) continue;
                        const bjson = await bres.json();
                        if (!bjson.success) continue;
                        const dataArr = Array.isArray(bjson.data) ? bjson.data : (Array.isArray(bjson.data?.components) ? bjson.data.components : null);
                        if (!Array.isArray(dataArr)) continue;
                        for (const cb of dataArr) {
                            const cid = cb.component_id ?? cb.ComponentId ?? cb.componentId ?? cb.component?.componentId ?? cb.component?.id;
                            const qty = parseFloat(cb.quantity ?? cb.Quantity ?? cb.component?.quantity ?? cb.Quantity ?? 0) || 0;
                            if (!cid) continue;
                            aggregatedAvailability[cid] = (aggregatedAvailability[cid] || 0) + qty;
                        }
                    } catch (e) { console.warn('bin fetch error', e); }
                }


                document.querySelectorAll('#tableBody tr').forEach(r => {
                    const compId = r.cells[1].dataset.id;
                    const avail = aggregatedAvailability[compId] || 0;
                    r.dataset.available = avail;
                    const inp = r.querySelector('input[type=number]');
                    if (inp) { inp.max = avail; if (parseFloat(inp.value) > avail) inp.value = avail; }
                });
                calc();
                try { if (document.getElementById('modal').style.display === 'flex') renderList(); } catch (e) { }
            } catch (err) { console.error('availability error', err); }
        }

        async function loadComponents() {
            const res = await fetch(BASE + "/components", { credentials: "include" });
            const json = await res.json();
            if (!json.success) return alert("Unable to load products");
            components = json.data;
        }


        async function loadCustomers() {
            try {
                const res = await fetch(BASE.replace('/storekeeper', '') + '/storekeeper/customers', { credentials: 'include' });
                if (!res.ok) { console.warn('customers fetch failed', await res.text()); return; }
                const json = await res.json();
                console.log('loadCustomers response', json);
                if (!json.success || !json.data) return;
                const select = document.getElementById('customerSelect');
                if (!select) return;
                select.innerHTML = '';
                const emptyOpt = document.createElement('option');
                emptyOpt.value = '';
                emptyOpt.text = '-- Not selected --';
                select.appendChild(emptyOpt);
                json.data.forEach(ci => {
                    try {
                        const opt = document.createElement('option');
                        opt.value = (ci.id ?? ci.ID ?? ci.customerId ?? ci.customer_id ?? '');
                        opt.text = ci.name ?? ci.Name ?? ci.displayName ?? ci.customerName ?? ci.CustomerName ?? (ci.contact ?? 'Customer');
                        opt.dataset.raw = JSON.stringify(ci);
                        select.appendChild(opt);
                    } catch (e) { }
                });
                if (Array.isArray(json.data) && json.data.length === 0) console.warn('customers list is empty');
            } catch (e) { console.warn('loadCustomers error', e); }
        }

        function openModal() { renderList(); document.getElementById("modal").style.display = "flex"; }
        function closeModal() { document.getElementById("modal").style.display = "none"; }

        function renderList() {

            const list = document.getElementById("productList");
            list.innerHTML = "";

            components.forEach(c => {
                const id = c.componentId ?? c.id;
                const name = c.name ?? c.metadata?.name ?? "No name";
                const unit = c.unit ?? "N/A";
                const totalAvail = c.quantity ?? c.TotalQuantity ?? c.totalQuantity ?? 0;

                const aggAvail = aggregatedAvailability[id] ?? aggregatedAvailability[id?.toString?.()] ?? totalAvail;
                if (!aggAvail || aggAvail <= 0) return;

                list.innerHTML += `
<div class="modal-item"
onclick="addItemAsync(${id},'${name}','${unit}', ${aggAvail})">
<b>${name}</b><br>
Unit: ${unit} · Available: ${aggAvail}
</div>`;
            });
        }


        async function addItemAsync(id, name, unit, available) {
            const aggAvail = aggregatedAvailability[id] ?? aggregatedAvailability[id.toString()] ?? available;
            return addItem(id, name, unit, aggAvail);
        }

        function addItem(id, name, unit, available) {
            const avail = parseFloat(available) || 0;
            if (avail <= 0) {
                alert('Product "' + name + '" is not available in the selected bin.');
                return;
            }

            count++;

            const rowId = 'row-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
            const initialAvail = avail;
            const row = `
<tr id="${rowId}" data-available="${initialAvail}">
<td style="text-align:center">${count}</td>
<td data-id="${id}">${name}</td>
<td style="text-align:center">${unit}</td>
<td style="text-align:center"><input type="number" value="1" min="1" max="${initialAvail}" onchange="onQtyChange(this)" style="width:100px;padding:6px;border-radius:6px;border:1px solid #d1d5db;text-align:center"></td>
<td style="text-align:center"><button class="remove" onclick="removeRow(this)" style="background:#ef4444;color:#fff;border:none;padding:6px 10px;border-radius:6px;cursor:pointer">X</button></td>
</tr>`;

            document.getElementById("tableBody").insertAdjacentHTML("beforeend", row);
            closeModal();
            calc();
        }

        function onQtyChange(input) {
            const max = parseFloat(input.getAttribute('max')) || Infinity;
            let v = parseFloat(input.value) || 0;
            if (v < 1) v = 1;
            if (v > max) {
                input.value = max;
                input.style.borderColor = '#ef4444';
            } else {
                input.style.borderColor = '';
            }
            calc();
        }

        function removeRow(btn) {
            btn.closest("tr").remove();
            calc();
        }

        function calc() {

            let total = 0;

            document.querySelectorAll("#tableBody tr").forEach(r => {
                const inpEl = r.querySelector('input[type=number]');
                const qty = parseFloat(inpEl?.value) || 0;
                const avail = parseFloat(r.dataset.available) || Infinity;
                if (qty > avail) {
                    if (inpEl) inpEl.style.borderColor = '#ef4444';
                } else {
                    if (inpEl) inpEl.style.borderColor = '';
                }
                total += qty;
            });

            document.getElementById("totalMoney").innerText = total;
            const anyInvalid = Array.from(document.querySelectorAll('#tableBody tr')).some(r => {
                const inpEl = r.querySelector('input[type=number]');
                const q = parseFloat(inpEl?.value) || 0;
                const a = parseFloat(r.dataset.available) || Infinity;
                return q > a || q < 1;
            });
            const saveBtn = document.querySelector('.save');
            if (saveBtn) saveBtn.disabled = anyInvalid;
        }

        async function submitOutbound() {

            const rows = document.querySelectorAll("#tableBody tr");
            if (rows.length === 0) return alert("No products added");

            const sel = document.getElementById('customerSelect');
            const recip = document.getElementById('recipientInput');
            if (!sel || !sel.value || !recip || !recip.value || !recip.value.trim()) return alert('Please select a customer and enter recipient before saving.');

            const payloadBody = {
                desc: document.getElementById("desc").value,
                warehouse_from_id: parseInt(document.getElementById('warehouse').value) || null,
                bin_from_id: null,
                bin_to_id: null,
                components: []
            };

            for (const r of rows) {
                const compId = parseInt(r.cells[1].dataset.id);
                let qtyRemaining = parseInt(r.querySelector('input[type=number]').value);
                const avail = parseFloat(r.dataset.available) || Infinity;
                if (qtyRemaining > avail) {
                    alert('Requested quantity (' + qtyRemaining + ") exceeds total stock for product ID " + compId + ". Available: " + avail);
                    return;
                }
                payloadBody.components.push({ component_id: compId, quantity: qtyRemaining });
            }

            // attach customer/recipient info
            try {
                const sel = document.getElementById('customerSelect');
                const recip = document.getElementById('recipientInput');
                if (sel && sel.value) {
                    const id = parseInt(sel.value);
                    if (!isNaN(id)) payloadBody.customer_id = id;
                }
                if (recip && recip.value) payloadBody.recipient = recip.value;
                try {
                    const opt = sel.options[sel.selectedIndex];
                    if (opt && opt.dataset && opt.dataset.raw) payloadBody.customer_info_json = JSON.parse(opt.dataset.raw);
                } catch (e) { }
            } catch (e) { /* ignore */ }

            console.log("SEND:", payloadBody);

            const res = await fetch(BASE + "/transfers/outbound/create", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify(payloadBody)
            });
            if (!res.ok) { const txt = await res.text().catch(() => null); console.error('server error', txt || res.statusText); return alert('Creation failed: ' + (txt || res.statusText)); }
            const json = await res.json().catch(() => null);
            if (!json || !json.success) return alert('Creation failed: ' + (json?.msg || 'unknown'));

            alert('Outbound created successfully.');
            location.reload();
        }

        loadWarehouses();
        loadComponents();
        loadCustomers();

        async function setCreatorAndDate() {
            try {
                const apiRoot = BASE.replace('/storekeeper', '');
                const res = await fetch(apiRoot + '/me/info', { credentials: 'include' });
                const elBy = document.getElementById('createdBy');
                const elAt = document.getElementById('createdAt');
                if (elAt) elAt.innerText = new Date().toLocaleString();
                if (!elBy) return;
                if (res && res.ok) {
                    const j = await res.json().catch(() => null);
                    if (j && j.success && j.data) {
                        const u = j.data;
                        const display = u.display_name ?? u.DisplayName ?? u.username ?? u.Username ?? u.fullname ?? u.FullName;
                        elBy.innerText = (display || '').toString() || elBy.innerText || 'Auto';
                        return;
                    }
                }
                function _getCookie(name) { const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)'); return v ? decodeURIComponent(v.pop()) : null; }
                elBy.innerText = _getCookie('username') || _getCookie('displayName') || _getCookie('fullname') || elBy.innerText || 'Auto';
            } catch (e) { console.warn('setCreatorAndDate error', e); }
        }
        setCreatorAndDate();

    </script>


    <script>
        (function () {
            function _getCookie(name) { const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)'); return v ? decodeURIComponent(v.pop()) : null; }
            try {
                const elBy = document.getElementById('createdBy'); if (elBy) { elBy.innerText = _getCookie('username') || _getCookie('displayName') || _getCookie('fullname') || elBy.innerText || 'Auto'; }
                const elAt = document.getElementById('createdAt'); if (elAt) elAt.innerText = new Date().toLocaleString();
            } catch (e) { }
        })();
    </script>

</body>

</html>
