<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inbound Orders - Storekeeper</title>

    <style>
        body {
            font-family: Arial;
            background: #eefaf2;
            padding: 40px;
        }

        /* helper getField moved to script section */

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        button {
            padding: 6px 12px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .home-btn {
            background: #6c757d;
            color: white;
        }

        .confirm-btn {
            background: #27ae60;
            color: white;
        }

        .detail-btn {
            background: #3498db;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #2ecc71;
            color: white;
        }

        .status-complete {
            color: green;
            font-weight: bold;
        }

        .status-pending {
            color: orange;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            width: 800px;
            padding: 20px;
            border-radius: 8px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .close-btn {
            float: right;
            cursor: pointer;
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <h2>Inbound Orders</h2>
        <button class="home-btn" onclick="goHome()">⬅ Back to Home</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Order Code</th>
                <th>Date</th>
                <th>Warehouse</th>
                <th>Bin</th>
                <th>Total Items</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="orderTable"></tbody>
    </table>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">X</span>
            <h3>Order Detail</h3>
            <div id="detailContent"></div>
        </div>
    </div>

    <script>

        const BASE = "https://localhost:7297/api";

        function getField(obj, ...names) {
            if (!obj) return "-";
            for (const n of names) {
                if (obj[n] !== undefined && obj[n] !== null) return obj[n];
            }
            return "-";
        }

        function getComponents(obj) {
            if (!obj) return [];
            const keys = ['components','Components','transfer_request_components','transferRequestComponents','TransferRequestComponents'];
            for (const k of keys) if (Array.isArray(obj[k])) return obj[k];
            if (Array.isArray(obj.data)) return obj.data;
            for (const k of Object.keys(obj)) {
                if (Array.isArray(obj[k]) && obj[k].length>0 && (obj[k][0].quantity !== undefined || obj[k][0].component_id !== undefined))
                    return obj[k];
            }
            return [];
        }

        function goHome() {
            window.location = "home.html";
        }

        function getStatusText(status) {
            switch (status) {
                case 0: return "Pending";
                case 1: return "Approved";
                case 2: return "Approved - Waiting Confirm";
                case 3: return "Completed";
                default: return "Unknown";
            }
        }

        async function load() {
            // load transfers summary
            let res = await fetch(BASE + "/storekeeper/transfers", { credentials: "include" });
            let result = await res.json();

            const inboundListSummary = (result.data || []).filter(x => x.type === 1);
            const warehouseCache = {};

            const inboundList = await Promise.all(inboundListSummary.map(async t0 => {
                try {
                    // fetch full transfer detail first (to get components)
                    const dres = await fetch(BASE + "/storekeeper/transfers/" + (t0.id ?? t0.ID ?? t0.request_id), { credentials: 'include' });
                    if (dres.ok) {
                        const djson = await dres.json();
                        if (djson?.success && djson.data) t0 = djson.data;
                    }

                    // if still missing bin info, try bins endpoint
                    if (t0.bin_to && (t0.bin_to.location_in_warehouse || t0.bin_to.locationInWarehouse || t0.bin_to.binCode)) return t0;
                    const binId = t0.bin_to_id ?? t0.binToId ?? t0.bin_to?.id ?? t0.bin_to?.ID;
                    if (!binId) return t0;
                    const bres = await fetch(BASE + "/storekeeper/bins/" + binId, { credentials: 'include' });
                    if (bres.ok) {
                        const bjson = await bres.json();
                        if (bjson?.success && bjson.data) {
                            t0.bin_to = bjson.data;
                            const w = t0.bin_to.warehouse ?? t0.bin_to.Warehouse ?? null;
                            const wid = w?.id ?? t0.bin_to.warehouse_id ?? t0.bin_to.warehouseId ?? t0.bin_to.WarehouseId;
                            if (!w && wid) {
                                if (!warehouseCache[wid]) {
                                    try {
                                        const wres = await fetch(BASE + "/storekeeper/warehouses/" + wid, { credentials: 'include' });
                                        if (wres.ok) {
                                            const wjson = await wres.json();
                                            if (wjson?.success && wjson.data) warehouseCache[wid] = wjson.data;
                                        }
                                    } catch (e) { console.error('warehouse fetch failed', e); }
                                }
                                if (warehouseCache[wid]) t0.bin_to.warehouse = warehouseCache[wid];
                            }
                        }
                    }
                    // also set helper field for to-warehouse name
                    try {
                        const toName = t0.bin_to?.warehouse?.name ?? t0.bin_to?.warehouse?.warehouseName ?? t0.bin_to?.warehouse ?? null;
                        t0._toWarehouseName = toName ?? null;
                    } catch (e) { /* ignore */ }
                    return t0;
                } catch (e) {
                    console.error('detail/bin fetch failed', e);
                    return t0;
                }
            }));

            let html = "";

            inboundList.forEach(o => {

                let statusText = getStatusText(o.status);
                let statusClass = o.status === 3 ? "status-complete" : "status-pending";

                // read using JSON names returned by API (snake_case) with fallbacks
                const binTo = o['bin_to'] ?? o.bin_to ?? null;
                let warehouse = '-';
                if (binTo?.warehouse) warehouse = binTo.warehouse.name ?? binTo.warehouse.warehouseName ?? binTo.warehouse;
                else if (o.warehouse) warehouse = o.warehouse.name ?? o.warehouse.warehouseName ?? o.warehouse;
                const bin = binTo?.location_in_warehouse ?? binTo?.locationInWarehouse ?? binTo?.binCode ?? o.location_in_warehouse ?? o.locationInWarehouse ?? '-';

                const comps = getComponents(o);
                const totalItems = comps.reduce((s, c) => s + (c.quantity ?? c.Quantity ?? c.qty ?? 0), 0);

                // chỉ dẫn sang trang chi tiết (trang chi tiết có nút confirm)
                let action = `<button class="detail-btn" onclick="goDetail(${o.id})">Detail</button>`;

                html += `
<tr>
<td>${o.description}</td>
<td>${formatDate(o.creation_date)}</td>
<td>${warehouse}</td>
<td>${bin}</td>
<td>${totalItems}</td>
<td class="${statusClass}">${statusText}</td>
<td>${action}</td>
</tr>`;
            });

            document.getElementById("orderTable").innerHTML = html;
        }


        function goDetail(id) {
            window.location.href = `inbound-detail.html?id=${id}`;
        }


        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleString();
        }

        load();

    </script>

</body>
</html>
