<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inbound Orders - Storekeeper</title>

    <style>
        :root{--muted:#6b7280;--accent:#10b981}
        body{font-family:Inter, 'Segoe UI', Roboto, Arial, sans-serif;background:#f4fbf7;padding:28px;color:#0f172a}
        .page{max-width:1200px;margin:0 auto}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
        h2{margin:0;font-size:20px}
        .controls{display:flex;gap:12px;align-items:center}
        .search{display:flex;gap:8px;align-items:center}
        .search input{padding:8px;border-radius:8px;border:1px solid #eef6f0}
        .btn{padding:8px 12px;border-radius:8px;border:none;cursor:pointer}
        .btn.ghost{background:transparent;border:1px solid #e6f6ee}
        .btn.primary{background:var(--accent);color:#fff}
        .table-card{background:#fff;border-radius:12px;padding:12px;box-shadow:0 8px 30px rgba(2,6,23,0.06)}
        table{width:100%;border-collapse:collapse}
        thead th{background:linear-gradient(90deg,#bbf7d0,#ecfccb);color:#065f46;padding:12px;text-align:left;border-bottom:1px solid #eef6f0}
        th,td{padding:12px;border-bottom:1px solid #f1f5f4}
        tr:hover td{background:#fbfff8}
        .status-complete{color:#059669;font-weight:700}
        .status-pending{color:#d97706;font-weight:700}
        .action-btn{background:#06b6d4;color:#fff;padding:6px 10px;border-radius:8px;border:none;cursor:pointer}
        /* pagination */
        .pagination{display:flex;gap:6px;justify-content:flex-end;margin-top:12px}
        .page-item{padding:6px 10px;border-radius:8px;border:1px solid #e6f6ee;background:#fff;cursor:pointer}
        .page-item.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    </style>
</head>

<body>

    <div class="page">
        <div class="top-bar">
            <div>
                <h2>Inbound</h2>
                <div style="color:var(--muted);font-size:13px">Inbound receipts list — paginated, 5 per page</div>
            </div>
            <div class="controls">
                <div class="search">
                    <input id="q" placeholder="Search by description, warehouse, bin..." />
                    <button class="btn ghost" onclick="applyFilter()">Search</button>
                </div>
                <button class="btn primary" onclick="goHome()">Back</button>
            </div>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Order Code</th>
                        <th>Date</th>
                        <th>Warehouse</th>
                        <th>Bin</th>
                        <th>Total Items</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="orderTable"></tbody>
            </table>
            <div id="pagination" class="pagination"></div>
        </div>

    <div class="modal" id="detailModal">
        <div class="modal-content">
      
            <div id="detailContent"></div>
        </div>
    </div>

    <script>

        const BASE = "https://localhost:7297/api";

        function getField(obj, ...names) {
            if (!obj) return "-";
            for (const n of names) {
                if (obj[n] !== undefined && obj[n] !== null) return obj[n];
            }
            return "-";
        }

        function getId(obj) {
            if (!obj) return null;
            return obj.id ?? obj.ID ?? obj.request_id ?? obj.requestId ?? obj.requestID ?? null;
        }

        function getComponents(obj) {
            if (!obj) return [];
            const keys = ['components','Components','transfer_request_components','transferRequestComponents','TransferRequestComponents'];
            for (const k of keys) if (Array.isArray(obj[k])) return obj[k];
            if (Array.isArray(obj.data)) return obj.data;
            for (const k of Object.keys(obj)) {
                if (Array.isArray(obj[k]) && obj[k].length>0 && (obj[k][0].quantity !== undefined || obj[k][0].component_id !== undefined))
                    return obj[k];
            }
            return [];
        }

        function goHome() {
            window.location = "home.html";
        }


        function getStatusText(status) {
            switch (status) {
                case 0: return "Unknown";
                case 1: return "Pending";
                case 2: return "Approved - Waiting Confirm";
                case 3: return "Rejected";
                case 4: return "Finished";
                case 5: return "Missing components";
                case 6: return "Canceled";
                default: return "Unknown";
            }
        }

        async function load() {
            try {
                let res = await fetch(BASE + "/storekeeper/transfers", { credentials: "include" });
                let result = await res.json();
                
                const inboundListSummary = (result.data || []).filter(x => x.type === 1);
                
                const inboundList = [];
                for (let t0 of inboundListSummary) {
                    try {
                        const dres = await fetch(BASE + "/storekeeper/transfers/" + (getId(t0)), { credentials: 'include' });
                        if (dres.ok) {
                            const djson = await dres.json();
                            if (djson?.success && djson.data) t0 = djson.data;
                        }

                        const binId = t0.bin_to_id ?? t0.binToId ?? t0.bin_to?.id ?? t0.bin_to?.ID;
                        if (binId && (!t0.bin_to || t0.bin_to.id === undefined)) {
                            const bres = await fetch(BASE + "/storekeeper/bins/" + binId, { credentials: 'include' });
                            if (bres.ok) {
                                const bjson = await bres.json();
                                if (bjson?.success && bjson.data) {
                                    t0.bin_to = bjson.data;
                                }
                            }
                        }
                        // If API provides finished_components with bin object, reuse it as bin_finish
                        const finishedArr = t0.finished_components ?? t0.finishedComponents ?? t0.finished_components_list ?? t0.finishedComponentsList;
                        if (Array.isArray(finishedArr) && finishedArr.length > 0) {
                            // if multiple finished components, collect all finished bins
                            const bins = finishedArr.map(fc => {
                                const binObj = fc.bin ?? fc.Bin ?? null;
                                return binObj ? binObj : ((fc.bin_id || fc.binId) ? { id: fc.bin_id ?? fc.binId } : null);
                            }).filter(x => x !== null);
                            if (bins.length === 1) {
                                t0.bin_finish = bins[0];
                            } else if (bins.length > 1) {
                                t0.bin_finish_list = bins;
                            }
                            // resolve warehouse for each finished bin if needed
                            if ((t0.bin_finish_list && t0.bin_finish_list.length>0) || t0.bin_finish) {
                                const list = t0.bin_finish_list ?? [t0.bin_finish];
                                const names = new Set();
                                for (const bin of list) {
                                    const bwId = bin?.warehouse ?? bin?.warehouse_id ?? bin?.warehouseId ?? (typeof bin?.warehouse === 'object' ? bin.warehouse.id : null) ?? t0.warehouse_to_id;
                                    if (bwId && (!bin?.warehouse || typeof bin.warehouse !== 'object')) {
                                        try {
                                            const wresB = await fetch(BASE + "/storekeeper/warehouses/" + bwId, { credentials: 'include' });
                                            if (wresB.ok) {
                                                const wjsonB = await wresB.json();
                                                if (wjsonB?.success && wjsonB.data) {
                                                    bin.warehouse = wjsonB.data;
                                                    names.add(wjsonB.data.name ?? wjsonB.data.warehouseName);
                                                }
                                            }
                                        } catch (e) { console.error('bin finish warehouse fetch failed', e); }
                                    } else if (bin?.warehouse && typeof bin.warehouse === 'object') {
                                        names.add(bin.warehouse.name ?? bin.warehouse.warehouseName);
                                    }
                                }
                                if (names.size === 1) t0._finishWarehouseName = Array.from(names)[0];
                                else if (names.size > 1) t0._finishWarehouseName = Array.from(names).join(', ');
                            }
                        }
                        // If the transfer is confirmed (status 4) there might be a "bin_finish"/"binFinish" field
                        // that points to the final bin where items were placed. Try to load it so the list can show
                        // the finished bin when status is 4.
                        const binFinishId = t0.bin_finish_id ?? t0.binFinishId ?? t0.bin_finish?.id ?? t0.bin_finish?.ID;
                        // If there's a binFinishId try to resolve it regardless of status (some environments mark canceled/other statuses differently)
                        if (binFinishId && (!t0.bin_finish || t0.bin_finish.id === undefined)) {
                            try {
                                const bfres = await fetch(BASE + "/storekeeper/bins/" + binFinishId, { credentials: 'include' });
                                if (bfres.ok) {
                                    const bfjson = await bfres.json();
                                    if (bfjson?.success && bfjson.data) {
                                        t0.bin_finish = bfjson.data;
                                    }
                                }
                            } catch (e) {
                                console.error('bin_finish fetch failed', e);
                            }
                        }
                        
                        const wId = t0.bin_to?.warehouse ?? t0.bin_to?.warehouse_id ?? t0.bin_to?.warehouseId ?? (typeof t0.bin_to?.warehouse === 'object' ? t0.bin_to.warehouse.id : null) ?? t0.warehouse_to_id;
                        if (wId && (!t0.bin_to?.warehouse || typeof t0.bin_to.warehouse !== 'object')) {
                            const wres = await fetch(BASE + "/storekeeper/warehouses/" + wId, { credentials: 'include' });
                            if (wres.ok) {
                                const wjson = await wres.json();
                                if (wjson?.success && wjson.data) {
                                    t0._toWarehouseName = wjson.data.name ?? wjson.data.warehouseName;
                                    if(t0.bin_to) t0.bin_to.warehouse = wjson.data;
                                }
                            }
                        } else if (t0.bin_to?.warehouse && typeof t0.bin_to.warehouse === 'object') {
                            t0._toWarehouseName = t0.bin_to.warehouse.name ?? t0.bin_to.warehouse.warehouseName;
                        }
                        // Also resolve warehouse name for bin_finish if present
                        const bfWId = t0.bin_finish?.warehouse ?? t0.bin_finish?.warehouse_id ?? t0.bin_finish?.warehouseId ?? (typeof t0.bin_finish?.warehouse === 'object' ? t0.bin_finish.warehouse.id : null) ?? t0.warehouse_to_id;
                        if (t0.bin_finish) {
                            if (bfWId && (!t0.bin_finish?.warehouse || typeof t0.bin_finish.warehouse !== 'object')) {
                                try {
                                    const wres2 = await fetch(BASE + "/storekeeper/warehouses/" + bfWId, { credentials: 'include' });
                                    if (wres2.ok) {
                                        const wjson2 = await wres2.json();
                                        if (wjson2?.success && wjson2.data) {
                                            t0._finishWarehouseName = wjson2.data.name ?? wjson2.data.warehouseName;
                                            t0.bin_finish.warehouse = wjson2.data;
                                        }
                                    }
                                } catch (e) { console.error('bin_finish warehouse fetch failed', e); }
                            } else if (t0.bin_finish?.warehouse && typeof t0.bin_finish.warehouse === 'object') {
                                t0._finishWarehouseName = t0.bin_finish.warehouse.name ?? t0.bin_finish.warehouse.warehouseName;
                            }
                        }
                        
                    } catch (e) {
                        console.error('detail fetch failed', e);
                    }
                    inboundList.push(t0);
                }

                window._inboundListData = inboundList;
                window._inboundFiltered = inboundList.slice();
                window._inboundPageSize = 5;
                window._inboundCurrentPage = 1;
                renderPage(1);
            } catch (err) { }
        }

        window.renderPage = function (page) {
            window._inboundCurrentPage = page;
            const size = window._inboundPageSize;
            const all = window._inboundFiltered || [];
            const start = (page - 1) * size;
            const items = all.slice(start, start + size);

            let html = "";
            items.forEach(o => {
                let statusText = getStatusText(o.status ?? o.Status);
                let statusClass = (o.status === 3 || o.Status === 3) ? "status-complete" : "status-pending";

                // Prefer to show finished bins when available
                const binTo = o['bin_to'] ?? o.bin_to ?? null;
                const binFinish = o['bin_finish'] ?? o.bin_finish ?? null;
                const binFinishList = o['bin_finish_list'] ?? o.bin_finish_list ?? null;
                let warehouse = '-';
                let bin = '-';
                if (Array.isArray(binFinishList) && binFinishList.length>0) {
                  
                    const names = binFinishList.map(b => b?.warehouse?.name ?? b?.warehouse?.warehouseName ?? '').filter(x=>x);
                    warehouse = names.length ? Array.from(new Set(names)).join(', ') : (o._finishWarehouseName ?? (binTo?.warehouse?.name ?? binTo?.warehouse?.warehouseName) ?? '-');
                    bin = binFinishList.map(b => b?.location_in_warehouse ?? b?.locationInWarehouse ?? b?.binCode ?? '-').join(', ');
                } else if (binFinish) {
                    warehouse = o._finishWarehouseName ?? (binFinish?.warehouse?.name ?? binFinish?.warehouse?.warehouseName) ?? '-';
                    bin = binFinish?.location_in_warehouse ?? binFinish?.locationInWarehouse ?? binFinish?.binCode ?? '-';
                } else {
                    warehouse = o._toWarehouseName ?? (binTo?.warehouse?.name ?? binTo?.warehouse?.warehouseName) ?? '-';
                    bin = binTo?.location_in_warehouse ?? binTo?.locationInWarehouse ?? binTo?.binCode ?? o.location_in_warehouse ?? o.locationInWarehouse ?? '-';
                }

                
                const isPendingOrApproved = (o.status === 1 || o.Status === 1 || o.status === 2 || o.Status === 2);
                if (isPendingOrApproved) bin = '<i>Not allocated</i>';

                const comps = getComponents(o);
                const totalItems = comps.reduce((s, c) => s + (c.quantity ?? c.Quantity ?? c.qty ?? 0), 0);

                let action = `<button class="action-btn" onclick="goDetail('${getId(o)}')">Detail</button>`;
          
                if ((o.status ?? o.Status) === 1) {
                    action += ` <button class="btn ghost" onclick="cancelInbound('${getId(o)}')" style="background:#fff1f0;border:1px solid #fdecec;color:#9f1239;padding:6px 10px;border-radius:8px;margin-left:6px">Cancel</button>`;
                }

                html += `
                <tr>
                    <td>${o.description ?? '-'}</td>
                    <td>${formatDate(o.creation_date)}</td>
                    <td>${warehouse}</td>
                    <td>${bin}</td>
                    <td>${totalItems}</td>
                    <td class="${statusClass}">${statusText}</td>
                    <td>${action}</td>
                </tr>`;
            });

            document.getElementById("orderTable").innerHTML = html;

            const totalItemsAll = (window._inboundFiltered || []).length;
            const totalPages = Math.max(1, Math.ceil(totalItemsAll / window._inboundPageSize));
            const pag = document.getElementById('pagination');
            pag.innerHTML = '';
            for(let i=1;i<=totalPages;i++){
                const cls = 'page-item' + (i===page? ' active':'');
                pag.insertAdjacentHTML('beforeend', `<div class="${cls}" onclick="renderPage(${i})">${i}</div>`);
            }
        };


        function goDetail(id) {
            if (!id) return;
            window.location.href = `inbound-detail.html?id=${id}`;
        }

        async function cancelInbound(id) {
            if (!id) return;
            if (!confirm('Are you sure you want to cancel this inbound receipt?')) return;
            try {
                const res = await fetch(BASE + '/storekeeper/transfers/' + id + '/cancel', { method: 'POST', credentials: 'include' });
                if (!res.ok) {
                    const txt = await res.text().catch(()=>null);
                    return alert('Cancel failed: ' + (txt || res.statusText));
                }
                const json = await res.json().catch(()=>null);
                if (json?.success) { alert('Inbound canceled'); load(); }
                else alert(json?.msg || json?.message || 'Error');
            } catch (e) { alert('Network error: ' + e.message); }
        }

  
        function applyFilter(){
            const q = document.getElementById('q')?.value?.trim().toLowerCase() || '';
            const all = window._inboundListData || [];
            if(!q){ window._inboundFiltered = all.slice(); renderPage(1); return; }
            window._inboundFiltered = all.filter(o => {
                const txt = ((o.description||'') + ' ' + (o._toWarehouseName||'') + ' ' + (o.bin_to?.location_in_warehouse||'') ).toString().toLowerCase();
                return txt.includes(q);
            });
            renderPage(1);
        }


        function formatDate(dateStr) {
            const d = getField({d: dateStr}, 'd', 'creation_date', 'creationDate', 'created_at', 'createdAt');
            if (!d || d === '-') return '-';
            try { return new Date(d).toLocaleString(); } catch(e) { return d; }
        }

        load();

    </script>

</body>
</html>
