<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Maintenance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        /* Reset & font */
        * {
            box-sizing: border-box;
            font-family: 'Inter', Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            color: #222;
        }

        /* Card container */
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

            /* Headings & text */
            .card h1, .card h2, .card h3 {
                margin-bottom: 10px;
                color: #111827;
            }

            .card p {
                margin: 8px 0;
                color: #6b7280;
                font-size: 14px;
            }

        /* Buttons */
        .btn {
            padding: 10px 14px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

            .btn-primary:hover {
                background: #2563eb;
            }

        .btn-ghost {
            background: transparent;
            border: 1px solid #ddd;
            color: #111827;
        }

            .btn-ghost:hover {
                background: rgba(59, 130, 246, 0.1);
            }

        /* Actions container */
        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 18px;
        }

        /* Input fields (if needed) */
        input {
            width: 100%;
            padding: 12px 14px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #d1d5db;
        }

            input:focus {
                border-color: #3b82f6;
                outline: none;
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            }
    </style>
</head>
<body>
    <div class="card">
        <h1>System Maintenance</h1>
        <p>The system is currently in maintenance mode. Do you want to log out?</p>
        <div class="actions">
            <button class="btn btn-primary" onclick="doLogout()">Log Out</button>
        </div>
    </div>

    <script>
        const POLL_ENDPOINT = '/api/system/maintenance';
        const POLL_INTERVAL_MS = 30000; 

        const messageEl = document.querySelector('.card p');
        const actionsEl = document.querySelector('.actions');

        async function fetchMaintenanceInfo() {
            try {
                const res = await fetch(POLL_ENDPOINT, { credentials: 'include' });
                if (res.status === 503) {
                    const j = await res.json();
                    const msg = j.message ?? j.msg ?? 'System is under maintenance';
                    const scheduled = j.scheduledEnd ?? j.scheduled_end ?? null;
                    updateMessage(msg, scheduled);
                    return true; 
                }
                window.location.href = '/';
                return false;
            } catch (e) {
                console.warn('maintenance poll failed', e);
                return true;
            }
        }

        function updateMessage(msg, scheduled) {
            let html = `<div>${escapeHtml(msg)}</div>`;
            if (scheduled) {
                let dt = null;
                try {
                    dt = new Date(scheduled);
                    if (isNaN(dt.getTime())) dt = null;
                } catch (e) { dt = null; }
                if (!dt && /T/.test(scheduled)) {
                    dt = new Date(scheduled);
                }
                if (dt) {
                    html += `<div style="margin-top:8px;font-size:13px;color:#374151">Scheduled end: ${dt.toLocaleString()}</div>`;
                    html += `<div id="countdown" style="margin-top:6px;font-weight:600;color:#111827"></div>`;
                    startCountdown(dt);
                }
            }
            messageEl.innerHTML = html;
        }

        function startCountdown(target) {
            const cd = document.getElementById('countdown');
            if (!cd) return;
            clearInterval(window._maintenanceCountdown);
            function tick() {
                const diff = target.getTime() - Date.now();
                if (diff <= 0) {
                    cd.innerText = 'Maintenance window ended — reloading...';
                    clearInterval(window._maintenanceCountdown);
                    setTimeout(() => window.location.reload(), 1500);
                    return;
                }
                const mins = Math.floor(diff / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                cd.innerText = `Time remaining: ${mins}m ${secs}s`;
            }
            tick();
            window._maintenanceCountdown = setInterval(tick, 1000);
        }

        async function doLogout() {
            try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }); } catch (e) { }
            window.location.href = '/login';
        }

        function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

        (async function initMaintenance() {
            await fetchMaintenanceInfo();
            window._maintenancePoll = setInterval(fetchMaintenanceInfo, POLL_INTERVAL_MS);
        })();
    </script>
</body>
</html>
