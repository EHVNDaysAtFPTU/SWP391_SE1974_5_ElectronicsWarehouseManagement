<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin | User Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="layout">

        <div class="sidebar">
            <div class="sidebar-top">
                <h2 class="brand">ECWMS</h2>

                <div class="sidebar-user">
                    <div class="avatar-wrapper" onclick="toggleUserMenu(event)">
                        <img src="https://i.pravatar.cc/40?img=12" class="avatar-large">

                        <div id="userMenu" class="user-menu hidden">
                            <div onclick="openProfile()">Profile</div>
                            <div onclick="logout()">Logout</div>
                        </div>
                    </div>
                </div>

                <div class="menu">
                    <p onclick="goUser()">User Management</p>
                    <p onclick="goMaintenance()">Maintenance Config</p>
                    <p onclick="goSystemInfo()">System Info</p>
                </div>
            </div>
        </div>

        <div class="content">

            <div class="header">
                <h2>User Management</h2>
                <button class="btn-primary" onclick="window.location.href='/create-user.html'">+ Add User</button>
            </div>

            <div class="search-bar">
                <input id="searchInput" placeholder="Search username or email">
                <button class="btn-primary" onclick="searchUsers()">Search</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
            </table>

        </div>
    </div>
    <div id="viewModal" class="modal hidden">
        <div class="modal-box">
            <h3>User Information</h3>
            <p><b>Username:</b> <span id="viewUsername"></span></p>
            <p><b>Display Name:</b> <span id="viewDisplayName"></span></p>
            <p><b>Email:</b> <span id="viewEmail"></span></p>
            <p><b>Role:</b> <span id="viewRole"></span></p>
            <p><b>Status:</b> <span id="viewStatus"></span></p>

            <div class="modal-actions">
                <button onclick="closeViewModal()">Close</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal hidden">
        <div class="modal-box">
            <h3>Edit User</h3>

            <input type="hidden" id="editUserId">

            <label>Role</label>
            <select id="editRole">
                <option value="2">Manager</option>
                <option value="3">Storekeeper</option>
            </select>

            <label>Status</label>
            <select id="editStatus">
                <option value="1">Active</option>
                <option value="2">Inactive</option>
                <option value="3">Suspended</option>
            </select>

            <div class="modal-actions">
                <button class="btn-primary" onclick="updateUser()">Save</button>
                <button onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>


        async function api(endpoint, method = "GET", body = null) {
            const opt = {
                method,
                headers: { "Content-Type": "application/json" },
                credentials: "include"
            };
            if (body) opt.body = JSON.stringify(body);
            const res = await fetch(`/api${endpoint}`, opt);
            return await res.json();
        }

        async function loadUsers() {
            const r = await api("/admin/users");
            if (r.success) render(r.data);
        }
        function render(users) {
            const tbody = document.getElementById("userTableBody");
            tbody.innerHTML = "";

            users.forEach(u => {

                let statusText = "";
                let statusClass = "";

                switch (u.status) {
                    case 1:
                        statusText = "Active";
                        statusClass = "status active";
                        break;
                    case 2:
                        statusText = "Inactive";
                        statusClass = "status disabled";
                        break;
                    case 3:
                        statusText = "Suspended";
                        statusClass = "status locked";
                        break;
                    case 4:
                        statusText = "Deleted";
                        statusClass = "status disabled";
                        break;
                }

                tbody.innerHTML += `
<tr>
<td>${u.user_id}</td>
<td>${u.username}</td>
<td>${u.email}</td>
<td><span class="${statusClass}">${statusText}</span></td>
<td>
<button onclick="viewUser(${u.user_id})">View</button>
<button onclick="editUser(${u.user_id})">Edit</button>
<button class="btn-danger" onclick="deleteUser(${u.user_id})">Delete</button>
</td>
</tr>`;
            });
        }

        async function deleteUser(id) {
            if (!confirm("Are you sure you want to delete this user?")) return;

            const r = await api(`/admin/users/${id}/delete`, "DELETE");

            if (!r.success) return showError(r.msg);

            alert("User deleted successfully!");
            loadUsers();
        }

        async function searchUsers() {
            const q = searchInput.value.trim();
            if (!q) return loadUsers();
            const r = await api(`/admin/users/search?query=${q}`);
            if (r.success) render(r.data);
        }

        function openModal() {
            modal.classList.remove("hidden");
        }

        function closeModal() {
            modal.classList.add("hidden");
        }
        async function viewUser(id) {
            const r = await api(`/admin/users/${id}`);
            if (!r.success) return showError(r.msg);

            const u = r.data;

            let statusText = "Unknown";
            switch (u.status) {
                case 1: statusText = "Active"; break;
                case 2: statusText = "Inactive"; break;
                case 3: statusText = "Suspended"; break;
                case 4: statusText = "Deleted"; break;
            }

            const roleName = u.role && u.role.length > 0
                ? u.role.map(r => r.role_name).join(", ")
                : "No Role";

            viewUsername.innerText = u.username || "-";
            viewDisplayName.innerText = u.displayName ?? u.display_name ?? u.displayname ?? "-";
            viewEmail.innerText = u.email || "-";
            viewRole.innerText = roleName;
            viewStatus.innerText = statusText;

            viewModal.classList.remove("hidden");
        }

        function closeViewModal() {
            viewModal.classList.add("hidden");
        }
        async function editUser(id) {
            const r = await api(`/admin/users/${id}`);
            if (!r.success) return;

            const u = r.data;

            const roleName = u.role && u.role.length > 0
                ? u.role[0].role_name
                : "";

            const roleId = u.role && u.role.length > 0
                ? u.role[0].role_id
                : "";

            if (roleName === "Admin") {
                alert("Cannot edit Admin account");
                return;
            }

            editUserId.value = id;
            editRole.value = roleId;
            editStatus.value = u.status;

            editModal.classList.remove("hidden");
        }
        function closeEditModal() {
            editModal.classList.add("hidden");
        }

        async function updateUser() {
            const id = parseInt(editUserId.value);
            const roleId = parseInt(editRole.value);
            const status = parseInt(editStatus.value);

            const roleRes = await api(`/admin/users/${id}/role`, "PATCH", {
                role_ids: [roleId]
            });

            if (!roleRes.success) return showError(roleRes.msg);

            const statusRes = await api(`/admin/users/${id}/status`, "PATCH", {
                status: status
            });

            if (!statusRes.success) return showError(statusRes.msg);

            alert("Update success");
            closeEditModal();
            loadUsers();
        }
        async function logout() {
            await api("/auth/logout", "POST");
            window.location.href = "/login.html";
        }

        function openProfile() {
            window.location.href = "/me/index.html";
        }
        function toggleUserMenu(event) {
            event.stopPropagation();
            document.getElementById("userMenu").classList.toggle("hidden");
        }

        document.addEventListener("click", function () {
            document.getElementById("userMenu").classList.add("hidden");
        });
        function showError(msg) {
            alert(msg || "Something went wrong!");
        }
        function goUser() {
            window.location.href = "/home.html";
        }

        function goMaintenance() {
            window.location.href = "/maintenance-cfg.html";
        }

        function goSystemInfo() {
            window.location.href = "/systeminfo.html";
        }

        document.addEventListener("DOMContentLoaded", loadUsers);
    </script>

</body>
</html>
