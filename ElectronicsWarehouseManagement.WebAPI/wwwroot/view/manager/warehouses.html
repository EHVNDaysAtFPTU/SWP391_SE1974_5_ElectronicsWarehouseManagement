<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouses | Manager</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Manager Styles -->
    <link rel="stylesheet" href="css/manager-basic.css">
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column">
        <div class="p-3">
            <h5 class="fw-bold mb-0">E-Warehouse</h5>
        </div>
        <nav class="nav flex-column mt-3">
            <a class="nav-link" href="home.html">Dashboard</a>
            <a class="nav-link" href="component-inventory.html">Components</a>
            <a class="nav-link" href="transfers.html">Transfers</a>
            <a class="nav-link active" href="warehouses.html">Warehouses</a>
            <a class="nav-link" href="bin.html">Bins</a>
            <a class="nav-link" href="customer.html">Customers</a>
        </nav>
    </div>

    <!-- Header -->
    <header class="header d-flex justify-content-between align-items-center">
        <div>
            <h5 class="mb-0">Warehouse Directory</h5>
            <small class="text-muted">Manage physical storage facilities</small>
        </div>

        <div class="profile-container position-relative">
            <div class="cursor-pointer d-flex align-items-center" onclick="toggleProfileMenu()">
                <img src="https://i.pravatar.cc/40?img=12" alt="Profile" class="rounded-circle me-2 border" width="40">
                <span class="small fw-bold">Manager</span>
            </div>

            <div class="profile-dropdown" id="profileDropdown">
                <a href="profile.html">My Profile</a>
                <a href="account.html">Settings</a>
                <hr class="my-1">
                <a href="#" onclick="logout()" class="text-danger">Logout</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container-fluid">
            
            <div class="mb-4">
                <h4 class="fw-bold">Available Facilities</h4>
                <p class="text-muted small">Select a warehouse to view its bin structure.</p>
            </div>

            <!-- Filters Card -->
            <div class="card shadow-sm p-3 mb-4">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label small">Search Name</label>
                        <input type="text" id="searchInput" class="form-control" placeholder="Search naming...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Sort By</label>
                        <select id="sortBy" class="form-select">
                            <option value="id">Default (ID)</option>
                            <option value="warehouseName">Name</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Order</label>
                        <select id="sortDirection" class="form-select">
                            <option value="asc">Ascending</option>
                            <option value="desc">Descending</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-primary w-100" onclick="applyFilter()">Search</button>
                    </div>
                </div>
            </div>

            <!-- Content Card -->
            <div class="card shadow-sm overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Facility Name</th>
                                <th>Description</th>
                                <th>Location</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="warehouseTable">
                            <!-- JS content -->
                        </tbody>
                    </table>
                </div>
                <!-- Pagination -->
                <div class="p-4 border-top bg-white">
                    <div id="pagination"></div>
                    <div class="text-center mt-3">
                        <label class="small me-2">Items per page:</label>
                        <select id="pageSize" class="form-select d-inline-block w-auto form-select-sm">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="20">20</option>
                        </select>
                    </div>
                </div>
            </div>
            
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/warehouses.js"></script>
</body>
</html>
