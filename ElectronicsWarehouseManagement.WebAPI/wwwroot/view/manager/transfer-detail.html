<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Transfer Detail</title>
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/transfer-detail-style.css">
</head>

<body>

    <header class="header">
        <div class="logo">My Manager</div>

        <div class="profile-container">
            <div class="profile" onclick="toggleProfileMenu()">
                <img src="https://i.pravatar.cc/40" alt="Profile">
                <span class="username">Manager</span>
            </div>

            <div class="profile-dropdown" id="profileDropdown">
                <a href="profile.html">Thông tin cá nhân</a>
                <a href="account.html">Quản lí tài khoản</a>
                <a href="logout.html" class="logout">Logout</a>
            </div>
        </div>
    </header>

    <div class="wrapper">

        <div class="sidebar">
            <ul>
                <li><a href="home.html">Dashboard</a></li>
                <li><a href="component-inventory.html">Components</a></li>
                <li><a href="transfers.html">Transfers</a></li>
                <li><a href="warehouses.html">Warehouses</a></li>
                <li><a href="bin.html">Bins</a></li>
            </ul>
        </div>

        <div class="content">

            <h2>Transfer Detail</h2>

            <div id="infoSection"></div>
            <hr>
            <div id="componentSection"></div>

            <br>
            <button onclick="goBack()">Back</button>

        </div>
    </div>

    <script>

        document.addEventListener("DOMContentLoaded", function () {
            const id = getTransferIdFromUrl();
            if (!id) {
                document.getElementById("infoSection").innerText = "Missing transfer ID";
                return;
            }
            loadTransferDetail(id);
        });

        function getTransferIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get("id");
        }

        async function loadTransferDetail(id) {

            const response = await fetch(
                `/api/manager/get-transfer/${id}?fullInfo=true`,
                { credentials: "include" }
            );

            if (!response.ok) {
                document.getElementById("infoSection").innerText =
                    "API Error: " + response.status;
                return;
            }

            const result = await response.json();

            if (!result.success) {
                document.getElementById("infoSection").innerText = "Load failed";
                return;
            }

            renderInfo(result.data);
            renderComponents(result.data);
        }

        async function renderInfo(t) {

            const container = document.getElementById("infoSection");

            const fromWarehouseName = t.bin_from
                ? await getWarehouseName(t.bin_from.warehouse_id)
                : "-";

            const toWarehouseName = t.bin_to
                ? await getWarehouseName(t.bin_to.warehouse_id)
                : "-";

            container.innerHTML = `
            <h3>Transfer Information</h3>
            <p><strong>ID:</strong> ${t.id}</p>
            <p><strong>Description:</strong> ${t.description ?? "-"}</p>
            <p><strong>Type:</strong> ${getTypeText(t.type)}</p>
            <p><strong>Status:</strong> ${getStatusText(t.status)}</p>
            <p><strong>Creation Date:</strong> ${formatDate(t.creation_date)}</p>
            <p><strong>Execution Date:</strong> ${t.execution_date ? formatDate(t.execution_date) : "-"}</p>
            <p><strong>Creator:</strong> ${t.creator?.username || "-"}</p>
            <p><strong>Approver:</strong> ${t.approver?.username || "-"}</p>
            <p><strong>From:</strong> ${t.bin_from
                    ? `${t.bin_from.location_in_warehouse} - ${fromWarehouseName}`
                    : "-"
                }</p>
            <p><strong>To:</strong> ${t.bin_to
                    ? `${t.bin_to.location_in_warehouse} - ${toWarehouseName}`
                    : "-"
                }</p>
        `;
        }

        function renderComponents(t) {

            const container = document.getElementById("componentSection");

            if (!t.components || t.components.length === 0) {
                container.innerHTML = "<h3>Component List</h3><p>No components found</p>";
                return;
            }

            let grandTotal = 0;

            let html = `
            <h3>Component List</h3>
            <table width="100%" border="1" cellpadding="8">
                <tr>
                    <th>Component ID</th>
                    <th>Quantity</th>
                    <th>Unit Price</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
        `;

            t.components.forEach((c, index) => {

                const componentId = c.component_id;
                const quantity = c.quantity ?? 0;
                const price = c.unit_price ?? 0;
                const total = quantity * price;

                grandTotal += total;

                html += `
                <tr>
                    <td>${componentId}</td>
                    <td>${quantity}</td>
                    <td>${formatMoney(price)}</td>
                    <td>${formatMoney(total)}</td>
                    <td>
                        <button onclick="toggleDetail(${index}, ${componentId})">
                            View
                        </button>
                    </td>
                </tr>

                <tr id="detail-row-${index}" style="display:none;">
                    <td colspan="5" id="detail-content-${index}">
                        Loading...
                    </td>
                </tr>
            `;
            });

            html += `
            <tr>
                <td colspan="3"><strong>Total Transfer Value</strong></td>
                <td colspan="2"><strong>${formatMoney(grandTotal)}</strong></td>
            </tr>
        `;

            html += `</table>`;
            container.innerHTML = html;
        }

        async function toggleDetail(index, componentId) {

            if (!componentId) return;

            const row = document.getElementById(`detail-row-${index}`);
            const content = document.getElementById(`detail-content-${index}`);

            if (row.style.display === "none") {

                row.style.display = "table-row";

                if (content.dataset.loaded !== "true") {

                    const resp = await fetch(
                        `/api/manager/get-component/${componentId}?fullInfo=true`,
                        { credentials: "include" }
                    );

                    if (!resp.ok) {
                        content.innerHTML = "Failed to load detail";
                        return;
                    }

                    const result = await resp.json();
                    if (!result.success) {
                        content.innerHTML = "Failed to load detail";
                        return;
                    }

                    content.innerHTML = renderComponentDetail(result.data);
                    content.dataset.loaded = "true";
                }

            } else {
                row.style.display = "none";
            }
        }

        function renderComponentDetail(component) {

            const metadata = component.metadata ?? {};

            const categoriesText =
                component.categories && component.categories.length > 0
                    ? component.categories.map(c => c.name).join(", ")
                    : "-";

            const imageUrl = metadata.image_url
                ? `/${metadata.image_url}`
                : null;

            return `
            <div style="display:flex; gap:20px; padding:10px;">
                <div>
                    ${imageUrl
                    ? `<img src="${imageUrl}" style="width:150px;">`
                    : `<div style="width:150px;height:150px;background:#eee;display:flex;align-items:center;justify-content:center;">
                                    No Image
                               </div>`
                }
                </div>
                <div>
                    <b>ID:</b> ${component.id} <br>
                    <b>Name:</b> ${metadata.name ?? "-"} <br>
                    <b>Description:</b> ${metadata.desc ?? "-"} <br>
                    <b>Manufacturer:</b> ${metadata.manufacturer ?? "-"} <br>
                    <b>Manufacturing Date:</b> ${formatDate(metadata.manufacturing_date)} <br>
                    <b>Unit:</b> ${component.unit ?? "-"} <br>
                    <b>Unit Price:</b> ${formatMoney(component.unit_price ?? 0)} <br>
                    <b>Categories:</b> ${categoriesText} <br>
                    <b>Datasheet:</b> ${metadata.datasheet_url
                    ? `<a href="${metadata.datasheet_url}" target="_blank">View</a>`
                    : "-"
                }
                </div>
            </div>
        `;
        }

        function formatMoney(value) {
            return value.toLocaleString("vi-VN") + " VND";
        }

        function formatDate(dateString) {
            if (!dateString) return "-";
            return new Date(dateString).toLocaleDateString("vi-VN");
        }

        function getStatusText(status) {
            if (status === 0) return "Pending";
            if (status === 2) return "Approved";
            if (status === 3) return "Rejected";
            return "Unknown";
        }

        function getTypeText(type) {
            if (type === 1) return "Inbound";
            if (type === 2) return "Outbound";
            if (type === 3) return "Internal";
            return "Unknown";
        }

        async function getWarehouseName(id) {
            try {
                const resp = await fetch(
                    `/api/manager/get-warehouse/${id}?fullInfo=false`,
                    { credentials: "include" }
                );
                const { success, data } = await resp.json();
                return success ? data?.name ?? "-" : "-";
            } catch {
                return "-";
            }
        }

        function goBack() {
            window.history.back();
        }

        function toggleProfileMenu() {
            document.getElementById("profileDropdown").classList.toggle("show");
        }

        window.onclick = function (event) {
            if (!event.target.closest('.profile-container')) {
                document.getElementById("profileDropdown").classList.remove("show");
            }
        }

    </script>

</body>
</html>
