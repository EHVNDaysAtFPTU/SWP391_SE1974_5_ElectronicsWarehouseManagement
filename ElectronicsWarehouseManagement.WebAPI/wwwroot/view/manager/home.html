<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Manager</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Manager Styles -->
    <link rel="stylesheet" href="css/manager-basic.css">
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column">
        <div class="p-3">
            <h5 class="fw-bold mb-0">E-Warehouse</h5>
        </div>
        <nav class="nav flex-column mt-3">
            <a class="nav-link active" href="home.html">Dashboard</a>
            <a class="nav-link" href="component-inventory.html">Components</a>
            <a class="nav-link" href="transfers.html">Requests</a>
            <a class="nav-link" href="warehouses.html">Warehouses</a>
            <a class="nav-link" href="bin.html">Bins</a>
            <a class="nav-link" href="customer.html">Customers</a>
        </nav>
    </div>

    <!-- Header -->
    <header class="header d-flex justify-content-between align-items-center">
        <div>
            <h5 class="mb-0">Manager Dashboard</h5>
            <small class="text-muted">Overview of warehouse activities</small>
        </div>

        <div class="profile-container position-relative">
            <div class="cursor-pointer d-flex align-items-center" onclick="toggleProfileMenu()">
                <img src="https://i.pravatar.cc/40?img=12" alt="Profile" class="rounded-circle me-2 border" width="40">
                <span class="small fw-bold">Manager Dashboard</span>
            </div>

            <div class="profile-dropdown" id="profileDropdown">
                <a href="profile.html">My Profile</a>
                <hr class="my-1">
                <a href="#" onclick="logout()" class="text-danger">Logout</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container-fluid">
            
            <!-- Statistics Cards -->
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card shadow-sm p-3">
                        <small class="text-muted text-uppercase mb-1">Total Components</small>
                        <h3 class="mb-0" id="totalComponents">0</h3>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm p-3">
                        <small class="text-muted text-uppercase mb-1">Total Warehouses</small>
                        <h3 class="mb-0" id="totalWarehouses">0</h3>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm p-3 border-primary">
                        <small class="text-muted text-uppercase mb-1">Current Stock</small>
                        <h3 class="mb-0 text-primary" id="currentStock">0</h3>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm p-3 border-warning">
                        <small class="text-muted text-uppercase mb-1">Low Stock</small>
                        <h3 class="mb-0 text-warning" id="lowStock">0</h3>
                    </div>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-4">
                    <div class="card shadow-sm p-3 border-danger">
                        <small class="text-muted text-uppercase mb-1">Out Of Stock</small>
                        <h4 class="mb-0 text-danger" id="outOfStock">0</h4>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm p-3 border-success">
                        <small class="text-muted text-uppercase mb-1">Inbound Today</small>
                        <h4 class="mb-0 text-success" id="inboundToday">0</h4>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm p-3 border-info">
                        <small class="text-muted text-uppercase mb-1">Outbound Today</small>
                        <h4 class="mb-0 text-info" id="outboundToday">0</h4>
                    </div>
                </div>
            </div>

            <!-- Chart -->
            <div class="card shadow-sm p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="mb-0">Activity Chart</h5>
                    <button class="btn btn-sm btn-outline-secondary" onclick="loadTransferChart()">Refresh</button>
                </div>
                <div style="height: 350px;">
                    <canvas id="transferChart"></canvas>
                </div>
            </div>
            
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
