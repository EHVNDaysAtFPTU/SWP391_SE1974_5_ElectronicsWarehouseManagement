<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bin Detail | Manager</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Manager Styles -->
    <link rel="stylesheet" href="css/manager-basic.css">
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column">
        <div class="p-3">
            <h5 class="fw-bold mb-0">E-Warehouse</h5>
        </div>
        <nav class="nav flex-column mt-3">
            <a class="nav-link" href="home.html">Dashboard</a>
            <a class="nav-link" href="component-inventory.html">Components</a>
            <a class="nav-link" href="transfers.html">Requests</a>
            <a class="nav-link" href="warehouses.html">Warehouses</a>
            <a class="nav-link active" href="bin.html">Bins</a>
            <a class="nav-link" href="customer.html">Customers</a>
        </nav>
    </div>

    <!-- Header -->
    <header class="header d-flex justify-content-between align-items-center">
        <div>
            <h5 class="mb-0">Storage Bin Contents</h5>
            <small class="text-muted">Explore items stored in this bin</small>
        </div>

        <div class="profile-container position-relative">
            <div class="cursor-pointer d-flex align-items-center" onclick="toggleProfileMenu()">
                <img src="https://i.pravatar.cc/40?img=12" alt="Profile" class="rounded-circle me-2 border" width="40">
                <span class="small fw-bold">Manager Dashboard</span>
            </div>

            <div class="profile-dropdown" id="profileDropdown">
                <a onclick="openProfile()">Profile</a>
                <hr class="my-1">
                <a href="#" onclick="logout()" class="text-danger">Logout</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container-fluid">

            <div class="mb-4">
                <button class="btn btn-sm btn-secondary" onclick="goBackToBins()">
                    &larr; Back to Bin List
                </button>
            </div>

            <!-- Bin Header Info -->
            <div id="binInfo">
                <!-- JS content -->
            </div>

            <!-- Components List -->
            <div class="mt-4">
                <h5 class="fw-bold mb-3">Stored Components</h5>
                <div class="card shadow-sm overflow-hidden">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4">Component</th>
                                    <th>Image</th>
                                    <th>Unit</th>
                                    <th>Price</th>
                                    <th>Quantity</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody id="componentList">
                                <!-- JS content -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/bin-detail.js"></script>
</body>
</html>
