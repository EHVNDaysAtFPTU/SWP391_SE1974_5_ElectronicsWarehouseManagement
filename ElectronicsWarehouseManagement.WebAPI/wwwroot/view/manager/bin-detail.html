<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bin Detail</title>

    <link rel="stylesheet" href="css/layout.css">

    <style>
        .content {
            min-height: 750px;
            padding: 25px;
            background: #f9fbfd;
        }

        h2 {
            margin-bottom: 10px;
        }

        .back-btn {
            background: #2f80ed;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            margin-bottom: 20px;
        }

            .back-btn:hover {
                background: #1c60c9;
            }

        .detail-box {
            padding: 20px;
            border-radius: 10px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            min-height: 130px;
            line-height: 1.8;
        }

            .detail-box p {
                margin: 6px 0;
            }

        .component-container {
            margin-top: 30px;
        }

            .component-container h3 {
                margin-bottom: 10px;
            }

        /* ===== TABLE STYLE ===== */
        .component-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

            .component-table thead {
                background: #eef2f7;
            }

            .component-table th,
            .component-table td {
                padding: 12px 15px;
                border-bottom: 1px solid #f0f2f5;
                text-align: left;
                vertical-align: top;
            }

            .component-table th {
                font-weight: 600;
            }

            .component-table tbody tr:hover {
                background: #f5f9ff;
            }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-empty {
            background: #9e9e9e;
        }

        .badge-inuse {
            background: #27ae60;
        }

        .badge-disabled {
            background: #e74c3c;
        }

        .skeleton {
            height: 16px;
            background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="logo">My Manager</div>

        <div class="profile-container">
            <div class="profile">
                <img src="https://i.pravatar.cc/40" alt="Profile">
                <span class="username">Manager</span>
            </div>
        </div>
    </header>

    <div class="wrapper">

        <div class="sidebar">
            <ul>
                <li><a href="home.html">Dashboard</a></li>
                <li><a href="component-inventory.html">Components</a></li>
                <li><a href="warehouse.html">Warehouses</a></li>
                <li><a href="bin.html" class="active">Bins</a></li>
                <li><a href="transfer-list.html">Transfers</a></li>
            </ul>
        </div>

        <div class="content">

            <h2>Bin Detail</h2>

            <button class="back-btn" onclick="history.back()">← Back to Bin List</button>

            <div id="binInfo" class="detail-box"></div>

            <div class="component-container">
                <h3>Components In This Bin</h3>

                <table class="component-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Component Info</th>
                            <th>Quantity</th>
                        </tr>
                    </thead>
                    <tbody id="componentList"></tbody>
                </table>
            </div>

        </div>
    </div>

    <script>

        let binId = null;

        document.addEventListener("DOMContentLoaded", function () {
            const params = new URLSearchParams(window.location.search);
            binId = params.get("binId");

            if (!binId) {
                alert("Bin ID not found");
                return;
            }

            loadBinDetail();
        });

        function showSkeleton() {

            const info = document.getElementById("binInfo");
            info.innerHTML = `
                <div class="skeleton" style="width:40%"></div><br>
                <div class="skeleton" style="width:60%"></div><br>
                <div class="skeleton" style="width:30%"></div>
            `;

            const container = document.getElementById("componentList");
            container.innerHTML = "";

            for (let i = 0; i < 5; i++) {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td><div class="skeleton"></div></td>
                    <td><div class="skeleton"></div></td>
                    <td><div class="skeleton"></div></td>
                `;
                container.appendChild(row);
            }
        }

        async function loadBinDetail() {

            try {

                showSkeleton();

                const response = await fetch(`/api/manager/get-bin/${binId}?fullInfo=true`, {
                    credentials: 'include'
                });

                if (!response.ok) {
                    throw new Error("Server error: " + response.status);
                }

                const result = await response.json();

                if (!result.success) {
                    alert(result.msg || "Load failed");
                    return;
                }

                renderBinDetail(result.data);

            } catch (error) {
                alert("Error: " + error.message);
            }
        }

        async function renderBinDetail(bin) {

            const info = document.getElementById("binInfo");

            info.innerHTML = `
                <p><strong>ID:</strong> ${bin.id}</p>
                <p><strong>Location:</strong> ${bin.location_in_warehouse}</p>
                <p><strong>Status:</strong> ${getStatusBadge(bin.status)}</p>
                <p><strong>Warehouse:</strong> ${bin.warehouse?.name || "-"}</p>
            `;

            const container = document.getElementById("componentList");
            container.innerHTML = "";

            if (!bin.components || bin.components.length === 0) {
                container.innerHTML = `
                    <tr>
                        <td colspan="3" style="padding:15px;text-align:center">
                            No components in this bin
                        </td>
                    </tr>
                `;
                return;
            }

            const promises = bin.components.map(c =>
                fetch(`/api/manager/get-component/${c.component_id}?fullInfo=true`, {
                    credentials: 'include'
                }).then(res => res.json())
            );

            const results = await Promise.all(promises);

            bin.components.forEach((binComp, index) => {

                const result = results[index];
                const row = document.createElement("tr");

                if (!result.success) {
                    row.innerHTML = `
                        <td>${binComp.id}</td>
                        <td>Load failed</td>
                        <td>${binComp.quantity}</td>
                    `;
                    container.appendChild(row);
                    return;
                }

                const component = result.data;
                const metadata = component.metadata || {};
                const categories = component.categories
                    ? component.categories.map(c => c.name).join(", ")
                    : "-";

                const manufactureDate = metadata.manufacturing_date &&
                    metadata.manufacturing_date !== "0001-01-01T00:00:00"
                    ? new Date(metadata.manufacturing_date).toLocaleDateString()
                    : "-";

                row.innerHTML = `
                    <td>${binComp.id}</td>
                    <td>
                        <b>${metadata.name || "Unnamed"}</b><br>
                        <small>${metadata.desc || ""}</small><br>
                        <small><b>Manufacturer:</b> ${metadata.manufacturer || "-"}</small><br>
                        <small><b>Manufacturing Date:</b> ${manufactureDate}</small><br>
                        <small><b>Unit:</b> ${component.unit || "-"}</small><br>
                        <small><b>Unit Price:</b> ${component.unit_price?.toLocaleString() || 0} VND</small><br>
                        <small><b>Categories:</b> ${categories}</small><br>
                        ${metadata.datasheet_url ?
                        `<small><a href="${metadata.datasheet_url}" target="_blank">Datasheet</a></small><br>`
                        : ""}
                        ${metadata.image_url ?
                        `<br><img src="${metadata.image_url}" width="60" style="margin-top:5px;border-radius:4px;">`
                        : ""}
                    </td>
                    <td>${binComp.quantity}</td>
                `;

                container.appendChild(row);
            });
        }

        function getStatusBadge(status) {
            switch (status) {
                case 0: return `<span class="badge badge-empty">Empty</span>`;
                case 1: return `<span class="badge badge-inuse">In Use</span>`;
                case 2: return `<span class="badge badge-disabled">Disabled</span>`;
                default: return status;
            }
        }
        //Profile
        function toggleProfileMenu() {
            document.getElementById("profileDropdown").classList.toggle("show");
        }

        // Đóng dropdown khi click ra ngoài
        window.onclick = function (event) {
            if (!event.target.closest('.profile-container')) {
                document.getElementById("profileDropdown").classList.remove("show");
            }
        }


    </script>

</body>
</html>
