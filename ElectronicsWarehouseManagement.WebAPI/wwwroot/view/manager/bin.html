<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bins | Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/manager-basic.css">
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column">
        <div class="p-3">
            <h5 class="fw-bold mb-0">E-Warehouse</h5>
        </div>
        <nav class="nav flex-column mt-3">
            <a class="nav-link" href="home.html">Dashboard</a>
            <a class="nav-link" href="component-inventory.html">Components</a>
            <a class="nav-link" href="transfers.html">Transfers</a>
            <a class="nav-link" href="warehouses.html">Warehouses</a>
            <a class="nav-link active" href="bins.html">Bins</a>
        </nav>
    </div>

    <!-- Header -->
    <header class="header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Bin Management</h5>
    </header>

    <!-- Main -->
    <main class="main-content">
        <div class="container-fluid">

            <h5 class="fw-bold mb-3">Bin List</h5>

            <div class="card shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Location</th>
                                <th>Status</th>
                                <th>Warehouse</th>
                                <th class="text-end">Action</th>
                            </tr>
                        </thead>
                        <tbody id="binTable">
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Pagination -->
            <div class="d-flex justify-content-between align-items-center mt-3">
                <button class="btn btn-sm btn-outline-secondary" id="prevBtn">Previous</button>
                <span id="pageInfo" class="small text-muted"></span>
                <button class="btn btn-sm btn-outline-secondary" id="nextBtn">Next</button>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/bins.js"></script>

</body>
</html>
