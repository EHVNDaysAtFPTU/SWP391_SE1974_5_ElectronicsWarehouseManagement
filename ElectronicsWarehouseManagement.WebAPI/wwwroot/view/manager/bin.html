<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bins | Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/manager-basic.css">
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column">
        <div class="p-3">
            <h5 class="fw-bold mb-0">E-Warehouse</h5>
        </div>
        <nav class="nav flex-column mt-3">
            <a class="nav-link" href="home.html">Dashboard</a>
            <a class="nav-link" href="component-inventory.html">Components</a>
            <a class="nav-link" href="transfers.html">Requests</a>
            <a class="nav-link" href="warehouses.html">Warehouses</a>
            <a class="nav-link active" href="bin.html">Bins</a>
            <a class="nav-link" href="customer.html">Customers</a>
        </nav>
    </div>

    <!-- Header -->
    <header class="header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Bin Management</h5>
        <div class="profile-container position-relative">
            <div class="cursor-pointer d-flex align-items-center" onclick="toggleProfileMenu()">
                <img src="https://i.pravatar.cc/40?img=12" alt="Profile" class="rounded-circle me-2 border" width="40">
                <span class="small fw-bold">Manager Dashboard</span>
            </div>

            <div class="profile-dropdown" id="profileDropdown">
                <a onclick="openProfile()">Profile</a>
                <hr class="my-1">
                <a href="#" onclick="logout()" class="text-danger">Logout</a>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="main-content">
        <div class="container-fluid">

            <h5 class="fw-bold mb-3">Bin List</h5>

            <!-- Filters Card -->
            <div class="card shadow-sm p-3 mb-4">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label small">Search Location</label>
                        <input type="text" id="searchInput" class="form-control" placeholder="Search location...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Sort By</label>
                        <select id="sortBy" class="form-select">
                            <option value="location">Default (Location)</option>
                            <option value="status">Status</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Order</label>
                        <select id="sortDirection" class="form-select">
                            <option value="asc">Ascending</option>
                            <option value="desc">Descending</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-primary w-100" onclick="applyFilter()">Search</button>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <span id="infoText" class="small fw-bold text-muted">Loading bins...</span>
                    <button type="button" class="btn btn-primary ms-auto" onclick="openCreateBinModal()">
                        + Create Bin
                    </button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Location</th>
                                <th>Status</th>
                                <th>Warehouse</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="binTable">
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Pagination -->
            <div class="p-4 border-top card shadow-sm mt-3">
                <div id="pagination"></div>
                <div class="text-center mt-3">
                    <label class="small me-2">Items per page:</label>
                    <select id="pageSize" class="form-select d-inline-block w-auto form-select-sm">
                        <option value="5" selected>5</option>
                        <option value="10">10</option>
                        <option value="20">20</option>
                    </select>
                </div>
            </div>

        </div>
    </main>
    <!-- CREATE BIN MODAL -->
    <div class="modal fade" id="createBinModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 shadow">

                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Create Bin</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <!-- Location -->
                    <div class="mb-3">
                        <label class="form-label small">Location in Warehouse</label>
                        <input id="binLocation" class="form-control" placeholder="e.g. A1, Shelf B2">
                    </div>

                    <!-- Warehouse Dropdown -->
                    <div class="mb-3">
                        <label class="form-label small">Select Warehouse</label>
                        <select id="warehouseSelect" class="form-select">
                            <option value="">Loading...</option>
                        </select>
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-light border" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary px-4" onclick="createBin()">Create</button>
                </div>

            </div>
        </div>
    </div>

    <!-- EDIT BIN MODAL -->
    <div class="modal fade" id="editBinModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 shadow">

                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Edit Bin</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="editBinId">

                    <!-- Location -->
                    <div class="mb-3">
                        <label class="form-label small">Location in Warehouse</label>
                        <input id="editBinLocation" class="form-control" placeholder="e.g. A1, Shelf B2">
                    </div>

                    <!-- Status -->
                    <div class="mb-3">
                        <label class="form-label small">Status</label>
                        <select id="editBinStatus" class="form-select">
                            <option value="1">Empty</option>
                            <option value="2">Available</option>
                            <option value="3">Locked</option>
                        </select>
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-light border" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary px-4" onclick="updateBin()">Save Changes</button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/bins.js"></script>

</body>
</html>
