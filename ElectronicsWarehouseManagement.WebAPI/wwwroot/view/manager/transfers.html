<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Transfer List</title>
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/table-style.css">
</head>

<body>

    <header class="header">
        <div class="logo">My Manager</div>

        <div class="profile-container">
            <div class="profile" onclick="toggleProfileMenu()">
                <img src="https://i.pravatar.cc/40" alt="Profile">
                <span class="username">Manager</span>
            </div>

            <div class="profile-dropdown" id="profileDropdown">
                <a href="profile.html">Thông tin cá nhân</a>
                <a href="account.html">Quản lí tài khoản</a>
                <a href="logout.html" class="logout">Logout</a>
            </div>
        </div>
    </header>

    <div class="wrapper">

        <div class="sidebar">
            <ul>
                <li><a href="home.html">Dashboard</a></li>
                <li><a href="component-inventory.html">Components</a></li>
                <li><a href="transfers.html">Transfers</a></li>
                <li><a href="warehouses.html">Warehouses</a></li>
                <li><a href="bin.html">Bins</a></li>
            </ul>
        </div>

        <div class="content">

            <h2>Transfer List</h2>

            Transfer per page:
            <select id="pageSize">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="20">20</option>
            </select>

            <br><br>

            <div id="infoText"></div>
            <br>

            <table id="transferTable" width="100%">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Description</th>
                        <th>Type</th>
                        <th>Creation Date</th>
                        <th>Execution Date</th>
                        <th>Status</th>
                        <th>Monitor Status</th>
                        <th>Detail</th>
                        <th>Decision</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <br>
            <div id="pagination"></div>
            <br>
            <div id="message"></div>

        </div>
    </div>

    <script>

        const STATUS = {
            PENDING: 1,
            APPROVED: 2,
            REJECTED: 3,
            CONFIRMED:4
        };

        let currentPage = 1;
        let pageSize = 10;
        let totalPages = 1;

        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById("pageSize").addEventListener("change", changePageSize);
            loadTransfers(1);
        });

        async function loadTransfers(page) {
            currentPage = page;

            const response = await fetch(
                `/api/manager/get-transfers?pageNumber=${page}&pageSize=${pageSize}`,
                { credentials: "include" }
            );

            const result = await response.json();

            if (!result.success) {
                showMessage(result.msg || "Load failed");
                return;
            }

            const data = result.data;
            renderInfo(data.totalCount);
            renderTable(data.data);
            renderPagination(data.totalPages);
        }

        function renderTable(data) {
            const tbody = document.querySelector("#transferTable tbody");
            tbody.innerHTML = "";

            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9">No transfers found</td></tr>`;
                return;
            }

            data.forEach(t => {
                const row = document.createElement("tr");

                row.innerHTML = `
                <td>${t.id ?? "-"}</td>
                <td>${t.description ?? "-"}</td>
                <td>${getTypeText(t.type)}</td>
                <td>${formatDate(t.creation_date)}</td>
                <td>${t.execution_date ? formatDate(t.execution_date) : "-"}</td>
                <td>${getStatusText(t.status)}</td>
                <td>${transferMonitorStatus(t)}</td>
                <td>
                    <button onclick="viewTransfer(${t.id})">View</button>
                </td>
                <td>
                    ${renderDecisionButtons(t)}
                </td>
            `;

                tbody.appendChild(row);
            });
        }

        function renderDecisionButtons(t) {
            if (t.status !== STATUS.PENDING) return "-";

            return `
            <button onclick="updateTransferStatus(${t.id}, ${STATUS.APPROVED})">Approve</button>
            <button onclick="updateTransferStatus(${t.id}, ${STATUS.REJECTED})">Reject</button>
        `;
        }

        async function updateTransferStatus(transferId, decision) {
            const response = await fetch(
                `/api/manager/transfer-requests/${transferId}/decisions`,
                {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ decision: decision })
                }
            );

            const result = await response.json();

            if (response.ok && result.success) {
                showMessage("Updated successfully");
                loadTransfers(currentPage);
            } else {
                showMessage(result.msg || "Update failed");
            }
        }

        function getStatusText(status) {
            switch (status) {
                case STATUS.PENDING: return "Pending";
                case STATUS.APPROVED: return "Approved";
                case STATUS.REJECTED: return "Rejected";
                case STATUS.CONFIRMED: return "Confirmed";
                default: return "Unknown";
            }
        }

        function transferMonitorStatus(t) {
            if (t.status === STATUS.PENDING) return "Not Yet";
            if (t.status === STATUS.CONFIRMED && t.execution_date) return "Done";
            if (t.status === STATUS.APPROVED) return "Processing";
            if (t.status === STATUS.REJECTED) return "Canceled";
            return "Unknown";
        }

        function getTypeText(type) {
            switch (type) {
                case 1: return "Inbound";
                case 2: return "Outbound";
                case 3: return "Internal";
                default: return "Unknown";
            }
        }

        function formatDate(dateString) {
            if (!dateString) return "-";
            return new Date(dateString).toLocaleDateString("en-US");
        }

        function renderInfo(totalCount) {
            document.getElementById("infoText").innerText =
                `Showing ${(currentPage - 1) * pageSize + 1}
             to ${Math.min(currentPage * pageSize, totalCount)}
             of ${totalCount}`;
        }

        function renderPagination(pages) {
            totalPages = pages;
            const container = document.getElementById("pagination");
            container.innerHTML = "";

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement("button");
                btn.innerText = i;
                btn.disabled = (i === currentPage);
                btn.onclick = () => loadTransfers(i);
                container.appendChild(btn);
            }
        }

        function changePageSize() {
            pageSize = parseInt(document.getElementById("pageSize").value);
            loadTransfers(1);
        }

        function showMessage(msg) {
            document.getElementById("message").innerText = msg;
        }

        function viewTransfer(id) {
            window.location.href = `transfer-detail.html?id=${id}`;
        }

        function toggleProfileMenu() {
            document.getElementById("profileDropdown").classList.toggle("show");
        }

        window.onclick = function (event) {
            if (!event.target.closest('.profile-container')) {
                document.getElementById("profileDropdown").classList.remove("show");
            }
        }

    </script>

</body>
</html>
