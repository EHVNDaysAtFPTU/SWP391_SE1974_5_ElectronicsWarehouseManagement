<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bin List</title>

    <link rel="stylesheet" href="css/layout.css">

    <style>
        .content {
            min-height: 750px;
            padding: 25px;
            background: #f9fbfd;
        }

        h2 {
            margin-bottom: 10px;
        }

        /* ===== BACK BUTTON ===== */
        .back-btn {
            background: #2f80ed;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            margin-bottom: 20px;
        }

            .back-btn:hover {
                background: #1c60c9;
            }

        /* ===== BIN TABLE STYLE ===== */
        .bin-container {
            margin-top: 20px;
        }

        .bin-header,
        .bin-row {
            display: grid;
            grid-template-columns: 80px 2fr 1fr 120px 140px;
            align-items: center;
            padding: 12px 15px;
        }

        .bin-header {
            font-weight: 600;
            background: #eef2f7;
            border: 1px solid #dfe6ee;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
        }

        .bin-list {
            height: 450px;
            overflow-y: auto;
            border: 1px solid #dfe6ee;
            border-radius: 0 0 8px 8px;
            background: white;
        }

        .bin-row {
            border-bottom: 1px solid #f0f2f5;
            min-height: 50px;
            transition: background 0.2s;
        }

            .bin-row:hover {
                background: #f5f9ff;
            }

            .bin-row:last-child {
                border-bottom: none;
            }

        /* ===== BUTTON ===== */
        .view-btn {
            background: #27ae60;
            border: none;
            padding: 6px 10px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }

            .view-btn:hover {
                background: #1e874b;
            }

        /* ===== BADGE ===== */
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-empty {
            background: #9e9e9e;
        }

        .badge-inuse {
            background: #27ae60;
        }

        .badge-disabled {
            background: #e74c3c;
        }

        /* ===== SKELETON ===== */
        .skeleton {
            height: 16px;
            background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">My Manager</div>

        <div class="profile-container">
            <div class="profile" onclick="toggleProfileMenu()">
                <img src="https://i.pravatar.cc/40" alt="Profile">
                <span class="username">Manager</span>
            </div>

            <div class="profile-dropdown" id="profileDropdown">
                <a href="profile.html">Thông tin cá nhân</a>
                <a href="account.html">Quản lí tài khoản</a>
                <a href="logout.html" class="logout">Logout</a>
            </div>
        </div>
    </header>

    <div class="wrapper">

        <div class="sidebar">
            <ul>
                <li><a href="home.html">Dashboard</a></li>
                <li><a href="component-inventory.html">Components</a></li>
                <li><a href="warehouse.html">Warehouses</a></li>
                <li><a href="bin.html" class="active">Bins</a></li>
                <li><a href="transfer-list.html">Transfers</a></li>
            </ul>
        </div>

        <div class="content">

            <h2>Bin List</h2>

            <button class="back-btn" onclick="goBack()">← Back to Warehouses</button>

            <div class="bin-container">

                <div class="bin-header">
                    <div>ID</div>
                    <div>Location</div>
                    <div>Status</div>
                    <div>Components</div>
                    <div>Action</div>
                </div>

                <div id="binList" class="bin-list"></div>

            </div>

        </div>
    </div>

    <script>

        let warehouseId = null;

        document.addEventListener("DOMContentLoaded", function () {

            const params = new URLSearchParams(window.location.search);
            warehouseId = params.get("warehouseId");

            if (!warehouseId) {
                alert("Warehouse ID not found");
                return;
            }

            loadBins();
        });

        function goBack() {
            window.location.href = "warehouses.html";
        }

        /* ===== SKELETON ===== */
        function showSkeleton() {
            const container = document.getElementById("binList");
            container.innerHTML = "";

            for (let i = 0; i < 8; i++) {
                const row = document.createElement("div");
                row.className = "bin-row";
                row.innerHTML = `
                    <div class="skeleton"></div>
                    <div class="skeleton"></div>
                    <div class="skeleton"></div>
                    <div class="skeleton"></div>
                    <div class="skeleton"></div>
                `;
                container.appendChild(row);
            }
        }

        /* ===== LOAD DATA ===== */
        async function loadBins() {

            showSkeleton();

            try {

                const response = await fetch(
                    `/api/manager/get-bins/${warehouseId}?pageNumber=1&pageSize=100&fullInfo=true`,
                    { credentials: 'include' }
                );

                if (!response.ok) {
                    throw new Error("Server error: " + response.status);
                }

                const result = await response.json();

                if (!result.success) {
                    alert(result.msg || "Load bins failed");
                    return;
                }

                renderBins(result.data.data);

            } catch (error) {
                console.error(error);
                alert("Error loading bins");
            }
        }

        /* ===== RENDER ===== */
        function renderBins(bins) {

            const container = document.getElementById("binList");
            container.innerHTML = "";

            if (!bins || bins.length === 0) {
                container.innerHTML = "<div style='padding:15px'>No bins found</div>";
                return;
            }

            bins.forEach(b => {

                const row = document.createElement("div");
                row.className = "bin-row";

                row.innerHTML = `
                    <div>${b.id}</div>
                    <div>${b.location_in_warehouse || "-"}</div>
                    <div>${getStatusBadge(b.status)}</div>
                    <div>${b.components ? b.components.length : 0}</div>
                    <div>
                        <button class="view-btn" onclick="viewDetail(${b.id})">
                            View Detail
                        </button>
                    </div>
                `;

                container.appendChild(row);
            });
        }

        /* ===== NAVIGATE ===== */
        function viewDetail(id) {
            window.location.href = `bin-detail.html?binId=${id}`;
        }

        /* ===== BADGE ===== */
        function getStatusBadge(status) {
            switch (status) {
                case 0:
                    return `<span class="badge badge-empty">Empty</span>`;
                case 1:
                    return `<span class="badge badge-inuse">In Use</span>`;
                case 2:
                    return `<span class="badge badge-disabled">Disabled</span>`;
                default:
                    return status;
            }
        }
        //Profile
        function toggleProfileMenu() {
            document.getElementById("profileDropdown").classList.toggle("show");
        }

        // Đóng dropdown khi click ra ngoài
        window.onclick = function (event) {
            if (!event.target.closest('.profile-container')) {
                document.getElementById("profileDropdown").classList.remove("show");
            }
        }

    </script>

</body>
</html>
