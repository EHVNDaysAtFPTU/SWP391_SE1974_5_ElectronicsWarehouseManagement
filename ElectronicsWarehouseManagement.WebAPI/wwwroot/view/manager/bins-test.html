<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bin List</title>
</head>
<body>

    <h2>Bin List</h2>

    <button onclick="goBack()">← Back to Warehouses</button>

    <br><br>

    <table border="1" cellpadding="8" cellspacing="0" width="100%">
        <thead>
            <tr>
                <th>ID</th>
                <th>Location</th>
                <th>Status</th>
                <th>Components Count</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="binTable"></tbody>
    </table>

    <script>

        let warehouseId = null;

        document.addEventListener("DOMContentLoaded", function () {

            // Lấy warehouseId từ URL
            const params = new URLSearchParams(window.location.search);
            warehouseId = params.get("warehouseId");

            if (!warehouseId) {
                alert("Warehouse ID not found");
                return;
            }

            loadBins();
        });

        function goBack() {
            window.location.href = "warehouses.html";
        }

        async function loadBins() {

            try {

                const response = await fetch(
                    `/api/manager/get-bins/${warehouseId}?pageNumber=1&pageSize=100&fullInfo=true`,
                    { credentials: 'include' }
                );

                const result = await response.json();

                if (!result.success) {
                    alert(result.msg || "Load bins failed");
                    return;
                }

                renderBins(result.data.data);

            } catch (error) {
                console.error(error);
                alert("Error loading bins");
            }
        }

        function renderBins(bins) {

            const tbody = document.getElementById("binTable");
            tbody.innerHTML = "";

            if (!bins || bins.length === 0) {
                const row = tbody.insertRow();
                const cell = row.insertCell();
                cell.colSpan = 5;
                cell.innerText = "No bins found";
                return;
            }

            bins.forEach(b => {

                const row = tbody.insertRow();

                row.insertCell().innerText = b.id;
                row.insertCell().innerText = b.location_in_warehouse || "";
                row.insertCell().innerText = b.status;
                row.insertCell().innerText = b.components ? b.components.length : 0;

                const actionCell = row.insertCell();

                const detailBtn = document.createElement("button");
                detailBtn.innerText = "View Detail";
                detailBtn.onclick = function () {
                    window.location.href = `bin-detail-test.html?binId=${b.id}`;
                };

                actionCell.appendChild(detailBtn);
            });
        }

    </script>

</body>
</html>
