<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bin Detail</title>
</head>
<body>

    <h2>Bin Detail</h2>

    <button onclick="goBack()">← Back to Bin List</button>

    <br><br>

    <div id="binInfo"></div>

    <h3>Components In This Bin</h3>

    <table border="1" cellpadding="8" cellspacing="0" width="100%">
        <thead>
            <tr>
                <th>ID</th>
                <th>Component ID</th>
                <th>Quantity</th>
            </tr>
        </thead>
        <tbody id="componentTable"></tbody>
    </table>

    <script>

let binId = null;

document.addEventListener("DOMContentLoaded", function () {

    const params = new URLSearchParams(window.location.search);
    binId = params.get("binId");

    if (!binId) {
        alert("Bin ID not found");
        return;
    }

    loadBinDetail();
});

function goBack() {
    history.back();
}

async function loadBinDetail() {

    const response = await fetch(
        `/api/manager/get-bin/${binId}?fullInfo=true`,
        { credentials: 'include' }
    );

    const result = await response.json();

    if (!result.success) {
        alert(result.msg || "Load bin detail failed");
        return;
    }

    renderBinDetail(result.data);
}

function renderBinDetail(bin) {

    const info = document.getElementById("binInfo");

    info.innerHTML = `
        <p><strong>ID:</strong> ${bin.id}</p>
        <p><strong>Location:</strong> ${bin.location_in_warehouse}</p>
        <p><strong>Status:</strong> ${bin.status}</p>
        <p><strong>Warehouse:</strong> ${bin.warehouse.name}</p>
    `;

    const tbody = document.getElementById("componentTable");
    tbody.innerHTML = "";

    if (!bin.components || bin.components.length === 0) {
        const row = tbody.insertRow();
        const cell = row.insertCell();
        cell.colSpan = 3;
        cell.innerText = "No components in this bin";
        return;
    }

    bin.components.forEach(c => {
        const row = tbody.insertRow();
        row.insertCell().innerText = c.id;
        row.insertCell().innerText = c.component_id;
        row.insertCell().innerText = c.quantity;
    });
}

    </script>

</body>
</html>
