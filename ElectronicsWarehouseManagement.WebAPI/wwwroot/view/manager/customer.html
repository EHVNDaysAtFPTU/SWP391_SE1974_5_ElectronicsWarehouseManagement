<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers | Manager</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Manager Styles -->
    <link rel="stylesheet" href="css/manager-basic.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column">
        <div class="p-3">
            <h5 class="fw-bold mb-0">E-Warehouse</h5>
        </div>
        <nav class="nav flex-column mt-3">
            <a class="nav-link" href="home.html">Dashboard</a>
            <a class="nav-link" href="component-inventory.html">Components</a>
            <a class="nav-link" href="transfers.html">Requests</a>
            <a class="nav-link" href="warehouses.html">Warehouses</a>
            <a class="nav-link" href="bin.html">Bins</a>
            <a class="nav-link active" href="customer.html">Customers</a>
        </nav>
    </div>

    <!-- Header -->
    <header class="header d-flex justify-content-between align-items-center">
        <div>
            <h5 class="mb-0">Customer List</h5>
            <small class="text-muted">Add, update customer in this list</small>
        </div>

        <div class="profile-container position-relative">
            <div class="cursor-pointer d-flex align-items-center" onclick="toggleProfileMenu()">
                <img src="https://i.pravatar.cc/40?img=12" alt="Profile" class="rounded-circle me-2 border" width="40">
                <span class="small fw-bold">Manager Dashboard</span>
            </div>

            <div class="profile-dropdown" id="profileDropdown">
                <a href="profile.html">My Profile</a>
                <hr class="my-1">
                <a href="#" onclick="logout()" class="text-danger">Logout</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container-fluid">

            <div id="messageContainer"></div>

            <!-- Page Controls -->
            <div class="card shadow-sm p-3 mb-4">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label small">Search Customer Name</label>
                        <input type="text" id="searchInput" class="form-control" placeholder="Search keywords...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Sort By</label>
                        <select id="sortBy" class="form-select">
                            <option value="">Default (ID)</option>
                            <option value="createdAt">Creation Time</option>
                            <option value="customerName">Name</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Order</label>
                        <select id="sortDirection" class="form-select">
                            <option value="asc">Ascending</option>
                            <option value="desc">Descending</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-primary w-100" onclick="applyFilter()">Search</button>
                    </div>
                </div>
                <div class="row g-3 align-items-center mt-2">
                    <div class="col-md-6">
                        <label class="small me-2">Show</label>
                        <select id="pageSize" class="form-select d-inline-block w-auto">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="20">20</option>
                        </select>
                        <span class="small text-muted ms-2">items per page</span>
                    </div>
                    <div class="col-md-6 text-end">
                        <button class="btn btn-outline-secondary" onclick="loadCustomers(1)">Refresh List</button>
                    </div>
                </div>
            </div>

            <!-- Content Card -->
            <div class="card shadow-sm">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <span id="infoText" class="small fw-bold text-muted">Loading transfers...</span>
                    <button type="button" class="btn btn-primary ms-auto" onclick="openCreate()">
                        Điền thông tin
                    </button>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="transferTable">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Customer Name</th>
                                <th>Phone</th>
                                <th>Email</th>
                                <th>Address</th>
                                <th>Created Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="itemsTable">
                            <!-- JS content -->
                        </tbody>
                    </table>
                </div>

                <div class="p-4 border-top">
                    <div id="pagination"></div>
                </div>
            </div>

        </div>
    </main>
    <!-- Customer Form Modal -->
    <div class="modal fade" id="formModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Customer Information</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="customerForm">

                        <input type="hidden" id="customerId">

                        <div class="mb-3">
                            <label class="form-label">Customer Name</label>
                            <input type="text" id="customerName" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" id="phone" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <input type="text" id="address" class="form-control">
                        </div>

                    </form>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" onclick="saveCustomer()">Save</button>
                </div>

            </div>
        </div>
    </div>
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/customers.js"></script>
</body>
</html>
