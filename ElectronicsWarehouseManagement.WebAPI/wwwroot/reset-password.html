<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Reset password</title>
    <meta content="width=device-width,initial-scale=1" name="viewport">
    <script type="text/javascript">
        //TODO: change `alert` to a better UI element
        window.addEventListener('load', function () {
            var urlParams = new URLSearchParams(window.location.search);
            var token = urlParams.get('token');
            if (!token) {
                window.location.href = '/';
                return;
            }
            history.replaceState({}, '', window.location.origin + window.location.pathname);

            async function resetPassword() {
                var newPassword = document.getElementById('newPassword').value;
                var confirmPassword = document.getElementById('confirmPassword').value;
                if (newPassword !== confirmPassword) {
                    alert('Passwords do not match!');
                    return;
                }
                var response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: newPassword, confirm_password: confirmPassword })
                });
                var responseData = await response.json();
                if (responseData.success) {
                    alert('Password reset successful! You can now log in with your new password.');
                    window.location.href = '/';
                    return;
                }
                alert('Error resetting password: ' + responseData.msg);
            }
            document.getElementById('resetBtn').addEventListener('click', () => {
                resetPassword().catch(err => {
                    alert('An error occurred: ' + err.message);
                });
            });
        });
    </script>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle,black 0%, #0000ff 40%, #0099ff 90%);
        }

        h1 {
            color: #4e54c8;
            margin: 0;
        }

        .container {
            padding: 2rem 2.5rem;
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px #3c3c7826;
            max-width: 350px;
            margin: 50px 0;
            width: 100%;
        }

        .title {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .fields {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .fields label {
            color: #000066;
            font-weight: bold;
        }

        .fields input[type="password"] {

            padding: .7rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            transition: border .2s;
            color: #000066;
        }

        .fields input:focus {
            border-color: #4e54c8;
            outline: 0
        }

        .fields button {
            padding: .8rem;
            background: #4e54c8;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background .2s;
            width: 100%;
        }

        .fields button:hover {
            background: #6c70e5
        }

        .fields button:hover {
            background-color: #0056b3;
        }

        @media (max-width:480px) {
            .container {
                padding: 1rem
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">
            <h1>Reset Password</h1>
        </div>
        <div class="fields">
            <label for="newPassword">New password:</label>
            <input type="password" id="newPassword" name="newPassword" />
            <label for="confirmPassword">Confirm new password:</label>
            <input type="password" id="confirmPassword" name="confirmPassword" />
            <button id="resetBtn">Reset password</button>
        </div>
    </div>
</body>

</html>
