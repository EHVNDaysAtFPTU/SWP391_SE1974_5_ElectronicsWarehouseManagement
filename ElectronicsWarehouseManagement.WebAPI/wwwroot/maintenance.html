<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Maintenance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            color: #222;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        .card h1,
        .card h2,
        .card h3 {
            margin-bottom: 10px;
            color: #111827;
        }

        .card p {
            margin: 8px 0;
            color: #6b7280;
            font-size: 14px;
        }

        .btn {
            padding: 10px 14px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 18px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Scheduled Maintenance</h1>
        <p>The system is preparing for scheduled maintenance.</p>
        <p>Please save your work and log out.</p>
        <div class="actions">
            <button class="btn btn-primary" onclick="doLogout()">Log Out</button>
        </div>
    </div>
    <script>
        async function doLogout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
            } catch (e) {
                console.error("Error during logout:", e);
            }
            window.location.href = '/login';
        }
    </script>
</body>

</html>
